name: Build Multi Apps (Modular Injector)

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: "Link IPA gốc (YouTube, TikTok, Facebook...)"
        required: true
        type: string
      tweak_app_type:
        description: "Loại Tweak App (Chọn thư mục DEB tương ứng)"
        required: true
        type: choice
        default: 'YouTube'
        options:
          - 'YouTube'
          - 'Facebook'
          - 'TikTok'
          - 'General'
      app_name:
        description: "Tên hiển thị (Để trống = Mặc định)"
        default: ""
        required: false
        type: string
      bundle_id:
        description: "Bundle ID (Để trống = Mặc định)"
        default: ""
        required: false
        type: string
      extra_tweak_links:
        description: "Link Tweak bổ sung (Nhiều link cách nhau bởi dấu cách)"
        default: ""
        required: false
        type: string

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          path: main

      - name: 🏗️ Cài đặt công cụ tiêm (Cyan)
        run: |
          brew install ldid dpkg make
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: 📦 Gom Tweaks (Nội bộ + Link ngoài)
        run: |
          mkdir -p tweaks_to_inject
          
          # 1. Lấy Tweak nội bộ từ kho debs/
          TWEAK_FOLDER="${{ github.event.inputs.tweak_app_type }}"
          if [ -d "main/debs/$TWEAK_FOLDER" ]; then
            echo "📥 Thu thập Tweaks từ debs/$TWEAK_FOLDER..."
            cp main/debs/$TWEAK_FOLDER/*.deb tweaks_to_inject/ || true
          fi
          
          # 2. Tải thêm Tweaks từ link bên ngoài (nếu có)
          EXT_LINKS="${{ github.event.inputs.extra_tweak_links }}"
          for link in $EXT_LINKS; do
            if [ ! -z "$link" ]; then
              echo "🌐 Đang tải Tweak: $link"
              wget -q "$link" -P tweaks_to_inject/ || echo "❌ Lỗi tải link: $link"
            fi
          done

      - name: 📥 Xử lý IPA (Auto Detect Info)
        id: ipa_info
        run: |
          echo "🚚 Đang tải IPA gốc..."
          wget -q "${{ github.event.inputs.decrypted_ipa_url }}" -O original.ipa
          
          echo "🔍 Trích xuất thông tin App..."
          unzip -q original.ipa -d tmp
          INFO_PLIST=$(find tmp/Payload -name "Info.plist" | head -n 1)
          
          # Lấy thông tin gốc để dùng nếu người dùng để trống
          ORIG_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$INFO_PLIST")
          ORIG_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFO_PLIST")
          
          # Xử lý Tên
          FINAL_NAME="${{ github.event.inputs.app_name }}"
          [ -z "$FINAL_NAME" ] && FINAL_NAME="$ORIG_NAME"
          
          # Xử lý Bundle ID
          FINAL_ID="${{ github.event.inputs.bundle_id }}"
          [ -z "$FINAL_ID" ] && FINAL_ID="$ORIG_ID"
          
          echo "final_name=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "final_id=$FINAL_ID" >> $GITHUB_OUTPUT
          
          echo "🧹 Dọn dẹp PlugIns & Watch App..."
          rm -rf tmp/Payload/*.app/PlugIns/* || true
          rm -rf tmp/Payload/*.app/Watch || true
          
          cd tmp && zip -vrq ../clean.ipa Payload && cd ..
          echo "✅ Đã chuẩn bị IPA sạch."

      - name: 💉 Tiêm Tweaks & Đóng gói (Cyan)
        run: |
          mkdir -p output
          # -u: Un-restrict (Cần cho Sideload)
          # -f: Folder chứa toàn bộ tweaks
          cyan -i clean.ipa \
               -o "output/${{ steps.ipa_info.outputs.final_name }}.ipa" \
               -n "${{ steps.ipa_info.outputs.final_name }}" \
               -b "${{ steps.ipa_info.outputs.final_id }}" \
               -u -f tweaks_to_inject/

      - name: 💾 Upload Thành phẩm
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ipa_info.outputs.final_name }}-Patched
          path: output/*.ipa
          retention-days: 7
