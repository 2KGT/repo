name: Build Multi Apps (Modular Injector)

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: "Link IPA gốc (YouTube, TikTok, Facebook...)"
        required: true
        type: string
      app_type:
        description: "Loại App (Để tự động lấy Tweak tương ứng)"
        required: true
        type: choice
        default: 'YouTube'
        options:
          - 'YouTube'
          - 'Facebook'
          - 'TikTok'
          - 'General' # Dùng cho các app khác
      app_name:
        description: "Tên App hiển thị"
        default: "App Custom"
        required: true
        type: string
      bundle_id:
        description: "Bundle ID"
        default: "com.2kgt.custom"
        required: true
        type: string
      extra_tweak_url:
        description: "Link Tweak bổ sung bên ngoài (Tùy chọn)"
        default: ""
        required: false
        type: string

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          path: main

      - name: 🏗️ Cài đặt công cụ tiêm (Cyan)
        run: |
          brew install ldid dpkg make
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: 📦 Gom Tweaks theo Option
        run: |
          mkdir -p tweaks_to_inject
          
          # 1. Lấy Tweak chung (luôn luôn tiêm, ví dụ: Tweak chặn update hoặc HUD của bạn)
          if [ -d "main/debs/General" ]; then
            cp main/debs/General/*.deb tweaks_to_inject/ || true
          fi
          
          # 2. Lấy Tweak theo loại App đã chọn
          APP_FOLDER="${{ github.event.inputs.app_type }}"
          if [ -d "main/debs/$APP_FOLDER" ]; then
            echo "📥 Đang lấy Tweaks cho $APP_FOLDER..."
            cp main/debs/$APP_FOLDER/*.deb tweaks_to_inject/ || true
          fi
          
          # 3. Lấy Tweak từ link bên ngoài (nếu có)
          if [[ "${{ github.event.inputs.extra_tweak_url }}" != "" ]]; then
            wget "${{ github.event.inputs.extra_tweak_url }}" -P tweaks_to_inject/
          fi

      - name: 📥 Tải & Xử lý IPA
        run: |
          wget "${{ github.event.inputs.decrypted_ipa_url }}" -O original.ipa
          unzip -q original.ipa -d tmp
          # Dọn dẹp để cài đặt dễ dàng hơn
          rm -rf tmp/Payload/*.app/PlugIns/* || true
          rm -rf tmp/Payload/*.app/Watch || true
          cd tmp && zip -vr ../clean.ipa Payload && cd ..

      - name: 💉 Tiêm & Đóng gói
        run: |
          mkdir -p output
          cyan -i clean.ipa \
               -o "output/${{ github.event.inputs.app_name }}.ipa" \
               -n "${{ github.event.inputs.app_name }}" \
               -b "${{ github.event.inputs.bundle_id }}" \
               -u -f tweaks_to_inject/

      - name: 💾 Lưu thành phẩm
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-Patched
          path: output/*.ipa
