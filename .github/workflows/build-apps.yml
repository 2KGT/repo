name: Build Multi Apps (Modular Injector)

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: "Link IPA gốc (Bắt buộc)"
        required: true
        type: string
      tweak_app_type:
        description: "Loại Tweak App (Chọn thư mục DEB tương ứng)"
        required: true
        type: choice
        default: 'YouTube'
        options:
          - 'YouTube'
          - 'Facebook'
          - 'TikTok'
          - 'General'
      app_name:
        description: "Tên hiển thị (Để trống nếu muốn giữ mặc định)"
        default: ""
        required: false
        type: string
      bundle_id:
        description: "Bundle ID (Để trống nếu muốn giữ mặc định)"
        default: ""
        required: false
        type: string
      extra_tweak_links:
        description: "Link Tweak bổ sung (Dán nhiều link cách nhau bởi dấu cách hoặc xuống dòng)"
        default: ""
        required: false
        type: string

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          path: main

      - name: 🏗️ Cài đặt Cyan (Pyzule)
        run: |
          brew install ldid dpkg make
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: 📦 Gom Tweaks (Nội bộ + Nhiều link ngoài)
        run: |
          mkdir -p tweaks_to_inject
          
          # 1. Lấy Tweak nội bộ theo folder đã chọn
          TWEAK_FOLDER="${{ github.event.inputs.tweak_app_type }}"
          if [ -d "main/debs/$TWEAK_FOLDER" ]; then
            cp main/debs/$TWEAK_FOLDER/*.deb tweaks_to_inject/ || true
          fi
          
          # 2. Xử lý nhiều link Tweak bên ngoài
          EXT_LINKS="${{ github.event.inputs.extra_tweak_links }}"
          for link in $EXT_LINKS; do
            echo "🌐 Đang tải Tweak: $link"
            wget "$link" -P tweaks_to_inject/ || echo "❌ Lỗi tải link: $link"
          done

      - name: 📥 Xử lý IPA (Tự động nhận diện Tên/ID)
        id: ipa_info
        run: |
          wget "${{ github.event.inputs.decrypted_ipa_url }}" -O original.ipa
          unzip -q original.ipa -d tmp
          
          # Lấy thông tin gốc từ Info.plist
          INFO_PLIST=$(find tmp/Payload -name "Info.plist" | head -n 1)
          ORIG_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$INFO_PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$INFO_PLIST")
          ORIG_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFO_PLIST")
          
          # Quyết định dùng tên/id nhập vào hay dùng mặc định
          FINAL_NAME="${{ github.event.inputs.app_name }}"
          [ -z "$FINAL_NAME" ] && FINAL_NAME="$ORIG_NAME"
          
          FINAL_ID="${{ github.event.inputs.bundle_id }}"
          [ -z "$FINAL_ID" ] && FINAL_ID="$ORIG_ID"
          
          echo "final_name=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "final_id=$FINAL_ID" >> $GITHUB_OUTPUT
          
          # Dọn dẹp App
          rm -rf tmp/Payload/*.app/PlugIns/* || true
          cd tmp && zip -vr ../clean.ipa Payload && cd ..

      - name: 💉 Tiêm & Đóng gói
        run: |
          mkdir -p output
          # Dùng các thông tin đã trích xuất ở bước trước
          cyan -i clean.ipa \
               -o "output/${{ steps.ipa_info.outputs.final_name }}.ipa" \
               -n "${{ steps.ipa_info.outputs.final_name }}" \
               -b "${{ steps.ipa_info.outputs.final_id }}" \
               -u -f tweaks_to_inject/

      - name: 💾 Lưu thành phẩm
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ipa_info.outputs.final_name }}-Build
          path: output/*.ipa
