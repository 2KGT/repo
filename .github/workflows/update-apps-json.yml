name: Update apps.json from apps/ and Releases

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update apps.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let apps = [];

            // 1. Quét từ thư mục apps/
            try {
              const { data: files } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'apps'
              });

              for (const file of files) {
                if (file.name.toLowerCase().endsWith('.ipa')) {
                  const name = file.name.replace(/\.ipa$/i, '').replace(/_/g, ' ').trim();
                  apps.push({
                    name: name,
                    bundleIdentifier: "com.unknown.app",
                    version: "1.0",
                    downloadURL: `https://2kgt.github.io/repo/apps/${file.name}`,
                    size: file.size || 0,
                    developerName: "Kyic",
                    subtitle: name,
                    description: `${name} IPA`,
                    localizedDescription: `${name} đã được kiểm tra và tổng hợp bởi Kyic.`,
                    versionDate: new Date().toISOString().split('T')[0],
                    iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`
                  });
                }
              }
            } catch (e) {
              console.log("No apps/ folder or no .ipa files found");
            }

            // 2. Quét từ Releases (ưu tiên nếu có file .ipa trong Release)
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              for (const release of releases) {
                for (const asset of release.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const name = asset.name.replace(/\.ipa$/i, '').replace(/_/g, ' ').trim();
                    apps.push({
                      name: name,
                      bundleIdentifier: "com.unknown.app",
                      version: release.tag_name.replace(/^v/i, ''),
                      downloadURL: asset.browser_download_url,
                      size: asset.size,
                      developerName: "Kyic",
                      subtitle: name,
                      description: `${name} ${release.tag_name.replace(/^v/i, '')}`,
                      localizedDescription: release.body || `${name} đã được kiểm tra và tổng hợp bởi Kyic.`,
                      versionDate: release.published_at ? release.published_at.split('T')[0] : new Date().toISOString().split('T')[0],
                      iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`
                    });
                  }
                }
              }
            } catch (e) {
              console.log("No releases found");
            }

            // Giữ lại các app thủ công quan trọng
            const manualApps = [
              {
                "name": "Esign",
                "bundleIdentifier": "com.esign.installer",
                "version": "5.0.2",
                "downloadURL": "https://2kgt.github.io/repo/apps/esign.ipa",
                "size": 7510000,
                "developerName": "Kyic",
                "subtitle": "Công cụ ký IPA mạnh mẽ",
                "description": "Esign v5.0.2",
                "localizedDescription": "Chức năng đã thêm: Hỗ trợ ký nhiều loại chứng chỉ • Tối ưu tốc độ • Giao diện mới.",
                "versionDate": "2026-04-21",
                "iconURL": "https://2kgt.github.io/repo/icons/Esign.png"
              },
              {
                "name": "Turrit",
                "bundleIdentifier": "com.turrit.app",
                "version": "1.4.6",
                "downloadURL": "https://2kgt.github.io/repo/apps/turrit.ipa",
                "size": 88900000,
                "developerName": "Kyic",
                "subtitle": "Ứng dụng Turrit",
                "description": "Turrit - App Telegram bên thứ ba đa năng.",
                "localizedDescription": "Turrit-TGEXtra 1.7.3.",
                "versionDate": "2026-04-21",
                "iconURL": "https://2kgt.github.io/repo/icons/Turrit.png"
              }
            ];

            const finalJson = {
              "name": "Kyic IPA Repository",
              "identifier": "com.kyic.iparepo",
              "iconURL": "https://2kgt.github.io/repo/icons/Kyic.png",
              "apps": [...manualApps, ...apps]
            };

            fs.writeFileSync('apps.json', JSON.stringify(finalJson, null, 2));
            console.log(`✅ apps.json updated with ${apps.length} apps from folder and releases`);