name: Auto Update apps.json

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate apps.json from apps/ folder and Releases
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let apps = [];

            // 1. Quét từ thư mục apps/
            try {
              const appFiles = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'apps'
              });

              for (const file of appFiles.data) {
                if (file.name.toLowerCase().endsWith('.ipa')) {
                  const name = file.name.replace(/\.ipa$/i, '').replace(/_/g, ' ');
                  apps.push({
                    name: name,
                    bundleIdentifier: "com.unknown.app",
                    version: "1.0",
                    downloadURL: `https://2kgt.github.io/repo/apps/${file.name}`,
                    size: file.size || 0,
                    developerName: "Kyic",
                    subtitle: name,
                    description: `${name} IPA`,
                    localizedDescription: `${name} đã được kiểm tra và tổng hợp bởi Kyic.`,
                    versionDate: new Date().toISOString().split('T')[0],
                    iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`
                  });
                }
              }
            } catch (e) {
              console.log("No apps folder or no .ipa files");
            }

            // 2. Quét từ Releases (ưu tiên nếu có)
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              for (const release of releases) {
                for (const asset of release.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const name = asset.name.replace(/\.ipa$/i, '').replace(/_/g, ' ');
                    apps.push({
                      name: name,
                      bundleIdentifier: "com.unknown.app",
                      version: release.tag_name.replace(/^v/i, ''),
                      downloadURL: asset.browser_download_url,
                      size: asset.size,
                      developerName: "Kyic",
                      subtitle: name,
                      description: `${name} ${release.tag_name.replace(/^v/i, '')}`,
                      localizedDescription: release.body || `${name} đã được kiểm tra và tổng hợp bởi Kyic.`,
                      versionDate: release.published_at ? release.published_at.split('T')[0] : new Date().toISOString().split('T')[0],
                      iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`
                    });
                  }
                }
              }
            } catch (e) {
              console.log("No releases or error fetching releases");
            }

            // Giữ lại app thủ công
            const manual = [ /* Esign, Turrit, Zebra... bạn có thể thêm vào đây */ ];

            const finalJson = {
              "name": "Kyic IPA Repository",
              "identifier": "com.kyic.iparepo",
              "iconURL": "https://2kgt.github.io/repo/icons/Kyic.png",
              "apps": [...manual, ...apps]
            };

            fs.writeFileSync('apps.json', JSON.stringify(finalJson, null, 2));
            console.log(`✅ Updated apps.json with ${apps.length} apps from folder and releases`);