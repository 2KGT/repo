name: Update apps.json from Releases

on:
  release:
    types: [published, edited]
  workflow_dispatch:   # Cho phép chạy thủ công

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate apps.json from Releases
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const apps = [];

            for (const release of releases) {
              for (const asset of release.assets) {
                if (asset.name.endsWith('.ipa')) {
                  const appName = asset.name.replace(/\.ipa$/, '').replace(/_/g, ' ').replace(/-\d+$/, '');
                  
                  apps.push({
                    name: appName || release.name || "Unknown App",
                    bundleIdentifier: "com.unknown.app", // Bạn có thể chỉnh sau hoặc để thủ công
                    version: release.tag_name.replace(/^v/, ''),
                    downloadURL: asset.browser_download_url,
                    size: asset.size,
                    developerName: "Kyic",
                    subtitle: appName || release.name,
                    description: release.name || "IPA từ Kyic Repository",
                    localizedDescription: release.body ? release.body.substring(0, 300) : "IPA đã được kiểm tra và tổng hợp bởi Kyic.",
                    versionDate: release.published_at.split('T')[0],
                    iconURL: `https://2kgt.github.io/repo/icons/${appName.replace(/\s+/g, '') || 'Default'}.png`
                  });
                }
              }
            }

            // Giữ lại các app thủ công (như Esign, Turrit) nếu cần
            const manualApps = [
              // Dán phần Esign và Turrit của bạn vào đây
              {
                "name": "Esign",
                "bundleIdentifier": "com.esign.installer",
                "version": "5.0.2",
                "downloadURL": "https://2kgt.github.io/repo/apps/esign.ipa",
                "size": 7510000,
                "developerName": "Kyic",
                "subtitle": "Công cụ ký IPA mạnh mẽ",
                "description": "Esign v5.0.2 - Tool ký và sideload IPA không cần máy tính.",
                "localizedDescription": "Chức năng đã thêm: Hỗ trợ ký nhiều loại chứng chỉ...",
                "versionDate": "2026-04-21",
                "iconURL": "https://2kgt.github.io/repo/icons/Esign.png"
              }
              // Thêm Turrit tương tự nếu muốn
            ];

            const finalApps = [...manualApps, ...apps];

            const jsonContent = {
              "name": "Kyic IPA Repository",
              "identifier": "com.kyic.iparepo",
              "iconURL": "https://2kgt.github.io/repo/icons/Kyic.png",
              "apps": finalApps
            };

            fs.writeFileSync('apps.json', JSON.stringify(jsonContent, null, 2));
            console.log('✅ apps.json đã được tạo tự động từ Releases!');

      - name: Commit and push apps.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update apps.json from new Releases"
          file_pattern: apps.json