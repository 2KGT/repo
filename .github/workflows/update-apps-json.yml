name: Update apps.json from apps/ and Releases

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install IPA Parser
        run: npm install app-info-parser

      - name: Update apps.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            
            const appMap = new Map();

            const extractVersion = (filename) => {
              const match = filename.match(/[_-]v?(\d+\.\d+(?:\.\d+)?)/i);
              return match ? match[1] : "1.0";
            };

            const cleanAppName = (filename) => {
              return filename.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();
            };

            // 1. Quét sâu (Parse) từ thư mục apps/
            if (fs.existsSync('apps')) {
              const files = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              
              for (const file of files) {
                const filePath = `apps/${file}`;
                const name = cleanAppName(file);
                let bundleId = "com.unknown.app";
                let appPermissions = { entitlements: [], privacy: {} };

                try {
                  const parser = new AppInfoParser(filePath);
                  const info = await parser.parse();
                  
                  // Lấy Bundle ID
                  bundleId = info.CFBundleIdentifier || bundleId;

                  // Lấy Quyền hạn (Privacy/Usage Description)
                  for (const key in info) {
                    if (key.endsWith('UsageDescription')) {
                      appPermissions.privacy[key] = info[key];
                    }
                  }

                  // Lấy Định danh Entitlements
                  if (info.mobileProvision && info.mobileProvision.Entitlements) {
                    appPermissions.entitlements = Object.keys(info.mobileProvision.Entitlements);
                  }
                } catch (e) {
                  console.log(`⚠️ Lỗi parse ${file}, dùng info mặc định.`);
                }

                const stats = fs.statSync(filePath);

                appMap.set(name.toLowerCase(), {
                  name: name,
                  bundleIdentifier: bundleId,
                  version: extractVersion(file),
                  versionDate: stats.mtime.toISOString(), // Lấy thời gian update thực tế
                  size: stats.size,
                  downloadURL: `https://2kgt.github.io/repo/apps/${file}`,
                  developerName: "Kyic",
                  subtitle: name,
                  description: `${name} v${extractVersion(file)}`,
                  localizedDescription: `${name} đã được kiểm tra và tổng hợp bởi Kyic.`,
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`,
                  appPermissions: appPermissions
                });
              }
            }

            // 2. Quét từ Releases (Ghi đè hoặc thêm mới)
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              for (const release of releases) {
                for (const asset of release.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const name = cleanAppName(asset.name);
                    const existingApp = appMap.get(name.toLowerCase());
                    
                    appMap.set(name.toLowerCase(), {
                      name: name,
                      // Giữ lại bundleId/Permissions nếu app đã được quét sâu từ thư mục apps/
                      bundleIdentifier: existingApp ? existingApp.bundleIdentifier : "com.unknown.app",
                      appPermissions: existingApp ? existingApp.appPermissions : undefined,
                      version: release.tag_name.replace(/^v/i, ''),
                      versionDate: release.published_at,
                      downloadURL: asset.browser_download_url,
                      size: asset.size,
                      developerName: "Kyic",
                      subtitle: name,
                      description: `${name} ${release.tag_name.replace(/^v/i, '')}`,
                      localizedDescription: release.body || `${name} đã được kiểm tra và tổng hợp bởi Kyic.`,
                      iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`
                    });
                  }
                }
              }
            } catch (e) {
              console.log("No releases found");
            }

            const autoApps = Array.from(appMap.values());

            // 3. App thủ công (Manual)
            const manualApps = [
              {
                "name": "Esign",
                "bundleIdentifier": "com.esign.installer",
                "version": "5.0.2",
                "versionDate": "2026-04-21T00:00:00Z",
                "downloadURL": "https://2kgt.github.io/repo/apps/esign.ipa",
                "size": 7510000,
                "developerName": "Kyic",
                "subtitle": "Công cụ ký IPA mạnh mẽ",
                "description": "Esign v5.0.2",
                "localizedDescription": "Chức năng đã thêm: Hỗ trợ ký nhiều loại chứng chỉ • Tối ưu tốc độ • Giao diện mới.",
                "iconURL": "https://2kgt.github.io/repo/icons/Esign.png"
              },
              {
                "name": "Turrit",
                "bundleIdentifier": "com.turrit.app",
                "version": "1.4.6",
                "versionDate": "2026-04-21T00:00:00Z",
                "downloadURL": "https://2kgt.github.io/repo/apps/turrit.ipa",
                "size": 88900000,
                "developerName": "Kyic",
                "subtitle": "Ứng dụng Turrit",
                "description": "Turrit - App Telegram bên thứ ba đa năng.",
                "localizedDescription": "Turrit-TGEXtra 1.7.3.",
                "iconURL": "https://2kgt.github.io/repo/icons/Turrit.png"
              }
            ];

            const manualNames = manualApps.map(a => a.name.toLowerCase());
            const finalAutoApps = autoApps.filter(a => !manualNames.includes(a.name.toLowerCase()));

            const finalJson = {
              "name": "Kyic IPA Repository",
              "identifier": "com.kyic.iparepo",
              "iconURL": "https://2kgt.github.io/repo/icons/Kyic.png",
              "apps": [...manualApps, ...finalAutoApps]
            };

            fs.writeFileSync('apps.json', JSON.stringify(finalJson, null, 2));
            console.log(`✅ Đã xuất apps.json với ${finalJson.apps.length} ứng dụng.`);

      - name: Commit and push apps.json
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff-index --quiet HEAD || (git commit -m "Auto-update apps.json" && git push)
