name: Update apps.json when IPA uploaded

on:
  push:
    paths:
      - 'apps/*.ipa'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update apps.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let apps = [];

            // Quét tất cả .ipa trong thư mục apps/
            const { data: files } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'apps'
            });

            for (const file of files) {
              if (file.name.toLowerCase().endsWith('.ipa')) {
                const name = file.name.replace(/\.ipa$/i, '').replace(/_/g, ' ');
                apps.push({
                  name: name,
                  bundleIdentifier: "com.unknown.app",
                  version: "1.0",
                  downloadURL: `https://2kgt.github.io/repo/apps/${file.name}`,
                  size: file.size || 0,
                  developerName: "Kyic",
                  subtitle: name,
                  description: `${name} IPA`,
                  localizedDescription: `${name} đã được kiểm tra và tổng hợp bởi Kyic.`,
                  versionDate: new Date().toISOString().split('T')[0],
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`
                });
              }
            }

            const json = {
              "name": "Kyic IPA Repository",
              "identifier": "com.kyic.iparepo",
              "iconURL": "https://2kgt.github.io/repo/icons/Kyic.png",
              "apps": apps
            };

            fs.writeFileSync('apps.json', JSON.stringify(json, null, 2));
            console.log("✅ apps.json updated from apps/ folder");