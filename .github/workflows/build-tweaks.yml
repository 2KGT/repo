name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Construction options'
        required: true
        type: choice
        default: '(none)'
        options:
          - '(none)'
          - 'AutoAC'
          - 'AutoDL'

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Setup Theos
        uses: randomblock1/theos-action@v1

      - name: ⚙️ Build Logic (Semantic Versioning)
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          if [ "$DP_NAME" = "(none)" ]; then exit 1; fi
          
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          
          # Đọc Version hiện tại từ file control
          CURRENT_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          
          # Logic tăng Version chuẩn X.Y.Z
          if [[ $CURRENT_VER =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR=${BASH_REMATCH[1]}
              MINOR=${BASH_REMATCH[2]}
              PATCH=${BASH_REMATCH[3]}
              NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          else
              # Nếu version không đúng chuẩn (ví dụ 1.0), reset về 0.0.1 hoặc giữ nguyên tăng 1
              NEW_VER="0.0.1"
          fi
          
          echo "Nâng cấp version: $CURRENT_VER -> $NEW_VER"

          # Cập nhật thông tin vào file Control
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"

          # Biên dịch Tweak
          make -C "$DIR" clean package FINALPACKAGE=1
          mkdir -p deb_output && find "$DIR/packages" -name "*.deb" -exec cp {} deb_output/ \;
          
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT
          echo "deb_file=$(basename $(ls deb_output/*.deb | head -n 1))" >> $GITHUB_OUTPUT

      - name: 📦 Update Assets & Media JSON
        run: |
          brew install dpkg
          mkdir -p debs depictions/images icons
          
          # Di chuyển deb vào kho lưu trữ
          cp -v deb_output/*.deb debs/
          
          # Quét lại toàn bộ kho hàng (Tránh lỗi Sileo không thấy bản mới)
          dpkg-scanpackages -m ./debs /dev/null > Packages && bzip2 -fks Packages
          
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          URL="${{ env.BASE_URL }}"
          CTRL="${{ steps.metadata.outputs.proj_dir }}/control"
          PKG=$(grep "^Package:" "$CTRL" | cut -d' ' -f2)
          DESC=$(grep "^Description:" "$CTRL" | cut -d: -f2- | sed 's/^ *//')
          
          # Tạo file mô tả JSON đầy đủ nhãn dán
          cat > depictions/${SAFE}.json << EOF
          {
            "name": "${{ github.event.inputs.project }}",
            "package": "$PKG",
            "version": "${{ steps.metadata.outputs.proj_ver }}",
            "description": "$DESC",
            "icon": "${URL}/icons/${SAFE}.png",
            "banner": "${URL}/depictions/images/${SAFE}-banner.png",
            "video": "${URL}/depictions/images/${SAFE}.mp4",
            "screenshots": [
              "${URL}/depictions/images/${SAFE}1.png",
              "${URL}/depictions/images/${SAFE}2.png",
              "${URL}/depictions/images/${SAFE}3.png"
            ],
            "downloads": "${URL}/debs/${{ steps.metadata.outputs.deb_file }}",
            "changelog": [
                {"version": "${{ steps.metadata.outputs.proj_ver }}", "changes": "• Cập nhật phiên bản mới nhất\n• Tối ưu hóa hiệu năng build\n• Cập nhật tài nguyên hình ảnh"}
            ]
          }
          EOF

          # Đẩy dữ liệu lên GitHub
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          # Dọn dẹp sơ bộ để Git không bị lag
          rm -rf deb_output/
          
          git add .
          git commit -m "📦 Release $SAFE v${{ steps.metadata.outputs.proj_ver }}" || exit 0
          
          # Đồng bộ an toàn
          git fetch origin main
          git rebase origin/main || (git stash && git rebase origin/main && git stash pop)
          git push origin main

      - name: 🧹 Final Room Cleanup
        if: always()
        run: |
          # Dọn dẹp sân khấu sau buổi diễn
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          if [ -d "$DIR" ]; then
            rm -rf "$DIR/packages" "$DIR/.theos" "$DIR/obj"
          fi
          rm -rf theos/
