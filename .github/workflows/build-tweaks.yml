name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Release Official (Tích để lên Sileo)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # ==========================================
      # BƯỚC 1: KHỞI TẠO HỆ THỐNG
      # ==========================================
      - name: 📥 Checkout & Setup
        uses: actions/checkout@v4

      - name: 🛠️ Install Dependencies
        run: |
          brew install make ldid dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      # ==========================================
      # BƯỚC 2: QUẢN LÝ THEOS & SDK
      # ==========================================
      - name: 🧠 Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-v1
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: 🏗️ Setup Theos Environment
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      # ==========================================
      # BƯỚC 3: XỬ LÝ HEADER CHỦ ĐỘNG (BẢN FIX TRIỆT ĐỂ)
      # ==========================================
      - name: 🎯 Selective Header Picker
        id: picker
        run: |
          # 1. Khai báo biến đường dẫn
          THEOS_INC="$THEOS/include"
          KHO_TONG="$(pwd)/headers/YouTubeHeader"
          
          # Định nghĩa folder mục tiêu (Phải khớp với #import <YouTubeHeader/...>)
          DEST_DIR="$THEOS_INC/YouTubeHeader"
          
          # Reset folder mục tiêu cho sạch
          rm -rf "$DEST_DIR"
          mkdir -p "$DEST_DIR"
          
          # 2. Xác định dự án
          DP_NAME="${{ github.event.inputs.project }}"
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT

          # 3. Chỉ nhặt hàng nếu có headers.txt
          LIST_FILE="$DIR/headers.txt"
          if [ -f "$LIST_FILE" ]; then
              echo "🚀 Phát hiện headers.txt. Đang bốc hàng về xưởng..."
              while IFS= read -r file || [ -n "$file" ]; do
                  file=$(echo "$file" | tr -d '\r' | xargs)
                  [ -z "$file" ] && continue
                  
                  # CHIÊU MỚI: Tìm file và copy nội dung file (.h), KHÔNG copy folder
                  # Dùng -exec cp -t để ép tất cả vào cùng 1 thư mục DEST_DIR
                  find "$KHO_TONG" -type f -name "$file" -exec cp -L {} "$DEST_DIR/" \;
              done < "$LIST_FILE"

              # 4. THANH TRỪNG (Redefinition Guard)
              echo "🧹 Đang dọn dẹp Header Apple rác..."
              cd "$DEST_DIR"
              rm -f NSObject-Protocol.h NSCopying-Protocol.h NSCoding-Protocol.h \
                    NSSecureCoding-Protocol.h CGRect.h CGPoint.h UIEdgeInsets.h \
                    UIAppearanceContainer-Protocol.h UIGestureRecognizerDelegate-Protocol.h \
                    OS_dispatch_object-Protocol.h OS_dispatch_queue-Protocol.h \
                    GPBMessage.h NSObject.h NSString.h
              
              echo "📊 --- KIỂM KÊ KHO HÀNG (QUAN TRỌNG) ---"
              pwd
              ls -F
              echo "📦 Tổng cộng nhặt được: $(ls | wc -l) file."
          else
              echo "🍃 Tweak này không dùng Header ngoài. Bỏ qua."
          fi

      # ==========================================
      # BƯỚC 4: BUILD TWEAK (GÁN CỨNG FLAG)
      # ==========================================
      - name: ⚙️ Băm Trộn & Đóng Gói
        run: |
          DIR="${{ steps.picker.outputs.proj_dir }}"
          CTRL="$DIR/control"
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          
          RAW_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$RAW_VER" || echo "$RAW_VER-test$(date +%H%M)")
          
          # Flag chuẩn: Trỏ đến include để Compiler tự tìm folder con YouTubeHeader
          INC_FLAGS="-I$THEOS/include"

          # ... (Các lệnh sed và cat giữ nguyên) ...
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          
          mkdir -p depictions
          cat <<EOF > "depictions/${SAFE}.json"
          {
            "min_ios_version": "14.0",
            "tintColor": "#ff2d55",
            "tabs": [
              {
                "tabname": "Details",
                "class": "DepictionStackView",
                "views": [
                  { "class": "DepictionHeaderView", "title": "${{ github.event.inputs.project }}" },
                  { "class": "DepictionMarkdownView", "markdown": "Build version: $NEW_VER" }
                ]
              }
            ]
          }
          EOF
          
          # THỰC THI BUILD
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -Wno-duplicate-protocol -DTHEOS_LEAN_AND_MEAN $INC_FLAGS"
          
          mkdir -p deb_output
          cp "$DIR/packages/"*.deb deb_output/
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT

      # ==========================================
      # BƯỚC 5: LƯU TRỮ & PHÁT HÀNH
      # ==========================================
      - name: 📦 Xuất xưởng file .deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
          path: deb_output/*.deb

      - name: 🚀 Lên Kệ Sileo
        if: github.event.inputs.publish == 'true'
        run: |
          mkdir -p debs
          cp deb_output/*.deb debs/
          dpkg-scanpackages -m debs /dev/null > Packages
          bzip2 -fks Packages
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🌟 [Auto] Release ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}"
          git push origin main
