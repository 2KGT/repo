name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để Build'
        required: true
        type: choice
        default: '(none)'
        options:
          - '(none)'
          - 'AutoAC'
          - 'AutoDL'
      publish:
        description: 'Tích vào đây để đẩy lên Cửa hàng (Sileo)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Setup Toolchain (Theos)
        uses: randomblock1/theos-action@v1

      - name: ⚙️ Build Logic (SemVer)
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          if [ "$DP_NAME" = "(none)" ]; then exit 1; fi
          
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          
          # Tăng version X.Y.Z (Chỉ tăng nếu người dùng chọn Publish)
          CURRENT_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          if [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
              IFS='.' read -r i1 i2 i3 <<< "$CURRENT_VER"
              NEW_VER="$i1.$i2.$((i3 + 1))"
          else
              NEW_VER="$CURRENT_VER-test" # Đánh dấu bản test
          fi
          
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          make -C "$DIR" clean package FINALPACKAGE=1
          mkdir -p deb_output && find "$DIR/packages" -name "*.deb" -exec cp {} deb_output/ \;
          
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT
          echo "deb_file=$(basename $(ls deb_output/*.deb | head -n 1))" >> $GITHUB_OUTPUT

      - name: 💾 Lưu file Test (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}-TEST
          path: deb_output/*.deb

      ## --- CHỈ CHẠY CÁC BƯỚC DƯỚI ĐÂY NẾU CHỌN PUBLISH ---

      - name: 📦 Update Repo Metadata
        if: github.event.inputs.publish == 'true'
        run: |
          brew install dpkg
          mkdir -p debs depictions/images icons
          cp -v deb_output/*.deb debs/
          dpkg-scanpackages -m ./debs /dev/null > Packages && bzip2 -fks Packages
          
          # (Logic tạo JSON giữ nguyên...)
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          URL="${{ env.BASE_URL }}"
          # ... [Code tạo file JSON của bạn] ...

      - name: 🚀 Giao hàng lên Cửa hàng (GitHub)
        if: github.event.inputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          rm -rf deb_output/ theos/ .theos/ "$DIR/packages" "$DIR/.theos" "$DIR/obj"
          git add .
          git commit -m "🚀 Release $SAFE v${{ steps.metadata.outputs.proj_ver }}" || exit 0
          git fetch origin main
          git reset --soft origin/main
          git add .
          git commit --amend --no-edit || git commit -m "Update Repo"
          git push origin main --force

      - name: 🧹 Vệ sinh sau khi diễn
        if: always()
        run: |
          rm -rf deb_output/ .theos/ obj/
          echo "Dọn dẹp xong. Bản Build nằm trong mục Artifacts nếu bạn cần Test!"
