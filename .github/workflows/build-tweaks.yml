name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án cần Build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Phát hành releases Sileo'
        type: boolean
        default: false

env:
  TZ: "Asia/Ho_Chi_Minh"

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Toolchain (Theos)
        uses: randomblock1/theos-action@v1

      - name: 📦 Tải Patched SDK (iOS 14.5)
        run: |
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      - name: 🚚 Hút Header tổng lực
        run: |
          # Tạo một thư mục phẳng duy nhất
          mkdir -p combined_headers/YouTube
          mkdir -p combined_headers/Shared
          
          # Hút hàng và san phẳng cấu trúc
          curl -L https://github.com/PoomSmart/YouTubeHeader/archive/master.tar.gz | tar -xz --strip-components=1 -C combined_headers/YouTube
          curl -L https://github.com/PoomSmart/PSHeader/archive/master.tar.gz | tar -xz --strip-components=1 -C combined_headers/Shared
          
          # Thanh trừng triệt để các file gây xung đột module hệ thống
          find combined_headers -type d -name "CoreImage" -exec rm -rf {} +
          find combined_headers -type d -name "QuartzCore" -exec rm -rf {} +
          find combined_headers -type d -name "UIKit" -exec rm -rf {} +

      - name: ⚙️ Build Logic
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          [ "$DP_NAME" = "(none)" ] && exit 1
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          RAW_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$RAW_VER" || echo "$RAW_VER-test$(date +%H%M)")
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          
          # ÉP XÁC: Copy kho header vào sát nách dự án
          cp -R combined_headers "$DIR/"
          
          # Build với đường dẫn trực tiếp
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-isystem combined_headers -Wno-error -DTHEOS_LEAN_AND_MEAN"
          
          mkdir -p deb_output
          cp "$DIR/packages/"*.deb deb_output/
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT

      - name: 💾 Lưu file Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}-v${{ steps.metadata.outputs.proj_ver }}
          path: deb_output/*.deb
