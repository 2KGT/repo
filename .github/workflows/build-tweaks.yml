name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Construction options'
        required: true
        type: choice
        default: '(none)'
        options:
          - '(none)'
          - 'AutoAC'
          - 'AutoDL'

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: üì• Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: üõ†Ô∏è Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: ‚öôÔ∏è Build Logic
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          if [ "$DP_NAME" = "(none)" ]; then exit 1; fi
          
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          
          # C·∫≠p nh·∫≠t Control & TƒÉng Version
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          
          VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          [[ "$VER" != *.*.*.* ]] && VER="0.0.0.0"
          IFS='.' read -r v1 v2 v3 v4 <<< "$VER"
          NVER="$v1.$v2.$v3.$((v4 + 1))"
          sed -i '' "s/^Version: .*/Version: $NVER/" "$CTRL"

          make -C "$DIR" clean package FINALPACKAGE=1
          mkdir -p deb_output && find "$DIR/packages" -name "*.deb" -exec cp {} deb_output/ \;
          
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "proj_ver=$NVER" >> $GITHUB_OUTPUT
          echo "deb_file=$(basename $(ls deb_output/*.deb | head -n 1))" >> $GITHUB_OUTPUT

      - name: üì¶ Update Assets & Media JSON
        run: |
          brew install dpkg
          mkdir -p debs depictions/images icons
          
          # 1. ƒê∆∞a file deb m·ªõi v√†o kho
          cp -v deb_output/*.deb debs/
          
          # 2. Qu√©t kho t·∫°o Packages
          dpkg-scanpackages -m ./debs /dev/null > Packages
          bzip2 -fks Packages
          
          # 3. T·∫°o JSON ƒë·∫ßy ƒë·ªß Media
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          URL="${{ env.BASE_URL }}"
          CTRL="${{ steps.metadata.outputs.proj_dir }}/control"
          PKG=$(grep "^Package:" "$CTRL" | cut -d' ' -f2)
          DESC=$(grep "^Description:" "$CTRL" | cut -d: -f2- | sed 's/^ *//')
          
          BANNER=""; [ -f "depictions/images/${SAFE}-banner.png" ] && BANNER="${URL}/depictions/images/${SAFE}-banner.png"
          VIDEO=""; [ -f "depictions/images/${SAFE}.mp4" ] && VIDEO="${URL}/depictions/images/${SAFE}.mp4"
          SS_JSON=""
          for i in {1..5}; do
            [ -f "depictions/images/${SAFE}${i}.png" ] && SS_JSON="${SS_JSON}${SS_JSON:+,}\"${URL}/depictions/images/${SAFE}${i}.png\""
          done

          cat > depictions/${SAFE}.json << EOF
          {
            "name": "${{ github.event.inputs.project }}",
            "package": "$PKG",
            "version": "${{ steps.metadata.outputs.proj_ver }}",
            "description": "$DESC",
            "icon": "${URL}/icons/${SAFE}.png",
            "banner": "$BANNER",
            "video": "$VIDEO",
            "screenshots": [$SS_JSON],
            "downloads": "${URL}/debs/${{ steps.metadata.outputs.deb_file }}",
            "changelog": [{"version": "${{ steps.metadata.outputs.proj_ver }}", "changes": "- Ph√°t h√†nh b·∫£n build m·ªõi nh·∫•t"}]
          }
          EOF

          # 4. CHI·∫æN THU·∫¨T GIT M·ªöI: Reset ƒë·ªÉ ƒë·∫©y (B·ªè qua l·ªói 128)
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          # D·ªçn d·∫πp tuy·ªát ƒë·ªëi m√°y ·∫£o tr∆∞·ªõc khi commit
          rm -rf theos/ .theos/ obj/ deb_output/
          
          git add .
          git commit -m "üì¶ Build $SAFE v${{ steps.metadata.outputs.proj_ver }}" || exit 0
          
          # Fetch ƒë·ªÉ bi·∫øt tr·∫°ng th√°i server
          git fetch origin main
          # √âp m√°y ·∫£o ƒëi theo server nh∆∞ng gi·ªØ nguy√™n c√°c file v·ª´a t·∫°o
          git rebase origin/main || (git stash && git rebase origin/main && git stash pop)
          
          git push origin main
