name: Build Multi Tweak src/ + Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án cần build (tên thư mục trong src/)'
        required: true
        default: 'autoac'
        type: choice
        options:
        - autoac
        - autodl
        - all
      bump_type:
        description: 'Loại tăng version'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Clone YouTubeHeader
        run: |
          git clone https://github.com/PoomSmart/YouTubeHeader $THEOS/include/YouTubeHeader || echo "YouTubeHeader already exists"

      # Build dự án (Bỏ chặn lỗi để log hiển thị nguyên nhân thực sự nếu thất bại)
      - name: Build Selected Project
        run: |
          PROJECT="${{ github.event.inputs.project }}"
          if [ -z "$PROJECT" ]; then PROJECT="autoac"; fi
          echo "🔨 Đang build: $PROJECT"

          if [ "$PROJECT" = "all" ]; then
            for dir in src/*/ ; do
              if [ -f "$dir/Makefile" ]; then
                proj=$(basename "$dir")
                echo "→ Building $proj ..."
                cp -r "$dir"/* . 2>/dev/null || true
                make package FINALPACKAGE=1
              fi
            done
          else
            echo "→ Building $PROJECT ..."
            cp -r "src/$PROJECT"/* . 2>/dev/null || true
            make package FINALPACKAGE=1
          fi

      # Upload Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoAC-Build-${{ github.event.inputs.project || 'autoac' }}
          path: packages/*.deb
          if-no-files-found: warn

      # Copy và Commit vào debs/
      - name: Copy to debs/ and Commit (Official Release Only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p debs
          cp packages/*.deb debs/ 2>/dev/null || echo "No .deb file found"
          echo "✅ Copied .deb files to debs/"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debs/
          git commit -m "chore: add official .deb files to debs/ [skip ci]" || echo "No new .deb to commit"
          git push origin main || echo "Nothing to push"
          echo "✅ Committed debs/ folder"

      # Tạo Release (Tự động nhận diện Tag)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tweak Release ${{ github.ref_name }}
          files: packages/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
