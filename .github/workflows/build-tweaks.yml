name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Release Official (Tích để lên Sileo)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # ==========================================
      # BƯỚC 1: KHỞI TẠO HỆ THỐNG
      # ==========================================
      - name: 📥 Checkout & Setup
        uses: actions/checkout@v4

      - name: 🛠️ Install Dependencies
        run: |
          brew install make ldid dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      # ==========================================
      # BƯỚC 2: QUẢN LÝ THEOS & SDK
      # ==========================================
      - name: 🧠 Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-v1
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: 🏗️ Setup Theos Environment
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      # ==========================================
      # BƯỚC 3: XỬ LÝ HEADER (LOẠI BỎ ZIP - ĐỌC TRỰC TIẾP)
      # ==========================================
      - name: 🚚 Cảm biến "Pháp Sư" (Hệ File Trần + Tối Ưu)
        run: |
          THEOS_INC="$THEOS/include"
          mkdir -p "$THEOS_INC"
          
          # 1. Liên kết các thư mục Header có sẵn trong repo vào Theos
          if [ -d "headers" ]; then
              echo "--- BẮT ĐẦU KẾT NỐI HEADER TRẦN ---"
              for dir in headers/*/; do
                  [ -d "$dir" ] || continue
                  FOLDER_NAME=$(basename "$dir")
                  echo "🔗 Liên kết thư mục: $FOLDER_NAME"
                  # Sử dụng Symbolic Link để Theos đọc trực tiếp không cần copy
                  ln -sf "$(pwd)/headers/$FOLDER_NAME" "$THEOS_INC/$FOLDER_NAME"
                  
                  # 🔧 Tiêm vaccine & Fix lỗi Protocol cho file trần
                  echo "🔧 Tối ưu hóa file .h trong $FOLDER_NAME..."
                  find "headers/$FOLDER_NAME" -type f -name "*.h" -exec sed -i '' \
                    -e 's/#import "NSObject.h"/#import <Foundation\/NSObject.h>/g' \
                    -e 's/#import "UIKit\/UIKit.h"/#import <UIKit\/UIKit.h>/g' \
                    -e 's/#import "Foundation\/Foundation.h"/#import <Foundation\/Foundation.h>/g' {} +
                  
                  find "headers/$FOLDER_NAME" -type f -name "*-Protocol.h" -exec sh -c 'cp -n "$1" "${1%-Protocol.h}.h"' _ {} \;
              done
          fi

          # 2. Xử lý file headers.txt (Nếu dự án yêu cầu thêm Repo từ bên ngoài)
          DP_NAME="${{ github.event.inputs.project }}"
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          if [ -f "$DIR/headers.txt" ]; then
              echo "--- TẢI THÊM HEADER TỪ NGOÀI ---"
              while IFS= read -r repo_name || [ -n "$repo_name" ]; do
                  repo_name=$(echo $repo_name | tr -d '\r' | xargs)
                  [ -z "$repo_name" ] || [ -d "$THEOS_INC/$repo_name" ] && continue
                  git clone --depth 1 https://github.com/2KGT/$repo_name "$THEOS_INC/$repo_name" || true
              done < "$DIR/headers.txt"
          fi
          
          # 3. Dọn dẹp các thư mục trùng lặp gây lỗi build
          rm -rf "$THEOS_INC/UIKit" "$THEOS_INC/CoreImage"

      # ==========================================
      # BƯỚC 4: BUILD TWEAK & TỰ ĐỘNG HÓA DEPICTION
      # ==========================================
      - name: ⚙️ Băm Trộn & Đóng Gói
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          [ "$DP_NAME" = "(none)" ] && exit 1
          
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          
          # Tính toán Version (Thêm đuôi -test nếu không phải bản chính thức)
          RAW_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$RAW_VER" || echo "$RAW_VER-test$(date +%H%M)")
          
          # Tự động gán I-Flags cho toàn bộ thư mục trong include
          INC_FLAGS=""
          for d in $THEOS/include/*/; do
              [ -d "$d" ] && INC_FLAGS="$INC_FLAGS -I$d"
          done

          # Cập nhật thông tin Control file
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          
          # Tạo file Depiction JSON tự động
          mkdir -p depictions
          cat <<EOF > "depictions/${SAFE}.json"
          {
            "min_ios_version": "14.0",
            "tintColor": "#ff2d55",
            "tabs": [
              {
                "tabname": "Details",
                "class": "DepictionStackView",
                "views": [
                  { "class": "DepictionHeaderView", "title": "$DP_NAME" },
                  { "class": "DepictionMarkdownView", "markdown": "Build version: $NEW_VER" }
                ]
              }
            ]
          }
          EOF
          
          # CHẠY LỆNH BUILD CHÍNH
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -DTHEOS_LEAN_AND_MEAN $INC_FLAGS"
          
          mkdir -p deb_output
          cp "$DIR/packages/"*.deb deb_output/
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT

      # ==========================================
      # BƯỚC 5: LƯU TRỮ & PHÁT HÀNH
      # ==========================================
      - name: 📦 Xuất xưởng file .deb (Tải về máy để test)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
          path: deb_output/*.deb

      - name: 🚀 Lên Kệ Sileo (Chỉ chạy khi tích Official)
        if: github.event.inputs.publish == 'true'
        run: |
          mkdir -p debs
          cp deb_output/*.deb debs/
          dpkg-scanpackages -m debs /dev/null > Packages
          bzip2 -fks Packages
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🌟 [Auto] Release ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}"
          git push origin main
