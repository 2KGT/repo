name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Release Official (Tích để lên Sileo)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # =========================================================
      # CÔNG ĐOẠN 1-2: KHỞI TẠO HỆ THỐNG & THEOS
      # =========================================================
      - name: 📥 Checkout & Setup
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: |
          brew install make ldid dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: 🧠 Cache & Setup Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-v2
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: 🏗️ Setup Environment
        run: |
          if [ "${{ steps.cache-theos.outputs.cache-hit }}" != "true" ]; then
            rm -rf $THEOS
            git clone --recursive https://github.com/theos/theos.git $THEOS
            mkdir -p $THEOS/sdks
            curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks
          fi
          mkdir -p $THEOS/include

      # =========================================================
      # CÔNG ĐOẠN 3: ĐỊNH VỊ & GÁN NHÃN ĐỘNG (CONTROL)
      # =========================================================
      - name: 🎯 Gán nhãn Icon & Metadata
        id: metadata
        run: |
          PROJ_NAME="${{ github.event.inputs.project }}"
          [ "$PROJ_NAME" = "(none)" ] && exit 1
          CTRL=$(grep -lE "^Name:.*$PROJ_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$(grep "^Version:" "$CTRL" | cut -d' ' -f2)" || echo "$(grep "^Version:" "$CTRL" | cut -d' ' -f2)-test$(date +%H%M)")
          
          sed -i '' "/^Icon:/d" "$CTRL"
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          echo "Icon: ${{ env.BASE_URL }}/icons/${SAFE}.png" >> "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT
          make -C "$DIR" clean

      # =========================================================
      # CÔNG ĐOẠN 4: VẬN CHUYỂN HEADERS (CHỈ KHI CÓ ĐƠN)
      # =========================================================
      - name: 🚛 Nhập kho Headers (Bản Đại Xá Thiên Hạ)
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          [ ! -f "$DIR/headers.txt" ] && echo "🍃 Không có đơn hàng." && exit 0
          rm -rf $THEOS/include/*
          
          # 1. Làm sạch danh sách: Đuổi hết rác, khoảng trắng, ký tự Windows (\r)
          sed -E 's/\.h//g; s/\r//g; s/ //g; /^\s*$/d' "$DIR/headers.txt" | sort -u > pending.txt
          
          echo "🔎 GIAI ĐOẠN 1: Càn quét hàng Chính Đạo (File .h xịn)..."
          for KHO_APP in headers/*/; do
            [ -d "$KHO_APP" ] || continue
            [ ! -s pending.txt ] && break
            
            APP_NAME=$(basename "$KHO_APP")
            DEST_DIR="$THEOS/include/$APP_NAME"
            
            # Quét từng file trong danh sách hiện tại
            while IFS= read -r NAME || [ -n "$NAME" ]; do
              TARGET=$(find "$KHO_APP" -maxdepth 1 -iname "${NAME}.h" | head -n 1)
              if [ -n "$TARGET" ]; then
                mkdir -p "$DEST_DIR"
                cp -f "$TARGET" "$DEST_DIR/"
                echo "  ✅ Nhặt hàng xịn: $NAME.h"
                # CHIÊU MỚI: Ghi đè file pending, chỉ giữ lại những thằng KHÔNG PHẢI tên này
                grep -vix "$NAME" pending.txt > temp.txt || true
                mv temp.txt pending.txt
              fi
            done < pending.txt
          done

          echo "💎 GIAI ĐOẠN 2: Triệu hồi từ Phong Thần Bảng (Tà Đạo)..."
          if [ -s pending.txt ]; then
            for KHO_APP in headers/*/; do
              [ -d "$KHO_APP" ] || continue
              [ ! -s pending.txt ] && break
              BRIDGE_FILE="${KHO_APP}Bridge.h"
              [ ! -f "$BRIDGE_FILE" ] && continue
              
              APP_NAME=$(basename "$KHO_APP")
              DEST_DIR="$THEOS/include/$APP_NAME"
              
              while IFS= read -r NAME || [ -n "$NAME" ]; do
                # Tìm mờ trong Phong Thần Bảng
                if grep -qiE "(^|[^a-zA-Z0-9_])$NAME($|[^a-zA-Z0-9_])" "$BRIDGE_FILE"; then
                  mkdir -p "$DEST_DIR"
                  echo -e "@interface $NAME : NSObject\n@end" > "$DEST_DIR/$NAME.h"
                  echo "  ✨ [Phong Thần] Đã triệu hồi: $NAME.h"
                  # Ghi đè file pending, loại bỏ tên đã triệu hồi
                  grep -vix "$NAME" pending.txt > temp.txt || true
                  mv temp.txt pending.txt
                fi
              done < pending.txt
            done
          fi

          # 📊 TỔNG KẾT
          if [ -s pending.txt ]; then
            echo "❌ LỖI: Vẫn mất tích các linh kiện sau:"
            cat pending.txt
            exit 1
          fi
          echo "🏁 Đã bốc đủ hàng. Khai hỏa!"

      # =========================================================
      # CÔNG ĐOẠN 5: THỰC THI BUILD
      # =========================================================
      - name: 🔨 Thực thi Build DEB
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          DYNAMIC_INCLUDES=""

          # 1. KIỂM TRA ĐIỀU KIỆN TRƯỚC KHI BUILD
          if [ -f "$DIR/headers.txt" ]; then
            echo "🎯 Dự án yêu cầu linh kiện ngoài, đang trỏ đường dẫn vào xưởng..."
            DYNAMIC_INCLUDES="-I$THEOS/include"
            
            # Kiểm kê nhanh để đảm bảo hàng đã nằm đúng chỗ
            ls -R $THEOS/include | head -n 10
          fi

          # 2. KHỞI ĐỘNG COMPILER
          echo "🚀 Khởi động Compiler với cờ: $DYNAMIC_INCLUDES"
          
          make -C "$DIR" package FINALPACKAGE=1 TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -DTHEOS_LEAN_AND_MEAN $DYNAMIC_INCLUDES"

          # 3. GOM HÀNG THÀNH PHẨM
          mkdir -p deb_output
          cp "$DIR/packages/"*.deb deb_output/

      # =========================================================
      # CÔNG ĐOẠN 6: QUÉT DẤU # TRONG CODE -> ĐÚC JSON -> ĐỒNG BỘ
      # =========================================================
      - name: 🚀 Quét # & Đồng bộ Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          JSON_PATH="depictions/${SAFE}.json"
          IMG_BASE="${{ env.BASE_URL }}/depictions/images"
          SRC_FILE=$(find "$DIR" -name "*.x" -o -name "*.xm" | head -n 1)
          DESC_CONTENT="Phiên bản $SAFE từ 2KGT Repo."
          if [ -n "$SRC_FILE" ]; then
            EXTRACTED=$(grep "^#" "$SRC_FILE" | sed 's/^#//;s/^ //' | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
            [ -n "$EXTRACTED" ] && DESC_CONTENT="$EXTRACTED"
          fi
          mkdir -p depictions
          echo '{"class":"DepictionTabView","tabs":[{"tabname":"Details","class":"DepictionStackView","views":[{"class":"DepictionHeaderView","title":"'$SAFE'"},{"class":"DepictionImageView","url":"'$IMG_BASE/${SAFE}-banner.png'","width":1242,"height":500,"cornerRadius":10},{"class":"DepictionScreenshotsView","itemCornerRadius":8,"screenshots":[' > "$JSON_PATH"
          FIRST=true
          for i in {1..5}; do
            if [ -f "depictions/images/${SAFE}${i}.png" ]; then
              [ "$FIRST" = true ] && FIRST=false || echo "," >> "$JSON_PATH"
              echo '{"url":"'$IMG_BASE/${SAFE}${i}.png'"}' >> "$JSON_PATH"
            fi
          done
          echo ']},{"class":"DepictionVideoView","videoURL":"'$IMG_BASE/${SAFE}.mp4'","cornerRadius":8},{"class":"DepictionMarkdownView","markdown":"'$DESC_CONTENT'","useMargins":true}]}]}' >> "$JSON_PATH"
          git add src/build-tweaks/ depictions/
          if [ "${{ github.event.inputs.publish }}" == "true" ]; then
            mkdir -p debs && cp deb_output/*.deb debs/
            dpkg-scanpackages -m debs /dev/null > Packages && bzip2 -fks Packages
            git add debs/ Packages Packages.bz2
            MSG="🌟 Release: $SAFE v${{ steps.metadata.outputs.proj_ver }}"
          else
            MSG="🛠️ Build: $SAFE v${{ steps.metadata.outputs.proj_ver }}"
          fi
          git commit -m "$MSG" || exit 0
          git push origin main

      - name: 📦 Xuất xưởng
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
