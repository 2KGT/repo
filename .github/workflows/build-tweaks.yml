name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Release Official (Tích để lên Sileo)'
        type: boolean
        default: false

env:
  # Base URL chuẩn để lấy hàng Raw từ Repo
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # =========================================================
      # CÔNG ĐOẠN 1: KHỞI TẠO HỆ THỐNG
      # =========================================================
      - name: 📥 Checkout & Setup
        uses: actions/checkout@v4

      - name: 🛠️ Cài đặt công cụ
        run: |
          brew install make ldid dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      # =========================================================
      # CÔNG ĐOẠN 2: THIẾT LẬP THEOS
      # =========================================================
      - name: 🧠 Cache & Setup Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-v2
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: 🏗️ Setup Environment
        run: |
          if [ "${{ steps.cache-theos.outputs.cache-hit }}" != "true" ]; then
            rm -rf $THEOS
            git clone --recursive https://github.com/theos/theos.git $THEOS
            mkdir -p $THEOS/sdks
            curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks
          fi
          mkdir -p $THEOS/include

      # =========================================================
      # CÔNG ĐOẠN 3: ĐỊNH VỊ & GÁN NHÃN ICON/DEPICTION (CỐ ĐỊNH)
      # =========================================================
      - name: 🎯 Gán nhãn Icon & Metadata
        id: metadata
        run: |
          PROJ_NAME="${{ github.event.inputs.project }}"
          [ "$PROJ_NAME" = "(none)" ] && exit 1
          
          CTRL=$(grep -lE "^Name:.*$PROJ_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$(grep "^Version:" "$CTRL" | cut -d' ' -f2)" || echo "$(grep "^Version:" "$CTRL" | cut -d' ' -f2)-test$(date +%H%M)")
          
          # --- GÁN NHÃN ICON & DEPICTION TỪ LINK RAW ---
          sed -i '' "/^Icon:/d" "$CTRL"
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          
          # Gán Icon từ thư mục icons/ (tên file trùng với SAFE name)
          echo "Icon: ${{ env.BASE_URL }}/icons/${SAFE}.png" >> "$CTRL"
          # Gán link JSON từ thư mục depictions/
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          
          # Cập nhật Version mới
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT
          make -C "$DIR" clean

      # =========================================================
      # CÔNG ĐOẠN 4: VẬN CHUYỂN HEADERS (THEO ĐƠN HÀNG)
      # =========================================================
      - name: 🚛 Nhập kho Headers
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          if [ ! -f "$DIR/headers.txt" ]; then
              echo "🍃 Không có headers.txt, bỏ qua."
              exit 0
          fi
          rm -rf $THEOS/include/*
          for KHO_APP in headers/*/; do
              [ -d "$KHO_APP" ] || continue
              APP_NAME=$(basename "$KHO_APP")
              DEST_DIR="$THEOS/include/$APP_NAME"
              mkdir -p "$DEST_DIR"
              while IFS= read -r line || [ -n "$line" ]; do
                  FILE=$(echo "$line" | tr -d '\r' | xargs)
                  [ -z "$FILE" ] && continue
                  [[ "$FILE" != *.h ]] && FILE="${FILE}.h"
                  [ -f "$KHO_APP/$FILE" ] && cp -f "$KHO_APP/$FILE" "$DEST_DIR/"
              done < "$DIR/headers.txt"
              [ "$(ls -A "$DEST_DIR" 2>/dev/null)" ] || rm -rf "$DEST_DIR"
          done

      # =========================================================
      # CÔNG ĐOẠN 5: THỰC THI BUILD
      # =========================================================
      - name: 🔨 Build Package
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          DYNAMIC_INCLUDES=""
          if [ -f "$DIR/headers.txt" ]; then
              for d in $THEOS/include/*/; do
                  [ -d "$d" ] && DYNAMIC_INCLUDES="$DYNAMIC_INCLUDES -I$d"
              done
          fi
          make -C "$DIR" package FINALPACKAGE=1 TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -DTHEOS_LEAN_AND_MEAN $DYNAMIC_INCLUDES -I$THEOS/include"
          mkdir -p deb_output && cp "$DIR/packages/"*.deb deb_output/

      # =========================================================
      # CÔNG ĐOẠN 6: ĐÚC NHÃN JSON & ĐỒNG BỘ NGƯỢC
      # =========================================================
      - name: 🚀 Đúc nhãn & Đồng bộ Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          JSON_PATH="depictions/${SAFE}.json"
          IMG_BASE="${{ env.BASE_URL }}/depictions/images"
          
          echo "📝 Đúc khuôn nhãn Sileo cho $SAFE..."
          mkdir -p depictions
          
          # --- ĐÚC JSON: Banner + Screenshots + Video ---
          cat <<EOF > "$JSON_PATH"
{
  "class": "DepictionTabView",
  "tabs": [
    {
      "tabname": "Details",
      "class": "DepictionStackView",
      "views": [
        { "class": "DepictionHeaderView", "title": "$SAFE" },
        {
          "class": "DepictionImageView",
          "url": "$IMG_BASE/${SAFE}-banner.png",
          "width": 1242, "height": 500, "cornerRadius": 10
        },
        {
          "class": "DepictionScreenshotsView",
          "itemCornerRadius": 8,
          "screenshots": [
EOF
          # Quét tối đa 5 ảnh screenshots
          FIRST=true
          for i in {1..5}; do
              if [ -f "depictions/images/${SAFE}${i}.png" ]; then
                  [ "$FIRST" = true ] && FIRST=false || echo "," >> "$JSON_PATH"
                  echo "            { \"url\": \"$IMG_BASE/${SAFE}${i}.png\" }" >> "$JSON_PATH"
              fi
          done

          # Đóng cụm Screenshots và thêm mục Video MP4
          cat <<EOF >> "$JSON_PATH"
          ]
        },
        {
          "class": "DepictionVideoView",
          "videoURL": "$IMG_BASE/${SAFE}.mp4",
          "cornerRadius": 8
        }
      ]
    }
  ]
}
EOF
          # --- ĐỒNG BỘ NGƯỢC ---
          git add src/build-tweaks/ depictions/
          
          if [ "${{ github.event.inputs.publish }}" == "true" ]; then
              mkdir -p debs
              cp deb_output/*.deb debs/
              dpkg-scanpackages -m debs /dev/null > Packages
              bzip2 -fks Packages
              git add debs/ Packages Packages.bz2
              MSG="🌟 Release: $SAFE v${{ steps.metadata.outputs.proj_ver }}"
          else
              MSG="🛠️ Build: $SAFE v${{ steps.metadata.outputs.proj_ver }}"
          fi
          
          git commit -m "$MSG" || exit 0
          git push origin main

      - name: 📦 Xuất xưởng file .deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
          path: deb_output/*.deb
