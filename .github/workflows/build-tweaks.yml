name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: '🧱 Chọn dự án'
        required: true
        type: choice
        options:
          - none
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Set Project Directory
        id: metadata
        run: |
          PROJECT_NAME="${{ github.event.inputs.project }}"
          
          if [ "$PROJECT_NAME" = "none" ]; then
            echo "❌ Bạn chưa chọn dự án!"
            exit 1
          fi

          DIR="src/build-tweaks/$PROJECT_NAME"

          if [ ! -d "$DIR" ]; then
            echo "❌ Không tìm thấy thư mục dự án: $DIR"
            exit 1
          fi

          echo "✅ Đang build dự án: $PROJECT_NAME"
          echo "proj_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT

          CONTROL="$DIR/control"
          CHANGELOG="$DIR/CHANGELOG.md"
          SOURCE=$(find "$DIR" -maxdepth 1 -name "*.x" -o -name "*.xm" | head -n 1)
          
          mkdir -p deb_output

          # --- TỰ ĐỘNG TĂNG VERSION ---
          current_ver=$(grep "^Version:" "$CONTROL" | cut -d' ' -f2)
          IFS='.' read -r major minor patch <<< "$current_ver"
          new_ver="$major.$minor.$((patch + 1))"
          sed -i '' "s/Version: $current_ver/Version: $new_ver/" "$CONTROL"
          echo "proj_ver=$new_ver" >> $GITHUB_OUTPUT

          # --- QUÉT CHỨC NĂNG ---
          if [ -n "$SOURCE" ] && [ -f "$SOURCE" ]; then
            news=$(grep "// NEW:" "$SOURCE" | sed 's/\/\/ NEW://g' | sed 's/^/- /' || echo "- Cập nhật hệ thống")
            fixes=$(grep "// FIX:" "$SOURCE" | sed 's/\/\/ FIX://g' | sed 's/^/- /' || echo "- Tối ưu hóa")
            sed -i '' '/\/\/ NEW:/d' "$SOURCE"
            sed -i '' '/\/\/ FIX:/d' "$SOURCE"
          else
            news="- Cập nhật mới"
            fixes="- Sửa lỗi nhỏ"
          fi
          
          latest_content="### ✨ Tính năng mới\n$news\n\n### 🐛 Sửa lỗi\n$fixes"

          # --- BUILD ---
          make -C "$DIR" clean package FINALPACKAGE=1
          find "$DIR/packages" -name "*.deb" -exec cp {} deb_output/ \;

          echo "proj_desc=$(grep "^Description:" "$CONTROL" | cut -d' ' -f2-)" >> $GITHUB_OUTPUT
          echo "proj_changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$latest_content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p debs
          cp -v deb_output/*.deb debs/ 2>/dev/null || true
          git add .
          git diff --cached --quiet || git commit -m "build(${{ steps.metadata.outputs.proj_name }}): v${{ steps.metadata.outputs.proj_ver }}"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.proj_name }}-v${{ steps.metadata.outputs.proj_ver }}
          name: "${{ steps.metadata.outputs.proj_name }} - v${{ steps.metadata.outputs.proj_ver }}"
          files: deb_output/*.deb
          body: |
            ## 📝 Mô tả
            > ${{ steps.metadata.outputs.proj_desc }}

            ${{ steps.metadata.outputs.proj_changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
