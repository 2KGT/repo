name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      header_folder:
        description: 'Tên thư mục nhốt xác (vd: YouTubeHeader)'
        required: false
        default: 'YouTubeHeader'
      publish:
        description: 'Release Official (Tích để lên Sileo)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # =============================================================
      # CÔNG ĐOẠN 1-2: KHỞI TẠO HỆ THỐNG & THEOS
      # =============================================================
      - name: 📥 1.1 Checkout Source
        uses: actions/checkout@v4

      - name: 🛠️ 1.2 Setup Tools
        run: |
          brew install make ldid dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: 🏗️ 2.1 Setup Environment (Theos)
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks
          mkdir -p $THEOS/include

      # =============================================================
      # CÔNG ĐOẠN 3: ĐỊNH VỊ DỰ ÁN & CẤP NHÃN
      # =============================================================
      - name: 🎯 3.1 Metadata & Versioning
        id: metadata
        run: |
          PROJ_NAME="${{ github.event.inputs.project }}"
          [ "$PROJ_NAME" = "(none)" ] && exit 1
          CTRL=$(grep -lE "^Name:.*$PROJ_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$(grep "^Version:" "$CTRL" | cut -d' ' -f2)" || echo "$(grep "^Version:" "$CTRL" | cut -d' ' -f2)-test$(date +%H%M)")
          
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT

      # =============================================================
      # CÔNG ĐOẠN 4: CỖ MÁY XAY XÁC PHÁP SƯ (NHÁNH VÔ ẢNH)
      # =============================================================
      - name: 🪄 4.1 Xử lý Headers tự động
        id: process_headers
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          FOLDER="${{ github.event.inputs.header_folder }}"
          DEST="$THEOS/include/$FOLDER"
          
          if [ -f "$DIR/headers.txt" ]; then
            mkdir -p "$DEST"
            while IFS= read -r CLASS || [ -n "$CLASS" ]; do
              CLEAN=$(echo "$CLASS" | tr -d '\r' | xargs)
              [ -z "$CLEAN" ] && continue
              echo "@interface $CLEAN : NSObject @end" > "$DEST/$CLEAN.h"
            done < "$DIR/headers.txt"
            
            INDEX="$DEST/$FOLDER.h"
            echo "#import <Foundation/Foundation.h>" > "$INDEX"
            echo "#import <UIKit/UIKit.h>" >> "$INDEX"
            for h in "$DEST"/*.h; do
              [ "$(basename "$h")" != "$FOLDER.h" ] && echo "#import \"$(basename "$h")\"" >> "$INDEX"
            done
            echo "has_headers=true" >> $GITHUB_OUTPUT
          else
            echo "has_headers=false" >> $GITHUB_OUTPUT
          fi

      # =============================================================
      # CÔNG ĐOẠN 5: BIÊN DỊCH DỰ ÁN
      # =============================================================
      - name: 🔨 5.1 Build DEB
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          DYNAMIC_CFLAGS="-fobjc-arc -Wno-error"
          if [ "${{ steps.process_headers.outputs.has_headers }}" = "true" ]; then
            DYNAMIC_CFLAGS="$DYNAMIC_CFLAGS -I$THEOS/include/${{ github.event.inputs.header_folder }}"
          fi
          make -C "$DIR" clean package FINALPACKAGE=1 TARGET=iphone:clang:14.5:14.5 ADDITIONAL_CFLAGS="$DYNAMIC_CFLAGS"
          mkdir -p deb_output && cp "$DIR/packages/"*.deb deb_output/

      # =============================================================
      # CÔNG ĐOẠN 6: TỰ ĐỘNG VIẾT NHẬT KÝ (CHANGELOG) & DÁN NHÃN
      # =============================================================
      - name: 📝 6.1 Auto-Changelog & Sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          VER="${{ steps.metadata.outputs.proj_ver }}"
          CLOG_PATH="$DIR/CHANGELOG.md"
          JSON_PATH="depictions/${SAFE}.json"
          SRC_FILE=$(find "$DIR" -name "*.x" -o -name "*.xm" | head -n 1)

          # 1. Quét nội dung từ code (Dấu - và +)
          FEAT=$(grep "^-" "$SRC_FILE" | sed 's/^- //' | sed ':a;N;$!ba;s/\n/\\n- /g' || echo "Cập nhật định kỳ")
          FIX=$(grep "^+" "$SRC_FILE" | sed 's/^+ //' | sed ':a;N;$!ba;s/\n/\\n+ /g' || echo "Cải thiện ổn định")

          # 2. Tự động đúc file Changelog (Nối đầu phiên bản mới)
          TIMESTAMP=$(date "+%d/%m/%Y %H:%M")
          OLD_CONTENT=$(cat "$CLOG_PATH" 2>/dev/null || echo "---")
          echo -e "### 🚀 v$VER ($TIMESTAMP)\n#### ✨ Tính năng mới\n- $FEAT\n#### 🐛 Sửa lỗi\n- $FIX\n\n---\n$OLD_CONTENT" > "$CLOG_PATH"

          # 3. Tạo bản tin Sileo
          DESC="### ✨ Mới nhất (v$VER)\n- $FEAT\n\n### 🐛 Sửa lỗi\n- $FIX\n\n---\n### 📜 Nhật ký đầy đủ\nXem tại CHANGELOG.md\n\n---\n### ⚠️ Lưu ý\n- iOS 14.0+\n- Xoá bản cũ trước khi cài."
          mkdir -p depictions
          IMG_BASE="${{ env.BASE_URL }}/depictions/images"
          echo '{"class":"DepictionTabView","tabs":[{"tabname":"Details","class":"DepictionStackView","views":[{"class":"DepictionHeaderView","title":"'$SAFE'"},{"class":"DepictionImageView","url":"'$IMG_BASE/${SAFE}-banner.png'","width":1242,"height":500,"cornerRadius":10},{"class":"DepictionScreenshotsView","itemCornerRadius":8,"screenshots":[]},{"class":"DepictionMarkdownView","markdown":"'$DESC'","useMargins":true}]}]}' > "$JSON_PATH"

          # 4. Đẩy ngược về Repo
          git add "$CLOG_PATH" depictions/
          if [ "${{ github.event.inputs.publish }}" == "true" ]; then
            mkdir -p debs && cp deb_output/*.deb debs/
            dpkg-scanpackages -m debs /dev/null > Packages && bzip2 -fks Packages
            git add debs/ Packages Packages.bz2
            MSG="🌟 Release: $SAFE v$VER"
          else
            MSG="🛠️ Build: $SAFE v$VER"
          fi
          git commit -m "$MSG" || exit 0
          git push origin main

      - name: 📦 7.1 Xuất xưởng Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
          path: deb_output/
