name: Build Multi Tweak src/ + Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án build src/'
        required: true
        default: 'autoac'
        type: choice
        options:
        - autoac
        - autodl
        - all
      bump_type:
        description: 'Chọn loại tăng versions'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        if: github.event_name == 'workflow_dispatch'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump_type }}

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Clone YouTubeHeader
        run: |
          git clone https://github.com/PoomSmart/YouTubeHeader $THEOS/include/YouTubeHeader || echo "YouTubeHeader already exists"

      - name: Build Selected Project
        run: |
          PROJECT="${{ inputs.project || 'all' }}"
          echo "🔨 Đang build: $PROJECT"

          if [ "$PROJECT" = "all" ]; then
            for dir in src/*/ ; do
              if [ -f "$dir/Makefile" ]; then
                proj=$(basename "$dir")
                echo "→ Building $proj ..."
                mkdir -p "$dir/packages" # Tự động tạo thư mục packages
                make -C "$dir" package FINALPACKAGE=1 || echo "Build $proj failed"
              fi
            done
          else
            echo "→ Building $PROJECT ..."
            mkdir -p "src/$PROJECT/packages" # Tự động tạo thư mục packages
            make -C "src/$PROJECT" package FINALPACKAGE=1 || echo "Build failed"
          fi
          
          echo "🔎 Các file .deb đã tạo:"
          find . -name "*.deb"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ inputs.project || 'all' }}
          path: '**/*.deb' # Quét toàn bộ để không bỏ sót file
          if-no-files-found: warn

      - name: Copy to debs/ and Commit
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          git checkout main
          
          mkdir -p debs
          # Tìm tất cả file .deb (ngoại trừ trong debs/) và copy vào debs/
          find . -name "*.deb" -not -path "./debs/*" -exec cp {} debs/ \;
          echo "✅ Copied .deb files to debs/"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debs/
          
          if git diff-index --quiet HEAD; then
            echo "No new .deb to commit"
          else
            git commit -m "chore: add official .deb files to debs/ [skip ci]"
            git push origin main
            echo "✅ Committed debs/ folder"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag || github.ref_name }}
          name: Release ${{ steps.tag_version.outputs.new_tag || github.ref_name }}
          files: debs/*.deb # Lấy trực tiếp từ thư mục debs/ đã copy
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
