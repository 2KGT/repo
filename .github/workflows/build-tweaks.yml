name: Build Multi Tweak (Professional Edition)

on:
  workflow_dispatch:
    inputs:
      project:
        description: '🧱Chọn dự án build (src/)'
        required: true
        default: 'autoac'
        type: choice
        options:
          - autoac
          - autodl
          # Thêm các thư mục dự án khác của bạn tại đây

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Build and Process Metadata
        id: metadata
        run: |
          PROJECT_NAME="${{ github.event.inputs.project }}"
          DIR="src/$PROJECT_NAME"
          CONTROL="$DIR/control"
          CHANGELOG="$DIR/CHANGELOG.md"
          SOURCE="$DIR/Tweak.xm"
          
          mkdir -p deb_output

          if [ ! -f "$CONTROL" ]; then
            echo "❌ Không tìm thấy file control tại $DIR"
            exit 1
          fi

          # --- 1. TỰ ĐỘNG TĂNG VERSION (Bản vá - Patch) ---
          current_ver=$(grep "^Version:" "$CONTROL" | cut -d' ' -f2)
          IFS='.' read -r major minor patch <<< "$current_ver"
          new_ver="$major.$minor.$((patch + 1))"
          sed -i '' "s/Version: $current_ver/Version: $new_ver/" "$CONTROL"

          # --- 2. QUÉT CODE TRÍCH XUẤT CHỨC NĂNG ---
          news=$(grep "// NEW:" "$SOURCE" | sed 's/\/\/ NEW://g' | sed 's/^/- /' || echo "- Cập nhật tính năng hệ thống")
          fixes=$(grep "// FIX:" "$SOURCE" | sed 's/\/\/ FIX://g' | sed 's/^/- /' || echo "- Sửa các lỗi nhỏ và tối ưu hóa")
          
          # Xóa comment trong code để tránh lặp lại lần sau
          sed -i '' '/\/\/ NEW:/d' "$SOURCE"
          sed -i '' '/\/\/ FIX:/d' "$SOURCE"
          
          latest_content="### ✨ Tính năng mới\n$news\n\n### 🐛 Sửa lỗi & Cải thiện\n$fixes"

          # --- 3. CẬP NHẬT CHANGELOG.MD ---
          note_section="---\n### ⚠️ Lưu ý\n- Yêu cầu iOS 14.0 trở lên.\n- Xóa phiên bản cũ trước khi cài đặt bản mới này."
          
          if [ -f "$CHANGELOG" ]; then
              # Lấy tối đa 30 dòng lịch sử cũ
              old_history=$(sed -n '/### 📜 Lịch sử/,/---/p' "$CHANGELOG" | grep -v "### 📜 Lịch sử" | grep -v "---" | head -n 30)
              
              echo -e "\n$latest_content\n\n" > "$CHANGELOG"
              echo -e "---\n### 📜 Lịch sử phiên bản cũ\n$old_history" >> "$CHANGELOG"
              echo -e "\n$latest_content (v$current_ver)" >> "$CHANGELOG"
              echo -e "\n$note_section" >> "$CHANGELOG"
          else
              echo -e "\n$latest_content\n\n\n---\n### 📜 Lịch sử phiên bản cũ\n(Chưa có lịch sử)\n\n$note_section" > "$CHANGELOG"
          fi

          # --- 4. BUILD DEB ---
          echo "🔨 Đang build $PROJECT_NAME v$new_ver..."
          make -C "$DIR" clean package FINALPACKAGE=1
          find "$DIR/packages" -name "*.deb" -exec cp {} deb_output/ \;

          # Xuất biến môi trường cho các bước sau
          echo "proj_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "proj_ver=$new_ver" >> $GITHUB_OUTPUT
          echo "proj_desc=$(grep "^Description:" "$CONTROL" | cut -d' ' -f2-)" >> $GITHUB_OUTPUT
          echo "proj_changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$latest_content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit & Push Auto-Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          
          # Cập nhật thư mục debs tập trung
          mkdir -p debs
          cp -v deb_output/*.deb debs/ 2>/dev/null || true
          
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "build(${{ steps.metadata.outputs.proj_name }}): v${{ steps.metadata.outputs.proj_ver }} [skip ci]"
            git push origin main
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.proj_name }}-v${{ steps.metadata.outputs.proj_ver }}
          name: "${{ steps.metadata.outputs.proj_name }} - v${{ steps.metadata.outputs.proj_ver }}"
          files: deb_output/*.deb
          body: |
            ## 📝 Mô tả
            > ${{ steps.metadata.outputs.proj_desc }}

            ${{ steps.metadata.outputs.proj_changelog }}

            ---
            ### ⚠️ Lưu ý
            - Yêu cầu iOS 14.0 trở lên.
            - Xóa phiên bản cũ trước khi cài đặt bản mới này.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
