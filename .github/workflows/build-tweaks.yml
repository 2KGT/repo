name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án cần Build'
        required: true
        type: choice
        default: '(none)'
        options:
          - '(none)'
          - 'AutoAC'
          - 'AutoDL'
      publish:
        description: 'Phát hành lên Sileo (Tăng vơ chính thức)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕒 Cài đặt múi giờ Hà Nội (ICT)
        run: |
          # Thiết lập múi giờ cho môi trường shell
          sudo ln -sf /usr/share/zoneinfo/Asia/Ho_Chi_Minh /etc/localtime
          echo "Thời gian hiện tại: $(date)"

      - name: 🛠️ Setup Toolchain (Theos)
        uses: randomblock1/theos-action@v1

      - name: ⚙️ Build Logic (Smart Versioning & Internal Time Fix)
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          if [ "$DP_NAME" = "(none)" ]; then exit 1; fi
          
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          if [ -z "$CTRL" ]; then echo "❌ Không tìm thấy dự án!"; exit 1; fi
          
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          
          RAW_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          
          if [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
              # TĂNG VƠ CHÍNH THỨC
              IFS='.' read -r i1 i2 i3 <<< "$RAW_VER"
              NEW_VER="$i1.$i2.$((i3 + 1))"
          else
              # TẠO VƠ TEST (Dấu thời gian HHMM)
              NEW_VER="$RAW_VER-test$(date +%H%M)"
          fi
          
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          
          # ✅ FIX LỖI EXIT CODE 1: Chỉ chạm vào file trong dự án, bỏ qua lỗi nếu có file symlink hỏng
          find "$DIR" -maxdepth 10 -not -path '*/.*' -exec touch -t $(date +%Y%m%d%H%M.%S) {} + || true
          
          make -C "$DIR" clean package FINALPACKAGE=1
          
          mkdir -p deb_output
          find "$DIR/packages" -name "*.deb" -exec cp {} deb_output/ \;
          
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT
          echo "deb_file=$(basename $(ls deb_output/*.deb | head -n 1))" >> $GITHUB_OUTPUT

      - name: 💾 Lưu file Test (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}-v${{ steps.metadata.outputs.proj_ver }}
          path: deb_output/*.deb
          retention-days: 3

      - name: 🚀 Cập nhật & Giao hàng (Chỉ khi Publish)
        if: github.event.inputs.publish == 'true'
        run: |
          brew install dpkg
          mkdir -p debs depictions/images icons
          cp -v deb_output/*.deb debs/
          
          # QUÉT FILE CHUẨN ĐỂ HIỆN DUNG LƯỢNG (Fix lỗi 0.0 MB)
          # Lưu ý dùng 'debs' thay vì './debs' để dpkg-scanpackages ghi đường dẫn đẹp hơn
          dpkg-scanpackages -m debs /dev/null > Packages
          bzip2 -fks Packages
          
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          URL="${{ env.BASE_URL }}"
          PKG=$(grep "^Package:" "${{ steps.metadata.outputs.proj_dir }}/control" | cut -d' ' -f2)
          DESC=$(grep "^Description:" "${{ steps.metadata.outputs.proj_dir }}/control" | cut -d: -f2- | sed 's/^ *//')
          
          cat > depictions/${SAFE}.json << EOF
          {
            "name": "${{ github.event.inputs.project }}",
            "package": "$PKG",
            "version": "${{ steps.metadata.outputs.proj_ver }}",
            "description": "$DESC",
            "icon": "${URL}/icons/${SAFE}.png",
            "banner": "${URL}/depictions/images/${SAFE}-banner.png",
            "screenshots": [
              "${URL}/depictions/images/${SAFE}1.png",
              "${URL}/depictions/images/${SAFE}2.png"
            ],
            "downloads": "${URL}/debs/${{ steps.metadata.outputs.deb_file }}",
            "changelog": [{"version": "${{ steps.metadata.outputs.proj_ver }}", "changes": "• Phát hành bản build chính thức (ICT)"}]
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          # Xóa các thư mục build để git sạch
          rm -rf deb_output/ theos/ .theos/
          
          git add .
          git commit -m "🚀 Release $SAFE v${{ steps.metadata.outputs.proj_ver }}" || exit 0
          
          # Push an toàn: Fetch trước khi push để tránh xung đột
          git pull --rebase origin main
          git push origin main

      - name: 🧹 Vệ sinh
        if: always()
        run: |
          rm -rf deb_output/ .theos/ obj/
