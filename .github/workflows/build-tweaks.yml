name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Release Official (Tích để lên Sileo)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # =========================================================
      # CÔNG ĐOẠN 1: KHỞI TẠO HỆ THỐNG & DEPENDENCIES
      # =========================================================
      - name: 📥 Checkout & Setup
        uses: actions/checkout@v4

      - name: 🛠️ Cài đặt công cụ hỗ trợ
        run: |
          brew install make ldid dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      # =========================================================
      # CÔNG ĐOẠN 2: THIẾT LẬP MÔI TRƯỜNG THEOS
      # =========================================================
      - name: 🧠 Quản lý Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-v2
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: 🏗️ Setup Theos Environment
        run: |
          if [ "${{ steps.cache-theos.outputs.cache-hit }}" != "true" ]; then
            rm -rf $THEOS
            git clone --recursive https://github.com/theos/theos.git $THEOS
            mkdir -p $THEOS/sdks
            curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks
          fi
          mkdir -p $THEOS/include

      # =========================================================
      # CÔNG ĐOẠN 3: ĐỊNH VỊ DỰ ÁN & QUY HOẠCH METADATA
      # =========================================================
      - name: 🎯 Định vị mục tiêu
        id: metadata
        run: |
          PROJ_NAME="${{ github.event.inputs.project }}"
          [ "$PROJ_NAME" = "(none)" ] && exit 1
          
          CTRL=$(grep -lE "^Name:.*$PROJ_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$(grep "^Version:" "$CTRL" | cut -d' ' -f2)" || echo "$(grep "^Version:" "$CTRL" | cut -d' ' -f2)-test$(date +%H%M)")
          
          # Tự động gán link Ảnh/Mô tả Sileo theo tên SAFE
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          
          # Cập nhật Version vào máy ảo
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT
          make -C "$DIR" clean

      # =========================================================
      # CÔNG ĐOẠN 4: NGƯỜI VẬN CHUYỂN (CHỈ CHẠY THEO ĐƠN HÀNG)
      # =========================================================
      - name: 🚛 Nhập kho Headers Động
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          if [ ! -f "$DIR/headers.txt" ]; then
              echo "🍃 Không có đơn hàng headers.txt. Bỏ qua."
              exit 0
          fi
          rm -rf $THEOS/include/*
          for KHO_APP in headers/*/; do
              [ -d "$KHO_APP" ] || continue
              APP_NAME=$(basename "$KHO_APP")
              DEST_DIR="$THEOS/include/$APP_NAME"
              mkdir -p "$DEST_DIR"
              while IFS= read -r line || [ -n "$line" ]; do
                  FILE=$(echo "$line" | tr -d '\r' | xargs)
                  [ -z "$FILE" ] && continue
                  [[ "$FILE" != *.h ]] && FILE="${FILE}.h"
                  [ -f "$KHO_APP/$FILE" ] && cp -f "$KHO_APP/$FILE" "$DEST_DIR/"
              done < "$DIR/headers.txt"
              [ "$(ls -A "$DEST_DIR" 2>/dev/null)" ] || rm -rf "$DEST_DIR"
          done

      # =========================================================
      # CÔNG ĐOẠN 5: THỰC THI BUILD & ĐÓNG GÓI (.DEB)
      # =========================================================
      - name: 🔨 Thực thi Build DEB
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          DYNAMIC_INCLUDES=""
          if [ -f "$DIR/headers.txt" ]; then
              for d in $THEOS/include/*/; do
                  [ -d "$d" ] && DYNAMIC_INCLUDES="$DYNAMIC_INCLUDES -I$d"
              done
          fi
          make -C "$DIR" package FINALPACKAGE=1 TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -DTHEOS_LEAN_AND_MEAN $DYNAMIC_INCLUDES -I$THEOS/include"
          mkdir -p deb_output && cp "$DIR/packages/"*.deb deb_output/

      # =========================================================
      # CÔNG ĐOẠN 6: ĐÚC NHÃN TỰ ĐỘNG & ĐỒNG BỘ NGƯỢC REPO
      # =========================================================
      - name: 🚀 Đúc nhãn Sileo & Đồng bộ ngược Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          JSON_PATH="depictions/${SAFE}.json"
          IMG_BASE="${{ env.BASE_URL }}/depictions/images"
          
          echo "📝 Đang đúc khuôn nhãn JSON cho $SAFE..."
          mkdir -p depictions
          
          # --- BẮT ĐẦU ĐÚC FILE JSON (Hỗ trợ Banner + Icon + Screenshots) ---
          cat <<EOF > "$JSON_PATH"
{
  "class": "DepictionTabView",
  "minVersion": "0.1",
  "tabs": [
    {
      "tabname": "Details",
      "class": "DepictionStackView",
      "views": [
        {
          "class": "DepictionHeaderView",
          "title": "$SAFE",
          "useBoldText": true,
          "useMargins":true
        },
        # --- 1. GÁN BANNER (Nếu có file tên [Project]-banner.png) ---
        {
          "class": "DepictionImageView",
          "url": "$IMG_BASE/${SAFE}-banner.png",
          "width": 1242,
          "height": 500,
          "cornerRadius": 10,
          "useMargins": true
        },
        # --- 2. GÁN SCREENSHOTS (Tự động quét file [Project]1.png, 2.png...) ---
        {
          "class": "DepictionScreenshotsView",
          "itemCornerRadius": 8,
          "itemSize": "{160, 346}",
          "screenshots": [
EOF

          # --- VÒNG LẶP TỰ ĐỘNG QUÉT SCREENSHOTS ---
          # Quét tối đa 5 ảnh screenshots có tên dạng AutoAC1.png, AutoAC2.png...
          FIRST_SHOT=true
          for i in {1..5}; do
              if [ -f "depictions/images/${SAFE}${i}.png" ]; then
                  if [ "$FIRST_SHOT" = true ]; then
                      FIRST_SHOT=false
                  else
                      echo "," >> "$JSON_PATH" # Thêm dấu phẩy ngăn cách các ảnh cũ
                  fi
                  # Chèn link ảnh raw vào JSON
                  echo "            { \"url\": \"$IMG_BASE/${SAFE}${i}.png\", \"accessibilityText\": \"Screenshot $i\" }" >> "$JSON_PATH"
              fi
          done

          # --- ĐÓNG FILE JSON ---
          cat <<EOF >> "$JSON_PATH"
          ]
        },
        # --- 3. DÒNG MÔ TẢ CUỐI ---
        {
          "class": "DepictionMarkdownView",
          "markdown": "AutoAC - Tự động hóa trải nghiệm YouTube của bạn.",
          "useMargins": true
        }
      ]
    }
  ]
}
EOF
          echo "✅ Đúc nhãn thành công: $JSON_PATH"

          # --- HÀNH ĐỘNG ĐỒNG BỘ ---
          git add src/build-tweaks/ depictions/
          
          if [ "${{ github.event.inputs.publish }}" == "true" ]; then
              mkdir -p debs
              cp deb_output/*.deb debs/
              dpkg-scanpackages -m debs /dev/null > Packages
              bzip2 -fks Packages
              git add debs/ Packages Packages.bz2
              COMMIT_MSG="🌟 Official Release: ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}"
          else
              COMMIT_MSG="🛠️ Beta Build: ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}"
          fi
          
          git commit -m "$COMMIT_MSG" || exit 0
          git push origin main


      - name: 📦 Xuất Artifact để kiểm tra
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
          path: deb_output/*.deb
