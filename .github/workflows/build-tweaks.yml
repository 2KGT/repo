name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: '🧱 Chọn dự án (Tên hiển thị)'
        required: true
        type: choice
        default: 'none'
        options:
          - none
          - AutoAC

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Set Project Metadata & Build
        id: metadata
        run: |
          DISPLAY_NAME="${{ github.event.inputs.project }}"
          
          if [ "$DISPLAY_NAME" = "none" ] || [ -z "$DISPLAY_NAME" ]; then
            echo "❌ Bạn chưa chọn dự án!"
            exit 1
          fi

          # Dùng grep -lE và .* để bỏ qua dấu ngoặc khi tìm kiếm
          TARGET_CONTROL=$(grep -lE "Name:.*$DISPLAY_NAME" src/build-tweaks/*/control | head -n 1)
          if [ -z "$TARGET_CONTROL" ]; then
            echo "❌ Không tìm thấy file control cho: $DISPLAY_NAME"
            exit 1
          fi

          DIR=$(dirname "$TARGET_CONTROL")
          PROJECT_FOLDER=$(basename "$DIR")
          CONTROL="$DIR/control"
          
          # Lọc sạch dấu ngoặc () và khoảng trắng để làm tên file an toàn
          TWEAK_NAME=$(grep "^Name:" "$CONTROL" | cut -d: -f2- | sed 's/^ *//;s/ *$//')
          SAFE_NAME=$(echo "$TWEAK_NAME" | tr -d '()' | tr -d ' ') 
          DEPICTION_URL="https://raw.githubusercontent.com/2KGT/repo/main/depictions/${SAFE_NAME}.json"
          
          if grep -q "^SileoDepiction:" "$CONTROL"; then
            sed -i '' "s|^SileoDepiction:.*|SileoDepiction: $DEPICTION_URL|" "$CONTROL"
          else
            echo "SileoDepiction: $DEPICTION_URL" >> "$CONTROL"
          fi

          echo "proj_name=$PROJECT_FOLDER" >> $GITHUB_OUTPUT
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "tweak_name=$TWEAK_NAME" >> $GITHUB_OUTPUT

          # --- TỰ ĐỘNG TĂNG VERSION ---
          current_ver=$(grep "^Version:" "$CONTROL" | cut -d' ' -f2)
          IFS='.' read -r major minor patch <<< "$current_ver"
          new_ver="$major.$minor.$((patch + 1))"
          sed -i '' "s/Version: $current_ver/Version: $new_ver/" "$CONTROL"
          echo "proj_ver=$new_ver" >> $GITHUB_OUTPUT

          # --- QUÉT CHỨC NĂNG (CHANGELOG) ---
          SOURCE=$(find "$DIR" -maxdepth 1 \( -name "*.x" -o -name "*.xm" \) | head -n 1)
          if [ -n "$SOURCE" ] && [ -f "$SOURCE" ]; then
            news=$(grep "// NEW:" "$SOURCE" | sed 's/\/\/ NEW://g' | sed 's/^/- /' || true)
            fixes=$(grep "// FIX:" "$SOURCE" | sed 's/\/\/ FIX://g' | sed 's/^/- /' || true)
            [ -z "$news" ] && news="- Cập nhật hệ thống"
            [ -z "$fixes" ] && fixes="- Tối ưu hóa"
            sed -i '' '/\/\/ NEW:/d; /\/\/ FIX:/d' "$SOURCE"
          else
            news="- Cập nhật mới"; fixes="- Sửa lỗi nhỏ"
          fi
          
          echo "proj_desc=$(grep "^Description:" "$CONTROL" | cut -d: -f2-)" >> $GITHUB_OUTPUT
          echo "proj_changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "### ✨ Tính năng mới\n$news\n\n### 🐛 Sửa lỗi\n$fixes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # --- BUILD ---
          make -C "$DIR" clean package FINALPACKAGE=1 || make -C "$DIR" package FINALPACKAGE=1
          mkdir -p deb_output
          find "$DIR/packages" -name "*.deb" -exec cp {} deb_output/ \;
          
          # Lấy chính xác tên file .deb vừa tạo ra để đẩy sang file JSON
          DEB_FILE=$(basename $(ls deb_output/*.deb | head -n 1))
          echo "deb_filename=$DEB_FILE" >> $GITHUB_OUTPUT

      - name: Update Packages Index
        run: |
          brew install dpkg
          mkdir -p debs
          cp -v deb_output/*.deb debs/ 2>/dev/null || true
          dpkg-scanpackages -m ./debs /dev/null > Packages
          bzip2 -fks Packages

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debs/ Packages Packages.bz2 src/build-tweaks/
          git diff --cached --quiet || (git commit -m "build(${{ steps.metadata.outputs.safe_name }}): v${{ steps.metadata.outputs.proj_ver }}" && git pull origin main --rebase && git push origin main)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.proj_name }}-v${{ steps.metadata.outputs.proj_ver }}
          name: "${{ steps.metadata.outputs.tweak_name }} - v${{ steps.metadata.outputs.proj_ver }}"
          files: deb_output/*.deb
          body: |
            ## 📝 Mô tả
            > ${{ steps.metadata.outputs.proj_desc }}

            ${{ steps.metadata.outputs.proj_changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Depictions & Sileo
        run: |
          mkdir -p depictions
          CONTROL="${{ steps.metadata.outputs.proj_dir }}/control"
          SAFE_NAME="${{ steps.metadata.outputs.safe_name }}"
          REPO_URL="https://raw.githubusercontent.com/2KGT/repo/main"
          
          # 1. Lấy metadata cơ bản
          AUTHOR=$(grep "^Author:" "$CONTROL" | cut -d: -f2- | sed 's/^ *//')
          MAINTAINER=$(grep "^Maintainer:" "$CONTROL" | cut -d: -f2- | sed 's/^ *//')
          DEPENDS=$(grep "^Depends:" "$CONTROL" | cut -d: -f2- | sed 's/^ *//')
          
          [ -z "$AUTHOR" ] && AUTHOR="Unknown"
          [ -z "$MAINTAINER" ] && MAINTAINER="Unknown"
          [ -z "$DEPENDS" ] && DEPENDS="mobilesubstrate"
          
          # 2. Xử lý logic Hình ảnh/Video thông minh
          ICON_URL="${REPO_URL}/icons/${SAFE_NAME}.png"
          
          BANNER_URL=""
          if [ -f "depictions/images/${SAFE_NAME}-banner.png" ]; then
            BANNER_URL="${REPO_URL}/depictions/images/${SAFE_NAME}-banner.png"
          fi

          VIDEO_URL=""
          if [ -f "depictions/images/${SAFE_NAME}.mp4" ]; then
            VIDEO_URL="${REPO_URL}/depictions/images/${SAFE_NAME}.mp4"
          fi

          SCREENSHOTS_JSON=""
          for i in {1..5}; do
            SS_PATH="depictions/images/${SAFE_NAME}${i}.png"
            if [ -f "$SS_PATH" ]; then
              [ -n "$SCREENSHOTS_JSON" ] && SCREENSHOTS_JSON="${SCREENSHOTS_JSON},"
              SCREENSHOTS_JSON="${SCREENSHOTS_JSON}\"${REPO_URL}/${SS_PATH}\""
            fi
          done

          # 3. Tạo file JSON hoàn chỉnh
          cat > depictions/${SAFE_NAME}.json << EOF
          {
            "name": "${{ steps.metadata.outputs.tweak_name }}",
            "version": "${{ steps.metadata.outputs.proj_ver }}",
            "description": "${{ steps.metadata.outputs.proj_desc }}",
            "author": "${AUTHOR}",
            "maintainer": "${MAINTAINER}",
            "depends": "${DEPENDS}",
            "section": "Tweaks",
            "tintColor": "#007aff",
            "icon": "${ICON_URL}",
            "banner": "${BANNER_URL}",
            "video": "${VIDEO_URL}",
            "screenshots": [${SCREENSHOTS_JSON}],
            "downloads": "${REPO_URL}/debs/${{ steps.metadata.outputs.deb_filename }}",
            "changelog": "## ✨ Nhật ký v${{ steps.metadata.outputs.proj_ver }}\n\n${{ steps.metadata.outputs.proj_changelog }}\n\n---\n**Cập nhật:** \$(date -u +'%Y-%m-%d %H:%M')",
            "updated": "\$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF
          
          # 4. Đẩy JSON lên Repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add depictions/
          git diff --cached --quiet || (git commit -m "docs: update dynamic depiction for ${SAFE_NAME}" && git pull origin main --rebase && git push origin main)
