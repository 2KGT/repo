name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Release Official'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout & Setup
        uses: actions/checkout@v4

      - name: 🛠️ Install Dependencies
        run: |
          brew install make ldid dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: 🧠 Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-${{ hashFiles('**/headers.txt') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: 🏗️ Setup Theos Environment
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      - name: 🚚 Cảm biến & Nạp Header (Zip 1-2-3)
        run: |
          THEOS_INC="$THEOS/include/YouTubeHeader"
          mkdir -p "$THEOS_INC"
          
          # 1. Dọn sạch bãi cũ
          rm -rf "$THEOS_INC/"*
          
          # 2. Xử lý tất cả file Zip trong folder headers/ (YouTube1 -> YouTube2 -> YouTube10)
          if ls headers/*.zip 1> /dev/null 2>&1; then
              echo "📦 Phát hiện kho Zip! Đang xả nén và trộn hàng..."
              for zipfile in $(ls headers/*.zip | sort -V); do
                  echo "🏗️ Đang xả và ghi đè: $zipfile"
                  unzip -q -o "$zipfile" -d "$THEOS_INC"
              done
              
          # 3. PHẲNG HÓA (Lôi hết file .h ra ngoài cấp cao nhất của YouTubeHeader)
              find "$THEOS_INC" -mindepth 2 -type f -name "*.h" -exec mv -t "$THEOS_INC" {} +
              find "$THEOS_INC" -type d -empty -delete
              echo "✅ Đã thông nòng $(ls "$THEOS_INC" | wc -l) file .h."
          else
              echo "⚠️ Không tìm thấy file Zip nào trong folder headers/."
          fi
          # 4. PHẦN XỬ LÝ THEO HEADERS.TXT
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          
          if [ -f "$DIR/headers.txt" ]; then
              echo "🔍 Tìm thấy headers.txt cho $DP_NAME..."
              while IFS= read -r repo_name || [ -n "$repo_name" ]; do
                  repo_name=$(echo $repo_name | tr -d '\r' | xargs)
                  # Bỏ qua YouTubeHeader vì đã xả Zip ở trên rồi
                  [ -z "$repo_name" ] || [ "$repo_name" = "YouTubeHeader" ] && continue

                  if [ -d "headers/$repo_name" ]; then
                      echo "📂 Dùng hàng nội bộ: headers/$repo_name"
                      rm -rf "$THEOS_INC/$repo_name"
                      ln -sf "$(pwd)/headers/$repo_name" "$THEOS_INC/$repo_name"
                  else
                      echo "🚀 Kéo từ GitHub: 2KGT/$repo_name"
                      git clone --depth 1 https://github.com/2KGT/$repo_name "$THEOS_INC/$repo_name" || true
                  fi
              done < "$DIR/headers.txt"
          fi
          
          # 5. DỌN RÁC APPLE (Để build không bị xung đột)
          find $THEOS_INC -type d -name "CoreImage" -exec rm -rf {} +
          find $THEOS_INC -type d -name "UIKit" -exec rm -rf {} +
          echo "✅ Nhà máy đã sẵn sàng luyện đan!"
      - name: ⚙️ Băm Trộn & Gán (Automation)
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          [ "$DP_NAME" = "(none)" ] && exit 1
          
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          DESC=$(grep "^Description:" "$CTRL" | cut -d: -f2- | sed 's/^ *//')
          
          RAW_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$RAW_VER" || echo "$RAW_VER-test$(date +%H%M)")
          
          IMG_PATH="${{ env.BASE_URL }}/depictions/images/${SAFE}"
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          sed -i '' "/^Icon:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          echo "Icon: ${{ env.BASE_URL }}/icons/${SAFE}.png" >> "$CTRL"
          
          mkdir -p depictions/images
          cat <<EOF > "depictions/${SAFE}.json"
          {
            "min_ios_version": "14.0",
            "headerImage": "${IMG_PATH}_header.png",
            "tintColor": "#ff2d55",
            "tabs": [
              {
                "tabname": "Details",
                "class": "DepictionStackView",
                "views": [
                  { "class": "DepictionHeaderView", "title": "$DP_NAME" },
                  { 
                    "class": "DepictionScreenshotsView", 
                    "screenshots": [
                      { "url": "${IMG_PATH}_ss1.png", "accessibilityText": "SS1" },
                      { "url": "${IMG_PATH}_ss2.png", "accessibilityText": "SS2" }
                    ],
                    "itemCornerRadius": 10
                  },
                  { "class": "DepictionMarkdownView", "markdown": "### Giới thiệu\n$DESC" },
                  { "class": "DepictionBannerView", "bannerImage": "${IMG_PATH}_banner.png" }
                ]
              }
            ]
          }
          EOF
          
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -DTHEOS_LEAN_AND_MEAN"
          
          mkdir -p deb_output
          cp "$DIR/packages/"*.deb deb_output/
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT

      - name: 🚀 Lên Kệ & Đồng bộ
        if: github.event.inputs.publish == 'true'
        run: |
          brew install dpkg
          mkdir -p debs icons depictions/images
          cp deb_output/*.deb debs/
          dpkg-scanpackages -m debs /dev/null > Packages
          bzip2 -fks Packages
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🌟 [Auto] Lên kệ ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}"
          git push origin main
