name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Function options'
        type: choice
        default: 'Build Project'
        options: [Build Project, Scan Options]
      project:
        description: 'Construction options'
        required: true
        type: choice
        default: '(none)'
        options:
          # OPTIONS-START
          - '(none)'
          - AutoAC
          - AutoDL
          # OPTIONS-END

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write # Chỉ giữ lại quyền cơ bản nhất để tránh lỗi hệ thống
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Scan & Update Options
        if: github.event.inputs.action == 'Scan Options'
        run: |
          FILE=".github/workflows/build-tweaks.yml"
          
          # 1. Lấy danh sách Name từ file control (Dùng -h để không hiện đường dẫn tệp)
          # Thêm lệnh sed để định dạng đúng chuẩn YAML ngay từ đầu
          PROJS=$(grep -h "^Name:" src/build-tweaks/*/control | cut -d: -f2- | sed "s/^ *//;s/ *$//" | sort | uniq | sed "s/^/          - '/;s/$/'/")
          
          # 2. Tạo nội dung chèn mới
          # Xóa sạch khoảng trắng thừa để tránh lỗi parse YAML
          LIST="          - '(none)'"
          if [ ! -z "$PROJS" ]; then
            LIST="$LIST"$'\n'"$PROJS"
          fi

          # 3. Sử dụng Perl để thay thế khối Options (Perl ổn định hơn sed trên macOS)
          perl -i -0777 -pe "s/(# OPTIONS-START).*?(# OPTIONS-END)/\$1\n$LIST\n          \$2/s" "$FILE"
          
          # 4. Lưu và đẩy lên
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "$FILE"
          git commit -m "chore: update tweak list" || exit 0
          git push origin main

      - name: 🛠️ Setup Theos
        if: github.event.inputs.action == 'Build Project'
        uses: Randomblock1/theos-action@v1

      - name: ⚙️ Build Logic
        if: github.event.inputs.action == 'Build Project'
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          [ "$DP_NAME" = "(none)" ] && exit 1
          
          # Tìm file control mà không để dính đường dẫn tệp vào biến
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          
          # Gán link chuẩn Raw
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          
          # Tăng version
          VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          [[ "$VER" != *.*.*.* ]] && VER="0.0.0.0"
          IFS='.' read -r v1 v2 v3 v4 <<< "$VER"
          NVER="$v1.$v2.$v3.$((v4 + 1))"
          sed -i '' "s/^Version: .*/Version: $NVER/" "$CTRL"

          make -C "$DIR" clean package FINALPACKAGE=1
          mkdir -p deb_output && find "$DIR/packages" -name "*.deb" -exec cp {} deb_output/ \;
          
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NVER" >> $GITHUB_OUTPUT
          echo "deb_file=$(basename $(ls deb_output/*.deb | head -n 1))" >> $GITHUB_OUTPUT

      - name: 📦 Update Assets
        if: github.event.inputs.action == 'Build Project'
        run: |
          brew install dpkg
          mkdir -p debs depictions/images icons
          cp -v deb_output/*.deb debs/ 2>/dev/null || true
          dpkg-scanpackages -m ./debs /dev/null > Packages && bzip2 -fks Packages
          
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          URL="${{ env.BASE_URL }}"
          ICON="${URL}/icons/${SAFE}.png"
          BANNER=""; [ -f "depictions/images/${SAFE}-banner.png" ] && BANNER="${URL}/depictions/images/${SAFE}-banner.png"
          
          SS_JSON=""
          for i in {1..5}; do
            [ -f "depictions/images/${SAFE}${i}.png" ] && SS_JSON="${SS_JSON}${SS_JSON:+,}\"${URL}/depictions/images/${SAFE}${i}.png\""
          done

          cat > depictions/${SAFE}.json << EOF
          {
            "name": "${{ github.event.inputs.project }}",
            "version": "${{ steps.metadata.outputs.proj_ver }}",
            "icon": "$ICON",
            "banner": "$BANNER",
            "screenshots": [$SS_JSON],
            "downloads": "${URL}/debs/${{ steps.metadata.outputs.deb_file }}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          rm -rf theos/ .theos/ obj/
          git add .
          git commit -m "build: $SAFE v${{ steps.metadata.outputs.proj_ver }}" || exit 0
          git pull --rebase origin main
          git push origin main
