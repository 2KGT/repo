name: Build Multi Tweak src/ + Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án cần build (tên thư mục trong src/)'
        required: true
        default: 'autoac'
        type: choice
        options:
        - autoac
        - autodl
        - all
      bump_type:
        description: 'Loại tăng version'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # Bắt buộc để có thể checkout main và push sau này

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Clone YouTubeHeader
        run: |
          git clone https://github.com/PoomSmart/YouTubeHeader $THEOS/include/YouTubeHeader || echo "YouTubeHeader already exists"

      - name: Build Selected Project
        run: |
          # Nếu push bằng tag (không có inputs), mặc định build 'all'
          PROJECT="${{ inputs.project || 'all' }}"
          echo "🔨 Đang build: $PROJECT"

          if [ "$PROJECT" = "all" ]; then
            for dir in src/*/ ; do
              if [ -f "$dir/Makefile" ]; then
                proj=$(basename "$dir")
                echo "→ Building $proj ..."
                make -C "$dir" package FINALPACKAGE=1 || echo "Build $proj failed"
              fi
            done
          else
            echo "→ Building $PROJECT ..."
            make -C "src/$PROJECT" package FINALPACKAGE=1 || echo "Build failed"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ inputs.project || 'all' }}
          path: src/**/packages/*.deb
          if-no-files-found: warn

      - name: Copy to debs/ and Commit (Official Release Only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git checkout main # Quay về main để tránh lỗi detached HEAD
          
          mkdir -p debs
          cp src/**/packages/*.deb debs/ 2>/dev/null || echo "No .deb file found"
          echo "✅ Copied .deb files to debs/"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debs/
          
          # Chỉ commit nếu có sự thay đổi (tránh lỗi rỗng)
          if git diff-index --quiet HEAD; then
            echo "No new .deb to commit"
          else
            git commit -m "chore: add official .deb files to debs/ [skip ci]"
            git push origin main
            echo "✅ Committed debs/ folder"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: src/**/packages/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
