name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Release Official'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
      steps:
      - name: 📥 Checkout & Setup
        uses: actions/checkout@v4

      # 1. Cài đặt phụ tùng (Chỉ cần dpkg và ldid, make gnu cho nhanh)
      - name: 🛠️ Install Dependencies
        run: |
          brew install make ldid dpkg
          # Ép hệ thống dùng GNU Make làm mặc định cho nhanh
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      # 2. CACHE THEOS: Bí kíp tăng tốc
      - name: 🧠 Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4 # Dùng bản v4 mới nhất cho ổn định
        with:
          path: theos
          key: ${{ runner.os }}-theos-${{ hashFiles('**/headers.txt') }} # Key động theo file headers
          restore-keys: |
            ${{ runner.os }}-theos-

      # 3. SETUP THEOS (Chỉ chạy nếu Cache không có - "cache-hit != 'true'")
      - name: 🏗️ Setup Theos Environment
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git theos
          # Tải SDK 14.5 ném vào luôn để lần sau dùng lại
          mkdir -p theos/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C theos/sdks

      - name: 🛠️ Setup Toolchain (Theos & SDK)
        uses: randomblock1/theos-action@v1

      - name: 📦 Setup SDK iOS 14.5
        run: |
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      - name: 🚚 Cảm biến & Nạp Header tự động
        run: |
          THEOS_INC="$THEOS/include"
          DP_NAME="${{ github.event.inputs.project }}"
          
          # 1. Tìm đường dẫn dự án
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          
          # 2. KIỂM TRA FILE ĐỊNH DANH (headers.txt)
          if [ -f "$DIR/headers.txt" ]; then
              echo "🔍 Tìm thấy danh sách Header cần nạp cho $DP_NAME..."
              
          # Đọc từng dòng trong file headers.txt
              while IFS= read -r repo_name || [ -n "$repo_name" ]; do
          # Xóa khoảng trắng thừa
                  repo_name=$(echo $repo_name | tr -d '\r' | xargs)
                  
                  if [ ! -z "$repo_name" ]; then
                      echo "🚀 Đang tự động kéo kho: $repo_name"
                      git clone --depth 1 https://github.com/2KGT/$repo_name $THEOS_INC/$repo_name
                  fi
              done < "$DIR/headers.txt"
              
          # Tự động kéo thêm bộ Shared (Dùng chung cho mọi nhà)
              mkdir -p $THEOS_INC/Shared
              curl -L https://github.com/PoomSmart/PSHeader/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS_INC/Shared
              
          # Quét rác hệ thống (Tránh đụng hàng Apple)
              find $THEOS_INC -type d -name "CoreImage" -exec rm -rf {} +
              find $THEOS_INC -type d -name "UIKit" -exec rm -rf {} +
          else
              echo "⚠️ Dự án này không yêu cầu Header đặc biệt."
          fi

      - name: ⚙️ Băm Trộn & Gán (Automation)
        id: metadata
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          [ "$DP_NAME" = "(none)" ] && exit 1
          
          # 1. Tìm File Control
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          DESC=$(grep "^Description:" "$CTRL" | cut -d: -f2- | sed 's/^ *//')
          
          # 2. Xử lý Version
          RAW_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$RAW_VER" || echo "$RAW_VER-test$(date +%H%M)")
          
          # 3. GHI NGƯỢC VÀO CONTROL (Gán link 4 loại ảnh qua Depiction)
          IMG_PATH="${{ env.BASE_URL }}/depictions/images/${SAFE}"
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          sed -i '' "/^Icon:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          echo "Icon: ${{ env.BASE_URL }}/icons/${SAFE}.png" >> "$CTRL"
          
          # 4. TẠO JSON SILEO (Trưng bày bộ tứ link ảnh)
          mkdir -p depictions/images
          cat <<EOF > "depictions/${SAFE}.json"
          {
            "min_ios_version": "14.0",
            "headerImage": "${IMG_PATH}_header.png",
            "tintColor": "#ff2d55",
            "tabs": [
              {
                "tabname": "Details",
                "class": "DepictionStackView",
                "views": [
                  { "class": "DepictionHeaderView", "title": "$DP_NAME" },
                  { 
                    "class": "DepictionScreenshotsView", 
                    "screenshots": [
                      { "url": "${IMG_PATH}_ss1.png", "accessibilityText": "SS1" },
                      { "url": "${IMG_PATH}_ss2.png", "accessibilityText": "SS2" }
                    ],
                    "itemCornerRadius": 10
                  },
                  { "class": "DepictionMarkdownView", "markdown": "### Giới thiệu\n$DESC" },
                  { "class": "DepictionBannerView", "bannerImage": "${IMG_PATH}_banner.png" }
                ]
              }
            ]
          }
          EOF
          
          # 5. LÊN THỚT BUILD (Theos tự lấy Header từ hệ thống đã tiêm)
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -DTHEOS_LEAN_AND_MEAN"
          
          mkdir -p deb_output
          cp "$DIR/packages/"*.deb deb_output/
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT


      - name: 🚀 Lên Kệ & Đồng bộ Repo
        if: github.event.inputs.publish == 'true'
        run: |
          brew install dpkg
          mkdir -p debs icons depictions/images
          cp deb_output/*.deb debs/
          dpkg-scanpackages -m debs /dev/null > Packages
          bzip2 -fks Packages
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          rm -rf headers/
          git add .
          git commit -m "🌟 [Auto] Lên kệ ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}"
          git push origin main
