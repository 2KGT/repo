name: Build Multi Tweak

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án để build'
        required: true
        type: choice
        default: '(none)'
        options: [ (none), AutoAC, AutoDL ]
      publish:
        description: 'Release Official (Tích để lên Sileo)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/2KGT/repo/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos

jobs:
  process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # ==========================================
      # BƯỚC 1: KHỞI TẠO HỆ THỐNG
      # ==========================================
      - name: 📥 Checkout & Setup
        uses: actions/checkout@v4

      - name: 🛠️ Install Dependencies
        run: |
          brew install make ldid dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

            # ==========================================
      # BƯỚC 2: QUẢN LÝ THEOS (SỬA LỖI EXIT CODE 128)
      # ==========================================
      - name: 🧠 Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: ${{ runner.os }}-theos-v2 # Dùng v2 cho sạch
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: 🏗️ Setup Theos Environment
        run: |
          if [ "${{ steps.cache-theos.outputs.cache-hit }}" != "true" ]; then
            echo "📥 Cache trống hoặc lỗi, đang dọn dẹp và tải mới..."
            # LỆNH QUAN TRỌNG: Xoá bỏ thư mục lỗi nếu nó tồn tại trước khi clone
            rm -rf $THEOS
            git clone --recursive https://github.com/theos/theos.git $THEOS
            
            mkdir -p $THEOS/sdks
            curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks
          else
            echo "💎 Đã nhận hàng từ Cache, xưởng đã sẵn sàng!"
          fi
          # Luôn đảm bảo include tồn tại cho khâu nhặt hàng
          mkdir -p $THEOS/include

      # ==========================================
      # BƯỚC 3: NGƯỜI VẬN CHUYỂN (BỐC THEO ĐƠN TXT)
      # ==========================================
      - name: 🎯 Dynamic Header Picker
        id: picker
        run: |
          DP_NAME="${{ github.event.inputs.project }}"
          CTRL=$(grep -lE "^Name:.*$DP_NAME" src/build-tweaks/*/control | head -n 1)
          DIR=$(dirname "$CTRL")
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT

          if [ ! -f "$DIR/headers.txt" ]; then
              echo "🍃 Không có headers.txt, bỏ qua khâu bốc hàng."
              exit 0
          fi

          # Dọn dẹp folder cũ trong include trước khi nhặt mới
          find $THEOS/include -maxdepth 1 -type d ! -path $THEOS/include -exec rm -rf {} +

          echo "🚀 Đang nhặt hàng từ root/headers vào xưởng..."
          for KHO_APP in headers/*/; do
              [ -d "$KHO_APP" ] || continue
              APP_NAME=$(basename "$KHO_APP")
              DEST_DIR="$THEOS/include/$APP_NAME"
              mkdir -p "$DEST_DIR"

              while IFS= read -r line || [ -n "$line" ]; do
                  FILE_NEED=$(echo "$line" | tr -d '\r' | xargs)
                  [ -z "$FILE_NEED" ] && continue
                  # Móc file tận gốc và làm phẳng
                  find "$KHO_APP" -type f -name "$FILE_NEED" -exec cp -fL {} "$DEST_DIR/" \;
              done < "$DIR/headers.txt"

              # Thanh tẩy rác Apple để build mượt
              if [ "$(ls -A "$DEST_DIR")" ]; then
                  cd "$DEST_DIR"
                  rm -f NSObject-Protocol.h NSCopying-Protocol.h NSCoding-Protocol.h \
                        NSSecureCoding-Protocol.h CGRect.h CGPoint.h UIEdgeInsets.h \
                        UIAppearanceContainer-Protocol.h UIGestureRecognizerDelegate-Protocol.h \
                        OS_dispatch_object-Protocol.h OS_dispatch_queue-Protocol.h \
                        OS_dispatch_source-Protocol.h GPBMessage.h NSObject.h NSString.h
                  cd - > /dev/null
              else
                  rm -rf "$DEST_DIR"
              fi
          done

      # ==========================================
      # BƯỚC 4: CHIẾN THUẬT NHẶT THẲNG (SAU KHI ĐÃ FILTER)
      # ==========================================
      - name: ⚙️ Build & Clean Up
        id: metadata
        run: |
          DIR="${{ steps.picker.outputs.proj_dir }}"
          CTRL="$DIR/control"
          
          # 1. Định danh nhãn mác
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | sed 's/^ *//;s/ *$//' | tr -d '()' | tr -d ' ')
          RAW_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$RAW_VER" || echo "$RAW_VER-test$(date +%H%M)")
          
          # 2. DỌN SÂN (Theos Clean)
          make -C "$DIR" clean

          # 3. NHẶT TRỰC TIẾP (Vì kho headers đã được lọc phẳng bởi Factory)
          if [ -f "$DIR/headers.txt" ]; then
              echo "🚚 Bốc hàng trực tiếp từ kho đã thanh tẩy..."
              DEST_DIR="$THEOS/include/YouTubeHeader"
              mkdir -p "$DEST_DIR"
              
              KHO_CHUAN="$(pwd)/headers/YouTubeHeader"
              
              while IFS= read -r file || [ -n "$file" ]; do
                  FILE_NEED=$(echo "$file" | tr -d '\r' | xargs)
                  [ -z "$FILE_NEED" ] && continue
                  
                  # Nhặt trực tiếp, không dùng find lằng nhằng vì hàng đã nằm ngay mặt tiền
                  if [ -f "$KHO_CHUAN/$FILE_NEED" ]; then
                      cp -fL "$KHO_CHUAN/$FILE_NEED" "$DEST_DIR/"
                      echo "✅ Đã dán: $FILE_NEED"
                  else
                      # Nếu Factory lọc chưa kỹ, dùng find hỗ trợ nốt lần cuối cho chắc
                      find "$KHO_CHUAN" -type f -name "$FILE_NEED" -exec cp -fL {} "$DEST_DIR/" \;
                      [ -f "$DEST_DIR/$FILE_NEED" ] && echo "⚠️ Đã tìm thấy trong hẻm: $FILE_NEED" || echo "❌ Mất dấu: $FILE_NEED"
                  fi
              done < "$DIR/headers.txt"
          fi

          # 4. THỔI LỬA BUILD
          echo "🔥 Nấu mẻ tweak: $SAFE..."
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          INC_FLAGS="-I$THEOS/include"
          
          make -C "$DIR" package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -Wno-duplicate-protocol -DTHEOS_LEAN_AND_MEAN $INC_FLAGS"
          
          # 5. CẤT HÀNG & DỌN DẸP
          mkdir -p deb_output
          cp "$DIR/packages/"*.deb deb_output/
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT

          echo "🧹 Xưởng sạch, hàng đã vào két!"
          find $THEOS/include -maxdepth 1 -type d ! -path $THEOS/include -exec rm -rf {} +


      # ==========================================
      # BƯỚC 5: LƯU TRỮ & PHÁT HÀNH
      # ==========================================
      - name: 📦 Xuất xưởng file .deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
          path: deb_output/*.deb

      - name: 🚀 Lên Kệ Sileo
        if: github.event.inputs.publish == 'true'
        run: |
          mkdir -p debs
          cp deb_output/*.deb debs/
          dpkg-scanpackages -m debs /dev/null > Packages
          bzip2 -fks Packages
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🌟 [Auto] Release ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}"
          git push origin main
