name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link IPA Decrypt (Dropbox đổi dl=1)'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục Header (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # ==========================================
      # BƯỚC 1: TỰ RÈN DAO MỔ (BUILD DSDUMP)
      # ==========================================
      - name: 🛠️ Build dsdump Tool
        run: |
          echo "--- ĐANG TỰ RÈN DAO MỔ DSDUMP ---"
          # Tải source code chính chủ
          git clone --recursive https://github.com/DerekSelander/dsdump.git dsdump_src
          cd dsdump_src
          
          # Sử dụng xcodebuild để biên dịch ngay tại chỗ
          # Chúng ta dùng scheme 'dsdump' và cấu hình Release
          xcodebuild -project dsdump.xcodeproj -scheme dsdump -configuration Release -derivedDataPath build_data
          
          # Lôi file binary vừa rèn xong ra ngoài
          sudo cp build_data/Build/Products/Release/dsdump /usr/local/bin/
          
          cd ..
          rm -rf dsdump_src
          echo "✅ Dao mổ dsdump đã sẵn sàng!"
          dsdump --version

      # ==========================================
      # BƯỚC 2: TIẾP NHẬN BỆNH NHÂN (IPA)
      # ==========================================
      - name: 📦 Download & Extract IPA
        run: |
          echo "--- ĐANG TIẾP NHẬN IPA ---"
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          # Tìm file não bộ của App
          BINARY_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$BINARY_PATH" .app)
          echo "binary=$BINARY_PATH/$APP_NAME" >> $GITHUB_OUTPUT
          echo "🎯 Đã xác định mục tiêu: $APP_NAME"

      # ==========================================
      # BƯỚC 3: GIẢI PHẪU & PHÂN LOẠI HEADER
      # ==========================================
      - name: ⚡ Full Dumping & Cleaning
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          mkdir -p "$TARGET_DIR"
          rm -rf "$TARGET_DIR"/*
          
          echo "🚀 Đang tiến hành mổ xẻ..."
          dsdump --objc --swift -f public --gen-header -o "$TARGET_DIR" "${{ steps.locate.outputs.binary }}"
          
          echo "🤖 Bot đang dọn dẹp và san phẳng..."
          # Đưa toàn bộ file .h về một cấp thư mục duy nhất
          find "$TARGET_DIR" -mindepth 2 -type f -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          find "$TARGET_DIR" -type d -empty -delete
          find "$TARGET_DIR" -type f ! -name "*.h" -delete

      # ==========================================
      # BƯỚC 4: XUẤT XƯỞNG LÊN REPO
      # ==========================================
      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có gì thay đổi."
          else
            git commit -m "🪄 [2KGT Factory] Dumped: ${{ github.event.inputs.app_name }}"
            git push origin main
            echo "🎉 CA PHẪU THUẬT HOÀN TẤT!"
          fi
