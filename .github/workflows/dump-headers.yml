name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu heards'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập tên class heards'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          BIN=$(find app_extracted/Payload -name "*.app" | head -n 1)
          echo "binary=$BIN/$(basename "$BIN" .app)" >> $GITHUB_OUTPUT

      - name: ⚡ Smart Dumping & Deep Collection Logic
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          
          # 1. DỌN SÂN
          if [ "${{ github.event.inputs.clear_all }}" == "true" ]; then
              echo "🧨 Nuclear: Xoá sạch kho cũ để làm mới..."
              rm -rf "$TARGET_DIR"
          fi
          mkdir -p "$TARGET_DIR" "$TEMP_DUMP"

          # 2. XÁC ĐỊNH DANH SÁCH CLASS
          CLASSES="${{ github.event.inputs.target_classes }}"
          if [ -z "$CLASSES" ] && [ -n "${{ github.event.inputs.config_path }}" ]; then
              if [ -f "${{ github.event.inputs.config_path }}" ]; then
                  echo "📝 Đọc danh sách từ dự án: ${{ github.event.inputs.config_path }}"
                  CLASSES=$(tr '\r\n' ' ' < "${{ github.event.inputs.config_path }}" | sed 's/\.h//g')
              fi
          fi

          # 3. THỰC THI DUMP (Hỗ trợ Deep Scan ngay từ khâu đầu)
          if [ -n "$CLASSES" ]; then
              for CLS in $CLASSES; do
                  [ -z "$CLS" ] && continue
                  echo "🎯 Đang băm Class: $CLS"
                  # Xuất ra folder để ipsw tự tạo cấu trúc con nếu cần
                  ipsw class-dump "${{ steps.locate.outputs.binary }}" --class "$CLS" -o "$TEMP_DUMP"
              done
          else
              echo "🌊 Dump All: Đang bóc toàn bộ Header..."
              ipsw class-dump "${{ steps.locate.outputs.binary }}" --headers -o "$TEMP_DUMP"
          fi

          # 4. GOM HÀNG (Deep Scan - Trả tiền phụ in cho chủ quán)
          if [ "${{ github.event.inputs.deep_scan }}" == "true" ]; then
              echo "📂 Deep Scan BẬT: Đang vét sạch từ mọi ngõ ngách thư mục con..."
              find "$TEMP_DUMP" -name "*.h" -type f -exec mv -f {} "$TARGET_DIR/" \;
          else
              echo "📁 Standard Scan: Chỉ lấy file ở tầng mặt..."
              find "$TEMP_DUMP" -maxdepth 1 -name "*.h" -type f -exec mv -f {} "$TARGET_DIR/" \;
          fi
          
          # 5. VÁ LỖI ĐỒNG LOẠT (Patch Headers)
          if [ "${{ github.event.inputs.patch_headers }}" == "true" ]; then
              echo "🩹 Đang dán giáp Forward Declaration cho toàn bộ kho..."
              find "$TARGET_DIR" -name "*.h" -exec sed -i '' '1i\
              @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
              @protocol NSObject, NSCopying, NSCoding;
              ' {} +
          fi

          # 6. SÀNG LỌC TINH (Chỉ bỏ rác hệ thống)
          if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
              echo "✨ Đang lọc tinh rác Swift/Apple..."
              cd "$TARGET_DIR"
              # Chỉ xóa những thứ thực sự vô dụng
              rm -f NSObject-Protocol.h NSCopying-Protocol.h NSCoding-Protocol.h GPBMessage.h 2>/dev/null
              find . -name "_Ttc*" -exec rm -f {} \;
              find . -name "*.h" | awk 'length > 100' | xargs rm -f 2>/dev/null
              cd - > /dev/null
          fi

          rm -rf "$TEMP_DUMP" app_extracted
          echo "📦 Kho hàng hiện tại: $(ls -1 "$TARGET_DIR" | wc -l) file."

      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f "headers/${{ github.event.inputs.app_name }}"
          git diff --staged --quiet || (git commit -m "🪄 [Factory] managed-dump v6.0: ${{ github.event.inputs.app_name }}" && git push origin main)
