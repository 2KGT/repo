name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          IPA_LINK="${{ github.event.inputs.ipa_url }}"
          if [[ ! "$IPA_LINK" =~ ^http ]]; then
            echo "❌ Link IPA không hợp lệ: $IPA_LINK"
            exit 1
          fi
          echo "📥 Đang tải hàng từ: $IPA_LINK"
          curl -L -A "Mozilla/5.0" "$IPA_LINK" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: ⚡ Smart Dumping & Talent Scouting Logic
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          
          # 1. DỌN SÂN
          if [ "${{ github.event.inputs.clear_all }}" == "true" ]; then
              echo "🧨 Nuclear: Xoá sạch kho cũ để làm mới..."
              rm -rf "$TARGET_DIR"
          fi
          mkdir -p "$TARGET_DIR" "$TEMP_DUMP"

          # 2. XÁC ĐỊNH MỤC TIÊU (Lập bản đồ hang ổ)
          echo "🔍 Đang rà soát toàn bộ Binary..."
          # Tìm các file thực thi (không có đuôi mở rộng) trong .app và .framework
          find app_extracted/Payload -type f ! -name "*.*" > bin_list.txt

          # 3. ĐỊNH NGHĨA DANH SÁCH ĐÒI NỢ (Fix lỗi trống biến)
          CLASSES="${{ github.event.inputs.target_classes }}"
          CONFIG="${{ github.event.inputs.config_path }}"
          
          if [ -z "$CLASSES" ] && [ -n "$CONFIG" ] && [ -f "$CONFIG" ]; then
              echo "📝 Đọc danh sách từ dự án: $CONFIG"
              CLASSES=$(tr '\r\n' ' ' < "$CONFIG" | sed 's/\.h//g')
          fi

          # 4. CHIẾN THUẬT HỐT CẢ Ổ
          if [ -n "$CLASSES" ]; then
              echo "🎯 Bắt đầu chiến dịch săn lùng theo danh sách: $CLASSES"
              for CLS in $CLASSES; do
                  [ -z "$CLS" ] && continue
                  echo "🎯 Đòi nợ Class: $CLS"
                  while read -r BIN; do
                      # Dump class và hốt luôn headers liên quan
                      ipsw class-dump "$BIN" --class "$CLS" --headers -o "$TEMP_DUMP" || true
                  done < bin_list.txt
              done
          else
              echo "🌊 Dump All: Càn quét toàn bộ hang ổ..."
              while read -r BIN; do
                  ipsw class-dump "$BIN" --headers -o "$TEMP_DUMP" || true
              done < bin_list.txt
          fi

          # 5. VÒNG LỌC TỐ CHẤT & NHẬP HỘ KHẨU
          echo "🧐 Kiểm tra tố chất và ép chuyển nhà..."
          if [ "${{ github.event.inputs.deep_scan }}" == "true" ]; then
              # Deep Scan: Tìm mọi ngóc ngách
              FIND_CMD="find $TEMP_DUMP -name *.h -type f"
          else
              # Standard Scan: Chỉ lấy tầng mặt
              FIND_CMD="find $TEMP_DUMP -maxdepth 2 -name *.h -type f"
          fi

          $FIND_CMD | while read -r FILE; do
              if [ -s "$FILE" ] && grep -qE "@interface|@protocol" "$FILE"; then
                  mv -f "$FILE" "$TARGET_DIR/"
              else
                  rm -f "$FILE"
              fi
          done

          # 6. DÁN GIÁP ĐỒNG LOẠT (Patching)
          if [ "${{ github.event.inputs.patch_headers }}" == "true" ]; then
              echo "🩹 Dán giáp Forward Declaration cho các tân binh..."
              find "$TARGET_DIR" -name "*.h" -exec sed -i '' '1i\
              @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
              @protocol NSObject, NSCopying, NSCoding;
              ' {} +
          fi

          # 7. SÀNG LỌC RÁC CUỐI (Smart Filter)
          if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
              echo "✨ Đang lọc tinh rác Swift/Apple..."
              cd "$TARGET_DIR"
              rm -f NSObject-Protocol.h NSCopying-Protocol.h NSCoding-Protocol.h GPBMessage.h 2>/dev/null
              find . -name "_Ttc*" -exec rm -f {} \;
              find . -name "*.h" | awk 'length > 100' | xargs rm -f 2>/dev/null
              cd - > /dev/null
          fi

          rm -rf "$TEMP_DUMP" app_extracted bin_list.txt
          echo "📦 Kho hàng tinh nhuệ hiện có: $(ls -1 "$TARGET_DIR" | wc -l) file."

      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f "headers/${{ github.event.inputs.app_name }}"
          git diff --staged --quiet || (git commit -m "🪄 [Factory] v8.0 Managed Dump: ${{ github.event.inputs.app_name }}" && git push origin main)
