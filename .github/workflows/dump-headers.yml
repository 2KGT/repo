name: Dump Header Factory (Integrated Version)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục lưu (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # BƯỚC 1: CÀI TOOL QUA BREW (ĐẢM BẢO CHẠY)
      - name: 🛠️ Setup Dsdump
        run: |
          brew install dsdump
          dsdump --version

      # BƯỚC 2: XỬ LÝ IPA
      - name: 📦 Download & Extract IPA
        run: |
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          APP_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH" .app)
          echo "binary=$APP_PATH/$APP_NAME" >> $GITHUB_OUTPUT

      # BƯỚC 3: DUMP VỚI CẤU TRÚC CHUẨN (GIỐNG macOS_headers)
      - name: ⚡ Full Dumping
        run: |
          # Tạo cấu trúc thư mục chuyên nghiệp
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          mkdir -p "$TARGET_DIR"
          
          # Dump theo chuẩn Objective-C và Swift
          dsdump --objc --swift -f public --gen-header -o "$TARGET_DIR" "${{ steps.locate.outputs.binary }}"
          
          # Tích hợp logic "Làm sạch": Gom tất cả về một mối hoặc phân loại
          # (Chỗ này sau này mình sẽ viết thêm script để so khớp với macOS_headers)
          find "$TARGET_DIR" -mindepth 2 -type f -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          find "$TARGET_DIR" -type d -empty -delete

      # BƯỚC 4: ĐẨY LÊN REPO
      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có thay đổi."
          else
            git commit -m "🪄 [2KGT Factory] Dump & Sync Structure: ${{ github.event.inputs.app_name }}"
            git push origin main
          fi
