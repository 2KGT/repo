name: 2KGT Anti-404 Dump Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Link IPA Decrypt (Dropbox đổi dl=1)'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục lưu (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # ==========================================
      # BƯỚC 1: TỰ BUILD DSDUMP (ĐẢM BẢO 100% CÓ TOOL)
      # ==========================================
      - name: 🛠️ Build dsdump from Source
        run: |
          echo "--- ĐANG TỰ BUILD CÔNG CỤ GIẢI PHẪU ---"
          # Tải mã nguồn gốc từ GitHub (Link git clone này không bao giờ 404)
          git clone --recursive https://github.com/DerekSelander/dsdump.git dsdump_src
          cd dsdump_src
          
          # Dùng lệnh của Apple để tự đóng gói file thực thi
          xcodebuild -project dsdump.xcodeproj -scheme dsdump -configuration Release -derivedDataPath build_folder
          
          # Lấy file vừa tạo ra đưa vào hệ thống
          sudo cp build_folder/Build/Products/Release/dsdump /usr/local/bin/
          
          cd ..
          rm -rf dsdump_src
          echo "✅ Đã rèn xong dsdump!"
          dsdump --version

      # ==========================================
      # BƯỚC 2: TẢI IPA
      # ==========================================
      - name: 📦 Download & Extract IPA
        run: |
          echo "--- ĐANG TẢI BỆNH NHÂN (IPA) ---"
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          # Tìm file lõi bên trong Payload
          BINARY_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$BINARY_PATH" .app)
          echo "binary=$BINARY_PATH/$APP_NAME" >> $GITHUB_OUTPUT

      # ==========================================
      # BƯỚC 3: GIẢI PHẪU & DỌN DẸP
      # ==========================================
      - name: ⚡ Dumping & Cleaning
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          mkdir -p "$TARGET_DIR"
          
          # Nã Header
          dsdump --objc --swift -f public --gen-header -o "$TARGET_DIR" "${{ steps.locate.outputs.binary }}"
          
          # Bot dọn dẹp: Quét sạch folder rác, đưa file .h về mặt tiền
          find "$TARGET_DIR" -mindepth 2 -type f -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          find "$TARGET_DIR" -type d -empty -delete
          find "$TARGET_DIR" -type f ! -name "*.h" -delete
          echo "✅ Đã dọn dẹp xong thành phẩm."

      # ==========================================
      # BƯỚC 4: ĐẨY LÊN REPO
      # ==========================================
      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có gì mới để cập nhật."
          else
            git commit -m "🪄 [2KGT] Dumped: ${{ github.event.inputs.app_name }}"
            git push origin main
            echo "🎉 Xong! Check Repo đi ông ơi."
          fi
