name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn dự án .txt'
        required: false
        type: string
      delete_files:
        description: '🗑️ Tên file .h muốn xoá'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan lấy cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc Swift, Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          BIN=$(find app_extracted/Payload -name "*.app" | head -n 1)
          echo "binary=$BIN/$(basename "$BIN" .app)" >> $GITHUB_OUTPUT

      - name: ⚡ Smart Dumping & Collection Logic
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          
          # 1. DỌN SÂN
          if [ "${{ github.event.inputs.clear_all }}" == "true" ]; then
              echo "🧨 Nuclear: Xoá sạch kho cũ..."
              rm -rf "$TARGET_DIR"
          fi
          mkdir -p "$TARGET_DIR" "$TEMP_DUMP"

          # 2. CHIẾN THUẬT GOM QUÂN
          CLASSES="${{ github.event.inputs.target_classes }}"
          if [ -z "$CLASSES" ] && [ -n "${{ github.event.inputs.config_path }}" ]; then
              if [ -f "${{ github.event.inputs.config_path }}" ]; then
                  echo "📝 Đọc danh sách từ dự án: ${{ github.event.inputs.config_path }}"
                  CLASSES=$(tr '\r\n' ' ' < "${{ github.event.inputs.config_path }}" | sed 's/\.h//g')
              fi
          fi

          # 3. THỰC THI DUMP
          if [ -n "$CLASSES" ]; then
              for CLS in $CLASSES; do
                  [ -z "$CLS" ] && continue
                  echo "🎯 Đang băm: $CLS"
                  ipsw class-dump "${{ steps.locate.outputs.binary }}" --class "$CLS" > "$TEMP_DUMP/$CLS.h"
              done
          else
              echo "🌊 Dump All: Đang bóc toàn bộ Header..."
              ipsw class-dump "${{ steps.locate.outputs.binary }}" --headers -o "$TEMP_DUMP"
          fi

          # 4. PATCH GIÁP (Forward Declaration)
          if [ "${{ github.event.inputs.patch_headers }}" == "true" ]; then
              echo "🩹 Đang dán giáp chống lỗi build cho toàn bộ file .h..."
              find "$TEMP_DUMP" -name "*.h" -exec sed -i '' '1i\
              @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
              @protocol NSObject, NSCopying, NSCoding;
              ' {} +
          fi

          # 5. XỬ LÝ CÔNG TẮC DEEP SCAN (Lấy file con)
          if [ "${{ github.event.inputs.deep_scan }}" == "true" ]; then
              echo "📂 Deep Scan Enabled: Gom hàng từ mọi ngóc ngách..."
              find "$TEMP_DUMP" -name "*.h" -type f -exec mv -f {} "$TARGET_DIR/" \;
          else
              echo "📁 Standard Scan: Chỉ lấy file tầng mặt..."
              find "$TEMP_DUMP" -maxdepth 1 -name "*.h" -type f -exec mv -f {} "$TARGET_DIR/" \;
          fi
          
          # 6. SÀNG LỌC VÀ DỌN DẸP
          if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
              echo "✨ Đang lọc tinh..."
              cd "$TARGET_DIR"
              rm -f NSObject-Protocol.h NSCopying-Protocol.h NSCoding-Protocol.h GPBMessage.h 2>/dev/null
              find . -name "_Ttc*" -exec rm -f {} \;
              find . -name "*.h" | awk 'length > 100' | xargs rm -f 2>/dev/null
              cd - > /dev/null
          fi

          # Xoá file theo danh sách đen (nếu có)
          if [ -n "${{ github.event.inputs.delete_files }}" ]; then
              for DEL_FILE in ${{ github.event.inputs.delete_files }}; do
                  BASE_DEL=$(echo "$DEL_FILE" | sed 's/\.h//g')
                  rm -f "$TARGET_DIR/$BASE_DEL.h"
              done
          fi

          rm -rf "$TEMP_DUMP" app_extracted
          echo "📦 Kho hàng hiện tại: $(ls -1 "$TARGET_DIR" | wc -l) file."

      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f "headers/${{ github.event.inputs.app_name }}"
          git diff --staged --quiet || (git commit -m "🪄 [Factory] Managed Dump v5.5: ${{ github.event.inputs.app_name }}" && git push origin main)
