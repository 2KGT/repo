name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link IPA Decrypt (Dropbox đổi dl=1)'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục lưu (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # ==========================================
      # BƯỚC 1: CÀI ĐẶT DSDUMP (DÙNG LINK DỰ PHÒNG XỊN)
      # ==========================================
      - name: 🛠️ Setup Dsdump (Manual Fix)
        run: |
          echo "--- ĐANG TẢI DSDUMP TỪ NGUỒN DỰ PHÒNG ---"
          # Tải bản dsdump đã được build sẵn cho macOS
          curl -L "https://github.com/DerekSelander/dsdump/raw/master/dsdump" -o dsdump
          
          # Kiểm tra file
          if [ ! -s dsdump ]; then
            echo "⚠️ Lỗi tải file, đang dùng phương án 2..."
            curl -L "https://raw.githubusercontent.com/DerekSelander/dsdump/master/dsdump" -o dsdump
          fi
          
          chmod +x dsdump
          sudo mv dsdump /usr/local/bin/
          echo "✅ Đã cài đặt dsdump thành công!"
          dsdump --version

      # ==========================================
      # BƯỚC 2: TẢI VÀ GIẢI NÉN IPA
      # ==========================================
      - name: 📦 Download & Extract IPA
        run: |
          echo "--- ĐANG TẢI IPA ---"
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          APP_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH" .app)
          echo "binary=$APP_PATH/$APP_NAME" >> $GITHUB_OUTPUT

      # ==========================================
      # BƯỚC 3: DUMP HEADER
      # ==========================================
      - name: ⚡ Full Dumping
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          echo "--- ĐANG DUMP VÀO $TARGET_DIR ---"
          mkdir -p "$TARGET_DIR"
          rm -rf "$TARGET_DIR"/*
          
          dsdump --objc --swift -f public --gen-header -o "$TARGET_DIR" "${{ steps.locate.outputs.binary }}"
          
          echo "🧹 San phẳng folder..."
          find "$TARGET_DIR" -mindepth 2 -type f -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          find "$TARGET_DIR" -type d -empty -delete
          find "$TARGET_DIR" -type f ! -name "*.h" -delete

      # ==========================================
      # BƯỚC 4: LƯU TRỮ
      # ==========================================
      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có gì thay đổi."
          else
            git commit -m "🪄 [2KGT Factory] Dumped: ${{ github.event.inputs.app_name }}"
            git push origin main
          fi
