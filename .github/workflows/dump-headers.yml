name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link IPA Decrypt (Dropbox đổi dl=1)'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục Header (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # ==========================================
      # BƯỚC 1: CÀI ĐẶT CÔNG CỤ GIẢI PHẪU (DSDUMP)
      # ==========================================
      - name: 🛠️ Setup Dsdump (Verified Binary)
        run: |
          echo "--- ĐANG NHẬP KHẨU DAO MỔ XỊN ---"
          # Tải từ Mirror CDN của GitHub (Link này trả về Binary xịn)
          curl -L "https://github.com/PoomSmart/dsdump/raw/master/dsdump" -o dsdump_tool
          
          # Kiểm tra dung lượng (File xịn phải ~4.4MB = 4400000 bytes)
          SIZE=$(stat -f%z dsdump_tool)
          echo "📦 Dung lượng dao mổ: $SIZE bytes"
          
          if [ $SIZE -lt 1000000 ]; then
             echo "❌ Dao mổ giả (HTML)! Đang thử link dự phòng..."
             curl -L "https://raw.githubusercontent.com/DerekSelander/dsdump/master/dsdump" -o dsdump_tool
          fi

          chmod +x dsdump_tool
          sudo mv dsdump_tool /usr/local/bin/dsdump
          echo "✅ Dao mổ đã sẵn sàng!"
          dsdump --version

      # ==========================================
      # BƯỚC 2: MÁY BĂM MỔ (XỬ LÝ IPA)
      # ==========================================
      - name: 📦 Download & Extract IPA
        run: |
          echo "--- ĐANG ĐƯA IPA VÀO PHÒNG MỔ ---"
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary (Tìm tim phổi App)
        id: locate
        run: |
          BINARY=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$BINARY" .app)
          echo "binary=$BINARY/$APP_NAME" >> $GITHUB_OUTPUT
          echo "🎯 Đã xác định mục tiêu: $APP_NAME"

      # ==========================================
      # BƯỚC 3: GIẢI PHẪU VÀ PHÂN LOẠI
      # ==========================================
      - name: ⚡ Full Dumping & Cleaning
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          mkdir -p "$TARGET_DIR"
          rm -rf "$TARGET_DIR"/*
          
          echo "🚀 Đang mổ xẻ lấy Header..."
          dsdump --objc --swift -f public --gen-header -o "$TARGET_DIR" "${{ steps.locate.outputs.binary }}"
          
          echo "🤖 Bot đang phân loại và dọn dẹp..."
          # Lôi toàn bộ file .h về mặt tiền, xóa folder rác
          find "$TARGET_DIR" -mindepth 2 -type f -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          find "$TARGET_DIR" -type d -empty -delete
          find "$TARGET_DIR" -type f ! -name "*.h" -delete

      # ==========================================
      # BƯỚC 4: XUẤT XƯỞNG (PUSH TO REPO)
      # ==========================================
      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có gì thay đổi."
          else
            git commit -m "🪄 [2KGT Factory] Dumped: ${{ github.event.inputs.app_name }}"
            git push origin main
            echo "🎉 CA PHẪU THUẬT THÀNH CÔNG!"
          fi
