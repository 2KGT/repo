name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu heards'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập tên class heards'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          BIN=$(find app_extracted/Payload -name "*.app" | head -n 1)
          echo "binary=$BIN/$(basename "$BIN" .app)" >> $GITHUB_OUTPUT

           - name: ⚡ Smart Dumping & Talent Scouting Logic
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          
          # 1. DỌN SÂN
          if [ "${{ github.event.inputs.clear_all }}" == "true" ]; then
              echo "🧨 Nuclear: Xoá sạch kho cũ để làm mới..."
              rm -rf "$TARGET_DIR"
          fi
          mkdir -p "$TARGET_DIR" "$TEMP_DUMP"

          # 2. XÁC ĐỊNH MỤC TIÊU (Tìm tất cả Binary có trong App)
          # Logic tìm kiếm tương thích cả macOS/Linux
          ALL_BINS=$(find app_extracted/Payload -name "*.app" -exec find {} -maxdepth 2 -type f ! -name "*.*" \; )
          
          # 3. CHIẾN THUẬT HỐT CẢ Ổ (Dump & Lây lan)
          CLASSES="${{ github.event.inputs.target_classes }}"
          if [ -z "$CLASSES" ] && [ -n "${{ github.event.inputs.config_path }}" ]; then
              if [ -f "${{ github.event.inputs.config_path }}" ]; then
                  echo "📝 Đọc danh sách từ dự án: ${{ github.event.inputs.config_path }}"
                  CLASSES=$(tr '\r\n' ' ' < "${{ github.event.inputs.config_path }}" | sed 's/\.h//g')
              fi
          fi

          if [ -n "$CLASSES" ]; then
              echo "🎯 Bắt đầu chiến dịch săn lùng theo danh sách..."
              for CLS in $CLASSES; do
                  [ -z "$CLS" ] && continue
                  for BIN in $ALL_BINS; do
                      # Dump class lẻ nhưng dùng --headers để ipsw tự hốt các file liên quan trong Binary đó
                      ipsw class-dump "$BIN" --class "$CLS" --headers -o "$TEMP_DUMP" 2>/dev/null
                  done
              done
          else
              echo "🌊 Dump All: Càn quét toàn bộ hang ổ..."
              for BIN in $ALL_BINS; do
                  ipsw class-dump "$BIN" --headers -o "$TEMP_DUMP" 2>/dev/null
              done
          fi

          # 4. VÒNG LỌC TỐ CHẤT & NHẬP HỘ KHẨU (Deep Scan + Filter)
          echo "🧐 Đang kiểm tra tố chất từng file trước khi cho nhập tịch..."
          # Quét sạch mọi xó xỉnh trong khu tạm trú
          find "$TEMP_DUMP" -name "*.h" -type f | while read -r FILE; do
              # Điều kiện: File có nội dung VÀ chứa cấu trúc ObjC (@interface/@protocol)
              if [ -s "$FILE" ] && grep -qE "@interface|@protocol" "$FILE"; then
                  mv -f "$FILE" "$TARGET_DIR/"
              else
                  rm -f "$FILE"
              fi
          done

          # 5. DÁN GIÁP ĐỒNG LOẠT (Patching)
          if [ "${{ github.event.inputs.patch_headers }}" == "true" ]; then
              echo "🩹 Dán giáp Forward Declaration cho các tân binh..."
              find "$TARGET_DIR" -name "*.h" -exec sed -i '' '1i\
              @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
              @protocol NSObject, NSCopying, NSCoding;
              ' {} +
          fi

          # 6. SÀNG LỌC RÁC CUỐI (Smart Filter)
          if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
              cd "$TARGET_DIR"
              rm -f NSObject-Protocol.h NSCopying-Protocol.h NSCoding-Protocol.h GPBMessage.h 2>/dev/null
              find . -name "_Ttc*" -exec rm -f {} \;
              find . -name "*.h" | awk 'length > 100' | xargs rm -f 2>/dev/null
              cd - > /dev/null
          fi

          rm -rf "$TEMP_DUMP" app_extracted
          echo "📦 Kho hàng tinh nhuệ hiện có: $(ls -1 "$TARGET_DIR" | wc -l) file."
