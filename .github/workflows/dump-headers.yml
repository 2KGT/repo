name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          IPA_LINK="${{ github.event.inputs.ipa_url }}"
          if [[ ! "$IPA_LINK" =~ ^http ]]; then
            echo "❌ Link IPA không hợp lệ: $IPA_LINK"
            exit 1
          fi
          echo "📥 Đang tải hàng từ: $IPA_LINK"
          curl -L -A "Mozilla/5.0" "$IPA_LINK" -o app.ipa
          unzip -q app.ipa -d app_extracted

            - name: ⚡ Smart Dumping & Kinship Scouting Logic
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          mkdir -p "$TARGET_DIR" "$TEMP_DUMP"

          # 1. LẬP BẢN ĐỒ BINARY (Tìm tất cả file thực thi)
          echo "🔍 Đang rà soát hang ổ..."
          find app_extracted/Payload -type f ! -name "*.*" > bin_list.txt

          # 2. XỬ LÝ DANH SÁCH "ĐẦU NẬU"
          CLASSES="${{ github.event.inputs.target_classes }}"
          CONFIG="${{ github.event.inputs.config_path }}"
          if [ -z "$CLASSES" ] && [ -f "$CONFIG" ]; then
              CLASSES=$(tr '\r\n' ' ' < "$CONFIG" | sed 's/\.h//g')
          fi

          # 3. CHIẾN THUẬT "HỐT CẢ HỌ HÀNG" (Dùng Regex để nhặt file con)
          if [ -n "$CLASSES" ]; then
              for CLS in $CLASSES; do
                  [ -z "$CLS" ] && continue
                  # CHIÊU ĐỘC: Thêm ".*" vào sau tên Class để ipsw hốt luôn 
                  # các Delegate, DataSource, Cell, Manager liên quan
                  KINSHIP_REGEX="${CLS}.*"
                  echo "🎯 Săn lùng dòng họ: $KINSHIP_REGEX"
                  
                  while read -r BIN; do
                      # Dump class theo Regex giúp lách lỗi Cache và hốt được file con
                      # Ta dùng dấu > để trích xuất trực tiếp, tránh lỗi cờ --headers
                      ipsw class-dump "$BIN" --class "$KINSHIP_REGEX" > "$TEMP_DUMP/raw_dump.h" 2>/dev/null || true
                      
                      # Vì ipsw đổ hết vào 1 file hoặc in ra, ta dùng awk để xẻ nhỏ 
                      # nếu có nhiều interface trong đó, hoặc đơn giản là lọc lấy ruột.
                      # Nhưng để chắc chắn nhất, ta gọi lệnh dump lẻ cho từng thằng con tiềm năng:
                      ipsw objc dump "$BIN" --class "$KINSHIP_REGEX" > "$TEMP_DUMP/${CLS}_family.h" 2>/dev/null || true
                  done < bin_list.txt
              done
          else
              echo "🌊 Mode Dump All (Thận trọng)..."
              while read -r BIN; do
                  # Dump headers từng binary một để tránh lỗi Shared Cache
                  ipsw class-dump "$BIN" --headers -o "$TEMP_DUMP" || true
              done < bin_list.txt
          fi

          # 4. ÉP CHUYỂN NHÀ & SÀNG LỌC (Deep Scan san phẳng)
          echo "🏘️ Đang gom quân và kiểm tra tố chất..."
          # Quét sạch mọi file .h phát sinh
          find "$TEMP_DUMP" -name "*.h" -type f | while read -r FILE; do
              if [ -s "$FILE" ] && grep -qE "@interface|@protocol" "$FILE"; then
                  # Nhặt thêm bước: Nếu file quá lớn (do dump cụm), ta vẫn giữ
                  mv -f "$FILE" "$TARGET_DIR/"
              else
                  rm -f "$FILE"
              fi
          done

          # 5. DÁN GIÁP & SMART FILTER (Giữ nguyên logic cũ nhưng gắt hơn)
          find "$TARGET_DIR" -name "*.h" -exec sed -i '' '1i\
          @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
          @protocol NSObject, NSCopying, NSCoding;
          ' {} +

          # Xóa rác hệ thống phát sinh do dump cụm
          cd "$TARGET_DIR"
          rm -f NSObject-Protocol.h NSCopying-Protocol.h 2>/dev/null
          find . -name "*.h" | awk 'length > 120' | xargs rm -f 2>/dev/null
          cd - > /dev/null

          rm -rf "$TEMP_DUMP" app_extracted bin_list.txt
          echo "📦 Kho hàng tinh nhuệ: $(ls -1 "$TARGET_DIR" | wc -l) file."
