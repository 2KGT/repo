name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: 'Thư mục lưu (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Dsdump
        run: |
          curl -L https://github.com/DerekSelander/dsdump/releases/download/v0.0.29/dsdump.zip -o dsdump.zip
          unzip dsdump.zip
          chmod +x dsdump
          sudo mv dsdump /usr/local/bin/

      - name: 📦 Download & Extract IPA
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          APP_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH" .app)
          echo "binary=$APP_PATH/$APP_NAME" >> $GITHUB_OUTPUT
          echo "Found Binary: $APP_PATH/$APP_NAME"

      - name: ⚡ Full Dumping (Straight to Headers)
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          mkdir -p "$TARGET_DIR"
          # Dọn sạch folder cũ nếu có để tránh chồng chéo phiên bản
          rm -rf "$TARGET_DIR"/*
          
          echo "🚀 Đang tiến hành Dump toàn bộ Header..."
          dsdump --objc --swift -f public --gen-header -o "$TARGET_DIR" "${{ steps.locate.outputs.binary }}"
          
          echo "🧹 San phẳng và dọn rác..."
          # Lôi hết file .h ra ngoài mặt tiền
          find "$TARGET_DIR" -mindepth 2 -type f -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          # Xoá các thư mục rỗng sau khi đã dọn file
          find "$TARGET_DIR" -type d -empty -delete

      - name: 🚀 Commit & Push to Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "headers/${{ github.event.inputs.app_name }}"
          
          # Chỉ commit nếu có sự thay đổi (tránh lỗi workflow)
          if git diff --staged --quiet; then
            echo "Nothin' changed, skip commit."
          else
            git commit -m "🪄 [2KGT Factory] Dumped: ${{ github.event.inputs.app_name }}"
            git push
          fi
