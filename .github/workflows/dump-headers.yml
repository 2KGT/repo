name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          IPA_LINK="${{ github.event.inputs.ipa_url }}"
          if [[ ! "$IPA_LINK" =~ ^http ]]; then
            echo "❌ Link IPA không hợp lệ: $IPA_LINK"
            exit 1
          fi
          echo "📥 Đang tải hàng từ: $IPA_LINK"
          curl -L -A "Mozilla/5.0" "$IPA_LINK" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: ⚡ Smart Dumping & Talent Scouting Logic
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          ALL_DUMP_DIR="full_dump" # Thư mục chứa toàn bộ headers trên máy ảo
          mkdir -p "$TARGET_DIR" "$ALL_DUMP_DIR"

          # 1. CÀN QUÉT TOÀN BỘ (Đổ hết về một mối để chuẩn bị nhặt)
          echo "🔍 Đang lập bản đồ và càn quét toàn bộ hang ổ..."
          find app_extracted/Payload -type f ! -name "*.*" > bin_list.txt
          
          while read -r BIN; do
              # Dump toàn bộ headers của từng Binary vào thư mục full_dump
              # Cách này lách hoàn toàn lỗi --class vs --headers
              echo "🌊 Đang bóc tách toàn bộ: $(basename "$BIN")"
              ipsw class-dump "$BIN" --headers -o "$ALL_DUMP_DIR" || true
          done < bin_list.txt

          # 2. ĐỊNH NGHĨA DANH SÁCH "CHỦ NỢ"
          CLASSES="${{ github.event.inputs.target_classes }}"
          CONFIG="${{ github.event.inputs.config_path }}"
          if [ -z "$CLASSES" ] && [ -f "$CONFIG" ]; then
              CLASSES=$(tr '\r\n' ' ' < "$CONFIG" | sed 's/\.h//g')
          fi

          # 3. ĐI NHẶT HÀNG (Sàng lọc từ đống đổ nát)
          echo "🧺 Bot đang đi nhặt hàng theo danh sách và tìm file con..."
          
          if [ -n "$CLASSES" ]; then
              for CLS in $CLASSES; do
                  [ -z "$CLS" ] && continue
                  echo "🔎 Đang lùng sục Class: $CLS"
                  # Nhặt file chính xác và các file có tên chứa Class đó (file con/phụ)
                  find "$ALL_DUMP_DIR" -name "*$CLS*.h" -type f -exec mv -f {} "$TARGET_DIR/" \;
              done
          else
              # Nếu không có danh sách, ta nhặt sạch sành sanh (Deep Scan Mode)
              echo "🚜 Không có danh sách, tiến hành san phẳng toàn bộ kho..."
              find "$ALL_DUMP_DIR" -name "*.h" -type f -exec mv -f {} "$TARGET_DIR/" \;
          fi

          # 4. VÒNG LỌC TỐ CHẤT (Vòng cuối: Loại bỏ những thằng nhập cư lậu không có code)
          echo "🧐 Kiểm tra tố chất cuối cùng trước khi cấp hộ khẩu..."
          find "$TARGET_DIR" -name "*.h" -type f | while read -r FILE; do
              if [ -s "$FILE" ] && grep -qE "@interface|@protocol" "$FILE"; then
                  # Giữ lại và tiến hành Vá lỗi (Patching) ngay tại đây
                  if [ "${{ github.event.inputs.patch_headers }}" == "true" ]; then
                      sed -i '' '1i\
                      @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
                      @protocol NSObject, NSCopying, NSCoding;
                      ' "$FILE"
                  fi
              else
                  rm -f "$FILE"
              fi
          done

          # 5. SÀNG LỌC RÁC HỆ THỐNG (Smart Filter)
          if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
              cd "$TARGET_DIR"
              rm -f NSObject-Protocol.h NSCopying-Protocol.h NSCoding-Protocol.h GPBMessage.h 2>/dev/null
              find . -name "_Ttc*" -exec rm -f {} \;
              find . -name "*.h" | awk 'length > 100' | xargs rm -f 2>/dev/null
              cd - > /dev/null
          fi

          rm -rf "$ALL_DUMP_DIR" app_extracted bin_list.txt
          echo "📦 Kho hàng tinh nhuệ hiện có: $(ls -1 "$TARGET_DIR" | wc -l) file."
