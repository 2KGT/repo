name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục lưu Header'
        required: true
        default: 'YouTubeHeader'
      purge_swift:
        description: 'Thanh trừng rác Swift (_Ttc...)'
        type: boolean
        default: true

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # ==========================================
      # BƯỚC 1: CHUẨN BỊ VŨ KHÍ (IPSW)
      # ==========================================
      - name: 🛠️ Setup IPSW Tool
        run: |
          brew install blacktop/tap/ipsw
          ipsw version

      # ==========================================
      # BƯỚC 2: TIẾP NHẬN & GIẢI PHẪU IPA
      # ==========================================
      - name: 📦 Download & Extract IPA
        run: |
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          BINARY_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_BIN=$(basename "$BINARY_PATH" .app)
          echo "binary=$BINARY_PATH/$APP_BIN" >> $GITHUB_OUTPUT
          echo "🎯 Mục tiêu mổ xẻ: $APP_BIN"

           # ==========================================
      # BƯỚC 3: DUMP THEO ĐƠN ĐẶT HÀNG (TARGETED DUMP)
      # ==========================================
      - name: ⚡ Targeted Dumping
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          LIST_FILE="src/build-tweaks/AutoAC/headers.txt" # Đường dẫn tới đơn hàng của ông
          
          mkdir -p "$TARGET_DIR"
          mkdir -p "$TEMP_DUMP"
          
          echo "🚀 IPSW đang mổ xẻ lấy hàng theo danh sách..."
          
          if [ -f "$LIST_FILE" ]; then
              # Vòng lặp đọc từng file cần thiết trong headers.txt
              while IFS= read -r line || [ -n "$line" ]; do
                  FILE_NEED=$(echo "$line" | tr -d '\r' | xargs)
                  [ -z "$FILE_NEED" ] && continue
                  [[ "$FILE_NEED" != *.h ]] && continue # Chỉ xử lý file .h
                  
                  # Lấy tên Class (bỏ đuôi .h)
                  CLASS_NAME="${FILE_NEED%.h}"
                  
                  echo "🎯 Đang trích xuất: $CLASS_NAME"
                  # Lệnh ipsw hỗ trợ filter theo class
                  ipsw class-dump "${{ steps.locate.outputs.binary }}" \
                    --headers \
                    --filter "$CLASS_NAME" \
                    -o "$TEMP_DUMP"
              done < "$LIST_FILE"
              
              # Gom hàng đã trích xuất về kho chính (Làm phẳng)
              find "$TEMP_DUMP" -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          else
              echo "⚠️ Không tìm thấy headers.txt, tiến hành Dump toàn bộ (Fallback)..."
              ipsw class-dump "${{ steps.locate.outputs.binary }}" --headers -o "$TEMP_DUMP"
              find "$TEMP_DUMP" -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          fi
          
          # Dọn dẹp rác ngay lập tức
          rm -rf "$TEMP_DUMP"
          echo "📦 Tổng hàng 'tuyển chọn' đã nhập kho: $(ls -1 "$TARGET_DIR" | wc -l) file."

      # ==========================================
      # BƯỚC 4: NHẬP KHO REPO
      # ==========================================
      - name: 🚀 Commit & Push Clean Headers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          # Force add để tránh sót file có tên đặc biệt
          git add -f "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có gì mới để cập nhật."
          else
            git commit -m "🪄 [2KGT Factory] Dumped & Filtered: ${{ github.event.inputs.app_name }}"
            git push origin main
            echo "🎉 KHO HÀNG ĐÃ ĐƯỢC LÀM MỚI SẠCH SẼ - PHẲNG LÌ!"
          fi
