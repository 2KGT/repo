name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          IPA_LINK="${{ github.event.inputs.ipa_url }}"
          if [[ ! "$IPA_LINK" =~ ^http ]]; then
            echo "❌ Link IPA không hợp lệ: $IPA_LINK"
            exit 1
          fi
          echo "📥 Đang tải hàng từ: $IPA_LINK"
          curl -L -A "Mozilla/5.0" "$IPA_LINK" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: ⚡ Smart Dumping & Master Filtering
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          ALL_DUMP_DIR="full_dump_cache"
          
          # 1. KHỞI TẠO
          [ "${{ github.event.inputs.clear_all }}" == "true" ] && rm -rf "$TARGET_DIR"
          mkdir -p "$TARGET_DIR" "$ALL_DUMP_DIR"

          # 2. ĐỔ HÀNG VÀO KHO ĐỆM (San phẳng hang ổ)
          echo "🌊 Đang bóc tách toàn bộ Binary vào kho đệm..."
          find app_extracted/Payload -type f ! -name "*.*" > bin_list.txt
          while read -r BIN; do
              echo "🧬 Băm xác: $(basename "$BIN")"
              ipsw class-dump "$BIN" --headers -o "$ALL_DUMP_DIR" || true
          done < bin_list.txt

          # 3. ĐỌC CHIẾU CHỈ (headers.txt)
          CLASSES="${{ github.event.inputs.target_classes }}"
          CONFIG="${{ github.event.inputs.config_path }}"
          if [ -z "$CLASSES" ] && [ -f "$CONFIG" ]; then
              echo "📜 Đọc danh sách từ: $CONFIG"
              # Lọc sạch khoảng trắng và đuôi .h nếu có
              CLASSES=$(tr '\r\n' ' ' < "$CONFIG" | sed 's/\.h//g' | xargs)
          fi

                   # 4. CHIẾN THUẬT "VÉT MÁNG" TỔNG LỰC
          echo "🧺 Đang hốt sạch sành sanh headers về Repo..."
          
          # Không dùng vòng lặp Class nữa, quét thẳng vào kho đệm
          find "$ALL_DUMP_DIR" -name "*.h" -type f | while read -r FILE; do
              # Điều kiện: File có dung lượng (không rỗng)
              if [ -s "$FILE" ]; then
                  FILENAME=$(basename "$FILE")
                  
                  # Dán giáp ngay lập tức để build deb sau này đỡ lỗi
                  sed -i '' '1i\
                  @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
                  @protocol NSObject, NSCopying, NSCoding;
                  ' "$FILE"
                  
                  # Đẩy về kho chính
                  mv -f "$FILE" "$TARGET_DIR/"
              fi
          done

          # Đếm hàng phát cho phấn khởi
          echo "📦 Tổng số hàng đã về kho: $(ls -1 "$TARGET_DIR" | wc -l) file."


          # 5. DÁN GIÁP & SMART FILTER (Giai đoạn hậu kiểm)
          echo "🩹 Dán giáp và dọn rác cuối..."
          if [ -d "$TARGET_DIR" ]; then
              # Dán giáp Forward Declaration
              find "$TARGET_DIR" -name "*.h" -exec sed -i '' '1i\
              @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
              @protocol NSObject, NSCopying, NSCoding;
              ' {} +

              if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
                  cd "$TARGET_DIR"
                  # Trảm rác tên quá dài hoặc rác hệ thống trà trộn
                  rm -f NSObject-Protocol.h NSCopying-Protocol.h 2>/dev/null
                  find . -name "*.h" | awk 'length > 110' | xargs rm -f 2>/dev/null
                  cd - > /dev/null
              fi
          fi

          rm -rf "$ALL_DUMP_DIR" app_extracted bin_list.txt
          echo "📦 Kho hàng tinh nhuệ hiện có: $(ls -1 "$TARGET_DIR" | wc -l) file."
