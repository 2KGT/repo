name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau bằng dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn file .txt (Dự án)'
        required: false
        type: string
      smart_filter:
        description: '✨ Chế độ Sàng Lọc Vàng'
        type: boolean
        default: true

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          BIN=$(find app_extracted/Payload -name "*.app" | head -n 1)
          echo "binary=$BIN/$(basename "$BIN" .app)" >> $GITHUB_OUTPUT

      - name: ⚡ Smart Dumping & Sàng Lọc Vàng
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          mkdir -p "$TARGET_DIR" "$TEMP_DUMP"
          
          # 🔥 CHIẾN THUẬT GOM QUÂN
          CLASSES="${{ github.event.inputs.target_classes }}"
          
          if [ -z "$CLASSES" ] && [ -n "${{ github.event.inputs.config_path }}" ]; then
              if [ -f "${{ github.event.inputs.config_path }}" ]; then
                  echo "📝 Đang đọc danh sách từ file: ${{ github.event.inputs.config_path }}"
                  CLASSES=$(tr '\r\n' ' ' < "${{ github.event.inputs.config_path }}" | sed 's/\.h//g')
              fi
          fi

          # 🔥 THỰC THI DUMP
          if [ -n "$CLASSES" ]; then
              echo "🎯 Chế độ gắp thú mục tiêu cho các class..."
              for CLS in $CLASSES; do
                  [ -z "$CLS" ] && continue
                  echo "  -> Trích xuất class: $CLS"
                  ipsw class-dump "${{ steps.locate.outputs.binary }}" --headers --class "$CLS" -o "$TEMP_DUMP"
              done
          else
              echo "🌊 Chế độ càn quét (Dump All)..."
              ipsw class-dump "${{ steps.locate.outputs.binary }}" --headers -o "$TEMP_DUMP"
          fi

          # 🔥 BỘ LỌC SÀNG VÀNG
          find "$TEMP_DUMP" -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          
          if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
              echo "✨ Đang sàng lọc vàng..."
              cd "$TARGET_DIR"
              rm -f NSObject-Protocol.h NSCopying-Protocol.h NSCoding-Protocol.h CGRect.h CGPoint.h UIEdgeInsets.h GPBMessage.h NSObject.h NSString.h NSArray.h NSDictionary.h NSValue.h NSNumber.h _Ttc*
              find . -name "*+*" | awk 'length > 100' | xargs rm -f 2>/dev/null
              cd - > /dev/null
          fi

          rm -rf "$TEMP_DUMP" app_extracted
          echo "📦 Kho hàng thành phẩm: $(ls -1 "$TARGET_DIR" | wc -l) file."

      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f "headers/${{ github.event.inputs.app_name }}"
          git diff --staged --quiet || (git commit -m "🪄 [Factory] Smart Dump: ${{ github.event.inputs.app_name }}" && git push origin main)
