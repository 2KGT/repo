name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          IPA_LINK="${{ github.event.inputs.ipa_url }}"
          if [[ ! "$IPA_LINK" =~ ^http ]]; then
            echo "❌ Link IPA không hợp lệ: $IPA_LINK"
            exit 1
          fi
          echo "📥 Đang tải hàng từ: $IPA_LINK"
          curl -L -A "Mozilla/5.0" "$IPA_LINK" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: ⚡ Smart Dumping & Master Filtering
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          ALL_DUMP_DIR="full_dump_cache"
          TEMP_DUMP="temp_headers"
          
          # 1. KHỞI TẠO & DỌN SÂN
          [ "${{ github.event.inputs.clear_all }}" == "true" ] && rm -rf "$TARGET_DIR"
          mkdir -p "$TARGET_DIR" "$ALL_DUMP_DIR" "$TEMP_DUMP"

          # 2. ĐỔ HÀNG VÀO KHO ĐỆM (Bắt buộc phải có bước này)
          echo "🌊 Đang đổ toàn bộ Header vào kho đệm trên máy ảo..."
          find app_extracted/Payload -type f ! -name "*.*" > bin_list.txt
          while read -r BIN; do
              echo "🧬 Đang bóc tách: $(basename "$BIN")"
              # Dump sạch sẽ vào ALL_DUMP_DIR
              ipsw class-dump "$BIN" --headers -o "$ALL_DUMP_DIR" || true
          done < bin_list.txt

          # 3. ĐỌC CHIẾU CHỈ
          CLASSES="${{ github.event.inputs.target_classes }}"
          CONFIG="${{ github.event.inputs.config_path }}"
          if [ -z "$CLASSES" ] && [ -f "$CONFIG" ]; then
              echo "📜 Đang đọc chiếu chỉ từ dự án: $CONFIG"
              CLASSES=$(tr '\r\n' ' ' < "$CONFIG" | sed 's/\.h//g')
          fi

          # 4. CHIẾN THUẬT NHẶT HÀNG (Mắt Thần)
          echo "🧺 Bot đang đi lục soát kho đệm..."
          CLEAN_CLASSES=$(echo $CLASSES | sed 's/\*/ /g')

          if [ -n "$CLEAN_CLASSES" ]; then
              for CLS in $CLEAN_CLASSES; do
                  [ -z "$CLS" ] && continue
                  echo "🔎 Truy quét mục tiêu: $CLS"
                  # Tìm mọi file liên quan trong kho đệm
                  find "$ALL_DUMP_DIR" -type f -name "*$CLS*.h" | while read -r FILE; do
                      if [ -s "$FILE" ] && grep -qE "@interface|@protocol" "$FILE"; then
                          mv -f "$FILE" "$TARGET_DIR/"
                          echo "✅ Thu nạp: $(basename "$FILE")"
                      fi
                  done
              done
          else
              echo "🚜 Không có thánh chỉ, nhặt sạch tinh anh!"
              find "$ALL_DUMP_DIR" -name "*.h" -type f | while read -r FILE; do
                  if [ -s "$FILE" ] && grep -qE "@interface|@protocol" "$FILE"; then
                      mv -f "$FILE" "$TARGET_DIR/"
                  fi
              done
          fi

          # 5. VÁ LỖI & DỌN RÁC CUỐI
          echo "🩹 Đang dán giáp và dọn dẹp hậu chiến..."
          find "$TARGET_DIR" -name "*.h" -exec sed -i '' '1i\
          @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
          @protocol NSObject, NSCopying, NSCoding;
          ' {} +

          if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
              cd "$TARGET_DIR"
              rm -f NSObject-Protocol.h NSCopying-Protocol.h 2>/dev/null
              find . -name "*.h" | awk 'length > 120' | xargs rm -f 2>/dev/null
              cd - > /dev/null
          fi

          rm -rf "$ALL_DUMP_DIR" "$TEMP_DUMP" app_extracted bin_list.txt
          echo "📦 Kho hàng tinh nhuệ hiện có: $(ls -1 "$TARGET_DIR" | wc -l) file."

