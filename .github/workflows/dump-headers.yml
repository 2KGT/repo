name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          IPA_LINK="${{ github.event.inputs.ipa_url }}"
          if [[ ! "$IPA_LINK" =~ ^http ]]; then
            echo "❌ Link IPA không hợp lệ: $IPA_LINK"
            exit 1
          fi
          echo "📥 Đang tải hàng từ: $IPA_LINK"
          curl -L -A "Mozilla/5.0" "$IPA_LINK" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: ⚡ Nhà Máy Cưỡng Chế (Dump All & Debug)
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          RAW_CACHE="raw_dump_cache"
          
          # 1. DỌN SÂN & KHỞI TẠO
          rm -rf "$RAW_CACHE"
          mkdir -p "$TARGET_DIR" "$RAW_CACHE"

          # 2. TÌM BINARY (Kiểm tra xem IPA có gì)
          echo "🔍 Đang rà soát danh sách Binary..."
          find app_extracted/Payload -type f ! -name "*.*" > bin_list.txt
          if [ ! -s bin_list.txt ]; then
            echo "❌ LỖI: Không tìm thấy file thực thi nào trong IPA!"
            exit 1
          fi

          # 3. DUMP TỔNG LỰC
          while read -r BIN; do
              echo "🧬 Đang băm: $(basename "$BIN")"
              # Thêm --objc để ép ipsw chỉ tập trung vào Obj-C cho nhanh
              ipsw class-dump "$BIN" --headers --objc -o "$RAW_CACHE" || true
          done < bin_list.txt

          # 4. KIỂM TRA KHO ĐỆM TRƯỚC KHI CHUYỂN
          TEMP_COUNT=$(find "$RAW_CACHE" -name "*.h" | wc -l)
          echo "📊 Máy ảo đã dump được: $TEMP_COUNT file .h"
          
          if [ "$TEMP_COUNT" -eq 0 ]; then
            echo "❌ LỖI: ipsw không nhả ra file nào. Có thể IPA đã bị mã hóa hoặc sai kiến trúc!"
            exit 1
          fi

          # 5. ĐẨY VỀ KHO REPO (Ủi phẳng không điều kiện)
          echo "🧺 Đang cưỡng chế nhập kho..."
          find "$RAW_CACHE" -name "*.h" -type f -exec mv -f {} "$TARGET_DIR/" \;

          # 6. CHỐT HẠ & XÁC NHẬN
          FINAL_COUNT=$(ls -1 "$TARGET_DIR" | wc -l)
          echo "📦 Tổng hàng chuẩn bị đẩy lên Repo: $FINAL_COUNT file."
          
          # Tự động dán giáp nhanh cho toàn bộ
          find "$TARGET_DIR" -name "*.h" -exec sed -i '' '1i\
          @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
          ' {} +
