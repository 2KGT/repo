name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục lưu (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # ==========================================
      # BƯỚC 1: CÀI ĐẶT IPSW
      # ==========================================
      - name: 🛠️ Setup IPSW Tool
        run: |
          brew install blacktop/tap/ipsw
          ipsw version

      # ==========================================
      # BƯỚC 2: TẢI VÀ GIẢI NÉN IPA
      # ==========================================
      - name: 📦 Download & Extract IPA
        run: |
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          BINARY_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$BINARY_PATH" .app)
          echo "binary=$BINARY_PATH/$APP_NAME" >> $GITHUB_OUTPUT
          echo "🎯 Mục tiêu: $APP_NAME"

            # ==========================================
      # BƯỚC 3: GIẢI PHẪU & BOT DỌN DẸP (BẢN NÂNG CẤP)
      # ==========================================
      - name: ⚡ Full Dumping
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          mkdir -p "$TARGET_DIR"
          mkdir -p "$TEMP_DUMP"
          
          echo "🚀 IPSW đang mổ xẻ..."
          ipsw class-dump "${{ steps.locate.outputs.binary }}" --headers -o "$TEMP_DUMP"
          
          echo "🤖 Bot thợ lặn đang gom file..."
          # Lệnh này sẽ tìm TẤT CẢ file .h ở bất kỳ thư mục con nào và đưa về TARGET_DIR
          find "$TEMP_DUMP" -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          
          # Xóa dấu vết tạm
          rm -rf "$TEMP_DUMP"
          
          # Kiểm tra xem có file nào không
          COUNT=$(ls -1 "$TARGET_DIR" | wc -l)
          echo "📦 Tổng cộng thu hoạch được: $COUNT file headers."

      # ==========================================
      # BƯỚC 4: XUẤT XƯỞNG
      # ==========================================
      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có thay đổi."
          else
            git commit -m "🪄 [2KGT Factory] Dumped: ${{ github.event.inputs.app_name }}"
            git push origin main
            echo "🎉 THÀNH CÔNG RỰC RỠ!"
          fi
