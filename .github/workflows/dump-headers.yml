name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link IPA Decrypt (Dropbox đổi dl=1)'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục lưu (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # ==========================================
      # BƯỚC 1: CÀI ĐẶT CÔNG CỤ
      # ==========================================
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Dsdump (Fixed Link)
        run: |
          echo "--- ĐANG TẢI DSDUMP PHIÊN BẢN 0.0.29 ---"
          curl -L "https://github.com/DerekSelander/dsdump/releases/download/v0.0.29/dsdump.zip" -o dsdump.zip
          unzip -q dsdump.zip
          chmod +x dsdump
          sudo mv dsdump /usr/local/bin/
          echo "✅ Cài đặt dsdump thành công!"

      # ==========================================
      # BƯỚC 2: TẢI VÀ GIẢI NÉN IPA
      # ==========================================
      - name: 📦 Download & Extract IPA
        run: |
          echo "--- ĐANG TẢI IPA TỪ NGUỒN ---"
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          echo "🏗️ Đang giải nén IPA..."
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          APP_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH" .app)
          echo "binary=$APP_PATH/$APP_NAME" >> $GITHUB_OUTPUT
          echo "🎯 Mục tiêu tìm thấy: $APP_NAME"

      # ==========================================
      # BƯỚC 3: DUMP HEADER (THEO TÊN ÔNG NHẬP)
      # ==========================================
      - name: ⚡ Full Dumping (Straight to Headers)
        run: |
          # Lấy tên từ Input của ông
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          
          echo "--- BẮT ĐẦU DUMP VÀO $TARGET_DIR ---"
          mkdir -p "$TARGET_DIR"
          rm -rf "$TARGET_DIR"/*
          
          dsdump --objc --swift -f public --gen-header -o "$TARGET_DIR" "${{ steps.locate.outputs.binary }}"
          
          echo "🧹 San phẳng cấu trúc file .h..."
          find "$TARGET_DIR" -mindepth 2 -type f -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          find "$TARGET_DIR" -type d -empty -delete
          find "$TARGET_DIR" -type f ! -name "*.h" -delete
          echo "✅ Đã nôn hết file trần vào folder!"

      # ==========================================
      # BƯỚC 4: ĐẨY HÀNG LÊN REPO
      # ==========================================
      - name: 🚀 Commit & Push to Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          # Add đúng cái folder vừa tạo/cập nhật
          git add "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có gì mới để cập nhật."
          else
            git commit -m "🪄 [2KGT Factory] Dumped: ${{ github.event.inputs.app_name }}"
            git push origin main
            echo "🎉 Đã đẩy Header lên Repo thành công!"
          fi
