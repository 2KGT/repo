name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct link IPA Decrypt (Dropbox đổi dl=1)'
        required: true
        type: string
      app_name:
        description: 'Tên thư mục lưu (VD: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      # ==========================================
      # BƯỚC 1: CÀI ĐẶT DSDUMP (DÙNG BINARY ĐÃ BUILD SẴN)
      # ==========================================
      - name: 🛠️ Setup Dsdump (High Availability)
        run: |
          echo "--- ĐANG TẢI TOOL DUMP ĐÃ CẤU HÌNH SẴN ---"
          # Tải bản dsdump binary chuẩn từ kho lưu trữ tin cậy
          curl -L "https://github.com/2KGT/repo/releases/download/tools/dsdump" -o dsdump || \
          curl -L "https://raw.githubusercontent.com/PoomSmart/dsdump/master/dsdump" -o dsdump
          
          chmod +x dsdump
          sudo mv dsdump /usr/local/bin/
          echo "✅ Đã cài đặt dsdump thành công!"
          dsdump --version

      # ==========================================
      # BƯỚC 2: TẢI VÀ GIẢI NÉN IPA
      # ==========================================
      - name: 📦 Download & Extract IPA
        run: |
          echo "--- ĐANG TẢI IPA ---"
          curl -L -A "Mozilla/5.0" "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: 🔍 Locate Binary
        id: locate
        run: |
          APP_PATH=$(find app_extracted/Payload -name "*.app" | head -n 1)
          APP_NAME=$(basename "$APP_PATH" .app)
          echo "binary=$APP_PATH/$APP_NAME" >> $GITHUB_OUTPUT
          echo "🎯 Đã tìm thấy: $APP_NAME"

      # ==========================================
      # BƯỚC 3: DUMP HEADER (NÃ FILE TRẦN)
      # ==========================================
      - name: ⚡ Full Dumping
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          mkdir -p "$TARGET_DIR"
          rm -rf "$TARGET_DIR"/*
          
          echo "🚀 Đang tiến hành Dump ObjC/Swift..."
          dsdump --objc --swift -f public --gen-header -o "$TARGET_DIR" "${{ steps.locate.outputs.binary }}"
          
          echo "🧹 San phẳng cấu trúc thư mục..."
          find "$TARGET_DIR" -mindepth 2 -type f -name "*.h" -exec mv {} "$TARGET_DIR/" \;
          find "$TARGET_DIR" -type d -empty -delete
          find "$TARGET_DIR" -type f ! -name "*.h" -delete

      # ==========================================
      # BƯỚC 4: ĐẨY LÊN GITHUB
      # ==========================================
      - name: 🚀 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "headers/${{ github.event.inputs.app_name }}"
          
          if git diff --staged --quiet; then
            echo "💎 Không có thay đổi nào."
          else
            git commit -m "🪄 [2KGT Factory] Dumped: ${{ github.event.inputs.app_name }}"
            git push origin main
            echo "🎉 HOÀN TẤT! Bộ Header đã nằm gọn trong Repo của ông."
          fi
