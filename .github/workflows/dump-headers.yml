name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          IPA_LINK="${{ github.event.inputs.ipa_url }}"
          if [[ ! "$IPA_LINK" =~ ^http ]]; then
            echo "❌ Link IPA không hợp lệ: $IPA_LINK"
            exit 1
          fi
          echo "📥 Đang tải hàng từ: $IPA_LINK"
          curl -L -A "Mozilla/5.0" "$IPA_LINK" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: ⚡ Nhà Máy Sàng Lọc Đa Tầng (Filter & Sync)
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          RAW_CACHE="raw_dump_cache"
          REFINED_CACHE="refined_dump_cache"
          
          # 1. KHỞI TẠO CÁC TẦNG NHỐT
          mkdir -p "$TARGET_DIR" "$RAW_CACHE" "$REFINED_CACHE"

          # 2. ĐỔ ĐỆM (Dump sạch sành sanh)
          echo "🌊 Bước 1: Đang đổ Header thô vào máy ảo..."
          find app_extracted/Payload -type f ! -name "*.*" > bin_list.txt
          while read -r BIN; do
              ipsw class-dump "$BIN" --headers -o "$RAW_CACHE" || true
          done < bin_list.txt

          # 3. LỌC THÔ & LỌC TINH (Xử lý trong máy ảo đệm)
          echo "🧐 Bước 2: Đang sàng lọc tố chất (Dung lượng, Ký tự, Nội dung)..."
          find "$RAW_CACHE" -name "*.h" -type f | while read -r FILE; do
              FILENAME=$(basename "$FILE")
              
              # A. Kiểm tra dung lượng (Không nhốt file rỗng hoặc quá nhỏ < 100 bytes)
              FILE_SIZE=$(stat -f%z "$FILE")
              if [ "$FILE_SIZE" -lt 100 ]; then
                  continue
              fi

              # B. Kiểm tra ký tự lạ & độ dài (Không nhốt file tên quá dài > 100 ký tự hoặc có dấu $)
              if [ ${#FILENAME} -gt 100 ] || [[ "$FILENAME" == *\$* ]]; then
                  continue
              fi

              # C. Kiểm tra nội dung (Chỉ nhốt file có cấu trúc Obj-C)
              if grep -qE "@interface|@protocol" "$FILE"; then
                  # Dán giáp Forward Declaration trước khi chuyển tầng
                  sed -i '' '1i\
                  @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
                  @protocol NSObject, NSCopying, NSCoding;
                  ' "$FILE"
                  
                  mv -f "$FILE" "$REFINED_CACHE/"
              fi
          done

          # 4. GHI ĐÈ & NHẬP KHO (Chốt hạ về Repo)
          echo "📦 Bước 3: Đang ghi đè và nhập kho tinh nhuệ..."
          # Nếu bật clear_all thì dọn sạch kho cũ, không thì ghi đè file mới
          [ "${{ github.event.inputs.clear_all }}" == "true" ] && rm -rf "$TARGET_DIR/*"
          
          cp -rf "$REFINED_CACHE/." "$TARGET_DIR/"

          # 5. KIỂM KÊ CUỐI CÙNG
          COUNT=$(ls -1 "$TARGET_DIR" | wc -l)
          echo "🚀 Hoàn tất! Kho hàng hiện có: $COUNT file chất lượng cao."
          
          if [ "$COUNT" -eq 0 ]; then
              echo "❌ Cảnh báo: Phễu lọc quá gắt, không có hàng về kho!"
              exit 1
          fi

          rm -rf "$RAW_CACHE" "$REFINED_CACHE" app_extracted bin_list.txt

