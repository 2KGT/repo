name: Dump Header Factory

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: '🔗 Link IPA Decrypt'
        required: true
        type: string
      app_name:
        description: '📁 Thư mục lưu'
        required: true
        default: 'YouTubeHeader'
        type: string
      target_classes:
        description: '🎯 Nhập Class (cách nhau dấu cách)'
        required: false
        type: string
      config_path:
        description: '📄 Đường dẫn heards.txt'
        required: false
        type: string
      patch_headers:
        description: '🩹 Vá lỗi @class (Forward Declaration)'
        type: boolean
        default: true
      deep_scan:
        description: '📂 Deep Scan cả file con'
        type: boolean
        default: true
      smart_filter:
        description: '✨ Sàng lọc rác Swift/Apple'
        type: boolean
        default: true
      clear_all:
        description: '🧨 Xoá thư mục dump trước'
        type: boolean
        default: false

jobs:
  dump_process:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Tools
        run: brew install blacktop/tap/ipsw

      - name: 📦 Download & Extract IPA
        run: |
          IPA_LINK="${{ github.event.inputs.ipa_url }}"
          if [[ ! "$IPA_LINK" =~ ^http ]]; then
            echo "❌ Link IPA không hợp lệ: $IPA_LINK"
            exit 1
          fi
          echo "📥 Đang tải hàng từ: $IPA_LINK"
          curl -L -A "Mozilla/5.0" "$IPA_LINK" -o app.ipa
          unzip -q app.ipa -d app_extracted

      - name: ⚡ Chiến Thuật Chu Di Tam Tộc (The Kinship Hunter)
        run: |
          TARGET_DIR="headers/${{ github.event.inputs.app_name }}"
          TEMP_DUMP="temp_headers"
          mkdir -p "$TARGET_DIR" "$TEMP_DUMP"

          # 1. LẬP BẢN ĐỒ BINARY (Dò tìm hang ổ phản tặc)
          find app_extracted/Payload -type f ! -name "*.*" > bin_list.txt

          # 2. ĐỌC CHIẾU CHỈ (Lấy danh sách từ headers.txt)
          CLASSES="${{ github.event.inputs.target_classes }}"
          CONFIG="${{ github.event.inputs.config_path }}"
          if [ -z "$CLASSES" ] && [ -f "$CONFIG" ]; then
              echo "📜 Đang đọc chiếu chỉ từ dự án: $CONFIG"
              CLASSES=$(tr '\r\n' ' ' < "$CONFIG" | sed 's/\.h//g')
          fi

                    # 3. GIAI ĐOẠN "NHẶT VÀ LỌC" (Bản Fix Mắt Thần)
          echo "🧺 Bot đang đi lục soát kho đệm..."
          
          # Đảm bảo CLASSES không bị dính ký tự lạ
          CLEAN_CLASSES=$(echo $CLASSES | sed 's/\*/ /g') # Xử lý nếu ông giáo nhập dấu *

          if [ -n "$CLEAN_CLASSES" ]; then
              for CLS in $CLEAN_CLASSES; do
                  [ -z "$CLS" ] && continue
                  echo "🔎 Truy quét mục tiêu: $CLS"
                  
                  # CHƯƠNG TRÌNH NHẶT HÀNG ĐA TẦNG:
                  # Tìm tất cả file .h bắt đầu bằng tên Class hoặc có chứa tên Class
                  # Dùng -ipath để lục tung cả thư mục con
                  FOUND_FILES=$(find "$ALL_DUMP_DIR" -type f -name "*$CLS*.h")
                  
                  if [ -z "$FOUND_FILES" ]; then
                      echo "⚠️ Không tìm thấy họ hàng nhà: $CLS (Bỏ qua)"
                      continue
                  fi

                  echo "$FOUND_FILES" | while read -r FILE; do
                      # Vòng lọc tố chất: Chỉ lấy file có nội dung thực thụ
                      if [ -s "$FILE" ] && grep -qE "@interface|@protocol" "$FILE"; then
                          FILENAME=$(basename "$FILE")
                          mv -f "$FILE" "$TARGET_DIR/"
                          echo "✅ Đã thu nạp tân binh: $FILENAME"
                      fi
                  done
              done
          else
              # Nếu không có danh sách, ân xá tất cả thằng có tố chất
              echo "🚜 Không có thánh chỉ, nhặt sạch tinh anh!"
              find "$ALL_DUMP_DIR" -name "*.h" -type f | while read -r FILE; do
                  if [ -s "$FILE" ] && grep -qE "@interface|@protocol" "$FILE"; then
                      mv -f "$FILE" "$TARGET_DIR/"
                  fi
              done
          fi

          # 5. DÁN GIÁP & SMART FILTER (Bước dọn dẹp cuối cùng)
          if [ "${{ github.event.inputs.patch_headers }}" == "true" ]; then
              find "$TARGET_DIR" -name "*.h" -exec sed -i '' '1i\
              @class NSObject, NSString, NSArray, NSDictionary, UIView, UIViewController; \
              @protocol NSObject, NSCopying, NSCoding;
              ' {} +
          fi

          # Sàng lọc rác hệ thống (Trảm nốt những thằng trà trộn)
          if [ "${{ github.event.inputs.smart_filter }}" == "true" ]; then
              cd "$TARGET_DIR"
              rm -f NSObject-Protocol.h NSCopying-Protocol.h 2>/dev/null
              # Loại những file tên quá dài (thường là lỗi dump của Swift)
              find . -name "*.h" | awk 'length > 120' | xargs rm -f 2>/dev/null
              cd - > /dev/null
          fi

          rm -rf "$TEMP_DUMP" app_extracted bin_list.txt
          echo "📦 Kho hàng chu di hiện có: $(ls -1 "$TARGET_DIR" | wc -l) file tinh nhuệ."
