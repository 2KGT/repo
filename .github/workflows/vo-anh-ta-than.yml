name: 🏮 VÔ ẢNH PHONG THẦN - FINAL (STRUCT)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Linh hồn dự án'
        required: true
        type: choice
        default: 'None'
        options: [ None, AutoAC, AutoDL ]
      ver_type:
        description: 'Cấp độ nâng cấp'
        type: choice
        default: 'Patch (Vá lỗi)'
        options: [ 'Patch (Vá lỗi)', 'Minor (Tính năng)', 'Major (Đại tu)' ]
      publish:
        description: 'Release Official'
        type: boolean
        default: false

# ======== PHÁP KHÍ MÔI TRƯỜNG ========
env:
  BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos_engine 

jobs:
  forge:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # ======== 1. KHỞI TẠO ========
      - name: 📥 1.1 Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🛠️ 1.2 Setup Theos Engine
        run: |
          brew install make ldid dpkg
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      # ======== 2. ĐỊNH DANH & GÁN LINK ========
      - name: 🎯 2.1 Metadata & Icon Logic
        id: metadata
        run: |
          PROJ="${{ github.event.inputs.project }}"
          [ "$PROJ" == "None" ] && exit 1
          DIR="src/build-tweaks/$PROJ"
          CTRL="$DIR/control"
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | xargs | tr -d '() ')
          IMG_URL="${{ env.BASE_URL }}/depictions/images"
          
          # ... (Phần logic tăng Version giữ nguyên) ...

          # Gán Icon & Depiction (Sử dụng tên file gọn: AutoAC.png)
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          sed -i '' "/^Icon:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          echo "Icon: ${IMG_URL}/${SAFE}.png" >> "$CTRL"

          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "final_ver=$FINAL_VER" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT

      # ======== 3. LUYỆN ĐAN (BUILD) ========
      - name: 🔨 3.1 Biên dịch Tweak
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          PROJ="${{ github.event.inputs.project }}"
          rm -rf "$DIR/packages" && mkdir -p output
          export THEOS=$THEOS
          
          # TRỎ LÙI RA NGOÀI THƯ MỤC CHA
          HEADER_PATH="$GITHUB_WORKSPACE/$DIR" 
          
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.0 \
            THEOS=$THEOS \
            ADDITIONAL_CFLAGS="-fobjc-arc -Wno-error -I. -I$HEADER_PATH" \
            ADDITIONAL_LDFLAGS="-Wl,-segalign,4000"
          
          cp "$DIR/packages/"*.deb output/

      # ======== 4. ĐỒNG BỘ NHẬT KÝ & HÌNH ẢNH ========
      - name: 📝 4.1 Sync Changelog & Depiction JSON
        run: |
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          VER="${{ steps.metadata.outputs.final_ver }}"
          IMG_URL="${{ env.BASE_URL }}/depictions/images"
          
          # 1. Quét Nhật ký
          SRC_FILE=$(find "$DIR" -name "*.x" -o -name "*.xm" | head -n 1)
          FEAT=$(grep "^// -" "$SRC_FILE" | sed 's/^\/\/ - //' | sed ':a;N;$!ba;s/\n/\\n- /g' || echo "Cập nhật định kỳ")
          FIX=$(grep "^// +" "$SRC_FILE" | sed 's/^\/\/ + //' | sed ':a;N;$!ba;s/\n/\\n+ /g' || echo "Cải thiện ổn định")
          
          # 2. Tạo danh sách Screenshots (AutoAC1.png -> AutoAC5.png)
          SS_JSON=""
          for i in {1..5}; do
            SS_JSON+='{"url": "'$IMG_URL'/'$SAFE$i'.png", "accessibilityText": "Screenshot '$i'"},'
          done
          SS_JSON=${SS_JSON%,}

          # 3. Tạo JSON (Banner: -banner, Video: .mp4)
          DESC="### ✨ Mới nhất (v$VER)\n- $FEAT\n\n### 🐛 Sửa lỗi\n- $FIX"
          mkdir -p depictions
          echo '{
            "class": "DepictionTabView",
            "tabs": [{
              "tabname": "Details",
              "class": "DepictionStackView",
              "views": [
                {"class": "DepictionHeaderView", "title": "'$SAFE'"},
                {"class": "DepictionImageView", "url": "'$IMG_URL'/'$SAFE'-banner.png", "width": 1242, "height": 500, "cornerRadius": 10},
                {"class": "DepictionVideoView", "videoURL": "'$IMG_URL'/'$SAFE'.mp4", "cornerRadius": 8},
                {"class": "DepictionMarkdownView", "markdown": "'$DESC'", "useMargins": true},
                {"class": "DepictionSeparatorView"},
                {"class": "DepictionHeaderView", "title": "Screenshots"},
                {"class": "DepictionScreenshotsView", "itemCornerRadius": 8, "screenshots": ['$SS_JSON']}
              ]
            }]
          }' > "depictions/${SAFE}.json"

          git add "$DIR" depictions/
          # ... (Phần commit & push giữ nguyên) ...

          if [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
            mkdir -p debs && cp output/*.deb debs/
            dpkg-scanpackages -m debs /dev/null > Packages && bzip2 -fks Packages
            git add debs/ Packages Packages.bz2
            MSG="🌟 Release: $SAFE v$VER"
          else
            MSG="🛠️ Build Test: $SAFE v$VER"
          fi
          git commit -m "$MSG" || exit 0
          git push origin main

      # ======== 5. XUẤT XƯỞNG ========
      - name: 📦 5.1 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.final_ver }}
          path: output/
