name: 🏮 VÔ ẢNH PHONG THẦN

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Linh hồn dự án'
        required: true
        type: choice
        default: '(none)'
        options: [ AutoAC, AutoDL ]
      publish:
        description: 'Release Official (Lên Sileo)'
        type: boolean
        default: false

env:
  THEOS: ${{ github.workspace }}/theos
  TZ: "Asia/Ho_Chi_Minh"

jobs:
  forge:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 1. Triệu hồi Source
        uses: actions/checkout@v4

      - name: 🛠️ 2. Chuẩn bị Pháp khí (Cache SDK)
        run: |
          brew install make ldid dpkg
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      - name: 🎯 3. Metadata & Đồng bộ Nhãn Xác
        id: metadata
        run: |
          PROJ="${{ github.event.inputs.project }}"
          CTRL=$(find src/build-tweaks/$PROJ -name "control")
          DIR=$(dirname "$CTRL")
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | xargs | tr -d '() ')
          
          # ĐỒNG BỘ: TênDựÁn + headers (ví dụ: AutoACheaders)
          H_NAME="${PROJ}headers"
          
          # Xử lý Version
          OLD_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$OLD_VER" || echo "$OLD_VER-test$(date +%H%M)")
          
          # Cập nhật Control (Ngòi nổ)
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          sed -i '' "s/^Depends: .*/Depends: mobilesubstrate, firmware (>= 14.0)/" "$CTRL"
          
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "h_name=$H_NAME" >> $GITHUB_OUTPUT

      - name: 🪄 4. Đúc Xác Vô Ảnh (Đồng bộ Tên Dự Án)
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          H_NAME="${{ steps.metadata.outputs.h_name }}"
          DEST="$THEOS/include/$H_NAME"
          mkdir -p "$DEST"
          
          # 1. Ưu tiên bốc file headers.h thủ công nếu có
          if [ -f "$DIR/headers.h" ]; then
            echo "🔮 Dùng Xác Chính Tông (.h)"
            cp "$DIR/headers.h" "$DEST/$H_NAME.h"
          # 2. Hoặc xay từ headers.txt
          elif [ -f "$DIR/headers.txt" ]; then
            echo "🧪 Đang luyện xác từ .txt"
            while IFS= read -r line || [ -n "$line" ]; do
              CLASS=$(echo "$line" | cut -d':' -f1 | xargs)
              BASE=$(echo "$line" | grep ":" | cut -d':' -f2 | xargs || echo "NSObject")
              echo "@interface $CLASS : $BASE @end" > "$DEST/$CLASS.h"
            done < "$DIR/headers.txt"
            
            INDEX="$DEST/$H_NAME.h"
            echo "#import <UIKit/UIKit.h>" > "$INDEX"
            for h in "$DEST"/*.h; do
              [ "$(basename "$h")" != "$H_NAME.h" ] && echo "#import \"$(basename "$h")\"" >> "$INDEX"
            done
          fi

      - name: 🔨 5. Luyện Đan (Biên dịch Song Sinh)
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          H_NAME="${{ steps.metadata.outputs.h_name }}"
          
          # Tối ưu FLAGS: Nhìn cả tại chỗ (-I.) và trong kho xác (-I$THEOS...)
          DYNAMIC_FLAGS="-fobjc-arc -Wno-error -I. -I$THEOS/include/$H_NAME"
          
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.5 \
            ADDITIONAL_CFLAGS="$DYNAMIC_FLAGS" \
            ADDITIONAL_LDFLAGS="-Wl,-segalign,4000"
          
          mkdir -p output && cp "$DIR/packages/"*.deb output/

      - name: 📝 6. Đồng bộ Nhật ký (Changelog)
        run: |
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"
          git add . && git commit -m "🏮 Phong Thần: ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}" || exit 0
          git push origin main

      - name: 📦 7. Xuất xưởng
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
          path: output/
