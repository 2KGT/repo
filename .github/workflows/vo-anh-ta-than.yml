name: "Vô ảnh tà thần final"

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Linh hồn dự án'
        required: true
        type: choice
        default: 'None'
        options: [ None, AutoAC, AutoDL, Facebook ]
      ver_type:
        description: 'Cấp độ nâng cấp'
        type: choice
        default: 'Patch (Vá lỗi)'
        options: [ 'Patch (Vá lỗi)', 'Minor (Tính năng)', 'Major (Đại tu)' ]
      publish:
        description: '🚀 Đưa lên sileo (Test-Publish)'
        type: boolean
        default: false
      clean_build:
        description: '🧹 Dọn sạch cache trước khi build'
        type: boolean
        default: true
      send_deb:
        description: '🤖 Gửi file .deb qua Telegram'
        type: boolean
        default: true
      update_depiction:
        description: '📝 Cập nhật mô tả JSON Depiction'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos_engine

jobs:
  forge:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 1.1 Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ 1.2 Setup Theos Engine
        run: |
          brew install make ldid dpkg
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git $THEOS
            curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks
          fi

      - name: 🎯 2.1 Metadata & Version Bump
        id: metadata
        run: |
          PROJ="${{ github.event.inputs.project }}"
          if [ "$PROJ" = "None" ]; then exit 1; fi
          DIR="src/build-tweaks/$PROJ"
          CTRL="$DIR/control"
          
          CUR_VER=$(grep "^Version:" "$CTRL" | cut -d: -f2- | xargs)
          IFS='.' read -r -a v <<< "$CUR_VER"
          MAJ=${v[0]}; MIN=${v[1]}; PAT=${v[2]}
          
          case "${{ github.event.inputs.ver_type }}" in
            "Major (Đại tu)") MAJ=$((MAJ + 1)); MIN=0; PAT=0 ;;
            "Minor (Tính năng)") MIN=$((MIN + 1)); PAT=0 ;;
            "Patch (Vá lỗi)") PAT=$((PAT + 1)) ;;
          esac
          NEW_VER="$MAJ.$MIN.$PAT"
          
          NAME=$(grep "^Name:" "$CTRL" | cut -d: -f2- | xargs)
          SAFE=$(echo "$NAME" | tr -d '() ' | sed 's/[^a-zA-Z0-9]//g')
          
          sed -i '' "s/^Version:.*/Version: $NEW_VER/" "$CTRL"
          grep -q "^SileoDepiction:" "$CTRL" && sed -i '' "s|^SileoDepiction:.*|SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json|" "$CTRL" || echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "final_ver=$NEW_VER" >> $GITHUB_OUTPUT
          echo "display_name=$NAME" >> $GITHUB_OUTPUT

      - name: 🔨 3.1 Biên dịch Tweak
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          export THEOS=$THEOS
          rm -rf output && mkdir -p output
          
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            make -C "$DIR" clean THEOS=$THEOS
          fi
          
          make -C "$DIR" package FINALPACKAGE=1 THEOS=$THEOS ADDITIONAL_CFLAGS="-I$THEOS/include -fobjc-arc"
          [ -d "$DIR/packages" ] && cp "$DIR/packages/"*.deb output/

      - name: 📝 4.1 Sync Depiction
        if: github.event.inputs.update_depiction == 'true'
        env:
          SAFE: ${{ steps.metadata.outputs.safe_name }}
          VER: ${{ steps.metadata.outputs.final_ver }}
          DNAME: ${{ steps.metadata.outputs.display_name }}
        run: |
          mkdir -p depictions
          python3 -c "
          import json, os
          safe, ver, dname = os.environ['SAFE'], os.environ['VER'], os.environ['DNAME']
          data = {'class': 'DepictionTabView', 'tabs': [{'tabname': 'Details', 'class': 'DepictionStackView', 'views': [{'class': 'DepictionHeaderView', 'title': dname}, {'class': 'DepictionMarkdownView', 'markdown': f'### Phiên bản {ver}\n- Tối ưu bởi Kyic Repository', 'useMargins': True}]}]}
          with open(f'depictions/{safe}.json', 'w') as f: json.dump(data, f, indent=2)
          "

      - name: 🚀 5.1 Publish to Repo
        if: github.event.inputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p debs && cp output/*.deb debs/
          dpkg-scanpackages -m debs /dev/null > Packages
          bzip2 -kf Packages
          git add debs/ Packages Packages.bz2 depictions/
          git commit -m "Update Kyic Repository [skip ci]" || echo "No changes"
          git push origin main

      - name: 🤖 6.1 Telegram Notification
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          STATUS="${{ job.status }}"
          NAME="${{ steps.metadata.outputs.display_name || 'N/A' }}"
          VER="${{ steps.metadata.outputs.final_ver || 'N/A' }}"
          ICON="🧿"
          [ "$STATUS" == "success" ] && ICON="⚡"
          [ "$STATUS" == "failure" ] && ICON="❌"

          # Tin nhắn giao diện Kyic
          MSG="<b>$ICON Kyic repository update</b>%0A"
          MSG="$MSG──────────────────%0A"
          MSG="$MSG📱 <b>App:</b> <code>$NAME</code>%0A"
          MSG="$MSG💡 <b>Ver:</b> <code>$VER</code>%0A"
          MSG="$MSG💯 <b>Status:</b> <code>$STATUS ✅</code>%0A"
          MSG="$MSG──────────────────%0A"
          MSG="$MSG🤩 <i>Enjoy your experience!</i>"

          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$TO" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=$MSG"
          
          if [ "$STATUS" == "success" ] && [ "${{ github.event.inputs.send_deb }}" == "true" ]; then
            find output -name "*.deb" -type f | while read -r file; do
              curl -s -F "chat_id=$TO" -F "document=@$file" \
                -F "caption=✅ Build thành công: $(basename "$file")" \
                "https://api.telegram.org/bot$TOKEN/sendDocument"
            done
          fi
