name:🪶 VÔ ẢNH PHONG THẦN (SYNC)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Linh hồn dự án'
        required: true
        type: choice
        default: 'None'
        options: [ None, AutoAC, AutoDL ]
      ver_type:
        description: 'Cấp độ nâng cấp'
        type: choice
        default: 'Patch (Vá lỗi)'
        options: [ 'Patch (Vá lỗi)', 'Minor (Tính năng)', 'Major (Đại tu)' ]
      publish:
        description: 'Release Official (Ver & Sync)'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main"
  TZ: "Asia/Ho_Chi_Minh"
  # ĐỔI TÊN Ở ĐÂY ĐỂ NÉ LỖI SUBMODULE
  THEOS: ${{ github.workspace }}/theos_engine 

jobs:
  forge:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 1. Triệu hồi Source
        uses: actions/checkout@v4
        with:
          submodules: false # Tuyệt đối không quét submodule

      - name: 🛠️ 2. Chuẩn bị Pháp khí
        run: |
          brew install make ldid dpkg
          # Clone vào thư mục mới hoàn toàn
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      - name: 🎯 3. Metadata & Logic Tăng Ver
        id: metadata
        run: |
          PROJ="${{ github.event.inputs.project }}"
          if [ "$PROJ" == "None" ]; then exit 1; fi
          DIR="src/build-tweaks/$PROJ"
          CTRL="$DIR/control"
          
          CURRENT_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          IFS='.' read -r major minor patch <<< "$CURRENT_VER"
          if [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
            if [[ "${{ github.event.inputs.ver_type }}" == "Major (Đại tu)" ]]; then
              major=$((major + 1)); minor=0; patch=0
            elif [[ "${{ github.event.inputs.ver_type }}" == "Minor (Tính năng)" ]]; then
              minor=$((minor + 1)); patch=0
            else
              patch=$((patch + 1))
            fi
            FINAL_VER="$major.$minor.$patch"
            sed -i '' "s/^Version: .*/Version: $FINAL_VER/" "$CTRL"
          else
            FINAL_VER="$CURRENT_VER-test$(date +%H%M)"
          fi

          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | xargs | tr -d '() ')
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"

          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "final_ver=$FINAL_VER" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT

      - name: 🔨 4. Luyện Đan (Dùng Theos Engine)
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          # Dọn sạch kho trước khi đúc
          rm -rf "$DIR/packages" && mkdir -p output
          
          # Trỏ chính xác vào theos_engine
          export THEOS=$THEOS
          DYNAMIC_FLAGS="-fobjc-arc -Wno-error -I. -I$THEOS/include/${{ github.event.inputs.project }}headers"
          LDFLAGS="-Wl,-segalign,4000"
          
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.0 \
            THEOS=$THEOS \
            ADDITIONAL_CFLAGS="$DYNAMIC_FLAGS" \
            ADDITIONAL_LDFLAGS="$LDFLAGS"
          
          cp "$DIR/packages/"*.deb output/

      - name: 📝 5. Đồng bộ Ngược
        run: |
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"
          
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          VER="${{ steps.metadata.outputs.final_ver }}"
          CLOG_PATH="$DIR/CHANGELOG.md"
          JSON_PATH="depictions/${SAFE}.json"
          
          SRC_FILE=$(find "$DIR" -name "*.x" -o -name "*.xm" | head -n 1)
          FEAT=$(grep "^-" "$SRC_FILE" | sed 's/^- //' | sed ':a;N;$!ba;s/\n/\\n- /g' || echo "Cập nhật định kỳ")
          FIX=$(grep "^+" "$SRC_FILE" | sed 's/^+ //' | sed ':a;N;$!ba;s/\n/\\n+ /g' || echo "Cải thiện ổn định")

          TIMESTAMP=$(date "+%d/%m/%Y %H:%M")
          OLD_CONTENT=$(cat "$CLOG_PATH" 2>/dev/null || echo "---")
          echo -e "### 🚀 v$VER ($TIMESTAMP)\n#### ✨ Tính năng mới\n- $FEAT\n#### 🐛 Sửa lỗi\n- $FIX\n\n---\n$OLD_CONTENT" > "$CLOG_PATH"

          mkdir -p depictions
          IMG_BASE="${{ env.BASE_URL }}/depictions/images"
          echo '{"class":"DepictionTabView","tabs":[{"tabname":"Details","class":"DepictionStackView","views":[{"class":"DepictionHeaderView","title":"'$SAFE'"},{"class":"DepictionImageView","url":"'$IMG_BASE/${SAFE}-banner.png'","width":1242,"height":500,"cornerRadius":10},{"class":"DepictionMarkdownView","markdown":"'$DESC'","useMargins":true}]}]}' > "$JSON_PATH"

          # Xử lý commit: Loại bỏ thư mục theos (nếu có) ra khỏi commit để tránh tạo lỗi mới
          git rm -r --cached theos || echo "Clean"
          git add "$DIR" depictions/
          
          if [ "${{ github.event.inputs.publish }}" == "true" ]; then
            mkdir -p debs && cp output/*.deb debs/
            dpkg-scanpackages -m debs /dev/null > Packages && bzip2 -fks Packages
            git add debs/ Packages Packages.bz2
            MSG="🌟 Release: $SAFE v$VER"
          else
            MSG="🛠️ Build Test: $SAFE v$VER"
          fi
          git commit -m "$MSG" || exit 0
          git push origin main

      - name: 📦 6. Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.final_ver }}
          path: output/
