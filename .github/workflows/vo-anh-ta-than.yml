name: VÔ ẢNH PHONG THẦN - FINAL (VÔ ĐỐI)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Linh hồn dự án'
        required: true
        type: choice
        default: 'None'
        options: [ None, AutoAC, AutoDL ]
      ver_type:
        description: 'Cấp độ nâng cấp'
        type: choice
        default: 'Patch (Vá lỗi)'
        options: [ 'Patch (Vá lỗi)', 'Minor (Tính năng)', 'Major (Đại tu)' ]
      publish:
        description: '🚀 Đưa lên Repo (Bật = Publish, Tắt = Build Test)'
        type: boolean
        default: false
      clean_build:
        description: '🧹 Dọn sạch cache trước khi build'
        type: boolean
        default: true
      send_deb:
        description: '🤖 Gửi file .deb qua Telegram'
        type: boolean
        default: true
      skip_depiction:
        description: '🙈 Bỏ qua cập nhật JSON Depiction'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos_engine 

jobs:
  forge:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # ======== 1. KHỞI TẠO ========
      - name: 📥 1.1 Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🛠️ 1.2 Setup Theos Engine
        run: |
          brew install make ldid dpkg
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      # ======== 2. ĐỊNH DANH & TĂNG PHIÊN BẢN ========
      - name: 🎯 2.1 Metadata & Version Bump
        id: metadata
        run: |
          PROJ="${{ github.event.inputs.project }}"
          [ "$PROJ" = "None" ] && exit 1
          DIR="src/build-tweaks/$PROJ"
          CTRL="$DIR/control"
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | xargs | tr -d '() ')
          IMG_URL="${{ env.BASE_URL }}/depictions/images"

          update_ctrl() {
            grep -q "^$1:" "$CTRL" && sed -i '' "s/^$1:.*/$1: $2/" "$CTRL" || echo "$1: $2" >> "$CTRL"
          }

          CUR_VER=$(grep "^Version:" "$CTRL" | cut -d: -f2- | xargs)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CUR_VER"

          case "${{ github.event.inputs.ver_type }}" in
            "Major (Đại tu)") MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            "Minor (Tính năng)") MINOR=$((MINOR + 1)); PATCH=0 ;;
            "Patch (Vá lỗi)") PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VER="${MAJOR}.${MINOR}.${PATCH}"

          update_ctrl "Version" "$NEW_VER"
          update_ctrl "SileoDepiction" "${{ env.BASE_URL }}/depictions/${SAFE}.json"
          update_ctrl "Icon" "${IMG_URL}/${SAFE}.png"

          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "final_ver=$NEW_VER" >> $GITHUB_OUTPUT

      # ======== 3. LUYỆN ĐAN ========
      - name: 🔨 3.1 Biên dịch Tweak
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          export THEOS=$THEOS

          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            rm -rf "$DIR/.theos" "$DIR/packages" "$DIR/obj"
          fi
          mkdir -p output

          if [ ! -f "$DIR/headers.h" ]; then
            cat > "$DIR/headers.h" <<'EOF'
          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>
          @interface NSObject (UniversalAutomation) @end
          EOF
            SOURCE_FILES=$(find "$DIR" -maxdepth 1 -type f \( -name "*.x" -o -name "*.xm" -o -name "*.mm" -o -name "*.m" \))
            if [ -n "$SOURCE_FILES" ]; then
              sed -n 's/^[[:space:]]*%hook[[:space:]]\+\([A-Za-z0-9_]\+\).*/\1/p' $SOURCE_FILES | sort -u | while read -r CLASS; do
                echo "@interface $CLASS : NSObject @end" >> "$DIR/headers.h"
              done
            fi
          fi

          VIRTUAL_HDR="${THEOS}/include/${SAFE}headers"
          rm -rf "${VIRTUAL_HDR}" && mkdir -p "${VIRTUAL_HDR}"
          cp "$DIR/headers.h" "${VIRTUAL_HDR}/${SAFE}headers.h"

          make -C "$DIR" clean package FINALPACKAGE=1 \
            THEOS=$THEOS \
            ADDITIONAL_CFLAGS="-fobjc-arc -w -Wno-error -I${THEOS}/include -I${VIRTUAL_HDR}" \
            ADDITIONAL_LDFLAGS="-Wl,-segalign,4000"

          cp "$DIR/packages/"*.deb output/

      # ======== 4. ĐỒNG BỘ NHẬT KÝ & DEPICTION ========
      - name: 📝 4.1 Sync Changelog & Depiction JSON
        if: ${{ github.event.inputs.skip_depiction == 'false' }}
        run: |
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          VER="${{ steps.metadata.outputs.final_ver }}"
          export SAFE VER DIR
          
          python3 - << 'PYEOF'
          import json, os
          safe, ver = os.environ['SAFE'], os.environ['VER']
          desc = f"### ✨ Mới nhất (v{ver})\n- Cập nhật định kỳ\n### 🐛 Sửa lỗi\n- Cải thiện ổn định"
          views = [{"class": "DepictionHeaderView", "title": safe}, {"class": "DepictionMarkdownView", "markdown": desc, "useMargins": True}]
          depiction = {"class": "DepictionTabView", "tabs": [{"tabname": "Details", "class": "DepictionStackView", "views": views}]}
          os.makedirs("depictions", exist_ok=True)
          with open(f"depictions/{safe}.json", "w", encoding="utf-8") as f:
              json.dump(depiction, f, indent=2, ensure_ascii=False)
          PYEOF

          git add .
          if ! git diff --cached --quiet; then
            git commit -m "🛠️ Build: $SAFE v$VER"
            git push origin main
          fi

      # ======== 5. XUẤT XƯỞNG ========
      - name: 📦 5.1 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.final_ver }}
          path: output/

      # ======== 6. TELEGRAM ========
      - name: 🤖 6.1 Telegram Notification
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_TO }}
        run: |
          STATUS="${{ job.status }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          VER="${{ steps.metadata.outputs.final_ver }}"
          if [ "$STATUS" = "success" ]; then
            TEXT="🚀 <b>$SAFE</b> v$VER: Build Thành Công!"
          else
            TEXT="⚠️ <b>$SAFE</b>: Lò luyện gặp sự cố!"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" -d "text=${TEXT}" -d "parse_mode=HTML"
