name: 🏮 VÔ ẢNH PHONG THẦN - FINAL (STRUCT)

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Linh hồn dự án'
        required: true
        type: choice
        default: 'None'
        options: [ None, AutoAC, AutoDL ]
      ver_type:
        description: 'Cấp độ nâng cấp'
        type: choice
        default: 'Patch (Vá lỗi)'
        options: [ 'Patch (Vá lỗi)', 'Minor (Tính năng)', 'Major (Đại tu)' ]
      publish:
        description: 'Release Official'
        type: boolean
        default: false

# ======== PHÁP KHÍ MÔI TRƯỜNG ========
env:
  BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos_engine 

jobs:
  forge:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # ======== 1. KHỞI TẠO ========
      - name: 📥 1.1 Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🛠️ 1.2 Setup Theos Engine
        run: |
          brew install make ldid dpkg
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

  # ======== 2. ĐỊNH DANH & GÁN LINK ========
      - name: 🎯 2.1 Metadata & Icon Logic
        id: metadata
        run: |
          PROJ="${{ github.event.inputs.project }}"
          [ "$PROJ" == "None" ] && exit 1
          DIR="src/build-tweaks/$PROJ"
          CTRL="$DIR/control"
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | xargs | tr -d '() ')
          IMG_URL="${{ env.BASE_URL }}/depictions/images"
          
          # ... (Phần logic tăng Version giữ nguyên) ...

          # Gán Icon & Depiction (Sử dụng tên file gọn: AutoAC.png)
          sed -i '' "/^SileoDepiction:/d" "$CTRL"
          sed -i '' "/^Icon:/d" "$CTRL"
          echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          echo "Icon: ${IMG_URL}/${SAFE}.png" >> "$CTRL"

          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "final_ver=$FINAL_VER" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT

  # ======== 3. LUYỆN ĐAN (BUILD) ========

      - name: 🔨 3.1 Biên dịch Tweak (Universal Self-Healing)
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          export THEOS=$THEOS

          # 1. TỔNG VỆ SINH & KIỂM TRA ĐẦU VÀO
          if [ ! -f "$DIR/Makefile" ] || [ ! -f "$DIR/control" ]; then
            echo "❌ Không tìm thấy cấu trúc dự án hợp lệ tại $DIR."
            exit 1
          fi
          rm -rf "$DIR/.theos" "$DIR/packages" "$DIR/obj"
          mkdir -p output

          # 2. AI SCANNER (Hỗ trợ đa nguồn .x .xm .mm .m)
          if [ ! -f "$DIR/headers.h" ]; then
            echo "🧠 AI Scanner: Đang đúc hồn cho $SAFE..."
            cat > "$DIR/headers.h" <<'EOF'
#import <UIKit/UIKit.h>
#import <Foundation/Foundation.h>
#import <objc/runtime.h>
@interface NSObject (UniversalAutomation) @end
EOF
            # Dùng find để quét an toàn, tránh lỗi rác shell
            SOURCE_FILES=$(find "$DIR" -maxdepth 1 -type f \( -name "*.x" -o -name "*.xm" -o -name "*.mm" -o -name "*.m" \))
            if [ -n "$SOURCE_FILES" ]; then
              # Bắt Class sau %hook, bỏ qua comment và dấu cách thừa
              sed -n 's/^[[:space:]]*%hook[[:space:]]\+\([A-Za-z0-9_]\+\).*/\1/p' $SOURCE_FILES | sort -u | while read -r CLASS; do
                echo "@interface $CLASS : NSObject @end" >> "$DIR/headers.h"
              done
            fi
            echo "✅ Headers.h đã sẵn sàng."
          fi

          # 3. NAMESPACE VÔ ẢNH (Gia cố đường dẫn)
          VIRTUAL_HDR="${THEOS}/include/${SAFE}headers"
          rm -rf "${VIRTUAL_HDR}" && mkdir -p "${VIRTUAL_HDR}"
          cp "$DIR/headers.h" "${VIRTUAL_HDR}/${SAFE}headers.h"

          # 4. KHAI HỎA (Cờ compiler tối ưu cho Sideload/Feather)
          # Thêm -Wno-unused-command-line-argument để log sạch hơn nữa
          make -C "$DIR" clean package FINALPACKAGE=1 \
            THEOS=$THEOS \
            ADDITIONAL_CFLAGS="-fobjc-arc -w -Wno-error -Wno-undeclared-selector -Wno-unused-command-line-argument -I${THEOS}/include -I${VIRTUAL_HDR}" \
            ADDITIONAL_LDFLAGS="-Wl,-segalign,4000"

          # 5. XUẤT XƯỞNG (Kiểm tra thực lực file DEB)
          DEB_FILE=$(find "$DIR/packages" -name "*.deb" -type f -size +1k | head -n 1)
          if [ -n "$DEB_FILE" ]; then
            cp "$DEB_FILE" output/
            echo "✅ Linh đan đã vào lò: $(basename "$DEB_FILE")"
          else
            echo "❌ Luyện đan thất bại hoặc file DEB rỗng!"
            exit 1
          fi
  # ======== 4. ĐỒNG BỘ NHẬT KÝ & HÌNH ẢNH ========
# ===============================================
      # GIAI ĐOẠN 4: ĐỒNG BỘ NHẬT KÝ & HÌNH ẢNH (BẤT DIỆT)
      # ===============================================
      - name: 📝 4.1 Sync Changelog & Depiction JSON
        run: |
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"

          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          VER="${{ steps.metadata.outputs.final_ver }}"
          IMG_URL="${{ env.BASE_URL }}/depictions/images"

          # Truyền biến an toàn cho Python
          export SAFE VER IMG_URL DIR

          # 1. Quét changelog
          SRC_FILE=$(find "$DIR" -maxdepth 1 \( -name "*.x" -o -name "*.xm" \) | head -n 1)
          if [ -n "$SRC_FILE" ]; then
            FEAT_RAW=$(grep "^// -" "$SRC_FILE" | sed 's/^\/\/ - //' || echo "Cập nhật định kỳ")
            FIX_RAW=$(grep "^// +" "$SRC_FILE" | sed 's/^\/\/ + //' || echo "Cải thiện ổn định")
          else
            FEAT_RAW="Cập nhật định kỳ"
            FIX_RAW="Cải thiện ổn định"
          fi
          export FEAT_RAW FIX_RAW

          # 2. Tạo Depiction JSON (Python với báo lỗi rõ ràng)
          mkdir -p depictions
          python3 << 'PYEOF'
import json, os, sys

try:
    safe = os.environ['SAFE']
    ver = os.environ['VER']
    img_url = os.environ['IMG_URL']
    feat_raw = os.environ.get('FEAT_RAW', 'Cập nhật định kỳ')
    fix_raw = os.environ.get('FIX_RAW', 'Cải thiện ổn định')

    desc = f"### ✨ Mới nhất (v{ver})\n- {feat_raw}\n\n### 🐛 Sửa lỗi\n- {fix_raw}"

    screenshots = []
    if os.path.isdir("depictions/images"):
        for i in range(1, 6):
            fname = f"{safe}{i}.png"
            if os.path.exists(f"depictions/images/{fname}"):
                screenshots.append({
                    "url": f"{img_url}/{fname}",
                    "accessibilityText": f"Screenshot {i}"
                })

    views = [{"class": "DepictionHeaderView", "title": safe}]

    if os.path.exists(f"depictions/images/{safe}-banner.png"):
        views.append({"class": "DepictionImageView", "url": f"{img_url}/{safe}-banner.png",
                      "width": 1242, "height": 500, "cornerRadius": 10})
    if os.path.exists(f"depictions/images/{safe}.mp4"):
        views.append({"class": "DepictionVideoView", "videoURL": f"{img_url}/{safe}.mp4",
                      "cornerRadius": 8})

    views.append({"class": "DepictionMarkdownView", "markdown": desc, "useMargins": True})
    views.append({"class": "DepictionSeparatorView"})
    if screenshots:
        views.append({"class": "DepictionHeaderView", "title": "Screenshots"})
        views.append({"class": "DepictionScreenshotsView", "itemCornerRadius": 8, "screenshots": screenshots})

    depiction = {
        "class": "DepictionTabView",
        "tabs": [{
            "tabname": "Details",
            "class": "DepictionStackView",
            "views": views
        }]
    }

    out_path = f"depictions/{safe}.json"
    with open(out_path, "w", encoding="utf-8") as f:
        json.dump(depiction, f, indent=2, ensure_ascii=False)

    print(f"✅ Đã tạo depiction: {out_path}")

except Exception as e:
    print(f"❌ Lỗi tạo depiction: {e}", file=sys.stderr)
    exit(1)
PYEOF

          # 3. Commit & Packages (có bảo hiểm .deb, làm sạch, rebase)
          git add "$DIR" depictions/
          if git diff --cached --quiet; then
            echo "📝 Không có thay đổi để commit."
          else
            if [[ "${{ github.event.inputs.publish }}" == "true" ]]; then
              # Bảo hiểm file .deb: kiểm tra tồn tại và không rỗng
              DEB_COUNT=0
              for deb in output/*.deb; do
                if [ -s "$deb" ]; then
                  ((DEB_COUNT++))
                fi
              done
              if [ "$DEB_COUNT" -eq 0 ]; then
                echo "❌ Không có file .deb hợp lệ (thiếu hoặc 0KB). Dừng release."
                exit 1
              fi

              mkdir -p debs
              cp output/*.deb debs/ || { echo "❌ Lỗi copy .deb"; exit 1; }
              echo "✅ Đã copy $DEB_COUNT file .deb hợp lệ."

              # Làm sạch Repo: xóa chỉ mục cũ tuyệt đối
              rm -f Packages Packages.bz2

              # Tạo Packages mới
              dpkg-scanpackages -m debs /dev/null > Packages
              python3 << 'PYEOF'
import os, sys, bz2

try:
    if not os.path.exists("Packages"):
        raise FileNotFoundError("❌ Không tìm thấy file Packages sau scan!")

    with open("Packages", "r", encoding="utf-8") as f:
        content = f.read()

    if not content.strip():
        print("⚠️ Cảnh báo: Packages trống (có thể debs/ không hợp lệ).")

    new_content = content.replace("Filename: debs/", "Filename: ./debs/")
    if new_content == content:
        print("ℹ️ Đường dẫn đã chuẩn, không cần sửa.")

    with open("Packages", "w", encoding="utf-8") as f:
        f.write(new_content)

    with open("Packages.bz2", "wb") as f:
        f.write(bz2.compress(new_content.encode("utf-8")))

    print("✅ Chỉ mục Repo đã được cập nhật.")

except Exception as e:
    print(f"❌ Lỗi xử lý Packages: {e}", file=sys.stderr)
    exit(1)
PYEOF

              git add debs/ Packages Packages.bz2
              MSG="🌟 Release: $SAFE v$VER"
            else
              MSG="🛠️ Build Test: $SAFE v$VER"
            fi

            git commit -m "$MSG" || exit 0
            # Hồi mã thương: đồng bộ trước khi push
            git pull --rebase origin main
            git push origin main
          fi