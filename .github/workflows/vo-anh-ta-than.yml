name: Vô ảnh tà thần final

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Linh hồn dự án'
        required: true
        type: choice
        default: 'None'
        options: [ None, AutoAC, AutoDL ]
      ver_type:
        description: 'Cấp độ nâng cấp'
        type: choice
        default: 'Patch (Vá lỗi)'
        options: [ 'Patch (Vá lỗi)', 'Minor (Tính năng)', 'Major (Đại tu)' ]
      publish:
        description: '🚀 Đưa lên sileo (Test-Publish)'
        type: boolean
        default: false
      clean_build:
        description: '🧹 Dọn sạch cache trước khi build'
        type: boolean
        default: true
      send_deb:
        description: '🤖 Gửi file .deb qua Telegram'
        type: boolean
        default: true
      skip_depiction:
        description: '🙈 Bỏ qua cập nhật JSON Depiction'
        type: boolean
        default: false

env:
  BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main"
  TZ: "Asia/Ho_Chi_Minh"
  THEOS: ${{ github.workspace }}/theos_engine

jobs:
  forge:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 1.1 Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ 1.2 Setup Theos Engine
        run: |
          brew install make ldid dpkg
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      - name: 🎯 2.1 Metadata & Version Bump
        id: metadata
        run: |
          PROJ="${{ github.event.inputs.project }}"
          [ "$PROJ" = "None" ] && exit 1
          DIR="src/build-tweaks/$PROJ"
          CTRL="$DIR/control"
          
          # Tăng phiên bản
          CUR_VER=$(grep "^Version:" "$CTRL" | cut -d: -f2- | xargs)
          IFS='.' read -r -a v <<< "$CUR_VER"
          MAJ=${v[0]}; MIN=${v[1]}; PAT=${v[2]}
          
          case "${{ github.event.inputs.ver_type }}" in
            "Major (Đại tu)") MAJ=$((MAJ + 1)); MIN=0; PAT=0 ;;
            "Minor (Tính năng)") MIN=$((MIN + 1)); PAT=0 ;;
            "Patch (Vá lỗi)") PAT=$((PAT + 1)) ;;
          esac
          NEW_VER="$MAJ.$MIN.$PAT"
          
          # Cập nhật control
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | xargs | tr -d '() ')
          sed -i '' "s/^Version:.*/Version: $NEW_VER/" "$CTRL"
          grep -q "^SileoDepiction:" "$CTRL" && sed -i '' "s|^SileoDepiction:.*|SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json|" "$CTRL" || echo "SileoDepiction: ${{ env.BASE_URL }}/depictions/${SAFE}.json" >> "$CTRL"
          
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "final_ver=$NEW_VER" >> $GITHUB_OUTPUT

      - name: 🔨 3.1 Biên dịch Tweak
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          SAFE="${{ steps.metadata.outputs.safe_name }}"
          export THEOS=$THEOS
          
          # Tạo Headers giả lập để tránh lỗi biên dịch
          HDR_DIR="$THEOS/include/${SAFE}headers"
          mkdir -p "$HDR_DIR"
                    cat > "$HDR_DIR/${SAFE}headers.h" <<EOF
#import <UIKit/UIKit.h>
#import <Foundation/Foundation.h>

@interface YTTabBarController : UITabBarController
@property (nonatomic, readonly) UITabBar *tabBar;
- (void)autoAC_handleLongPress:(UILongPressGestureRecognizer *)gesture;
- (void)autoAC_openSettings;
- (void)autoAC_clearCache;
- (void)autoAC_showDownloadStatus;
@end

@interface YTSettingsSectionItemManager : NSObject
- (id)valueForKey:(NSString *)key;
@end
EOF

          
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            make -C "$DIR" clean THEOS=$THEOS
          fi
          
          make -C "$DIR" package FINALPACKAGE=1 THEOS=$THEOS \
            ADDITIONAL_CFLAGS="-I$HDR_DIR -fobjc-arc"
          
          mkdir -p output && cp "$DIR/packages/"*.deb output/

      - name: 📝 4.1 Sync Depiction
        if: github.event.inputs.skip_depiction == 'false'
        env:
          SAFE: ${{ steps.metadata.outputs.safe_name }}
          VER: ${{ steps.metadata.outputs.final_ver }}
        run: |
          mkdir -p depictions
          python3 -c "
          import json, os
          safe, ver = os.environ['SAFE'], os.environ['VER']
          data = {
              'class': 'DepictionTabView',
              'tabs': [{
                  'tabname': 'Details',
                  'class': 'DepictionStackView',
                  'views': [
                      {'class': 'DepictionHeaderView', 'title': safe},
                      {'class': 'DepictionMarkdownView', 'markdown': f'### Phiên bản {ver}\n- Tối ưu bởi Vô Ảnh Phong Thần', 'useMargins': True}
                  ]
              }]
          }
          with open(f'depictions/{safe}.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: 🚀 5.1 Publish to Repo
        if: github.event.inputs.publish == 'true'
        run: |
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"
          mkdir -p debs && cp output/*.deb debs/
          dpkg-scanpackages -m debs /dev/null > Packages
          bzip2 -c Packages > Packages.bz2
          git add debs/ Packages Packages.bz2 depictions/
          git commit -m "🌟 Release ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.final_ver }}"
          git push origin main

      - name: 🤖 6.1 Telegram Notification
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          STATUS="${{ job.status }}"
          MSG="🚀 Dự án: ${{ steps.metadata.outputs.safe_name }}%0A📦 Phiên bản: ${{ steps.metadata.outputs.final_ver }}%0A🏮 Trạng thái: $STATUS"
          if [ -n "$TOKEN" ]; then
            curl -s "https://api.telegram.org/bot$TOKEN/sendMessage?chat_id=$TO&text=$MSG&parse_mode=HTML"
            if [[ "$STATUS" == "success" && "${{ github.event.inputs.send_deb }}" == "true" ]]; then
              for file in output/*.deb; do
                curl -v -F "chat_id=$TO" -F "document=@$file" "https://api.telegram.org/bot$TOKEN/sendDocument"
              done
            fi
          fi
