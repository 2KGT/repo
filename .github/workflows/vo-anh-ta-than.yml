name: 🏮 VÔ ẢNH PHONG THẦN

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Linh hồn dự án'
        required: true
        type: choice
        default: 'AutoAC'
        options: [ AutoAC, AutoDL ]
      publish:
        description: 'Release Official'
        type: boolean
        default: false

env:
  THEOS: ${{ github.workspace }}/theos
  TZ: "Asia/Ho_Chi_Minh"

jobs:
  forge:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: 📥 1. Triệu hồi Source
        uses: actions/checkout@v4

      - name: 🛠️ 2. Chuẩn bị Pháp khí
        run: |
          brew install make ldid dpkg
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz --strip-components=1 -C $THEOS/sdks

      - name: 🎯 3. Metadata (Gõ đầu file Gốc)
        id: metadata
        run: |
          PROJ="${{ github.event.inputs.project }}"
          DIR="src/build-tweaks/$PROJ"
          CTRL="$DIR/control"
          
          # Kiểm tra sự tồn tại của nguyên liệu
          if [ ! -f "$CTRL" ]; then
            echo "❌ Không tìm thấy file control tại: $CTRL"
            ls -R src/build-tweaks/
            exit 1
          fi

          # Định danh nhãn dán & xác
          SAFE=$(grep "^Name:" "$CTRL" | cut -d: -f2- | xargs | tr -d '() ')
          H_NAME="${PROJ}headers"
          
          # Xử lý Version (Ghi đè trực tiếp file gốc)
          OLD_VER=$(grep "^Version:" "$CTRL" | cut -d' ' -f2)
          NEW_VER=$([[ "${{ github.event.inputs.publish }}" == "true" ]] && echo "$OLD_VER" || echo "$OLD_VER-test$(date +%H%M)")
          sed -i '' "s/^Version: .*/Version: $NEW_VER/" "$CTRL"
          
          echo "proj_dir=$DIR" >> $GITHUB_OUTPUT
          echo "proj_ver=$NEW_VER" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "h_name=$H_NAME" >> $GITHUB_OUTPUT

      - name: 🪄 4. Đúc Xác Đồng Bộ
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          H_NAME="${{ steps.metadata.outputs.h_name }}"
          DEST="$THEOS/include/$H_NAME"
          mkdir -p "$DEST"
          
          # Ưu tiên bốc file headers.h nằm cạnh Tweak.x
          if [ -f "$DIR/headers.h" ]; then
            cp "$DIR/headers.h" "$DEST/$H_NAME.h"
          fi

      - name: 🔨 5. Luyện Đan (Biên dịch Thông minh)
        run: |
          DIR="${{ steps.metadata.outputs.proj_dir }}"
          H_NAME="${{ steps.metadata.outputs.h_name }}"
          
          # FLAGS: -I. tìm tại chỗ, -I$THEOS tìm trong kho xác, -Wl... chống văng
          DYNAMIC_FLAGS="-fobjc-arc -Wno-error -I. -I$THEOS/include/$H_NAME"
          LDFLAGS="-Wl,-segalign,4000"
          
          make -C "$DIR" clean package FINALPACKAGE=1 \
            TARGET=iphone:clang:14.5:14.0 \
            ADDITIONAL_CFLAGS="$DYNAMIC_FLAGS" \
            ADDITIONAL_LDFLAGS="$LDFLAGS"
          
          mkdir -p output && cp "$DIR/packages/"*.deb output/

      - name: 📝 6. Đồng bộ Nhật ký
        run: |
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"
          git add . && git commit -m "🏮 Phong Thần: ${{ steps.metadata.outputs.safe_name }} v${{ steps.metadata.outputs.proj_ver }}" || exit 0
          git push origin main

      - name: 📦 7. Xuất xưởng
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.safe_name }}_v${{ steps.metadata.outputs.proj_ver }}
          path: output/
