name: "Vô Ảnh Tà Thần - SINGULARITY MODE"

on:
  workflow_dispatch:
    inputs:
      project:
        type: choice
        required: true
        options: [None, AutoAC, AutoDL, Facebook]
      ver_type:
        type: choice
        default: Patch (Vá lỗi)
        options: [Patch (Vá lỗi), Minor (Tính năng), Major (Đại tu)]
      publish:
        type: boolean
        default: true
      send_deb:
        type: boolean
        default: true

env:
  THEOS: ${{ github.workspace }}/theos_engine
  BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main"

jobs:
  singularity:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - name: 📥 Load System
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: ⚡ Singularity Cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.THEOS }}
          ~/.cache
          ~/Library/Caches
        key: singularity-${{ runner.os }}-${{ hashFiles('**/control') }}

    - name: 🛠️ Singularity Engine
      run: |
        set -e
        brew install make ldid dpkg
        if [ ! -d "$THEOS" ]; then
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.tar.gz \
            | tar -xz --strip-components=1 -C $THEOS/sdks
        fi

    - name: 🧠 Singularity Metadata Memory
      id: meta
      run: |
        set -e
        PROJ="${{ github.event.inputs.project }}"
        [ "$PROJ" = "None" ] && exit 1
        DIR="src/build-tweaks/$PROJ"
        CTRL="$DIR/control"
        VER=$(grep "^Version:" "$CTRL" | cut -d: -f2 | xargs)
        IFS='.' read MAJ MIN PAT <<< "$VER"
        case "${{ github.event.inputs.ver_type }}" in
          "Major (Đại tu)") MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          "Minor (Tính năng)") MIN=$((MIN+1)); PAT=0 ;;
          "Patch (Vá lỗi)") PAT=$((PAT+1)) ;;
        esac
        NEW_VER="$MAJ.$MIN.$PAT"
        NAME=$(grep "^Name:" "$CTRL" | cut -d: -f2 | xargs)
        SAFE=$(echo "$NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_-]//g')
        sed -i '' "s/^Version:.*/Version: $NEW_VER/" "$CTRL"
        echo "dir=$DIR" >> $GITHUB_OUTPUT
        echo "safe=$SAFE" >> $GITHUB_OUTPUT
        echo "ver=$NEW_VER" >> $GITHUB_OUTPUT
        echo "name=$NAME" >> $GITHUB_OUTPUT

    - name: ⚙️ Singularity Adaptive Build
      id: build
      run: |
        set -e
        DIR="${{ steps.meta.outputs.dir }}"
        rm -rf output && mkdir -p output
        attempt_build() {
          make -C "$DIR" clean THEOS=$THEOS || true
          make -C "$DIR" package FINALPACKAGE=1 THEOS=$THEOS ADDITIONAL_CFLAGS="-I$THEOS/include -fobjc-arc"
        }
        attempt_build || attempt_build || make -C "$DIR" package FINALPACKAGE=1 THEOS=$THEOS ADDITIONAL_CFLAGS="-I$THEOS/include"
        find "$DIR/packages" -name "*.deb" -exec cp {} output/ \;

    - name: 🌐 Repo Self-Healing
      if: ${{ success() && github.event.inputs.publish == 'true' }}
      run: |
        set -e
        mkdir -p debs
        cp output/*.deb debs/
        dpkg-scanpackages debs /dev/null > Packages
        gzip -kf Packages
        bzip2 -kf Packages

    - name: 🚀 Singularity Release
      if: ${{ success() && github.event.inputs.publish == 'true' }}
      run: |
        set -e
        git config user.name "SINGULARITY"
        git config user.email "singularity@void.ai"
        git add .
        git commit -m "🧿 Singularity Release ${{ steps.meta.outputs.safe }} v${{ steps.meta.outputs.ver }}" || true
        git tag -f "singularity-${{ steps.meta.outputs.ver }}"
        git push origin main --tags -f

    - name: 🤖 Singularity Telemetry
      if: always()
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TO: ${{ secrets.TELEGRAM_TO }}
      run: |
        set -e
        STATUS="${{ job.status }}"
        ICON="🧿"
        [ "$STATUS" = "success" ] && ICON="⚡"
        [ "$STATUS" = "failure" ] && ICON="❌"
        
        NAME="${{ steps.meta.outputs.name }}"
        VER="${{ steps.meta.outputs.ver }}"

        # Giao diện tin nhắn mới
        MSG="<b>$ICON Singularity engine update</b>%0A"
        MSG="$MSG--------------------------------%0A"
        MSG="$MSG📦 <b>Project:</b> <code>$NAME</code>%0A"
        MSG="$MSG💡 <b>Version:</b> <code>v$VER</code>%0A"
        MSG="$MSG📊 <b>Status:</b> <code>$STATUS</code>%0A"
        MSG="$MSG--------------------------------%0A"
        MSG="$MSG🤩 <i>Enjoy the Singularity experience!</i>"

        curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
          -d "chat_id=$TO" \
          -d "parse_mode=HTML" \
          --data-urlencode "text=$MSG"

        if [ "$STATUS" = "success" ] && [ "${{ github.event.inputs.send_deb }}" = "true" ]; then
          find output -name "*.deb" | while read f; do
            curl -s -F "chat_id=$TO" -F "document=@$f" -F "caption=🧿 $(basename "$f")" \
              "https://api.telegram.org/bot$TOKEN/sendDocument"
          done
        fi
