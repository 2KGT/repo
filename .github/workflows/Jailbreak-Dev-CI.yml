name: 👑 Jailbreak Ultimate CI

on:
  workflow_dispatch:
    inputs:
      apps:
        description: "Danh sách IPA (phân cách dấu phẩy)"
        default: "Facebook,TikTok"
      tweaks:
        description: "Danh sách tweak"
        default: "AutoAC,AutoDL"
      cert_mode:
        type: choice
        options: [auto, manual]
        default: auto
      cert_name:
        description: "Tên cert nếu manual"
        required: false

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        app: ${{ fromJson(format('["{0}"]', join(split(github.event.inputs.apps, ','), '","'))) }}
        tweak: ${{ fromJson(format('["{0}"]', join(split(github.event.inputs.tweaks, ','), '","'))) }}

    steps:
      - uses: actions/checkout@v4

      # ⚡ Cache
      - uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}
          key: theos-${{ runner.os }}

      # 🛠 Setup
      - name: Setup
        run: |
          set -e
          brew install ldid dpkg unzip wget
          git clone --recursive https://github.com/theos/theos.git $THEOS || true

      # 🔨 Build tweak
      - name: Build tweak
        run: |
          set -e
          export THEOS=$THEOS
          make -C src/build-tweaks/${{ matrix.tweak }} package

          mkdir inject
          find src/build-tweaks/${{ matrix.tweak }}/.theos -name "*.dylib" -exec cp {} inject/ \;

      # 📲 Load IPA
      - name: Load IPA
        run: |
          set -e
          if [ -f "src/ipa/${{ matrix.app }}.ipa" ]; then
            cp src/ipa/${{ matrix.app }}.ipa app.ipa
          else
            echo "❌ IPA not found"
            exit 1
          fi

      # 📦 Unpack
      - run: unzip -q app.ipa -d work

      # 🧬 Inject
      - name: Inject tweak
        run: |
          set -e
          APP=$(find work/Payload -name "*.app" | head -n1)
          BIN=$(defaults read "$APP/Info.plist" CFBundleExecutable)

          insert_dylib --strip-codesig --all-yes inject/*.dylib "$APP/$BIN"

      # 🔐 Load cert
      - name: Load cert
        run: |
          set -e
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain

          echo "${{ secrets.CERT_P12 }}" | base64 -d > cert.p12
          echo "${{ secrets.PROFILE }}" | base64 -d > profile.mobileprovision

          security import cert.p12 -P "${{ secrets.CERT_PASS }}" -k build.keychain -T /usr/bin/codesign

      # 🔍 Detect / manual cert
      - name: Select cert
        id: cert
        run: |
          if [ "${{ github.event.inputs.cert_mode }}" = "manual" ]; then
            echo "CERT=${{ github.event.inputs.cert_name }}" >> $GITHUB_ENV
          else
            CERT=$(security find-identity -v -p codesigning | head -n1 | awk '{print $2}')
            echo "CERT=$CERT" >> $GITHUB_ENV
          fi

      # ✍️ Sign
      - name: Sign app
        run: |
          APP=$(find work/Payload -name "*.app" | head -n1)
          cp profile.mobileprovision "$APP/embedded.mobileprovision"

          codesign -f -s "$CERT" "$APP"

      # 📦 Repack
      - name: Pack IPA
        run: |
          cd work
          zip -qr ../${{ matrix.app }}-${{ matrix.tweak }}.ipa Payload

      # 🌐 Manifest (install link)
      - name: Create manifest
        run: |
          IPA_NAME="${{ matrix.app }}-${{ matrix.tweak }}.ipa"

          cat > manifest.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <items>
              <dict>
                <assets>
                  <array>
                    <dict>
                      <key>kind</key>
                      <string>software-package</string>
                      <key>url</key>
                      <string>https://yourdomain.com/$IPA_NAME</string>
                    </dict>
                  </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>com.example.app</string>
                  <key>bundle-version</key>
                  <string>1.0</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>$IPA_NAME</string>
                </dict>
              </dict>
            </items>
          </dict>
          </plist>
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ matrix.tweak }}
          path: |
            *.ipa
            manifest.plist

      # 📊 Dashboard
      - name: Summary
        run: |
          echo "## 📱 INSTALL READY" >> $GITHUB_STEP_SUMMARY
          echo "- App: ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tweak: ${{ matrix.tweak }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cert: $CERT" >> $GITHUB_STEP_SUMMARY