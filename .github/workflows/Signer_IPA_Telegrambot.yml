name: Sign IPA and Manage Certs

on:
  repository_dispatch:
    types: [sign_ipa, check_cert]

jobs:
  process_request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Folders and Save Certificate
        run: |
          # 1. Định nghĩa đường dẫn dựa trên telegram_id từ client_payload
          USER_ID="${{ github.event.client_payload.telegram_id }}"
          CERT_DIR="private/certs/$USER_ID"
          TEMP_DIR="temp/signed_files"

          # 2. Tạo thư mục nếu chưa tồn tại
          mkdir -p "$CERT_DIR"
          mkdir -p "$TEMP_DIR"

          # 3. Tải file p12 về thư mục riêng tư (nếu là lệnh ký/kiểm tra)
          # Lưu ý: File p12 này sẽ được lưu vào repo của bạn
          curl -L "${{ github.event.client_payload.p12_url }}" -o "$CERT_DIR/certificate.p12"
          
          # 4. Thực hiện logic ký IPA (Giả định bạn đã có script sign.sh)
          # ./scripts/sign.sh --input "${{ github.event.client_payload.ipa_url }}" --cert "$CERT_DIR/certificate.p12" --pass "${{ github.event.client_payload.password }}" --output "$TEMP_DIR/signed.ipa"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "2KGT-Bot"
          git config --global user.email "bot@2kgt.io"
          git add private/certs/
          git commit -m "Automated: Save cert for user ${{ github.event.client_payload.telegram_id }}"
          git push
