name: 2KGT Sign & Manage Certs

on:
  repository_dispatch:
    types: [sign_ipa, check_cert]

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Variables
        run: |
          USER_ID="${{ github.event.client_payload.telegram_id }}"
          echo "CERT_PATH=private/certs/$USER_ID" >> $GITHUB_ENV
          mkdir -p "private/certs/$USER_ID"
          mkdir -p "temp/output"

      - name: Download Cert
        run: |
          curl -L "${{ github.event.client_payload.p12_url }}" -o "$CERT_PATH/certificate.p12"

      - name: Process Sign
        if: github.event.action == 'sign_ipa'
        run: |
          curl -L "${{ github.event.client_payload.ipa_url }}" -o "temp/input.ipa"
          # Lệnh ký (Ví dụ dùng zsign)
          # zsign -k "$CERT_PATH/certificate.p12" -p "${{ github.event.client_payload.password }}" -o "temp/output/signed.ipa" "temp/input.ipa"

      - name: Save Cert to Private Folder
        run: |
          git config --global user.name "2KGT-Bot"
          git config --global user.email "bot@2kgt.io"
          git add private/certs/
          git commit -m "Update cert for $USER_ID" || echo "No changes"
          git push

      - name: Upload Artifact (24h)
        if: github.event.action == 'sign_ipa'
        uses: actions/upload-artifact@v4
        with:
          name: Signed_IPA_${{ github.event.client_payload.telegram_id }}
          path: temp/output/*.ipa
          retention-days: 1
