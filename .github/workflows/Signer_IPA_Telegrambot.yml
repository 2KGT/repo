name: IPA Signer Pro
on:
  repository_dispatch:
    types: [check_cert] # Worker sẽ gọi lệnh này

jobs:
  sign_ipa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cài đặt Zsign (Bộ công cụ ký)
        run: |
          git clone https://github.com/zhlynn/zsign.git
          cd zsign && g++ *.cpp -lcrypto -O3 -o zsign
          sudo cp zsign /usr/local/bin/

      - name: Tải tệp cần thiết
        run: |
          curl -L "${{ github.event.client_payload.file_url }}" -o cert.p12
          # Ở bước này, bạn cần bổ sung logic tải file .mobileprovision và .ipa từ người dùng

      - name: Thực hiện ký IPA
        run: |
          # Lệnh ký cơ bản
          zsign -k cert.p12 -p "${{ github.event.client_payload.password }}" -m embedded.mobileprovision -o signed.ipa input.ipa

      - name: Tạo Link cài đặt trực tiếp (OTA)
        run: |
          # Bước này sẽ upload signed.ipa lên một dịch vụ lưu trữ và trả về link itms-services
          # Ví dụ: dùng transfer.sh để lấy link nhanh
          LINK=$(curl --upload-file ./signed.ipa https://transfer.sh/signed.ipa)
          echo "SIGNED_URL=$LINK" >> $GITHUB_ENV

      - name: Phản hồi về Telegram
        run: |
          MSG="✅ Ký thành công!%n🚀 Cài đặt tại đây: itms-services://?action=download-manifest&url=YOUR_PLIST_URL"
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ github.event.client_payload.chat_id }} \
            -d text="$MSG"
