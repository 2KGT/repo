name: 🤖 Telegram Remote Sync

on:
  repository_dispatch:
    types: [telegram_cmd] # Lắng nghe tín hiệu từ Pipedream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Xử lý File từ Telegram
        run: |
          # Lấy dữ liệu từ tín hiệu Pipedream gửi sang
          FILE_URL="${{ github.event.client_payload.file_url }}"
          FILE_TYPE="${{ github.event.client_payload.file_type }}"
          PROJECT="${{ github.event.client_payload.project }}"
          
          mkdir -p depictions/icons depictions/videos debs
          
          case "$FILE_TYPE" in
            "icon")
              curl -L "$FILE_URL" -o "depictions/icons/${PROJECT}.png"
              MSG="🖼️ Cập nhật Icon cho $PROJECT"
              ;;
            "video")
              curl -L "$FILE_URL" -o "depictions/videos/${PROJECT}.mp4"
              MSG="🎥 Cập nhật Video cho $PROJECT"
              ;;
            "deb")
              curl -L "$FILE_URL" -o "debs/${PROJECT}.deb"
              MSG="📦 Cập nhật file DEB cho $PROJECT"
              # Sau đó chạy tiếp lệnh dpkg-scanpackages nếu cần...
              ;;
          esac
          
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"
          git add .
          git commit -m "$MSG"
          git push origin main
