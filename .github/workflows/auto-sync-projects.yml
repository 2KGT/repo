name: Auto Sync Projects
on:
  push:
    paths:
      - 'src/build-tweaks/**/control'
  workflow_dispatch:
jobs:
  sync-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Update Menu Build
        run: |
          cat << 'EOF' > sync_menu.py
          import os, glob, re
          names = ["(none)"]
          for path in glob.glob('src/build-tweaks/*/control'):
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      for line in f:
                          if line.startswith('Name:'):
                              n = line.split(':', 1)[1].strip()
                              if n: names.append(n)
              except: continue
          names.sort(key=lambda x: (x != "(none)", x.lower()))
          yml = '.github/workflows/build-tweaks.yml'
          if os.path.exists(yml):
              with open(yml, 'r', encoding='utf-8') as f: content = f.read()
              opts = "\n".join([f"          - '{n}'" for n in names])
              new_content = re.sub(r'(# OPTIONS-START\n).*?(\n[ \t]*# OPTIONS-END)', f'\\1{opts}\\2', content, flags=re.DOTALL)
              with open(yml, 'w', encoding='utf-8') as f: f.write(new_content)
          EOF
          python3 sync_menu.py
      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-tweaks.yml
          git diff --cached --quiet || (git commit -m "chore: sync build menu" && git push)
