name: Auto Sync Projects

on:
  push:
    paths:
      - 'src/build-tweaks/**/control'
  workflow_dispatch:

jobs:
  sync-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Cập nhật Menu Build
        run: |
          cat << 'EOF' > sync_menu.py
          import os, glob, re

          # 1. Tìm tên dự án (Chỉ trong vùng cấm build-tweaks)
          names = ["(none)"]
          for f in glob.glob('src/build-tweaks/*/control'):
              try:
                  with open(f, 'r') as file:
                      for line in file:
                          if line.startswith('Name:'):
                              n = line.split(':', 1)[1].strip()
                              if n: names.append(n)
              except: continue

          names.sort(key=lambda x: (x != "(none)", x.lower()))

          # 2. Ghi đè vào file build-tweaks.yml
          yml_path = '.github/workflows/build-tweaks.yml'
          if os.path.exists(yml_path):
              with open(yml_path, 'r') as f: content = f.read()
              
              opts = "\n".join([f"          - '{n}'" for n in names])
              # Vẫn dùng Marker ở đây để robot biết chỗ dán vào file YML cho đúng
              new_content = re.sub(r'(# OPTIONS-START\n).*?(\n[ \t]*# OPTIONS-END)', f'\\1{opts}\\2', content, flags=re.DOTALL)
              
              with open(yml_path, 'w') as f: f.write(new_content)
          EOF
          python3 sync_menu.py

      - name: 🚀 Push Menu mới
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-tweaks.yml
          git diff --staged --quiet || (git commit -m "chore: sync build menu" && git push)
