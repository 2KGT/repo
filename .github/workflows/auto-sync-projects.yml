name: Auto Sync Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/build-tweaks/**/control'
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Options & Documents
        run: |
          echo "🔄 Đang quét dự án & tạo tài liệu..."

          # Tạo Markdown
          cat > PROJECTS.md << 'EOF'
          # 📦 Danh sách Dự án Tweak
          > Cập nhật tự động lúc: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          | Tên Dự án | Phiên bản | Trạng thái | Thư mục nguồn |
          |-----------|-----------|------------|---------------|
          EOF

          echo "[" > PROJECTS.json

          # Tạo danh sách options với indentation chính xác (2 spaces)
          > new_opts.txt
          COUNT=0

          find src/build-tweaks -name control -print0 | sort -z | while IFS= read -r -d '' filepath; do
            dir=$(dirname "$filepath")
            NAME=$(awk -F': ' '/^Name:/ {print $2}' "$filepath" | xargs)
            VER=$(awk -F': ' '/^Version:/ {print $2}' "$filepath" | xargs)
            REPO_URL="https://github.com/${{ github.repository }}/tree/main/$dir"

            if [ -n "$NAME" ]; then
              # Ghi options với 2 spaces indent (chuẩn cho YAML list)
              echo "        - $NAME" >> new_opts.txt

              # Ghi JSON
              if [ $COUNT -gt 0 ]; then
                echo "," >> PROJECTS.json
              fi
              echo "{\"name\":\"$NAME\",\"version\":\"$VER\",\"url\":\"$REPO_URL\"}" >> PROJECTS.json

              # Ghi Markdown
              echo "| $NAME | $VER | ✅ Active | [📁 Xem]($REPO_URL) |" >> PROJECTS.md

              COUNT=$((COUNT + 1))
            fi
          done

          echo "]" >> PROJECTS.json
          echo "✅ Tìm thấy $COUNT dự án."
        shell: bash

      - name: Update Target Workflow (build-tweaks.yml)
        run: |
          cat << 'EOF' > update_yaml.py
          import re
          import os

          path = '.github/workflows/build-tweaks.yml'
          if not os.path.exists(path):
              print(f"⚠️ Không tìm thấy {path}")
              exit(0)

          with open('new_opts.txt', 'r', encoding='utf-8') as f:
              new_opts = f.read().rstrip()

          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()

          # Regex mạnh hơn: tìm "options:" theo sau là list, dừng trước "jobs:"
          # Hỗ trợ indentation linh hoạt (2 hoặc 4 spaces phổ biến)
          pattern = r'(?P<indent>^\s*options:)\s*\n(?P<content>(\s*-\s+.+\n)*?)(?=\n\s*jobs:|\Z)'
          match = re.search(pattern, content, flags=re.MULTILINE | re.DOTALL)

          if match:
              current_content = match.group('content').rstrip()
              indent = match.group('indent')

              if current_content.strip() != new_opts.strip():
                  print("🔄 Options thay đổi → Cập nhật workflow...")
                  replacement = f"{indent}\n{new_opts}"
                  new_content = re.sub(pattern, replacement, content, flags=re.MULTILINE | re.DOTALL)

                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print("✅ Đã ghi đè options thành công.")
              else:
                  print("✅ Options không thay đổi.")
          else:
              print("⚠️ Không tìm thấy block 'options:' trong build-tweaks.yml")
              print("   Kiểm tra xem file có dòng 'options:' không (thường nằm dưới inputs hoặc strategy).")
          EOF

          python3 update_yaml.py
          rm -f update_yaml.py new_opts.txt
        shell: bash

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/build-tweaks.yml PROJECTS.md PROJECTS.json

          if git diff --cached --quiet; then
            echo "✅ Không có thay đổi nào."
          else
            git commit -m "docs: auto sync projects and build options"
            git push
            echo "🚀 Đã commit & push thay đổi."
          fi