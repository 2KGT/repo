name: Auto Sync Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/build-tweaks/**/control'
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Options & Documents
        run: |
          echo "🔄 Đang quét tất cả control files..."

          cat > PROJECTS.md << 'EOF'
          # 📦 Danh sách Dự án Tweak
          > Cập nhật tự động lúc: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          | Tên Dự án | Phiên bản | Trạng thái | Thư mục nguồn |
          |-----------|-----------|------------|---------------|
          EOF

          echo "[" > PROJECTS.json
          > new_opts.txt
          echo "          - (none)" >> new_opts.txt   # thêm option mặc định

          COUNT=0

          find src/build-tweaks -name control -print0 | sort -z | while IFS= read -r -d '' filepath; do
            dir=$(dirname "$filepath")
            NAME=$(awk -F': ' '/^Name:/ {print $2}' "$filepath" | xargs)
            VER=$(awk -F': ' '/^Version:/ {print $2}' "$filepath" | xargs)
            REPO_URL="https://github.com/${{ github.repository }}/tree/main/$dir"

            if [ -n "$NAME" ]; then
              echo "          - $NAME" >> new_opts.txt

              if [ $COUNT -gt 0 ]; then
                echo "," >> PROJECTS.json
              fi
              echo "{\"name\":\"$NAME\",\"version\":\"$VER\",\"url\":\"$REPO_URL\"}" >> PROJECTS.json

              echo "| $NAME | $VER | ✅ Active | [📁 Xem]($REPO_URL) |" >> PROJECTS.md

              COUNT=$((COUNT + 1))
            fi
          done

          echo "]" >> PROJECTS.json
          echo "✅ Đã tìm thấy $COUNT dự án."
        shell: bash

      - name: Update options in build-tweaks.yml
        run: |
          cat > /tmp/update.py << 'EOF'
import re

with open('new_opts.txt', encoding='utf-8') as f:
    new_opts = f.read().rstrip()

with open('.github/workflows/build-tweaks.yml', encoding='utf-8') as f:
    content = f.read()

# Regex khớp block options
pattern = r'(^\s*options:\s*\n)((?:\s*-\s+.+\n)*)'

match = re.search(pattern, content, re.MULTILINE)
if match:
    indent_block = match.group(1)
    current = match.group(2).rstrip()

    if current != new_opts:
        print("🔄 Cập nhật options...")
        new_content = re.sub(pattern, indent_block + new_opts + '\n', content, flags=re.MULTILINE)
        with open('.github/workflows/build-tweaks.yml', 'w', encoding='utf-8') as f:
            f.write(new_content)
        print("✅ Cập nhật thành công!")
    else:
        print("✅ Options không thay đổi")
else:
    print("❌ Không tìm thấy block 'options:'")
EOF

          python3 /tmp/update.py
          rm -f /tmp/update.py new_opts.txt
        shell: bash

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/build-tweaks.yml PROJECTS.md PROJECTS.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ Không có thay đổi"
          else
            git commit -m "docs: auto sync projects and build options"
            git push
            echo "🚀 Đã push thay đổi"
          fi
