name: Auto Sync Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/build-tweaks/**/control'
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Detect & Sync All Projects
        run: |
          echo "🔄 Đang quét danh sách dự án..."
          
          # 1. Quét dự án từ thư mục src/build-tweaks/
          PROJECT_LIST=()
          for dir in src/build-tweaks/*/; do
            if [ -f "$dir/control" ]; then
              NAME=$(grep "^Name:" "$dir/control" | head -n 1 | cut -d' ' -f2- | xargs)
              if [ -n "$NAME" ]; then
                PROJECT_LIST+=("$NAME")
              fi
            fi
          done

          # Sắp xếp danh sách theo bảng chữ cái
          IFS=$'\n' SORTED=($(sort <<<"${PROJECT_LIST[*]}"))
          unset IFS
          echo "📋 Phát hiện: ${SORTED[*]}"

          # 2. Tạo nội dung options mới vào file tạm
          echo "        options:" > new_opts.txt
          for proj in "${SORTED[@]}"; do
            echo "          - $proj" >> new_opts.txt
          done

          # 3. Sử dụng Python để ghi đè file workflow an toàn
          python3 -c "
          import re, os
          workflow_path = '.github/workflows/build-tweaks.yml'
          if not os.path.exists(workflow_path):
              print(f'❌ Không tìm thấy {workflow_path}')
              exit(0)

          with open(workflow_path, 'r', encoding='utf-8') as f:
              content = f.read()
          
          with open('new_opts.txt', 'r', encoding='utf-8') as f:
              new_opts = f.read().strip()
          
          # Regex tìm block từ 'options:' đến 'jobs:' (giữ nguyên thụt lề 8 space cho options)
          pattern = re.compile(r'( {8}options:).*?(\n {6}jobs:)', re.DOTALL)
          
          if pattern.search(content):
              updated_content = pattern.sub(f'\\1\n{new_opts}\\2', content)
              with open(workflow_path, 'w', encoding='utf-8') as f:
                  f.write(updated_content)
              print('✅ Đã cập nhật options trong build-tweaks.yml')
          else:
              print('⚠️ Cảnh báo: Không tìm thấy block options: phù hợp trong build-tweaks.yml')
          "

          # 4. Cập nhật PROJECTS.md & PROJECTS.json
          cat > PROJECTS.md << EOF
          # 📦 Danh sách Dự án Tweak
          > Cập nhật tự động lúc: \$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          | Tên Dự án | Phiên bản | Trạng thái | Thư mục nguồn |
          |-----------|-----------|------------|---------------|
          EOF

          echo "[" > PROJECTS.json
          COUNT=0
          for dir in src/build-tweaks/*/; do
            if [ -f "$dir/control" ]; then
              NAME=$(grep "^Name:" "$dir/control" | head -n 1 | cut -d' ' -f2- | xargs)
              VER=$(grep "^Version:" "$dir/control" | head -n 1 | cut -d' ' -f2- | xargs)
              REPO_URL="https://github.com/\${{ github.repository }}/tree/main/$dir"
              
              [ \$COUNT -gt 0 ] && echo "," >> PROJECTS.json
              echo "{\"name\":\"$NAME\",\"version\":\"$VER\",\"url\":\"$REPO_URL\"}" >> PROJECTS.json
              echo "| $NAME | $VER | ✅ Active | [📁 Xem]($REPO_URL) |" >> PROJECTS.md
              COUNT=\$((COUNT + 1))
            fi
          done
          echo "]" >> PROJECTS.json
          rm new_opts.txt

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/workflows/build-tweaks.yml PROJECTS.md PROJECTS.json
          
          if git diff --cached --quiet; then
            echo "Nothings to commit"
          else
            git commit -m "docs: auto update project lists and build options"
            git push origin main
          fi
