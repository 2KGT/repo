name: Auto Sync Projects

on:
  push:
    paths:
      - 'src/build-tweaks/**/control' # Trigger khi có thay đổi trong các file control
  workflow_dispatch: # Cho phép bấm chạy thủ công
  schedule:
    - cron: '0 0 * * *' # Tự động chạy vào nửa đêm mỗi ngày (UTC)

jobs:
  sync-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền write để Action có thể commit và push

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Kéo toàn bộ lịch sử để dễ dàng push

      - name: 🐍 Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Chạy Script xử lý dữ liệu và cập nhật file
        run: |
          cat << 'EOF' > sync_projects.py
          import os
          import glob
          import json
          import re

          # 1. Quét danh sách project từ thư mục build-tweaks
          projects = []
          for path in glob.glob('src/build-tweaks/**/control', recursive=True):
              name, version = None, 'Unknown'
              with open(path, 'r', encoding='utf-8') as f:
                  for line in f:
                      if line.startswith('Name:'):
                          name = line.split(':', 1)[1].strip()
                      elif line.startswith('Version:'):
                          version = line.split(':', 1)[1].strip()
              
              if name:
                  dir_path = os.path.dirname(path)
                  projects.append({'name': name, 'version': version, 'path': dir_path})

          # Sắp xếp project theo alphabet
          projects.sort(key=lambda x: x['name'].lower())

          # 2. Sinh danh sách options (luôn có (none) ở đầu)
          options = ['(none)'] + [p['name'] for p in projects]

          # Ghi ra file new_opts.txt
          with open('new_opts.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(options))

          # 3. Ghi file PROJECTS.json
          with open('PROJECTS.json', 'w', encoding='utf-8') as f:
              json.dump(projects, f, indent=2, ensure_ascii=False)

          # 4. Sinh bảng Markdown và cập nhật README.md
          md_lines = ["| Tên Project | Phiên bản | Đường dẫn |", "|---|---|---|"]
          for p in projects:
              md_lines.append(f"| **{p['name']}** | `{p['version']}` | `{p['path']}` |")
          md_table = '\n'.join(md_lines)

          readme_path = 'README.md'
          if os.path.exists(readme_path):
              with open(readme_path, 'r', encoding='utf-8') as f:
                  readme = f.read()

              # Thay thế nội dung nằm giữa và readme = re.sub(
                  r'(\n).*?(\n)',
                  f'\\g<1>{md_table}\\g<2>',
                  readme,
                  flags=re.DOTALL
              )
              with open(readme_path, 'w', encoding='utf-8') as f:
                  f.write(readme)

          # 5. Cập nhật workflow khung (build-tweaks.yml)
          target_yml = '.github/workflows/build-tweaks.yml'
          if os.path.exists(target_yml):
              with open(target_yml, 'r', encoding='utf-8') as f:
                  workflow = f.read()

              # Tự động nhận diện khoảng trắng thụt lề từ marker
              match = re.search(r'([ \t]*)# OPTIONS-START', workflow)
              indent = match.group(1) if match else '          '

              # Format thành mảng YAML: - 'Tên project'
              yml_options = '\n'.join([f"{indent}- '{opt}'" for opt in options])

              # Thay thế nội dung options nằm giữa 2 marker
              new_workflow = re.sub(
                  r'([ \t]*# OPTIONS-START\n).*?(\n[ \t]*# OPTIONS-END)',
                  f'\\g<1>{yml_options}\\g<2>',
                  workflow,
                  flags=re.DOTALL
              )

              if workflow != new_workflow:
                  with open(target_yml, 'w', encoding='utf-8') as f:
                      f.write(new_workflow)
                  print("✅ Đã cập nhật options trong build-tweaks.yml")
              else:
                  print("ℹ️ Options không đổi, giữ nguyên build-tweaks.yml")

          EOF
          python sync_projects.py
          rm sync_projects.py # Dọn dẹp script sau khi chạy xong

      - name: 🚀 Commit & Push (Chỉ khi có thay đổi)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Chỉ add các file thực sự tham gia vào quá trình này
          git add PROJECTS.json new_opts.txt README.md .github/workflows/build-tweaks.yml

          # git diff-index sẽ trả về true (thoát code 0) nếu KHÔNG có thay đổi nào.
          if git diff-index --quiet HEAD --; then
            echo "🟢 Dữ liệu không có sự khác biệt. Bỏ qua commit."
          else
            git commit -m "chore: auto-sync project lists, options, and markdown files"
            git push
            echo "✅ Đã push thay đổi mới lên repo thành công!"
          fi
