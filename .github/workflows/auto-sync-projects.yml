name: Auto Sync Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/build-tweaks/**/control'
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Options & Documents
        run: |
          echo "🔄 Đang quét tất cả control files..."

          # Tạo PROJECTS.md
          cat > PROJECTS.md << 'EOF'
          # 📦 Danh sách Dự án Tweak
          > Cập nhật tự động lúc: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          | Tên Dự án | Phiên bản | Trạng thái | Thư mục nguồn |
          |-----------|-----------|------------|---------------|
          EOF

          echo "[" > PROJECTS.json
          > new_opts.txt
          COUNT=0

          find src/build-tweaks -name control -print0 | sort -z | while IFS= read -r -d '' filepath; do
            dir=$(dirname "$filepath")
            NAME=$(awk -F': ' '/^Name:/ {print $2}' "$filepath" | xargs)
            VER=$(awk -F': ' '/^Version:/ {print $2}' "$filepath" | xargs)
            REPO_URL="https://github.com/${{ github.repository }}/tree/main/$dir"

            if [ -n "$NAME" ]; then
              echo "        - $NAME" >> new_opts.txt

              if [ $COUNT -gt 0 ]; then
                echo "," >> PROJECTS.json
              fi
              echo "{\"name\":\"$NAME\",\"version\":\"$VER\",\"url\":\"$REPO_URL\"}" >> PROJECTS.json

              echo "| $NAME | $VER | ✅ Active | [📁 Xem]($REPO_URL) |" >> PROJECTS.md

              COUNT=$((COUNT + 1))
            fi
          done

          echo "]" >> PROJECTS.json
          echo "✅ Đã tìm thấy $COUNT dự án."
        shell: bash

      - name: Update options in build-tweaks.yml
        run: |
          cat << 'EOF' > update_yaml.py
          import re
          import os

          path = '.github/workflows/build-tweaks.yml'
          if not os.path.exists(path):
              print(f"❌ Không tìm thấy {path}")
              exit(1)

          with open('new_opts.txt', 'r', encoding='utf-8') as f:
              new_options = f.read().rstrip()

          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()

          # Regex chuyên biệt cho trường hợp options nằm trong workflow_dispatch.inputs.project
          # Tìm đúng block options: và thay thế toàn bộ list bên dưới nó
          pattern = r'(?P<indent>^\s{8}options:)\s*\n(?P<list>(\s{10}-\s+.+\n)*)'

          match = re.search(pattern, content, flags=re.MULTILINE)

          if match:
              current_list = match.group('list').rstrip()
              indent = match.group('indent')

              if current_list.strip() != new_options.strip():
                  print("🔄 Phát hiện thay đổi options → Đang cập nhật...")
                  replacement = f"{indent}\n{new_options}"
                  new_content = re.sub(pattern, replacement, content, flags=re.MULTILINE)

                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print("✅ Đã cập nhật thành công danh sách options!")
              else:
                  print("✅ Danh sách options không thay đổi.")
          else:
              print("❌ Không tìm thấy block 'options:' với indentation đúng.")
              print("   Kiểm tra lại file build-tweaks.yml xem options có đúng 8 spaces không.")
          EOF

          python3 update_yaml.py
          rm -f update_yaml.py new_opts.txt
        shell: bash

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/build-tweaks.yml PROJECTS.md PROJECTS.json

          if git diff --cached --quiet; then
            echo "✅ Không có thay đổi nào cần commit."
          else
            git commit -m "docs: auto sync projects and build options"
            git push
            echo "🚀 Đã commit & push thành công."
          fi