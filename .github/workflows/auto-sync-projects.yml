name: Auto Sync Projects

on:
  push:
    paths:
      - 'src/build-tweaks/**/control'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Chạy Script xử lý dữ liệu và cập nhật file
        run: |
          cat << 'EOF' > sync_projects.py
          import os
          import glob
          import json
          import re

          # 1. Quét danh sách project
          projects = []
          for path in glob.glob('src/build-tweaks/**/control', recursive=True):
              name, version = None, 'Unknown'
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      for line in f:
                          if line.startswith('Name:'):
                              name = line.split(':', 1)[1].strip()
                          elif line.startswith('Version:'):
                              version = line.split(':', 1)[1].strip()
              except Exception as e:
                  print(f"Lỗi đọc file {path}: {e}")
              
              if name:
                  dir_path = os.path.dirname(path)
                  projects.append({'name': name, 'version': version, 'path': dir_path})

          projects.sort(key=lambda x: x['name'].lower())
          options = ['(none)'] + [p['name'] for p in projects]

          # 2. Ghi file JSON và TXT
          with open('PROJECTS.json', 'w', encoding='utf-8') as f:
              json.dump(projects, f, indent=2, ensure_ascii=False)
          
          with open('new_opts.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(options))

          # 3. Cập nhật README.md (Sửa lỗi Syntax tại đây)
          md_table = "| Tên Project | Phiên bản | Đường dẫn |\n|---|---|---|\n"
          for p in projects:
              md_table += f"| **{p['name']}** | `{p['version']}` | `{p['path']}` |\n"

          readme_path = 'README.md'
          if os.path.exists(readme_path):
              with open(readme_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Tìm và thay thế nội dung giữa 2 thẻ Marker
              pattern_md = r'().*?()'
              if re.search(pattern_md, content, flags=re.DOTALL):
                  new_content = re.sub(pattern_md, f'\\1\n{md_table}\\2', content, flags=re.DOTALL)
                  with open(readme_path, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print("✅ Đã cập nhật README.md")

          # 4. Cập nhật build-tweaks.yml
          target_yml = '.github/workflows/build-tweaks.yml'
          if os.path.exists(target_yml):
              with open(target_yml, 'r', encoding='utf-8') as f:
                  yml_content = f.read()

              match = re.search(r'([ \t]*)# OPTIONS-START', yml_content)
              indent = match.group(1) if match else '          '
              yml_opts_str = '\n'.join([f"{indent}- '{opt}'" for opt in options])

              pattern_yml = r'(# OPTIONS-START\n).*?(\n[ \t]*# OPTIONS-END)'
              new_yml = re.sub(pattern_yml, f'\\1{yml_opts_str}\\2', yml_content, flags=re.DOTALL)
              
              with open(target_yml, 'w', encoding='utf-8') as f:
                  f.write(new_yml)
              print("✅ Đã cập nhật build-tweaks.yml")

          EOF
          python sync_projects.py
          rm sync_projects.py

      - name: 🚀 Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add PROJECTS.json new_opts.txt README.md .github/workflows/build-tweaks.yml
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync projects data"
            git push
          fi
