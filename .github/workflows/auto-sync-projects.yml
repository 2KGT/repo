name: Auto Sync Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/build-tweaks/**/control'
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Options & Documents
        run: |
          echo "🔄 Đang quét dự án & tạo tài liệu..."
          
          # Khởi tạo file Markdown & JSON
          cat > PROJECTS.md << EOF
          # 📦 Danh sách Dự án Tweak
          > Cập nhật tự động lúc: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          | Tên Dự án | Phiên bản | Trạng thái | Thư mục nguồn |
          |-----------|-----------|------------|---------------|
          EOF
          
          echo "[" > PROJECTS.json
          > new_opts.txt
          COUNT=0
          
          # Quét tất cả file control, thu thập dữ liệu và sắp xếp
          find src/build-tweaks -name control | sort | while read -r filepath; do
            dir=$(dirname "$filepath")
            NAME=$(awk -F': ' '/^Name:/ {print $2}' "$filepath" | xargs)
            VER=$(awk -F': ' '/^Version:/ {print $2}' "$filepath" | xargs)
            REPO_URL="https://github.com/${{ github.repository }}/tree/main/$dir"
            
            # Ghi vào new_opts.txt (10 spaces indent)
            [ -n "$NAME" ] && echo "          - $NAME" >> new_opts.txt
            
            # Ghi vào JSON
            [ $COUNT -gt 0 ] && echo "," >> PROJECTS.json
            echo "{\"name\":\"$NAME\",\"version\":\"$VER\",\"url\":\"$REPO_URL\"}" >> PROJECTS.json
            
            # Ghi vào Markdown
            echo "| $NAME | $VER | ✅ Active | [📁 Xem]($REPO_URL) |" >> PROJECTS.md
            
            COUNT=$((COUNT + 1))
          done
          
          echo "]" >> PROJECTS.json

      - name: Update Target Workflow
        run: |
          cat << 'EOF' > update_yaml.py
          import re, os

          path = '.github/workflows/build-tweaks.yml'
          if not os.path.exists(path):
              print(f"⚠️ Cảnh báo: Không tìm thấy {path}")
              exit(0)

          with open('new_opts.txt', 'r') as f:
              new_opts = f.read().rstrip()
              
          with open(path, 'r') as f:
              content = f.read()

          # Đã fix Regex: (?=\n *jobs:) để bỏ qua mọi lỗi thụt lề của chữ jobs:
          pattern = r'( {8}options:\n)(.*?)(?=\n *jobs:)'
          match = re.search(pattern, content, flags=re.DOTALL)

          if match:
              current_opts = match.group(2).rstrip()
              if current_opts != new_opts:
                  print("🔄 Options thay đổi, tiến hành cập nhật...")
                  new_content = re.sub(pattern, f"\\1{new_opts}", content, flags=re.DOTALL)
                  with open(path, 'w') as f:
                      f.write(new_content)
              else:
                  print("✅ Options khớp, bỏ qua ghi đè YAML.")
          else:
              print("⚠️ Không tìm thấy block options: trong file YAML.")
          EOF

          python3 update_yaml.py
          rm update_yaml.py new_opts.txt

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-tweaks.yml PROJECTS.md PROJECTS.json
          git diff --cached --quiet || (git commit -m "docs: auto sync projects and build options" && git push)
