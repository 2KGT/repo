name: Auto Sync Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/build-tweaks/**/control'
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Options & Documents
        run: |
          echo "🔄 Đang quét tất cả control files..."

          cat > README.md << 'EOF'
<p align="center">
  <img src="https://2kgt.github.io/repo/CydiaIcon.png" width="120" height="120" alt="Kyic Repository">
</p>

<div align="center" style="margin: 20px 0 40px 0;">
  <a href="https://2kgt.github.io/repo/">
    <img src="https://img.shields.io/badge/ADD_SOURCE-007AFF?style=for-the-badge&logo=apple&logoColor=white" alt="Add Source">
  </a>
</div>

<h1 align="center">Kyic Repository</h1>

<p align="center">
  Repo chuyên cung cấp tweak & IPA chất lượng cao cho iOS
</p>

---

## 📦 Danh sách Dự án Tweak
> Cập nhật tự động lúc: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

| Tên Dự án | Phiên bản | Trạng thái | Thư mục nguồn |
|-----------|-----------|------------|---------------|
| (none) | - | ⚠️ Default | - |
EOF

          echo "[" > PROJECTS.json
          > new_opts.txt
          echo "          - (none)" >> new_opts.txt   # thêm option mặc định

          COUNT=0

          find src/build-tweaks -name control -print0 | sort -z | while IFS= read -r -d '' filepath; do
            NAME=$(awk -F': ' '/^Name:/ {print $2}' "$filepath" | xargs)
            VER=$(awk -F': ' '/^Version:/ {print $2}' "$filepath" | xargs)

            if [ -n "$NAME" ]; then
              echo "          - $NAME" >> new_opts.txt

              if [ $COUNT -gt 0 ]; then
                echo "," >> PROJECTS.json
              fi
              echo "{\"name\":\"$NAME\",\"version\":\"$VER\",\"url\":\"https://github.com/${{ github.repository }}/tree/main/src/build-tweaks/$NAME\"}" >> PROJECTS.json

              echo "| $NAME | $VER | ✅ Active | [📁 Xem](https://github.com/${{ github.repository }}/tree/main/src/build-tweaks/$NAME) |" >> README.md

              COUNT=$((COUNT + 1))
            fi
          done

          echo "]" >> PROJECTS.json
          echo "✅ Đã tìm thấy $COUNT dự án."
        shell: bash

      - name: Update options in build-tweaks.yml
        run: |
          cat > /tmp/update.py << 'EOF'
import re

with open('new_opts.txt', encoding='utf-8') as f:
    new_opts = f.read().rstrip()

with open('.github/workflows/build-tweaks.yml', encoding='utf-8') as f:
    content = f.read()

# Regex khớp indent chính xác: 8 spaces cho options, 10 spaces cho item
pattern = r'(^ {8}options:\s*\n)((?: {10}- .+\n)*)'

match = re.search(pattern, content, re.MULTILINE)
if match:
    indent_block = match.group(1)
    current = match.group(2).rstrip()

    if current != new_opts:
        print("🔄 Cập nhật options...")
        new_content = re.sub(pattern, indent_block + new_opts + '\n', content, flags=re.MULTILINE)
        with open('.github/workflows/build-tweaks.yml', 'w', encoding='utf-8') as f:
            f.write(new_content)
        print("✅ Cập nhật thành công!")
    else:
        print("✅ Options không thay đổi")
else:
    print("❌ Không tìm thấy block 'options:'")
EOF

          python3 /tmp/update.py
          rm -f /tmp/update.py new_opts.txt
        shell: bash

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/build-tweaks.yml README.md PROJECTS.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "✅ Không có thay đổi"
          else
            git commit -m "docs: auto sync projects and build options"
            git push
            echo "🚀 Đã push thay đổi"
          fi