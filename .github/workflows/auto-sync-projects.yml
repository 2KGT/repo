      - name: Auto Detect & Sync All Projects
        run: |
          # 1. Thu thập dữ liệu bằng jq (Không bao giờ lỗi ký tự đặc biệt)
          PROJECTS_JSON="[]"
          for dir in src/build-tweaks/*/; do
            if [ -f "$dir/control" ]; then
              NAME=$(grep "^Name:" "$dir/control" | cut -d':' -f2- | xargs)
              VER=$(grep "^Version:" "$dir/control" | cut -d':' -f2- | xargs)
              URL="https://github.com/${{ github.repository }}/tree/main/$dir"
              PROJECTS_JSON=$(echo "$PROJECTS_JSON" | jq --arg n "$NAME" --arg v "$VER" --arg u "$URL" '. + [{name: $n, version: $v, url: $u}]')
            fi
          done
          echo "$PROJECTS_JSON" > PROJECTS.json

          # 2. Tạo PROJECTS.md
          echo -e "# 📦 Danh sách Dự án Tweak\n> Cập nhật: $(date -u)\n\n| Tên | Phiên bản | Link |\n|---|---|---|" > PROJECTS.md
          echo "$PROJECTS_JSON" | jq -r '.[] | "| \(.name) | \(.version) | [📁 Xem](\(.url)) |"' >> PROJECTS.md

          # 3. Cập nhật YAML (Regex linh hoạt, không phụ thuộc khoảng trắng)
          OPTS=$(echo "$PROJECTS_JSON" | jq -r '.[] | "          - \(.name)"')
          python3 -c "
          import re, os
          path = '.github/workflows/build-tweaks.yml'
          if os.path.exists(path):
              opts = '''$OPTS'''
              with open(path, 'r') as f: txt = f.read()
              # Tìm đoạn từ 'options:' đến chữ 'jobs:' gần nhất và thay thế
              txt = re.sub(r'(options:).*?(?=\n\s*jobs:)', r'\1\n' + opts, txt, flags=re.DOTALL)
              with open(path, 'w') as f: f.write(txt)
          "
