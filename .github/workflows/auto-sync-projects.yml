name: Auto Sync Projects

on:
  push:
    paths:
      - 'src/build-tweaks/**/control'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Chạy Script Bảng Tối Giản Xổ Xuống
        run: |
          cat << 'EOF' > sync_projects.py
          import os
          import glob
          import json
          import re

          # 1. Quét dự án
          projects = []
          for path in glob.glob('src/build-tweaks/**/control', recursive=True):
              name, version = None, '1.0.0'
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      for line in f:
                          if line.startswith('Name:'): name = line.split(':', 1)[1].strip()
                          if line.startswith('Version:'): version = line.split(':', 1)[1].strip()
              except: continue
              if name:
                  projects.append({'name': name, 'version': version, 'path': os.path.dirname(path)})

          projects.sort(key=lambda x: x['name'].lower())

          # 2. Tạo bảng tối giản
          md_table = "| Dự án | Phiên bản | Đường dẫn |\n|:---|:---:|:---:|\n"
          for p in projects:
              md_table += f"| **{p['name']}** | `{p['version']}` | [📂 Source]({p['path']}) |\n"

          # 3. Đưa bảng vào nút nhấn (Details)
          dashboard = f"<details>\n<summary><b>🚀 Xem danh sách dự án</b></summary>\n\n{md_table}\n</details>"

          # 4. Ghi file JSON
          with open('PROJECTS.json', 'w', encoding='utf-8') as f:
              json.dump(projects, f, indent=2, ensure_ascii=False)

          # 5. Cập nhật README.md (Dùng marker chính xác để tránh lặp)
          readme_path = 'README.md'
          if os.path.exists(readme_path):
              with open(readme_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              pattern = r'().*?()'
              if re.search(pattern, content, flags=re.DOTALL):
                  # Thay thế chính xác vùng giữa 2 marker
                  new_content = re.sub(pattern, f'\\1\n{dashboard}\n\\2', content, flags=re.DOTALL)
                  with open(readme_path, 'w', encoding='utf-8') as f:
                      f.write(new_content)

          # 6. Đồng bộ options Workflow Build
          target_yml = '.github/workflows/build-tweaks.yml'
          if os.path.exists(target_yml):
              options = ['(none)'] + [p['name'] for p in projects]
              with open(target_yml, 'r', encoding='utf-8') as f:
                  yml_content = f.read()
              match = re.search(r'([ \t]*)# OPTIONS-START', yml_content)
              indent = match.group(1) if match else '          '
              yml_opts_str = '\n'.join([f"{indent}- '{opt}'" for opt in options])
              pattern_yml = r'(# OPTIONS-START\n).*?(\n[ \t]*# OPTIONS-END)',
              # Chỉnh sửa nhẹ regex yml để an toàn hơn
              new_yml = re.sub(r'(# OPTIONS-START\n).*?(\n[ \t]*# OPTIONS-END)', f'\\1{yml_opts_str}\\2', yml_content, flags=re.DOTALL)
              with open(target_yml, 'w', encoding='utf-8') as f:
                  f.write(new_yml)
          EOF
          python sync_projects.py
          rm sync_projects.py

      - name: 🚀 Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add PROJECTS.json README.md .github/workflows/build-tweaks.yml
          if git diff-index --quiet HEAD --; then
            echo "No changes"
          else
            git commit -m "chore: fix duplicate and simplify dashboard"
            git push
          fi
