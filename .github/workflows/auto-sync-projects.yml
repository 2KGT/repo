name: Auto Sync Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/build-tweaks/**/control'

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Options
        run: |
          # 1. Quét danh sách projects
          PROJECTS=$(find src/build-tweaks -name control -exec awk -F': ' '/^Name:/ {print $2}' {} \; | sort)

          # 2. Ghi options ra file tạm (chuẩn 10 khoảng trắng thụt lề)
          > new_opts.txt
          while IFS= read -r p; do
            [ -n "$p" ] && echo "          - $p" >> new_opts.txt
          done <<< "$PROJECTS"

      - name: Update Target Workflow
        run: |
          cat << 'EOF' > update_yaml.py
          import re

          path = '.github/workflows/build-tweaks.yml'
          with open('new_opts.txt', 'r') as f:
              new_opts = f.read().rstrip()

          with open(path, 'r') as f:
              content = f.read()

          # Regex khớp block options (8 spaces indent) cho đến trước jobs: (2 spaces indent)
          pattern = r'( {8}options:\n)(.*?)(?=\n  jobs:)'
          match = re.search(pattern, content, flags=re.DOTALL)

          if match:
              current_opts = match.group(2).rstrip()
              if current_opts != new_opts:
                  print("Options khác biệt, tiến hành cập nhật...")
                  new_content = re.sub(pattern, f"\\1{new_opts}", content, flags=re.DOTALL)
                  with open(path, 'w') as f:
                      f.write(new_content)
              else:
                  print("Options khớp, bỏ qua cập nhật.")
          else:
              print("Không tìm thấy block options trong file YAML.")
          EOF

          python3 update_yaml.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-tweaks.yml
          git diff --cached --quiet || (git commit -m "docs: auto update options" && git push)
