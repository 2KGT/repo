name: Auto Sync Projects

on:
  push:
    paths:
      - 'src/**/control'
  workflow_dispatch:

jobs:
  sync-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Chạy Script Dashboard (Chống Spam)
        run: |
          cat << 'EOF' > sync_projects.py
          import os
          import glob
          import re

          tweaks, apps, new_projs = [], [], []

          # 1. Quét dự án
          for path in glob.glob('src/**/control', recursive=True):
              name, version, section = None, '1.0.0', None
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      for line in f:
                          if line.startswith('Name:'): name = line.split(':', 1)[1].strip()
                          if line.startswith('Version:'): version = line.split(':', 1)[1].strip()
                          if line.startswith('Section:'): section = line.split(':', 1)[1].strip()
              except: continue
              
              if name:
                  dir_path = os.path.dirname(path)
                  item = f"| **{name}** | `{version}` | [📂 Source]({dir_path}) |"
                  if section is None: new_projs.append(item)
                  elif 'App' in section: apps.append(item)
                  else: tweaks.append(item)

          def make_table(rows):
              if not rows: return ""
              return "| Dự án | Phiên bản | Link |\n|:---|:---:|:---:|\n" + "\n".join(rows)

          # 2. Tạo nội dung
          dash_body = ""
          if new_projs: dash_body += f"### ✨ DỰ ÁN MỚI (CHỜ BUILD)\n{make_table(new_projs)}\n\n"
          if tweaks: dash_body += f"### 🛠️ TWEAKS\n{make_table(tweaks)}\n\n"
          if apps: dash_body += f"### 📱 APPS\n{make_table(apps)}\n\n"
          
          if not dash_body: dash_body = "> ⚠️ Chưa có dự án nào trong src/"

          dashboard = f"<details>\n<summary><b>🚀 BẤM VÀO ĐÂY ĐỂ XEM DANH SÁCH DỰ ÁN</b></summary>\n<br>\n\n{dash_body}\n</details>"

          # 3. Ghi vào README (Xóa cũ - Ghi mới)
          readme_path = 'README.md'
          if os.path.exists(readme_path):
              with open(readme_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Regex cực mạnh để xóa sạch nội dung giữa 2 marker
              pattern = r'.*?'
              replacement = f'\n{dashboard}\n'
              
              if "" in content:
                  new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)
                  with open(readme_path, 'w', encoding='utf-8') as f:
                      f.write(new_content)
          EOF
          python sync_projects.py
