name: Auto Sync Projects

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/build-tweaks/**/control'
  schedule:
    - cron: '0 0 * * 0'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Detect & Sync All Projects
        run: |
          echo "🔄 Đang đồng bộ hóa danh sách dự án..."

          # 1. Quét dự án
          PROJECT_LIST=()
          for dir in src/build-tweaks/*/; do
            if [ -f "$dir/control" ]; then
              NAME=$(grep "^Name:" "$dir/control" | head -n 1 | cut -d' ' -f2- | xargs)
              [ -n "$NAME" ] && PROJECT_LIST+=("$NAME")
            fi
          done

          IFS=$'\n' SORTED=($(sort <<<"${PROJECT_LIST[*]}"))
          unset IFS
          echo "📋 Phát hiện: ${SORTED[*]}"

          # 2. Cập nhật build-tweaks.yml (Sửa lỗi sed)
          WORKFLOW_FILE=".github/workflows/build-tweaks.yml"
          
          # Tạo nội dung options mới vào file tạm
          echo "        options:" > new_options.txt
          for proj in "${SORTED[@]}"; do
            echo "          - $proj" >> new_options.txt
          done

          # Sử dụng sed để thay thế khối từ 'options:' đến trước 'jobs:'
          # Lệnh này xóa đoạn cũ và chèn nội dung file tạm vào
          sed -i -e '/        options:/,/      jobs:/{ /        options:/r new_options.txt' -e 'd }' "$WORKFLOW_FILE"
          
          # Fix lại dòng jobs: bị xóa nhầm ở bước trên
          sed -i '$ a \ \ \ \ \ \ jobs:' "$WORKFLOW_FILE" 2>/dev/null || echo "      jobs:" >> "$WORKFLOW_FILE"
          
          # Dọn dẹp: Đảm bảo file không bị mất phần jobs (Cách an toàn nhất là dùng file tạm)
          python3 -c "
          import sys
          content = open('$WORKFLOW_FILE').read()
          start_marker = '        options:'
          end_marker = '      jobs:'
          new_options = open('new_options.txt').read().strip()
          
          import re
          pattern = re.compile(f'{start_marker}.*?{end_marker}', re.DOTALL)
          updated_content = pattern.sub(f'{new_options}\n      jobs:', content)
          with open('$WORKFLOW_FILE', 'w') as f:
              f.write(updated_content)
          "
          rm new_options.txt

          # 3. Tạo PROJECTS.md & PROJECTS.json
          cat > PROJECTS.md << EOF
          # 📦 Danh sách Dự án Tweak
          > Cập nhật lúc: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          | Tên Dự án | Version | Mô tả | Trạng thái | Lần build cuối | Link |
          |-----------|---------|-------|------------|----------------|------|
          EOF

          echo "[" > PROJECTS.json
          TOTAL=0
          for dir in src/build-tweaks/*/; do
            if [ -f "$dir/control" ]; then
              NAME=$(grep "^Name:" "$dir/control" | head -n 1 | cut -d' ' -f2- | xargs)
              VERSION=$(grep "^Version:" "$dir/control" | head -n 1 | cut -d' ' -f2- | xargs)
              DESC=$(grep "^Description:" "$dir/control" | head -n 1 | cut -d' ' -f2- | xargs)
              LAST_BUILD=$(git log -1 --format="%ci" -- "$dir" 2>/dev/null | cut -d' ' -f1 || echo "N/A")
              REPO_URL="https://github.com/${{ github.repository }}/tree/main/$dir"
              
              echo "| $NAME | $VERSION | $DESC | ✅ Active | $LAST_BUILD | [📁 Xem]($REPO_URL) |" >> PROJECTS.md
              
              [ $TOTAL -gt 0 ] && echo "," >> PROJECTS.json
              echo "{\"name\":\"$NAME\",\"version\":\"$VERSION\",\"path\":\"$dir\"}" >> PROJECTS.json
              TOTAL=$((TOTAL + 1))
            fi
          done
          echo "]" >> PROJECTS.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PROJECTS.md PROJECTS.json .github/workflows/build-tweaks.yml
          git diff --cached --quiet || git commit -m "docs: auto sync projects"
          git push origin main
