name: Auto Sync Projects

on:
  push:
    paths:
      - 'src/**/control' # Trigger khi có thay đổi trong bất kỳ file control nào thuộc src/
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions
  schedule:
    - cron: '0 0 * * *' # Chạy tự động lúc 0h mỗi ngày

jobs:
  sync-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Chạy Script Đồng bộ (Quét src/)
        run: |
          cat << 'EOF' > sync_projects.py
          import os
          import glob
          import json
          import re

          # 1. Quét dự án trong thư mục src/
          projects = []
          # Quét tất cả file control nằm trong src/ (bao gồm cả thư mục con)
          for path in glob.glob('src/**/control', recursive=True):
              name, version = None, '1.0.0'
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      for line in f:
                          if line.startswith('Name:'): 
                              name = line.split(':', 1)[1].strip()
                          elif line.startswith('Version:'): 
                              version = line.split(':', 1)[1].strip()
              except Exception as e:
                  print(f"Lỗi đọc file {path}: {e}")
                  continue
              
              if name:
                  dir_path = os.path.dirname(path)
                  projects.append({'name': name, 'version': version, 'path': dir_path})

          # Sắp xếp danh sách theo tên (A-Z)
          projects.sort(key=lambda x: x['name'].lower())

          # 2. Tạo bảng Markdown tối giản
          md_table = "| Dự án | Phiên bản | Đường dẫn |\n|:---|:---:|:---:|\n"
          for p in projects:
              md_table += f"| **{p['name']}** | `{p['version']}` | [📂 Source]({p['path']}) |\n"

          # 3. Đưa bảng vào nút nhấn xổ xuống (Details)
          dashboard = f"<details>\n<summary><b>🚀 Xem danh sách dự án</b></summary>\n\n{md_table}\n</details>"

          # 4. Ghi file PROJECTS.json
          with open('PROJECTS.json', 'w', encoding='utf-8') as f:
              json.dump(projects, f, indent=2, ensure_ascii=False)

          # 5. Cập nhật README.md
          readme_path = 'README.md'
          if os.path.exists(readme_path):
              with open(readme_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Tìm vị trí giữa 2 marker START và END
              pattern = r'().*?()'
              if re.search(pattern, content, flags=re.DOTALL):
                  new_content = re.sub(pattern, f'\\1\n{dashboard}\n\\2', content, flags=re.DOTALL)
                  with open(readme_path, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print("✅ Đã cập nhật nút dự án vào README.md")
              else:
                  print("❌ Không tìm thấy Marker trong README.md")

          # 6. Đồng bộ options Workflow Build (build-tweaks.yml)
          target_yml = '.github/workflows/build-tweaks.yml'
          if os.path.exists(target_yml):
              options = ['(none)'] + [p['name'] for p in projects]
              with open(target_yml, 'r', encoding='utf-8') as f:
                  yml_content = f.read()
              
              match = re.search(r'([ \t]*)# OPTIONS-START', yml_content)
              indent = match.group(1) if match else '          '
              yml_opts_str = '\n'.join([f"{indent}- '{opt}'" for opt in options])
              
              pattern_yml = r'(# OPTIONS-START\n).*?(\n[ \t]*# OPTIONS-END)'
              if re.search(pattern_yml, yml_content, flags=re.DOTALL):
                  new_yml = re.sub(pattern_yml, f'\\1{yml_opts_str}\\2', yml_content, flags=re.DOTALL)
                  with open(target_yml, 'w', encoding='utf-8') as f:
                      f.write(new_yml)
                  print("✅ Đã đồng bộ options vào build-tweaks.yml")

          EOF
          python sync_projects.py
          rm sync_projects.py

      - name: 🚀 Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add PROJECTS.json README.md .github/workflows/build-tweaks.yml
          
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync projects from src/"
            git push
          fi
