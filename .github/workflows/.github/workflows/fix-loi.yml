name: "Fix Lỗi Theos Submodule"

on: 
  workflow_dispatch:

jobs:
  fix-git:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code (Bỏ qua submodules để không bị lỗi)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Xóa triệt để rác Theos
        run: |
          # Ép xóa cache của thư mục theos bị kẹt
          git rm --cached theos || true
          
          # Xóa thư mục thực tế nếu còn
          rm -rf theos || true
          
          # Xóa file cấu hình submodule gây lỗi
          rm -f .gitmodules || true

      - name: Lưu lại thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || (git commit -m "fix: xóa triệt để lỗi submodule theos" && git push)
