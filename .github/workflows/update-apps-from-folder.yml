name: Auto Update apps.json from apps/ folder

on:
  push:
    paths:
      - 'apps/**.ipa'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate apps.json from apps/ folder + Releases
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // === Phần 1: Quét từ thư mục apps/ ===
            const autoApps = [];
            const files = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'apps',
            });

            for (const file of files.data) {
              if (file.name.toLowerCase().endsWith('.ipa')) {
                const appName = file.name.replace(/\.ipa$/i, '').replace(/_/g, ' ');
                const size = file.size || 0;

                autoApps.push({
                  name: appName,
                  bundleIdentifier: "com.unknown.app",
                  version: "1.0",
                  downloadURL: `https://2kgt.github.io/repo/apps/${file.name}`,
                  size: size,
                  developerName: "Kyic",
                  subtitle: appName,
                  description: `${appName} IPA`,
                  localizedDescription: `${appName} đã được kiểm tra và tổng hợp bởi Kyic.`,
                  versionDate: new Date().toISOString().split('T')[0],
                  iconURL: `https://2kgt.github.io/repo/icons/${appName.replace(/\s+/g, '')}.png`
                });
              }
            }

            // === Phần 2: Giữ lại các app thủ công (Esign, Turrit, Zebra...) ===
            const manualApps = [
              {
                "name": "Esign",
                "bundleIdentifier": "com.esign.installer",
                "version": "5.0.2",
                "downloadURL": "https://2kgt.github.io/repo/apps/esign.ipa",
                "size": 7510000,
                "developerName": "Kyic",
                "subtitle": "Công cụ ký IPA mạnh mẽ",
                "description": "Esign v5.0.2",
                "localizedDescription": "Chức năng đã thêm: Hỗ trợ ký nhiều loại chứng chỉ • Tối ưu tốc độ • Giao diện mới.",
                "versionDate": "2026-04-21",
                "iconURL": "https://2kgt.github.io/repo/icons/Esign.png"
              },
              {
                "name": "Turrit",
                "bundleIdentifier": "com.turrit.app",
                "version": "1.4.6",
                "downloadURL": "https://2kgt.github.io/repo/apps/turrit.ipa",
                "size": 88900000,
                "developerName": "Kyic",
                "subtitle": "Ứng dụng Turrit",
                "description": "Turrit - App Telegram bên thứ ba đa năng.",
                "localizedDescription": "Turrit-TGEXtra 1.7.3.",
                "versionDate": "2026-04-21",
                "iconURL": "https://2kgt.github.io/repo/icons/Turrit.png"
              },
              {
                "name": "Zebra",
                "bundleIdentifier": "com.getzbra.zebra",
                "version": "1.1.28",
                "downloadURL": "https://2kgt.github.io/repo/apps/Zebra_1.1.28.ipa",
                "size": 9912320,
                "developerName": "Kyic",
                "subtitle": "Zebra Package Manager",
                "description": "Zebra 1.1.28",
                "localizedDescription": "Zebra 1.1.28 - Package manager hiện đại cho jailbreak.",
                "versionDate": "2026-04-22",
                "iconURL": "https://2kgt.github.io/repo/icons/Zebra.png"
              }
            ];

            const finalApps = [...manualApps, ...autoApps];

            const jsonContent = {
              "name": "Kyic IPA Repository",
              "identifier": "com.kyic.iparepo",
              "iconURL": "https://2kgt.github.io/repo/icons/Kyic.png",
              "apps": finalApps
            };

            fs.writeFileSync('apps.json', JSON.stringify(jsonContent, null, 2));
            console.log(`✅ apps.json đã được tự động cập nhật với ${finalApps.length} ứng dụng!`);
