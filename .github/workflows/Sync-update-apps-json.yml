name: Auto Sync Esign apps.json
# Updeta IPA Releases + apps/ 
on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử để tránh lỗi push

      - name: Install IPA Parser
        run: npm install app-info-parser

      - name: Update apps.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            
            const appsMap = {};

            const extractVersion = (filename) => {
              const match = filename.match(/[_-]v?(\d+\.\d+(?:\.\d+)?)/i);
              return match ? match[1] : "1.0";
            };

            const cleanAppName = (filename) => {
              return filename.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();
            };

            const formatCategory = (rawCategory) => {
              if (!rawCategory) return "Utilities";
              const parts = rawCategory.split('.');
              const lastPart = parts[parts.length - 1];
              return lastPart.charAt(0).toUpperCase() + lastPart.slice(1);
            };

            const addAppVersion = (name, bundleId, category, permissions, versionData) => {
              const key = name.toLowerCase();
              if (!appsMap[key]) {
                appsMap[key] = {
                  name: name,
                  bundleIdentifier: bundleId,
                  developerName: "Kyic",
                  subtitle: name,
                  category: category,
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`,
                  appPermissions: permissions,
                  versions: []
                };
              }
              if (!appsMap[key].versions.find(v => v.version === versionData.version)) {
                appsMap[key].versions.push(versionData);
              }
            };

            // Quét thư mục apps/
            if (fs.existsSync('apps')) {
              const files = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              for (const file of files) {
                const name = cleanAppName(file);
                const version = extractVersion(file);
                let bundleId = "com.unknown.app";
                let category = "Utilities";
                let perms = { entitlements: [], privacy: {} };

                try {
                  const parser = new AppInfoParser(`apps/${file}`);
                  const info = await parser.parse();
                  bundleId = info.CFBundleIdentifier || bundleId;
                  category = formatCategory(info.LSApplicationCategoryType);
                  for (const k in info) if (k.endsWith('UsageDescription')) perms.privacy[k] = info[k];
                  if (info.mobileProvision?.Entitlements) perms.entitlements = Object.keys(info.mobileProvision.Entitlements);
                } catch (e) { console.log(`⚠️ Lỗi parse ${file}`); }

                const stats = fs.statSync(`apps/${file}`);
                addAppVersion(name, bundleId, category, perms, {
                  version: version,
                  date: stats.mtime.toISOString(),
                  size: stats.size,
                  downloadURL: `https://2kgt.github.io/repo/apps/${file}`,
                  localizedDescription: `Phiên bản ${version} tổng hợp bởi Kyic.`
                });
              }
            }

            // Quét Releases
            try {
              const { data: releases } = await github.rest.repos.listReleases({ owner: context.repo.owner, repo: context.repo.repo });
              for (const release of releases) {
                for (const asset of release.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const name = cleanAppName(asset.name);
                    const version = release.tag_name.replace(/^v/i, '');
                    addAppVersion(name, "com.unknown.app", "Utilities", undefined, {
                      version: version,
                      date: release.published_at || new Date().toISOString(),
                      size: asset.size,
                      downloadURL: asset.browser_download_url,
                      localizedDescription: release.body || `Phiên bản ${version} tổng hợp bởi Kyic.`
                    });
                  }
                }
              }
            } catch (e) { console.log("No releases found"); }

            // Merge thủ công
            const manualApps = [
              {
                "name": "Turrit",
                "bundleIdentifier": "com.turrit.app",
                "developerName": "Kyic",
                "subtitle": "Ứng dụng Turrit",
                "category": "Social",
                "iconURL": "https://2kgt.github.io/repo/icons/Turrit.png",
                "versions": [
                  {
                    "version": "1.4.6",
                    "date": "2026-04-21T00:00:00Z",
                    "size": 88900000,
                    "downloadURL": "https://2kgt.github.io/repo/apps/turrit.ipa",
                    "localizedDescription": "Turrit - App Telegram bên thứ ba đa năng."
                  }
                ]
              }
            ];
            manualApps.forEach(app => { appsMap[app.name.toLowerCase()] = app; });

            const finalApps = Object.values(appsMap).map(app => {
              app.versions.sort((a, b) => b.version.localeCompare(a.version, undefined, { numeric: true, sensitivity: 'base' }));
              const latest = app.versions[0];
              app.version = latest.version;
              app.versionDate = latest.date;
              app.size = latest.size;
              app.downloadURL = latest.downloadURL;
              app.description = `${app.name} v${app.version}`;
              app.localizedDescription = latest.localizedDescription;
              return app;
            });

            const finalJson = {
              "name": "Kyic Repository",
              "identifier": "com.kyic.iparepo",
              "iconURL": "https://2kgt.github.io/repo/icons/Kyic.png",
              "apps": finalApps
            };

            fs.writeFileSync('apps.json', JSON.stringify(finalJson, null, 2));

      - name: Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update apps.json [skip ci]"
          file_pattern: 'apps.json'
          branch: main
