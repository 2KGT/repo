name: "Auto Sync Esign apps.json"

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: "Install Dependencies"
        run: npm install app-info-parser node-fetch@2

      - name: "Update apps.json"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const fetch = require('node-fetch');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            const appsMap = {};

            const extractVersion = (filename) => {
              const match = filename.match(/[_-]v?(\d+\.\d+(\.\d+)?)/i);
              return match ? match[1] : "1.0";
            };

            const cleanAppName = (filename) => {
              return filename.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();
            };

            const formatCategory = (rawCategory) => {
              if (!rawCategory) return "Utilities";
              const parts = rawCategory.split('.');
              return parts[parts.length - 1].charAt(0).toUpperCase() + parts[parts.length - 1].slice(1);
            };

            const addAppVersion = (name, bundleId, category, permissions, versionData) => {
              const key = name.toLowerCase();
              if (!appsMap[key]) {
                appsMap[key] = {
                  name: name,
                  bundleIdentifier: bundleId,
                  developerName: "Kyic",
                  subtitle: name,
                  category: category,
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`,
                  appPermissions: permissions,
                  versions: []
                };
              }
              // Tránh trùng lặp phiên bản
              if (!appsMap[key].versions.find(v => v.version === versionData.version)) {
                appsMap[key].versions.push(versionData);
              }
            };

            // 1. Xử lý file IPA trong thư mục nội bộ apps/
            if (fs.existsSync('apps')) {
              const files = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              for (const file of files) {
                const name = cleanAppName(file);
                const version = extractVersion(file);
                let bundleId = "com.unknown.app", category = "Utilities", perms = { entitlements: [], privacy: {} };

                try {
                  const parser = new AppInfoParser(`apps/${file}`);
                  const info = await parser.parse();
                  bundleId = info.CFBundleIdentifier || bundleId;
                  category = formatCategory(info.LSApplicationCategoryType);
                  for (const k in info) if (k.endsWith('UsageDescription')) perms.privacy[k] = info[k];
                  if (info.mobileProvision?.Entitlements) perms.entitlements = Object.keys(info.mobileProvision.Entitlements);
                } catch (e) { console.log(`⚠️ Lỗi parse file nội bộ: ${file}`); }

                const stats = fs.statSync(`apps/${file}`);
                addAppVersion(name, bundleId, category, perms, {
                  version: version,
                  date: stats.mtime.toISOString(),
                  size: stats.size,
                  downloadURL: `https://2kgt.github.io/repo/apps/${file}`,
                  localizedDescription: `Phiên bản ${version} tổng hợp bởi Kyic.`
                });
              }
            }

            // 2. Xử lý IPA từ GitHub Releases (Tích hợp Deep Parse)
            try {
              const { data: releases } = await github.rest.repos.listReleases({ owner: context.repo.owner, repo: context.repo.repo });
              const recentReleases = releases.slice(0, 8); // Quét 8 bản gần nhất

              for (const release of recentReleases) {
                for (const asset of release.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const name = cleanAppName(asset.name);
                    const key = name.toLowerCase();
                    if (appsMap[key] && appsMap[key].versions.some(v => v.downloadURL.includes('raw.githubusercontent'))) continue;

                    let version = extractVersion(asset.name);
                    if (version === "1.0") version = release.tag_name.replace(/^v/i, '');

                    let bundleId = "com.unknown.app", category = "Utilities", perms = { entitlements: [], privacy: {} };

                    try {
                      console.log(`📥 Đang parse sâu Release Asset: ${asset.name}...`);
                      const res = await fetch(asset.browser_download_url);
                      const buffer = await res.buffer();
                      const tempPath = `./temp_${asset.name}`;
                      fs.writeFileSync(tempPath, buffer);

                      const parser = new AppInfoParser(tempPath);
                      const info = await parser.parse();
                      bundleId = info.CFBundleIdentifier || bundleId;
                      category = formatCategory(info.LSApplicationCategoryType);
                      for (const k in info) if (k.endsWith('UsageDescription')) perms.privacy[k] = info[k];
                      if (info.mobileProvision?.Entitlements) perms.entitlements = Object.keys(info.mobileProvision.Entitlements);
                      
                      fs.unlinkSync(tempPath);
                    } catch (e) { console.log(`⚠️ Lỗi parse sâu asset: ${asset.name}`); }

                    addAppVersion(name, bundleId, category, perms, {
                      version: version,
                      date: release.published_at || new Date().toISOString(),
                      size: asset.size,
                      downloadURL: asset.browser_download_url,
                      localizedDescription: release.body || `Phiên bản ${version} tổng hợp bởi Kyic.`
                    });
                  }
                }
              }
            } catch (e) { console.log("Lỗi Releases: " + e.message); }

            // 3. App thủ công (Nếu có)
            const manualApps = []; // Thêm object app vào đây nếu cần
            manualApps.forEach(app => { appsMap[app.name.toLowerCase()] = app; });

            // 4. Tổng hợp và Ghi file
            const finalApps = Object.values(appsMap).map(app => {
              app.versions.sort((a, b) => b.version.localeCompare(a.version, undefined, { numeric: true }));
              const latest = app.versions[0];
              Object.assign(app, { version: latest.version, versionDate: latest.date, size: latest.size, downloadURL: latest.downloadURL, localizedDescription: latest.localizedDescription });
              return app;
            });

            const repoData = { name: "Kyic Repo", identifier: "com.2kgt.repo", iconURL: "https://2kgt.github.io/repo/icons/Kyic.png", apps: finalApps };
            fs.writeFileSync('apps.json', JSON.stringify(repoData, null, 2));

      - name: "🚀 Sync & Extract Data"
        id: sync
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp apps.json apps_new.json
          git fetch origin main && git reset --hard origin/main
          
          # Tìm thông tin app mới nhất để gửi Telegram
          APP_JSON=$(jq -c --slurpfile old apps.json --slurpfile new apps_new.json '
            $new[0].apps[] as $n | select(($old[0].apps | any(.name == $n.name and .version == $n.version) | not))
          ' | head -n 1)
          [ -z "$APP_JSON" ] && APP_JSON=$(jq -c '.apps[0]' apps_new.json)
          
          echo "APP_BASE64=$(echo "$APP_JSON" | base64 -w 0)" >> $GITHUB_ENV
          mv apps_new.json apps.json
          git add apps.json && git commit -m "Update metadata [skip ci]" || echo "No changes"
          git push origin main --force-with-lease

      - name: "🤖 Telegram Notification"
        if: always() && env.APP_BASE64 != ''
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          INFO=$(echo "${{ env.APP_BASE64 }}" | base64 -d)
          NAME=$(echo "$INFO" | jq -r '.name')
          VER=$(echo "$INFO" | jq -r '.version')
          LINK=$(echo "$INFO" | jq -r '.downloadURL')
          
          MSG="<b>🚀 REPO CẬP NHẬT</b>%0A📱 <b>App:</b> <code>$NAME</code>%0A📦 <b>Ver:</b> <code>$VER</code>%0A🔗 <a href='$LINK'>Tải trực tiếp IPA</a>"
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" -d "chat_id=$TO&parse_mode=HTML&text=$MSG"
