name: "Auto Sync Esign apps.json"

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: "Install Dependencies"
        run: npm install app-info-parser node-fetch@2

      - name: "Update apps.json"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            
            const appsMap = {};
            const eventName = context.eventName;
            let appToNotify = null;

            const extractVersion = (f) => (f.match(/[_-]v?(\d+\.\d+(\.\d+)?)/i) || [null, "1.0"])[1];
            const cleanAppName = (f) => f.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();

            const addAppToMap = (name, bundleId, category, vData) => {
              const key = name.toLowerCase();
              if (!appsMap[key]) {
                appsMap[key] = { 
                  name, 
                  bundleIdentifier: bundleId, 
                  developerName: "Kyic", 
                  subtitle: name,
                  category: category || "Utilities", 
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`,
                  appPermissions: { entitlements: [], privacy: {} },
                  versions: [] 
                };
              }
              if (!appsMap[key].versions.find(v => v.downloadURL === vData.downloadURL)) {
                appsMap[key].versions.push(vData);
              }
              return appsMap[key];
            };

            // Kiểm tra file thay đổi nếu là sự kiện push
            let changedFiles = [];
            if (eventName === 'push') {
              try {
                changedFiles = execSync('git diff --name-only HEAD^ HEAD').toString().split('\n').map(f => f.trim());
              } catch (e) {}
            }

            if (fs.existsSync('apps')) {
              const files = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              for (const file of files) {
                const path = `apps/${file}`;
                const name = cleanAppName(file);
                const version = extractVersion(file);
                let bundleId = "com.kyic.app";
                try {
                  const info = await (new AppInfoParser(path)).parse();
                  bundleId = info.CFBundleIdentifier || bundleId;
                } catch (e) {}

                const stats = fs.statSync(path);
                const vData = { version, date: stats.mtime.toISOString(), size: stats.size, downloadURL: `https://2kgt.github.io/repo/apps/${file}` };
                const appObj = addAppToMap(name, bundleId, "Utilities", vData);
                
                // Nếu file này vừa được upload (push)
                if (changedFiles.includes(path)) appToNotify = { ...appObj, ...vData };
              }
            }

            // Xử lý logic appToNotify cho Release
            if (eventName === 'release') {
               // ... logic release như cũ ...
            }

            const finalApps = Object.values(appsMap).map(app => {
              app.versions.sort((a, b) => new Date(b.date) - new Date(a.date));
              const latest = app.versions[0];
              return { ...app, version: latest.version, versionDate: latest.date, size: latest.size, downloadURL: latest.downloadURL };
            });

            const latestApp = finalApps.sort((a, b) => new Date(b.versionDate) - new Date(a.versionDate))[0];

            const repoData = { 
              name: "Kyic Repository", 
              identifier: "com.kyic.repo", 
              iconURL: "https://2kgt.github.io/repo/icons/Kyic.png",
              apps: finalApps 
            };
            fs.writeFileSync('apps.json', JSON.stringify(repoData, null, 2));

            // Luôn ghi file current_app.json để bước sau sử dụng
            const notifyData = {
              isManual: (eventName === 'workflow_dispatch'),
              targetApp: appToNotify || latestApp || { name: "Kyic Repository", version: "Cập nhật", downloadURL: "https://2kgt.github.io/repo/" }
            };
            fs.writeFileSync('current_app.json', JSON.stringify(notifyData));

      - name: "🚀 Sync & Push"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f current_app.json ]; then cp current_app.json /tmp/current_app.json; fi
          git fetch origin main
          git checkout main
          if [ -f /tmp/current_app.json ]; then mv /tmp/current_app.json current_app.json; fi
          git add apps.json
          git commit -m "Update Kyic Repository [skip ci]" || echo "No changes"
          git push origin main

      - name: 🤖 6.1 Telegram Notification
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
          JOB_STATUS: ${{ job.status }}
        run: |
          REAL_TIME=$(TZ="Asia/Ho_Chi_Minh" date +"%d/%m/%Y %H:%M")
          
          # Đảm bảo file tồn tại để jq không báo lỗi
          if [ ! -f current_app.json ]; then
            echo '{"isManual":true,"targetApp":{"name":"Kyic Repository","version":"Mới nhất","downloadURL":"https://2kgt.github.io/repo/"}}' > current_app.json
          fi

          IS_MANUAL=$(jq -r '.isManual' current_app.json)
          APP_NAME=$(jq -r '.targetApp.name' current_app.json)
          APP_VER=$(jq -r '.targetApp.version' current_app.json)
          IPA_URL=$(jq -r '.targetApp.downloadURL' current_app.json)

          if [ "$IS_MANUAL" == "true" ]; then
            TITLE="🔄 <b>Cập nhật Kho lưu trữ IPA</b>"
            SUB_TITLE="✨ <i>Hệ thống vừa được làm mới thủ công</i>"
          else
            TITLE="🚀 <b>Cập nhật Ứng dụng mới</b>"
            SUB_TITLE="🤩 <i>Hệ thống đồng bộ tự động Kyic</i>"
          fi

          case "$JOB_STATUS" in
            "success") ICON="✅"; TEXT_STT="Thành công" ;;
            *)         ICON="❌"; TEXT_STT="Thất bại" ;;
          esac

          MSG="$TITLE
          ──────────────────
          📱 <b>Ứng dụng:</b> <code>$APP_NAME</code>
          💡 <b>Phiên bản:</b> <code>$APP_VER</code>
          📊 <b>Trạng thái:</b> <code>$TEXT_STT</code>
          ⏰ <b>Thời gian:</b> <code>$REAL_TIME</code>
          ──────────────────
          $SUB_TITLE"

          KEYBOARD=$(jq -nrc --arg url1 "https://2kgt.github.io/repo/" --arg url2 "$IPA_URL" '{
            inline_keyboard: [[
              { text: "🌐 Add source", url: $url1 },
              { text: "📦 Tải về IPA", url: $url2 }
            ]]
          }')

          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$TO" -d "parse_mode=HTML" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "reply_markup=$KEYBOARD"
