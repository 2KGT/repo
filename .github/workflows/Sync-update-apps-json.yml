name: "Auto Sync Esign apps.json"

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

concurrency:
  group: sync-apps-json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: "Install Dependencies"
        run: npm install app-info-parser node-fetch@2

      - name: "Update apps.json"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            
            const appsMap = {};
            const eventName = context.eventName;
            let appToNotify = null;

            const extractVersion = (f) => (f.match(/[_-]v?(\d+\.\d+(\.\d+)?)/i) || [null, "1.0"])[1];
            const cleanAppName = (f) => f.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();

            const addAppToMap = (name, bundleId, category, vData) => {
              const key = name.toLowerCase();
              if (!appsMap[key]) {
                appsMap[key] = { 
                  name, 
                  bundleIdentifier: bundleId, 
                  developerName: "Kyic", 
                  subtitle: name,
                  category: category || "Utilities", 
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`,
                  appPermissions: { entitlements: [], privacy: {} },
                  versions: [] 
                };
              }
              if (!appsMap[key].versions.find(v => v.downloadURL === vData.downloadURL)) {
                appsMap[key].versions.push(vData);
              }
              return appsMap[key];
            };

            let changedFiles = [];
            try {
              changedFiles = execSync('git diff --name-only HEAD^ HEAD').toString().split('\n').map(f => f.trim());
            } catch (e) {}

            if (fs.existsSync('apps')) {
              const files = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              for (const file of files) {
                const path = `apps/${file}`;
                const name = cleanAppName(file);
                const version = extractVersion(file);
                let bundleId = "com.kyic.app";
                try {
                  const info = await (new AppInfoParser(path)).parse();
                  bundleId = info.CFBundleIdentifier || bundleId;
                } catch (e) {}

                const stats = fs.statSync(path);
                const vData = { version, date: stats.mtime.toISOString(), size: stats.size, downloadURL: `https://2kgt.github.io/repo/apps/${file}` };
                const appObj = addAppToMap(name, bundleId, "Utilities", vData);
                if (changedFiles.includes(path)) appToNotify = { ...appObj, ...vData };
              }
            }

            try {
              const { data: releases } = await github.rest.repos.listReleases({ 
                owner: context.repo.owner, 
                repo: context.repo.repo,
                per_page: 30 
              });
              for (const release of releases) {
                for (const asset of release.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const name = cleanAppName(asset.name);
                    const vData = { version: extractVersion(asset.name), date: release.published_at, size: asset.size, downloadURL: asset.browser_download_url };
                    const appObj = addAppToMap(name, "com.kyic.release", "Utilities", vData);
                    if (!appToNotify && eventName === 'release' && release.id === context.payload.release.id) appToNotify = { ...appObj, ...vData };
                  }
                }
              }
            } catch (e) {}

            const finalApps = Object.values(appsMap).map(app => {
              app.versions.sort((a, b) => new Date(b.date) - new Date(a.date));
              const latest = app.versions[0];
              return { ...app, version: latest.version, versionDate: latest.date, size: latest.size, downloadURL: latest.downloadURL };
            });

            const repoData = { 
              name: "Kyic Repository", 
              identifier: "com.2kgt.repo", 
              iconURL: "https://2kgt.github.io/repo/icons/repo-logo.png",
              apps: finalApps 
            };
            fs.writeFileSync('apps.json', JSON.stringify(repoData, null, 2));
            if (appToNotify) fs.writeFileSync('current_app.json', JSON.stringify(appToNotify));

      - name: "🚀 Sync & Push"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp apps.json apps_temp.json
          if [ -f current_app.json ]; then cp current_app.json notify_temp.json; fi
          git fetch origin main && git checkout main
          mv apps_temp.json apps.json
          git add apps.json
          git commit -m "Update Kyic Repository [skip ci]" || echo "No changes"
          git push origin main

      - name: 🤖 6.1 Telegram Notification
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
          JOB_STATUS: ${{ job.status }}
          DISP_NAME: ${{ steps.metadata.outputs.display_name }}
          VERSION: ${{ steps.metadata.outputs.final_ver }}
          PROJ_INPUT: ${{ github.event.inputs.project }}
        run: |
          # 1. Xác định icon trạng thái
          case "$JOB_STATUS" in
            success)   ICON="✅" ;;
            cancelled) ICON="⚪" ;;
            *)         ICON="❌" ;;
          esac

          # 2. Nội dung thông báo (đã bỏ các link dài dòng)
          MSG="<b>$ICON Kyic Repository Update</b>
          ──────────────────
          📱 <b>Dự án:</b> <code>${DISP_NAME:-$PROJ_INPUT}</code>
          💡 <b>Phiên bản:</b> <code>${VERSION:-Lỗi/Không rõ}</code>
          📊 <b>Trạng thái:</b> <code>$JOB_STATUS</code>
          ──────────────────
          🤩 <i>Hệ thống tự động Kyic Engine</i>"

          # 3. Định nghĩa nút bấm (JSON)
          # Thay URL bên dưới bằng link thực tế của bạn
          KEYBOARD=$(cat <<EOF
          {
            "inline_keyboard": [
              [
                { "text": "🌐 Xem Repository", "url": "https://github.com/${{ github.repository }}" },
                { "text": "📦 Tải về (IPA/Deb)", "url": "https://github.com/${{ github.repository }}/releases" }
              ]
            ]
          }
          EOF
          )

          # 4. Gửi qua Telegram API
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$TO" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "reply_markup=$KEYBOARD"

