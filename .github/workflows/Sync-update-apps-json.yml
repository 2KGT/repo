name: "Auto Sync Esign apps.json"

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

# Xếp hàng các tiến trình push để tránh xung đột dữ liệu và báo tin sai thứ tự
concurrency:
  group: sync-apps-json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Quan trọng để git diff hoạt động chính xác
          ref: main

      - name: "Install Dependencies"
        run: npm install app-info-parser node-fetch@2

      - name: "Update apps.json"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const fetch = require('node-fetch');
            const { execSync } = require('child_process');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            
            const appsMap = {};

            // Helper: Lấy danh sách file IPA vừa thay đổi qua Git Diff
            let changedFiles = [];
            try {
              const diff = execSync('git diff --name-only HEAD^ HEAD | grep "\\.ipa$" || true').toString();
              changedFiles = diff.split('\n').filter(f => f.trim() !== '');
              console.log("Files changed in this push:", changedFiles);
            } catch (e) {
              console.log("Không lấy được diff, quét toàn bộ thư mục apps/");
            }

            const extractVersion = (filename) => {
              const match = filename.match(/[_-]v?(\d+\.\d+(\.\d+)?)/i);
              return match ? match[1] : "1.0";
            };

            const cleanAppName = (filename) => {
              return filename.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();
            };

            const formatCategory = (rawCategory) => {
              if (!rawCategory) return "Utilities";
              const parts = rawCategory.split('.');
              return parts[parts.length - 1].charAt(0).toUpperCase() + parts[parts.length - 1].slice(1);
            };

            const addAppVersion = (name, bundleId, category, permissions, versionData) => {
              const key = name.toLowerCase();
              if (!appsMap[key]) {
                appsMap[key] = {
                  name: name,
                  bundleIdentifier: bundleId,
                  developerName: "Kyic",
                  subtitle: name,
                  category: category,
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`,
                  appPermissions: permissions,
                  versions: []
                };
              }
              if (!appsMap[key].versions.find(v => v.version === versionData.version)) {
                appsMap[key].versions.push(versionData);
              }
              return appsMap[key];
            };

            let lastUpdatedApp = null;

            // 1. Xử lý file IPA nội bộ (apps/)
            if (fs.existsSync('apps')) {
              const files = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              for (const file of files) {
                const fullPath = `apps/${file}`;
                const name = cleanAppName(file);
                const version = extractVersion(file);
                let bundleId = "com.unknown.app", category = "Utilities", perms = { entitlements: [], privacy: {} };

                try {
                  const parser = new AppInfoParser(fullPath);
                  const info = await parser.parse();
                  bundleId = info.CFBundleIdentifier || bundleId;
                  category = formatCategory(info.LSApplicationCategoryType);
                  for (const k in info) if (k.endsWith('UsageDescription')) perms.privacy[k] = info[k];
                  if (info.mobileProvision?.Entitlements) perms.entitlements = Object.keys(info.mobileProvision.Entitlements);
                } catch (e) { console.log(`⚠️ Lỗi parse: ${file}`); }

                const stats = fs.statSync(fullPath);
                const appObj = addAppVersion(name, bundleId, category, perms, {
                  version: version,
                  date: stats.mtime.toISOString(),
                  size: stats.size,
                  downloadURL: `https://2kgt.github.io/repo/apps/${file}`,
                  localizedDescription: `Cập nhật qua apps/`
                });

                // Nếu file này nằm trong danh sách Git Diff, đánh dấu là app vừa cập nhật
                if (changedFiles.includes(fullPath)) lastUpdatedApp = appObj;
              }
            }

            // 2. Xử lý IPA từ Releases (Quét 5 bản gần nhất)
            try {
              const { data: releases } = await github.rest.repos.listReleases({ owner: context.repo.owner, repo: context.repo.repo });
              for (const release of releases.slice(0, 5)) {
                for (const asset of release.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const name = cleanAppName(asset.name);
                    const version = extractVersion(asset.name);
                    // Skip nếu đã xử lý bản mới hơn ở apps/
                    if (appsMap[name.toLowerCase()] && appsMap[name.toLowerCase()].versions.some(v => v.downloadURL.includes('/apps/'))) continue;

                    addAppVersion(name, "com.release.app", "Utilities", { entitlements: [], privacy: {} }, {
                      version: version,
                      date: release.published_at,
                      size: asset.size,
                      downloadURL: asset.browser_download_url,
                      localizedDescription: release.body || `Phát hành qua Release`
                    });
                  }
                }
              }
            } catch (e) { console.log("Lỗi Release: " + e.message); }

            // 3. Xuất dữ liệu
            const finalApps = Object.values(appsMap).map(app => {
              app.versions.sort((a, b) => b.version.localeCompare(a.version, undefined, { numeric: true }));
              const latest = app.versions[0];
              Object.assign(app, { version: latest.version, versionDate: latest.date, size: latest.size, downloadURL: latest.downloadURL });
              return app;
            });

            const repoData = { name: "Kyic Repo", identifier: "com.2kgt.repo", apps: finalApps };
            fs.writeFileSync('apps.json', JSON.stringify(repoData, null, 2));

            // Ghi file tạm cho Telegram (Ưu tiên app trong Git Diff, nếu không lấy app mới nhất)
            const targetApp = lastUpdatedApp || finalApps.sort((a, b) => new Date(b.versionDate) - new Date(a.versionDate))[0];
            if (targetApp) fs.writeFileSync('current_app.json', JSON.stringify(targetApp));

      - name: "🚀 Push & Notify"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Lưu thông tin app trước khi sync git
          cp current_app.json temp_app.json || echo "{}" > temp_app.json
          
          git add apps.json
          git commit -m "Update apps.json [skip ci]" || echo "No changes"
          git push origin main
          
          # Gửi Telegram
          INFO=$(cat temp_app.json)
          NAME=$(echo "$INFO" | jq -r '.name')
          VER=$(echo "$INFO" | jq -r '.version')
          LINK=$(echo "$INFO" | jq -r '.downloadURL')
          
          if [ "$NAME" != "null" ]; then
            MSG="<b>🚀 REPO ĐÃ CẬP NHẬT</b>%0A━━━━━━━━━━━━━━━━━━%0A📱 <b>App:</b> <code>$NAME</code>%0A📦 <b>Ver:</b> <code>$VER</code>%0A━━━━━━━━━━━━━━━━━━%0A🔗 <a href='$LINK'>Tải trực tiếp IPA</a>"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
              -d "parse_mode=HTML" \
              -d "text=$MSG" \
              -d "disable_web_page_preview=true"
          fi
