name: "Auto Sync Esign apps.json"

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

concurrency:
  group: sync-apps-json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Lấy ít nhất 2 commit để so sánh diff
          ref: main

      - name: "Install Dependencies"
        run: npm install app-info-parser node-fetch@2

      - name: "Update apps.json"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const fetch = require('node-fetch');
            const { execSync } = require('child_process');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            
            const appsMap = {};

            // FIX: Lấy danh sách file thay đổi chính xác từ commit vừa push
            let changedFiles = [];
            try {
              // Lấy danh sách file thay đổi giữa commit hiện tại (HEAD) và commit trước đó (HEAD^)
              const diffOutput = execSync('git diff --name-only HEAD^ HEAD').toString();
              changedFiles = diffOutput.split('\n').map(f => f.trim()).filter(f => f.endsWith('.ipa'));
              console.log("Files detected in commit:", changedFiles);
            } catch (e) {
              console.log("Không lấy được diff hoặc lần đầu khởi tạo.");
            }

            const extractVersion = (filename) => {
              const match = filename.match(/[_-]v?(\d+\.\d+(\.\d+)?)/i);
              return match ? match[1] : "1.0";
            };

            const cleanAppName = (filename) => {
              return filename.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();
            };

            const formatCategory = (rawCategory) => {
              if (!rawCategory) return "Utilities";
              const parts = rawCategory.split('.');
              return parts[parts.length - 1].charAt(0).toUpperCase() + parts[parts.length - 1].slice(1);
            };

            const addAppVersion = (name, bundleId, category, permissions, versionData) => {
              const key = name.toLowerCase();
              if (!appsMap[key]) {
                appsMap[key] = {
                  name: name,
                  bundleIdentifier: bundleId,
                  developerName: "Kyic",
                  subtitle: name,
                  category: category,
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`,
                  appPermissions: permissions,
                  versions: []
                };
              }
              if (!appsMap[key].versions.find(v => v.version === versionData.version)) {
                appsMap[key].versions.push(versionData);
              }
              return appsMap[key];
            };

            let appToNotify = null;

            // 1. Xử lý thư mục apps/
            if (fs.existsSync('apps')) {
              const allIpaFiles = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              for (const file of allIpaFiles) {
                const relativePath = `apps/${file}`;
                const name = cleanAppName(file);
                const version = extractVersion(file);
                let bundleId = "com.unknown.app", category = "Utilities", perms = { entitlements: [], privacy: {} };

                try {
                  const parser = new AppInfoParser(relativePath);
                  const info = await parser.parse();
                  bundleId = info.CFBundleIdentifier || bundleId;
                  category = formatCategory(info.LSApplicationCategoryType);
                  for (const k in info) if (k.endsWith('UsageDescription')) perms.privacy[k] = info[k];
                  if (info.mobileProvision?.Entitlements) perms.entitlements = Object.keys(info.mobileProvision.Entitlements);
                } catch (e) { console.log("Parse error: " + file); }

                const stats = fs.statSync(relativePath);
                const appObj = addAppVersion(name, bundleId, category, perms, {
                  version: version,
                  date: stats.mtime.toISOString(),
                  size: stats.size,
                  downloadURL: `https://2kgt.github.io/repo/apps/${file}`,
                  localizedDescription: `Phiên bản ${version} cập nhật.`
                });

                // FIX: Chỉ gán appToNotify nếu file này nằm trong danh sách vừa push
                if (changedFiles.includes(relativePath)) {
                  appToNotify = appObj;
                }
              }
            }

            // 2. Xử lý Release (Nếu không có file push trực tiếp thì mới lấy app mới nhất từ đây)
            try {
              const { data: releases } = await github.rest.repos.listReleases({ owner: context.repo.owner, repo: context.repo.repo });
              for (const release of releases.slice(0, 3)) {
                for (const asset of release.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const name = cleanAppName(asset.name);
                    const appObj = addAppVersion(name, "com.release.app", "Utilities", {}, {
                      version: extractVersion(asset.name),
                      date: release.published_at,
                      size: asset.size,
                      downloadURL: asset.browser_download_url,
                      localizedDescription: release.body || "Phát hành Release"
                    });
                    if (!appToNotify && github.event_name === 'release') appToNotify = appObj;
                  }
                }
              }
            } catch (e) {}

            // Sắp xếp và lưu apps.json
            const finalApps = Object.values(appsMap).map(app => {
              app.versions.sort((a, b) => b.version.localeCompare(a.version, undefined, { numeric: true }));
              const latest = app.versions[0];
              Object.assign(app, { version: latest.version, versionDate: latest.date, size: latest.size, downloadURL: latest.downloadURL });
              return app;
            });

            fs.writeFileSync('apps.json', JSON.stringify({ name: "Kyic Repo", identifier: "com.2kgt.repo", apps: finalApps }, null, 2));

            // FIX: Ghi đè file tạm bằng app được xác định chính xác từ git diff
            if (appToNotify) {
              fs.writeFileSync('current_app.json', JSON.stringify(appToNotify));
              console.log("App selected for notification:", appToNotify.name);
            }
            

      - name: "🚀 Push & Notify"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Bảo lưu file tạm
          if [ -f current_app.json ]; then cp current_app.json temp_app.json; fi
          
          git add apps.json
          git commit -m "Update metadata [skip ci]" || echo "No changes"
          git push origin main --force
          
          # Gửi Telegram
          if [ -f temp_app.json ]; then
            INFO=$(cat temp_app.json)
            NAME=$(echo "$INFO" | jq -r '.name')
            VER=$(echo "$INFO" | jq -r '.version')
            LINK=$(echo "$INFO" | jq -r '.downloadURL')
            REPO_LINK="https://2kgt.github.io/repo/apps.json"

            MSG="<b>🚀 REPO ĐÃ CẬP NHẬT</b>%0A"
            MSG="$MSG━━━━━━━━━━━━━━━━━━%0A"
            MSG="$MSG📱 <b>Ứng dụng:</b> <code>$NAME</code>%0A"
            MSG="$MSG📦 <b>Phiên bản:</b> <code>$VER</code>%0A"
            MSG="$MSG━━━━━━━━━━━━━━━━━━%0A"
            MSG="$MSG🔗 <b>Link Repo (Chạm sao chép):</b>%0A<code>$REPO_LINK</code>%0A"
            MSG="$MSG━━━━━━━━━━━━━━━━━━%0A"
            MSG="$MSG📥 <a href='$LINK'>Nhấn để tải IPA trực tiếp</a>"

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
              -d "parse_mode=HTML" \
              -d "text=$MSG"
          fi
