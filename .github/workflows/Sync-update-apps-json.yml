name: "Auto Sync Esign apps.json"

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

concurrency:
  group: sync-apps-json
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Quan trọng: Để lấy đủ lịch sử cho git diff
          ref: main

      - name: "Install Dependencies"
        run: npm install app-info-parser node-fetch@2

      - name: "Update apps.json"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            
            const appsMap = {};
            const eventName = context.eventName;
            let appToNotify = null;

            // Hàm xử lý dữ liệu
            const extractVersion = (f) => (f.match(/[_-]v?(\d+\.\d+(\.\d+)?)/i) || [null, "1.0"])[1];
            const cleanAppName = (f) => f.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();

            // 1. Quét file mới từ Push
            let changedFiles = [];
            if (eventName === 'push') {
              try {
                changedFiles = execSync('git diff --name-only HEAD^ HEAD').toString().split('\n').map(f => f.trim());
              } catch (e) { console.log("Lỗi diff"); }
            }

            // 2. Xử lý thư mục apps/ (Giai đoạn 2: Local Scan)
            if (fs.existsSync('apps')) {
              const files = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              for (const file of files) {
                const path = `apps/${file}`;
                const name = cleanAppName(file);
                const version = extractVersion(file);
                
                let bundleId = "com.unknown.app", perms = { entitlements: [], privacy: {} };
                try {
                  const info = await (new AppInfoParser(path)).parse();
                  bundleId = info.CFBundleIdentifier || bundleId;
                  for (const k in info) if (k.endsWith('UsageDescription')) perms.privacy[k] = info[k];
                } catch (e) {}

                const stats = fs.statSync(path);
                const key = name.toLowerCase();
                if (!appsMap[key]) {
                  appsMap[key] = { name, bundleIdentifier: bundleId, developerName: "Kyic", category: "Utilities", versions: [] };
                }
                
                const vData = { version, date: stats.mtime.toISOString(), size: stats.size, downloadURL: `https://2kgt.github.io/repo/apps/${file}` };
                appsMap[key].versions.push(vData);

                // Ưu tiên app vừa push để thông báo
                if (changedFiles.includes(path)) appToNotify = { ...appsMap[key], ...vData };
              }
            }

            // 3. Xử lý Release (Nếu chưa có app từ push)
            if (!appToNotify && eventName === 'release') {
              const asset = context.payload.release.assets.find(a => a.name.endsWith('.ipa'));
              if (asset) {
                appToNotify = { name: cleanAppName(asset.name), version: extractVersion(asset.name), downloadURL: asset.browser_download_url };
              }
            }

            // --- GIAI ĐOẠN 3: GHI DỮ LIỆU ---
            const finalApps = Object.values(appsMap).map(app => {
              app.versions.sort((a, b) => b.version.localeCompare(a.version, undefined, { numeric: true }));
              return { ...app, ...app.versions[0] };
            });

            fs.writeFileSync('apps.json', JSON.stringify({ name: "Kyic Repo", identifier: "com.2kgt.repo", apps: finalApps }, null, 2));
            if (appToNotify) fs.writeFileSync('current_app.json', JSON.stringify(appToNotify));

      - name: "🚀 Push Metadata (Ghi file trước)"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Bảo lưu dữ liệu tránh bị reset mất
          cp apps.json apps_temp.json
          if [ -f current_app.json ]; then cp current_app.json notify_temp.json; fi
          
          git fetch origin main
          git checkout main
          mv apps_temp.json apps.json
          
          git add apps.json
          git commit -m "Update apps.json [skip ci]" || echo "No changes"
          git push origin main

      - name: "🤖 Telegram Notify (Thông báo sau)"
        run: |
          if [ -f notify_temp.json ]; then
            INFO=$(cat notify_temp.json)
            NAME=$(echo "$INFO" | jq -r '.name')
            VER=$(echo "$INFO" | jq -r '.version')
            LINK=$(echo "$INFO" | jq -r '.downloadURL')
            
            MSG="<b>🚀 REPO CẬP NHẬT</b>%0A📱 App: <code>$NAME</code>%0A📦 Ver: <code>$VER</code>%0A🔗 <a href='$LINK'>Tải trực tiếp IPA</a>"
            
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
              -d "parse_mode=HTML" \
              -d "text=$MSG"
          fi
