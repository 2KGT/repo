name: Auto Sync Sileo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Generate Packages & Release
        id: info # ID này cực kỳ quan trọng để bước cuối có thể gọi dữ liệu
        run: |
          if [ -d "debs" ]; then
            # 1. Trích xuất thông tin Tweak
            LATEST_DEB=$(ls -t debs/*.deb | head -1)
            TWEAK_NAME=$(dpkg-deb -f "$LATEST_DEB" Name)
            TWEAK_VER=$(dpkg-deb -f "$LATEST_DEB" Version)
            
            # Lưu vào outputs của bước này
            echo "tweak_name=$TWEAK_NAME" >> $GITHUB_OUTPUT
            echo "tweak_ver=$TWEAK_VER" >> $GITHUB_OUTPUT

            # 2. Xử lý Packages & Release (Giữ nguyên logic của bạn)
            dpkg-scanpackages -m debs /dev/null > Packages
            sed -i "s/^Name: \(.*\)/Name: \1\nIcon: https:\/\/2kgt.github.io\/repo\/icons\/\1.png/" Packages
            bzip2 -kf Packages
            {
              echo "Origin: Kyic Repository"
              echo "Label: Kyic Repository"
              echo "Suite: stable"
              echo "Version: 1.0"
              echo "Codename: ios"
              echo "Architectures: iphoneos-arm64 iphoneos-arm"
              echo "Components: main"
              echo "Description: Kyic Repository - Kho lưu trữ tweaks & IPA chất lượng cao."
              echo "Icon: icons/Kyic.png"
              echo "Date: $(date -R)"
              echo "Acquire-By-Hash: yes"
            } > Release
          else
            echo "❌ Không tìm thấy thư mục debs"
            exit 1
          fi

      - name: Commit and Push
        id: push # Thêm ID để kiểm tra trạng thái push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Repo (Icons, Packages & Release) [skip ci]"
          file_pattern: "Packages* Release"
          branch: main

      - name: "🤖 Telegram Notify"
        # Chỉ chạy khi bước Push thành công
        if: steps.push.outcome == 'success' || steps.push.outcome == 'skipped'
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
          # Gọi lại dữ liệu từ bước 'info' ở trên
          TWEAK_NAME: ${{ steps.info.outputs.tweak_name }}
          TWEAK_VER: ${{ steps.info.outputs.tweak_ver }}
        run: |
          # 1. Thời gian thực
          REAL_TIME=$(TZ="Asia/Ho_Chi_Minh" date +"%d/%m/%Y %H:%M")

          # 2. Nội dung tin nhắn
          MSG="<b>✅ Kyic Sileo Update</b>
          ──────────────────
          📱 <b>Tweak:</b> <code>${TWEAK_NAME:-Cập nhật Repo}</code>
          💡 <b>Phiên bản:</b> <code>${TWEAK_VER:-Latest}</code>
          📊 <b>Trạng thái:</b> <code>Hệ thống đã sẵn sàng</code>
          ⏰ <b>Thời gian:</b> <code>$REAL_TIME</code>
          ──────────────────
          🤩 <i>Hệ thống tự động Kyic Engine</i>"

          # 3. Nút bấm cùng hàng, tách biệt
          KEYBOARD=$(cat <<EOF
          {
            "inline_keyboard": [
              [
                { "text": "🌐 Kyic Repo", "url": "https://2kgt.github.io/repo/" },
                { "text": "📥 Download IPA", "url": "https://github.com/${{ github.repository }}/releases" }
              ]
            ]
          }
          EOF
          )

          # 4. Gửi qua API
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$TO" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "reply_markup=$KEYBOARD"
