name: Auto sync sileo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Generate Packages & Release
        run: |
          if [ -d "debs" ]; then
            # 1. Tạo file Packages thô
            cd debs
            dpkg-scanpackages -m . /dev/null > ../Packages
            cd ..

            # 2. Xử lý gán Icon cho từng Tweak từ thư mục icons/
            touch Packages.new
            while IFS= read -r line; do
              echo "$line" >> Packages.new
              if [[ $line == Package:* ]]; then
                PKG_ID=$(echo $line | awk '{print $2}')
                
                # Tìm file deb chứa ID gói này
                DEB_FILE=$(find debs -name "*.deb" -exec grep -l "Package: $PKG_ID" {} + | head -n 1)
                
                if [ -n "$DEB_FILE" ]; then
                  # Lấy trường Name từ Control của file deb
                  TWEAK_NAME=$(dpkg-deb -f "$DEB_FILE" Name)
                  
                  if [ -n "$TWEAK_NAME" ]; then
                    # Tự động chèn link icon (icons/Tên_Tweak.png)
                    echo "Icon: https://raw.githubusercontent.com/${{ github.repository }}/main/icons/${TWEAK_NAME}.png" >> Packages.new
                  fi
                fi
              fi
            done < Packages
            mv Packages.new Packages
            
            # 3. Nén Packages để Sileo đọc nhanh hơn
            bzip2 -kf Packages

            # 4. Cập nhật file Release (Chứa Icon chính của Repo)
            echo "Origin: Kyic Repository" > Release
            echo "Label: Kyic Repository" >> Release
            echo "Suite: stable" >> Release
            echo "Version: 1.0" >> Release
            echo "Codename: ios" >> Release
            echo "Architectures: iphoneos-arm64 iphoneos-arm" >> Release
            echo "Components: main" >> Release
            echo "Description: Kyic Repository - Kho lưu trữ tweaks & IPA chất lượng cao." >> Release
            
            # Đường dẫn icon Repo trong thư mục icons/
            echo "Icon: https://raw.githubusercontent.com/${{ github.repository }}/main/icons/sileo.png" >> Release
            echo "Date: $(date -R)" >> Release
            echo "Acquire-By-Hash: yes" >> Release
            
            echo "✅ Đã cập nhật xong Packages, bz2 và Release"
          else
            echo "❌ Lỗi: Không tìm thấy thư mục debs"
            exit 1
          fi

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Repo (Icons, Packages & Release) [skip ci]"
          file_pattern: "Packages* Release"
          branch: main
