      - name: Generate Packages & Release
        run: |
          if [ -d "debs" ]; then
            # 1. Tạo file Packages thô trước
            cd debs
            dpkg-scanpackages -m . /dev/null > ../Packages
            cd ..

            # 2. Logic quét từng file deb để gán Icon dựa trên Name trong Control
            # Tạo một file tạm để lưu Packages mới
            touch Packages.new
            
            # Đọc file Packages hiện tại để xử lý từng block dữ liệu
            while IFS= read -r line; do
              echo "$line" >> Packages.new
              
              # Nếu dòng hiện tại là 'Package: ...', ta sẽ tìm file deb tương ứng
              if [[ $line == Package:* ]]; then
                PKG_ID=$(echo $line | awk '{print $2}')
                # Tìm file deb dựa trên Package ID
                DEB_FILE=$(find debs -name "*.deb" -exec grep -l "Package: $PKG_ID" {} + | head -n 1)
                
                if [ -n "$DEB_FILE" ]; then
                  # Lấy Name từ file control (dùng tên hiển thị)
                  TWEAK_NAME=$(dpkg-deb -f "$DEB_FILE" Name)
                  
                  # Nếu có Name, chèn dòng Icon ngay sau dòng Package
                  if [ -n "$TWEAK_NAME" ]; then
                    echo "Icon: https://raw.githubusercontent.com/2KGT/repo/main/icons/${TWEAK_NAME}.png" >> Packages.new
                  fi
                fi
              fi
            done < Packages
            
            # Thay thế file cũ bằng file đã gán Icon
            mv Packages.new Packages
            
            # 3. Nén file
            bzip2 -kf Packages
            
            # 4. Ghi file Release
            echo "Origin: Kyic Repository" > Release
            echo "Label: Kyic Repository" >> Release
            echo "Suite: stable" >> Release
            echo "Version: 1.0" >> Release
            echo "Codename: ios" >> Release
            echo "Architectures: iphoneos-arm64 iphoneos-arm" >> Release
            echo "Components: main" >> Release
            echo "Description: Kyic Repository - Kho lưu trữ tweaks & IPA chất lượng cao." >> Release
            echo "Icon: https://raw.githubusercontent.com/2KGT/repo/main/icons/sileo.png" >> Release
            echo "Date: $(date -R)" >> Release
            
            echo "✅ Tự động quét gán icon theo tên Tweak thành công!"
          else
            echo "❌ Không tìm thấy thư mục debs"
            exit 1
          fi
