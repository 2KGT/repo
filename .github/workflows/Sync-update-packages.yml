name: Auto sync sileo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Generate Packages & Release
        run: |
          if [ -d "debs" ]; then
            # 1. Tạo file Packages thô từ thư mục debs
            dpkg-scanpackages -m debs /dev/null > Packages

            # 2. Xử lý gán Icon cho từng Tweak
            # Lưu ý: Tên file ảnh trong icons/ phải khớp 100% với Name của tweak
            touch Packages.new
            while IFS= read -r line; do
              echo "$line" >> Packages.new
              # Khi gặp dòng Name, chèn ngay dòng Icon bên dưới
              if [[ $line == Name:* ]]; then
                TWEAK_NAME=$(echo "$line" | cut -d' ' -f2-)
                # Sử dụng link GitHub Pages để Sileo nhận diện tốt hơn
                echo "Icon: https://2kgt.github.io/repo/icons/${TWEAK_NAME}.png" >> Packages.new
              fi
            done < Packages
            mv Packages.new Packages
            
            # 3. Nén file
            bzip2 -kf Packages

            # 4. Cập nhật file Release (Cấu hình Kyic Repository)
            {
              echo "Origin: Kyic Repository"
              echo "Label: Kyic Repository"
              echo "Suite: stable"
              echo "Version: 1.0"
              echo "Codename: ios"
              echo "Architectures: iphoneos-arm64 iphoneos-arm"
              echo "Components: main"
              echo "Description: Kyic Repository - Kho lưu trữ tweaks & IPA chất lượng cao."
              # Icon chính của Repo - dùng đường dẫn tương đối để tránh lỗi raw content
              echo "Icon: icons/Kyic.png"
              echo "Date: $(date -R)"
              echo "Acquire-By-Hash: yes"
            } > Release
            
            echo "✅ Đã cập nhật xong Packages, bz2 và Release cho Kyic Repository"
          else
            echo "❌ Lỗi: Không tìm thấy thư mục debs"
            exit 1
          fi

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Repo (Icons, Packages & Release) [skip ci]"
          file_pattern: "Packages* Release"
          branch: main

      - name: "🤖 Telegram Notify"
        run: |
          if [ -f notify_temp.json ]; then
            INFO=$(cat notify_temp.json)
            NAME=$(echo "$INFO" | jq -r '.name')
            VER=$(echo "$INFO" | jq -r '.version')
            LINK=$(echo "$INFO" | jq -r '.downloadURL')
            
            MSG=$(printf "<b>⭐ Kyic repository update</b>\n")
            MSG="${MSG}--------------------------------\n"
            MSG="${MSG}📱 <b>App:</b> <code>$NAME</code>\n"
            MSG="${MSG}💡 <b>Ver:</b> <code>$VER</code>\n"
            MSG="${MSG}💯 <b>Status:</b> <code>Ready ✅</code>\n"
            MSG="${MSG}--------------------------------\n"
            MSG="${MSG}🤩 <i>Enjoy your experience!</i>"

            KEYBOARD=$(jq -n -c '{
              inline_keyboard: [[
                {text: "🌐 Kyic Repo", url: "https://2kgt.github.io/repo/"},
                {text: "📥 Tải xuống", url: $link}
              ]]
            }' --arg link "$LINK")

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
              -d "parse_mode=HTML" \
              --data-urlencode "text=$MSG" \
              -d "reply_markup=$KEYBOARD"
          else
            echo "File notify_temp.json not found, skipping notification."
          fi

