name: Auto Sync Sileo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Generate Packages & Release
        id: info
        run: |
          if [ -d "debs" ]; then
            # 1. Tìm file deb mới nhất vừa được thêm vào
            LATEST_DEB_PATH=$(ls -t debs/*.deb | head -1)
            FILENAME=$(basename "$LATEST_DEB_PATH")
            
            # 2. Trích xuất thông tin từ file deb
            TWEAK_NAME=$(dpkg-deb -f "$LATEST_DEB_PATH" Name)
            TWEAK_VER=$(dpkg-deb -f "$LATEST_DEB_PATH" Version)
            
            # 3. Tạo link download trực tiếp từ GitHub Pages
            # Thay 'user/repo' bằng đúng tên user và repo của bạn nếu không dùng biến môi trường
            DEB_URL="https://2kgt.github.io/repo/debs/$FILENAME"
            
            # Xuất dữ liệu ra output
            echo "tweak_name=$TWEAK_NAME" >> $GITHUB_OUTPUT
            echo "tweak_ver=$TWEAK_VER" >> $GITHUB_OUTPUT
            echo "deb_url=$DEB_URL" >> $GITHUB_OUTPUT

            # 4. Logic tạo Packages & Release (Giữ nguyên)
            dpkg-scanpackages -m debs /dev/null > Packages
            sed -i "s/^Name: \(.*\)/Name: \1\nIcon: https:\/\/2kgt.github.io\/repo\/icons\/\1.png/" Packages
            bzip2 -kf Packages
            {
              echo "Origin: Kyic Repository"
              echo "Label: Kyic Repository"
              echo "Suite: stable"
              echo "Version: 1.0"
              echo "Codename: ios"
              echo "Architectures: iphoneos-arm64 iphoneos-arm"
              echo "Components: main"
              echo "Description: Kyic Repository - Kho lưu trữ tweaks chất lượng cao."
              echo "Icon: icons/Kyic.png"
              echo "Date: $(date -R)"
              echo "Acquire-By-Hash: yes"
            } > Release
          else
            echo "❌ Không tìm thấy thư mục debs"
            exit 1
          fi

      - name: Commit and Push
        id: push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Sileo Repo [skip ci]"
          file_pattern: "Packages* Release"
          branch: main

      - name: "🤖 Telegram Notify"
        if: steps.push.outcome == 'success' || steps.push.outcome == 'skipped'
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
          TWEAK_NAME: ${{ steps.info.outputs.tweak_name }}
          TWEAK_VER: ${{ steps.info.outputs.tweak_ver }}
          DEB_URL: ${{ steps.info.outputs.deb_url }}
        run: |
          REAL_TIME=$(TZ="Asia/Ho_Chi_Minh" date +"%d/%m/%Y %H:%M")

          # Nội dung thông báo tập trung vào Tweak
          MSG="<b>✅ Kyic Repository Sileo</b>
          ──────────────────
          📦 <b>Tweak:</b> <code>${TWEAK_NAME}</code>
          💡 <b>Phiên bản:</b> <code>${TWEAK_VER}</code>
          📊 <b>Trạng thái:</b> <code>Đã cập nhật kho</code>
          ⏰ <b>Thời gian:</b> <code>$REAL_TIME</code>
          ──────────────────
          🤩 <i>Hệ thống tự động Kyic Engine</i>"

          # Thiết kế nút theo yêu cầu mới
          KEYBOARD=$(cat <<EOF
          {
            "inline_keyboard": [
              [
                { "text": "🌐 Kyic Repo Sileo", "url": "https://2kgt.github.io/repo/" },
                { "text": "📥 Download Deb", "url": "$DEB_URL" }
              ]
            ]
          }
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$TO" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "reply_markup=$KEYBOARD"
