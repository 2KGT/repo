name: Auto sync sileo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Generate Packages & Release
        id: info # Thêm ID để lấy dữ liệu cho bước sau
        run: |
          if [ -d "debs" ]; then
            # 1. Lấy thông tin file deb mới nhất để thông báo
            LATEST_DEB=$(ls -t debs/*.deb | head -1)
            TWEAK_NAME=$(dpkg-deb -f "$LATEST_DEB" Name)
            TWEAK_VER=$(dpkg-deb -f "$LATEST_DEB" Version)
            echo "tweak_name=$TWEAK_NAME" >> $GITHUB_OUTPUT
            echo "tweak_ver=$TWEAK_VER" >> $GITHUB_OUTPUT

            # 2. Tạo file Packages & xử lý Icon
            dpkg-scanpackages -m debs /dev/null > Packages
            touch Packages.new
            while IFS= read -r line; do
              echo "$line" >> Packages.new
              if [[ $line == Name:* ]]; then
                NAME_VAL=$(echo "$line" | cut -d' ' -f2-)
                echo "Icon: https://2kgt.github.io/repo/icons/${NAME_VAL}.png" >> Packages.new
              fi
            done < Packages
            mv Packages.new Packages
            bzip2 -kf Packages

            # 3. Cập nhật file Release
            {
              echo "Origin: Kyic Repository"
              echo "Label: Kyic Repository"
              echo "Suite: stable"
              echo "Version: 1.0"
              echo "Codename: ios"
              echo "Architectures: iphoneos-arm64 iphoneos-arm"
              echo "Components: main"
              echo "Description: Kyic Repository - Kho lưu trữ tweaks & IPA chất lượng cao."
              echo "Icon: icons/Kyic.png"
              echo "Date: $(date -R)"
              echo "Acquire-By-Hash: yes"
            } > Release
            echo "✅ Cập nhật xong Packages & Release"
          else
            echo "❌ Không tìm thấy thư mục debs"
            exit 1
          fi


      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Repo (Icons, Packages & Release) [skip ci]"
          file_pattern: "Packages* Release"
          branch: main

      - name: "🤖 Telegram Notify"
        if: success()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
          TWEAK_NAME: ${{ steps.info.outputs.tweak_name }}
          TWEAK_VER: ${{ steps.info.outputs.tweak_ver }}
        run: |
          # 1. Thời gian thực (Hà Nội)
          REAL_TIME=$(TZ="Asia/Ho_Chi_Minh" date +"%d/%m/%Y %H:%M")

          # 2. Nội dung tin nhắn
          MSG="<b>✅ Kyic Sileo Update</b>
          ──────────────────
          📱 <b>Tweak:</b> <code>${TWEAK_NAME:-Kyic Repo}</code>
          💡 <b>Phiên bản:</b> <code>${TWEAK_VER:-Latest}</code>
          📊 <b>Trạng thái:</b> <code>Ready</code>
          ⏰ <b>Thời gian:</b> <code>$REAL_TIME</code>
          ──────────────────
          🤩 <i>Hệ thống tự động Kyic Engine</i>"

          # 3. Nút bấm: Hai nút cùng hàng ngang
          # Nút 1 dẫn về trang chủ Repo, Nút 2 mở trực tiếp trong Sileo (nếu người dùng dùng iPhone)
          KEYBOARD=$(cat <<EOF
          {
            "inline_keyboard": [
              [
                { "text": "🌐 Kyic Repo", "url": "https://2kgt.github.io/repo/" },
                { "text": "📥 Thêm vào Sileo", "url": "sileo://source/https://2kgt.github.io/repo/" }
              ]
            ]
          }
          EOF
          )

          # 4. Gửi qua Telegram
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$TO" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "reply_markup=$KEYBOARD"
