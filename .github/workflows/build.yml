name: Build AutoAC + Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Loại tăng version (patch / minor / major)'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # === DI CHUYỂN MÃ NGUỒN TỪ src/autoac/ RA GỐC ĐỂ BUILD ===
      - name: Prepare AutoAC source
        run: |
          echo "Di chuyển mã nguồn từ src/autoac/ ra gốc repo để build..."
          cp -r src/autoac/* . || true
          ls -la

      # Tăng version tự động
      - name: Bump Version Automatically
        id: bump
        run: |
          CURRENT_VERSION=$(grep "^Version:" control | awk '{print $2}')
          echo "Current version: $CURRENT_VERSION"
          
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          
          BUMP_TYPE=${{ github.event.inputs.bump_type || 'patch' }}
          
          if [ "$BUMP_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          
          sed -i '' "s/^Version: .*/Version: $NEW_VERSION/" control
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # Cài Theos
      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      # Clone YouTubeHeader
      - name: Clone YouTubeHeader
        run: |
          git clone https://github.com/PoomSmart/YouTubeHeader $THEOS/include/YouTubeHeader || echo "YouTubeHeader already exists or clone failed"

      # Build DEB
      - name: Build DEB
        run: |
          make package FINALPACKAGE=1

      # Upload Artifact
      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoAC-v${{ steps.bump.outputs.version }}
          path: packages/*.deb

      # Commit version & Tag
      - name: Commit new version & Create Tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add control
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]" || echo "No changes to commit"
          git tag "v${{ steps.bump.outputs.version }}" || true
          git push origin main --tags || true

      # Tạo GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: AutoAC v${{ steps.bump.outputs.version }}
          files: packages/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}