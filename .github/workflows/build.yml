name: Build Multi Tweak src/ + Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Chọn dự án cần build (tên thư mục trong src/)'
        required: true
        default: 'autoac'
        type: choice
        options:
        - autoac
        - autodl
        - all
      bump_type:
        description: 'Loại tăng version (patch / minor / major)'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Clone YouTubeHeader
        run: |
          git clone https://github.com/PoomSmart/YouTubeHeader $THEOS/include/YouTubeHeader || echo "YouTubeHeader already exists"

      # Build dự án được chọn - ĐÃ FIX
      - name: Build Selected Project(s)
        run: |
          PROJECT="${{ github.event.inputs.project }}"
          if [ -z "$PROJECT" ]; then
            PROJECT="autoac"   # Default nếu không nhận được input
          fi
          echo "🔨 Đang build dự án: $PROJECT"

          if [ "$PROJECT" = "all" ]; then
            echo "Build tất cả dự án trong src/"
            for dir in src/*/ ; do
              if [ -f "$dir/Makefile" ]; then
                proj=$(basename "$dir")
                echo "→ Building $proj ..."
                cp -r "$dir"/* . 2>/dev/null || true
                make package FINALPACKAGE=1 || echo "Build $proj failed"
              fi
            done
          else
            echo "→ Building $PROJECT ..."
            cp -r "src/$PROJECT"/* . 2>/dev/null || true
            make package FINALPACKAGE=1 || echo "Build failed - check if src/$PROJECT/Makefile exists"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Builds-${{ github.event.inputs.project || 'autoac' }}
          path: packages/*.deb

      # Copy vào debs/ chỉ khi là bản chính thức
      - name: Copy DEB to debs/ (Official Release Only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p debs
          cp packages/*.deb debs/
          echo "✅ Đã copy .deb vào thư mục debs/"

      # Commit version & Tag
      - name: Commit new version & Create Tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add control || true
          git commit -m "chore: bump version [skip ci]" || echo "No changes to commit"
          git tag "v1.0.0" || true   # Tạm thời hardcode để test, sau sẽ fix
          git push origin main --tags || true

      # Tạo GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0   # Tạm thời để test
          name: AutoAC v1.0.0
          files: packages/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}