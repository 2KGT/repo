name: Auto Generate Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Generate Packages (hỗ trợ arm + arm64)
        run: |
          cd debs
          # Scan tất cả file .deb, hỗ trợ multi-architecture
          dpkg-scanpackages -m . /dev/null > ../Packages
          cd ..
          # Nén Packages.bz2
          bzip2 -kf Packages
          echo "✅ Packages & Packages.bz2 đã được tạo tự động!"
          ls -l Packages*

      - name: Commit Packages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update Packages & Packages.bz2 from debs/"
          file_pattern: "Packages*"