name: Generate Packages

on:
  push:
    paths:
      - 'debs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Generate Packages
        run: |
          cd debs
          dpkg-scanpackages -m . /dev/null > ../Packages
          cd ..
          bzip2 -kf Packages
          echo "✅ Packages.bz2 đã được tạo tự động!"
