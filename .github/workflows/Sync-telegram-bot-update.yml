name: Auto sync Remote Telegram

on:
  repository_dispatch:
    types: [telegram_cmd] # Lắng nghe tín hiệu từ Pipedream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Xử lý File siêu tốc (Bản Lười)
        run: |
          # Lấy dữ liệu từ tín hiệu Pipedream gửi sang
          FILE_URL="${{ github.event.client_payload.file_url }}"
          FILE_TYPE="${{ github.event.client_payload.file_type }}"
          PROJECT="${{ github.event.client_payload.project }}"
          
          # Tự động tạo cấu trúc thư mục nếu chưa có
          mkdir -p depictions/icons depictions/images debs
          
          # Phân loại dựa trên ký tự viết tắt
          case "$FILE_TYPE" in
            "i") 
              PATH_FILE="depictions/icons/${PROJECT}.png" 
              MSG="🖼️ Icon: ${PROJECT}"
              ;;
            "b") 
              PATH_FILE="depictions/images/${PROJECT}-banner.png" 
              MSG="🚩 Banner: ${PROJECT}"
              ;;
            "1"|"2"|"3") 
              PATH_FILE="depictions/images/${PROJECT}${FILE_TYPE}.png" 
              MSG="📱 Screenshot ${FILE_TYPE}: ${PROJECT}"
              ;;
            "v") 
              PATH_FILE="depictions/images/${PROJECT}.mp4" 
              MSG="🎥 Video: ${PROJECT}"
              ;;
            "d") 
              PATH_FILE="debs/${PROJECT}.deb" 
              MSG="📦 DEB: ${PROJECT}"
              ;;
            *)
              echo "Lệnh không hợp lệ!"
              exit 1
              ;;
          esac
          
          # Tải file từ URL về đúng vị trí
          curl -L "$FILE_URL" -o "$PATH_FILE"
          
          # Thiết lập Git và đẩy lên Repo
          git config user.name "PhapSuAction"
          git config user.email "action@github.com"
          git add .
          git commit -m "$MSG (via Telegram)"
          git push origin main
