name: 🏭 Refinery - Lò Tinh Luyện Linh Hồn

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Dán Link IPA YouTube (Decrypted) vào đây'
        required: true

jobs:
  refine_process:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🏗️ Setup Tools (Dọn xưởng)
        run: |
          # Không cần ipsw nữa, dùng công cụ chính chủ Apple
          mkdir -p src/refinery/staging
          mkdir -p headers-repo/YouTube

      - name: 🚚 Bốc vác Trùm Cuối (Input)
        run: |
          # 1. Tải IPA
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          
          # 2. Xẻ xác IPA gắp file thực thi chính 'YouTube'
          unzip -j app.ipa "Payload/*.app/YouTube" -d src/refinery/staging/
          
          # Kiểm tra xem Trùm đã vào lò chưa
          ls -l src/refinery/staging/YouTube

      - name: 💎 Chế tác Linh hồn (.tbd) & Cầu nối (Bridge)
        run: |
          TARGET_BIN="src/refinery/staging/YouTube"
          OUT_DIR="headers-repo/YouTube"
          
          echo "🔨 Đang luyện file .tbd (Linh hồn)..."
          # Chiêu 3: Tạo file .tbd cực nhẹ để Linker nhận mặt Class
          xcrun tapi stubify "$TARGET_BIN" --out-file "$OUT_DIR/YouTube.tbd"
          
          echo "🌉 Đang bắc cầu (Bridge.h)..."
          # Tạo file Header tổng chứa tất cả các Class để "nhận vơ" trong code
          echo "// Refinery Auto-Generated Bridge Header" > "$OUT_DIR/YouTube-Bridge.h"
          echo "@import Foundation;" >> "$OUT_DIR/YouTube-Bridge.h"
          echo "@import UIKit;" >> "$OUT_DIR/YouTube-Bridge.h"
          
          # Lọc danh sách Class Objective-C và tiêm @class vào Header
          nm -gU "$TARGET_BIN" | grep "OBJC_CLASS_$_" | sed 's/.*OBJC_CLASS_$_\(.*\)/@class \1;/' >> "$OUT_DIR/YouTube-Bridge.h"
          
          echo "✅ Đã chế tác xong tại: $OUT_DIR"

      - name: 🎁 Nhập kho (Push to Repo)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add headers-repo/
          git commit -m "💎 Refinery: Luyện xong Linh hồn YouTube (.tbd & Bridge.h)" || exit 0
          git push

      - name: 🗑️ Dọn rác (-rf)
        if: always()
        run: |
          rm -rf src/refinery/staging/
          rm -f app.ipa
          echo "🧹 Xưởng sạch bong, nạc đã nằm trong kho!"
