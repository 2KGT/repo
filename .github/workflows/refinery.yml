name: 🏭 Refinery - Lò Tinh Luyện (Phân loại kho)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Dán Link IPA'
        required: true
      folder_name:
        description: 'Tên thư mục con trong headers/ (Vd: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  refine_process:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🚚 Bốc vác & Xẻ thịt
        run: |
          mkdir -p src/refinery/staging
          # Gắn gốc headers/ với tên thư mục ông giáo nhập
          OUT_DIR="headers/${{ github.event.inputs.folder_name }}"
          mkdir -p "$OUT_DIR"
          
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          # Gắp file thực thi (YouTube hoặc bất kỳ app nào)
          unzip -j app.ipa "Payload/*.app/*" -d src/refinery/staging/ 2>/dev/null || true
          
          # Tìm file thực thi chính (file nặng nhất trong staging)
          TARGET_BIN=$(ls -S src/refinery/staging/ | head -1)
          echo "TARGET_NAME=$TARGET_BIN" >> $GITHUB_ENV
          mv "src/refinery/staging/$TARGET_BIN" src/refinery/staging/main_bin


      - name: 💎 Chế tác Cầu nối (Bản Khảo Cổ Thô)
        run: |
          TARGET_BIN="src/refinery/staging/main_bin"
          OUT_DIR="headers/${{ github.event.inputs.folder_name }}"
          
          echo "// Refinery Bridge Header (Brute Force)" > "$OUT_DIR/Bridge.h"
          echo "@import Foundation; @import UIKit;" >> "$OUT_DIR/Bridge.h"
          
          # 1. Cố đấm ăn xôi với nm (vẫn giữ để lấy hàng xịn nếu có)
          nm -gU "$TARGET_BIN" 2>/dev/null | grep -E "OBJC_CLASS_\$_" | sed 's/.*OBJC_CLASS_\$_\(.*\)/@class \1;/' >> "$OUT_DIR/Bridge.h"
          
          # 2. CHIÊU CUỐI: Quét thô toàn bộ chuỗi ký tự trong file
          # Lọc những chuỗi bắt đầu bằng YT, ML, AS có độ dài từ 10-60 ký tự.
          # Đây là nơi 'YTMainViewController' đang ẩn nấp.
          strings "$TARGET_BIN" | grep -E "^(YT|ML|AS)[A-Z][A-Za-z0-9_]{5,60}$" | sort -u | sed 's/.*/@class &;/' >> "$OUT_DIR/Bridge.h"
          
          echo "📊 Thống kê: $(wc -l < "$OUT_DIR/Bridge.h") Class đã được tìm thấy."

      - name: 🎁 Nhập kho (Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add headers/
          git commit -m "💎 Refinery: Thêm linh hồn ${{ github.event.inputs.folder_name }} vào kho" || exit 0
          git push

      - name: 🗑️ Dọn rác
        if: always()
        run: rm -rf src/refinery/staging/ app.ipa
