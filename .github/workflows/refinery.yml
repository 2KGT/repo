name: 🏭 Refinery - Mổ Trùm Cuối YouTube

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Dán Link IPA vào đây'
        required: true

jobs:
  refine_process:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🏗️ Setup Tools
        run: |
          brew install blacktop/tap/ipsw
          mkdir -p src/refinery/staging/headers
          mkdir -p headers-repo/YouTube

      - name: 🚚 Bốc vác Trùm Cuối
        run: |
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          # Tìm và gắp file thực thi chính 'YouTube' nhè vào staging
          unzip -j app.ipa "Payload/*.app/YouTube" -d src/refinery/staging/
          ls -l src/refinery/staging/

      - name: 🔪 Xẻ thịt bằng nm (Siêu nhẹ - Anti-Exit-9)
        run: |
          # 1. Dùng nm để lọc ra tất cả các Class Objective-C (tiền tố OBJC_CLASS_$_)
          nm -gU src/refinery/staging/YouTube | grep "OBJC_CLASS_$_" | sed 's/.*OBJC_CLASS_$_\(.*\)/\1/' > src/refinery/staging/classes.txt
          
          # 2. Tạo folder kho
          mkdir -p headers-repo/YouTube
          
          # 3. Với mỗi Class tìm được, ta tạo một file .h "rỗng" nhưng đủ để bắc cầu
          # Chỉ lấy 500 Class quan trọng nhất (hoặc lọc theo YT) để tránh làm loãng kho
          grep "YT" src/refinery/staging/classes.txt | head -n 500 | while read -r className; do
            echo -e "@interface $className : NSObject\n@end" > "headers-repo/YouTube/$className.h"
          done
          
          echo "✅ Đã tạo xong 500 bản thiết kế bắc cầu cho YouTube!"

          
          # 3. Kiểm tra xem đã có nạc chưa
          ls -R src/refinery/staging/headers | head -n 20


      - name: 🥩 Lọc xương (Refinery Logic)
        run: |
          RAW_DIR="src/refinery/staging/headers"
          OUT_DIR="headers-repo/YouTube"
          
          # Chỉ lọc những file .h có nội dung (tránh file 0kb)
          find "$RAW_DIR" -type f -name "*.h" -size +1c | while read -r file; do
            filename=$(basename "$file")
            # Lọc xương dăm
            sed -i '' -E '/#import ".*"/d; /#include ".*"/d' "$file"
            # Tiêm forward declaration
            echo -e "@class NSString, NSArray, NSDictionary, UIView, UIViewController, NSData, UIButton, UILabel;\n$(cat "$file")" > "$file"
            # Nhập kho
            mv "$file" "$OUT_DIR/$filename"
          done

      - name: 🎁 Nhập kho (Push to Repo)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add headers-repo/
          git commit -m "🥩 Refinery: Đã mổ trùm cuối YouTube ($(date +'%Y-%m-%d'))" || exit 0
          git push

      - name: 🗑️ Dọn rác (-rf)
        if: always()
        run: |
          rm -rf src/refinery/staging/
          rm -f app.ipa
          echo "🧹 Xưởng sạch sẽ, trùm cuối đã bị xẻ thịt!"
