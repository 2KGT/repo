name: 🏭 Refinery - Lò Tinh Luyện (Phân loại kho)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Dán Link IPA'
        required: true
      folder_name:
        description: 'Tên thư mục con trong headers/ (Vd: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  refine_process:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🚚 Bốc vác & Xẻ thịt
        run: |
          mkdir -p src/refinery/staging
          # Gắn gốc headers/ với tên thư mục ông giáo nhập
          OUT_DIR="headers/${{ github.event.inputs.folder_name }}"
          mkdir -p "$OUT_DIR"
          
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          # Gắp file thực thi (YouTube hoặc bất kỳ app nào)
          unzip -j app.ipa "Payload/*.app/*" -d src/refinery/staging/ 2>/dev/null || true
          
          # Tìm file thực thi chính (file nặng nhất trong staging)
          TARGET_BIN=$(ls -S src/refinery/staging/ | head -1)
          echo "TARGET_NAME=$TARGET_BIN" >> $GITHUB_ENV
          mv "src/refinery/staging/$TARGET_BIN" src/refinery/staging/main_bin

      - name: 💎 Chế tác Cầu nối (Bridge Header)
        run: |
          TARGET_BIN="src/refinery/staging/main_bin"
          OUT_DIR="headers/${{ github.event.inputs.folder_name }}"
          APP_NAME="${{ env.TARGET_NAME }}"
          
          echo "🌉 Đang luyện Bridge.h cho $APP_NAME..."
          echo "// Refinery Bridge Header: $APP_NAME" > "$OUT_DIR/Bridge.h"
          echo "@import Foundation; @import UIKit;" >> "$OUT_DIR/Bridge.h"
          
          # 1. Quét danh sách Class và tiêm vào Bridge
          # Lệnh nm này cực kỳ lành, cân được cả Executable lẫn Dylib
          nm -gU "$TARGET_BIN" | grep "OBJC_CLASS_$_" | sed 's/.*OBJC_CLASS_$_\(.*\)/@class \1;/' >> "$OUT_DIR/Bridge.h"
          
          # 2. Tạo một file ký hiệu giả để Theos không bắt bẻ (Tùy chọn)
          echo "Đây là danh mục Class của $APP_NAME, dùng Bridge.h để hook." > "$OUT_DIR/ReadMe.txt"
          
          echo "✅ Đã chế tác xong Bridge.h tại: $OUT_DIR"


      - name: 🎁 Nhập kho (Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add headers/
          git commit -m "💎 Refinery: Thêm linh hồn ${{ github.event.inputs.folder_name }} vào kho" || exit 0
          git push

      - name: 🗑️ Dọn rác
        if: always()
        run: rm -rf src/refinery/staging/ app.ipa
