name: 🏭 Refinery - Lò Tinh Luyện (Phân loại kho)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Dán Link IPA'
        required: true
      folder_name:
        description: 'Tên thư mục con trong headers/ (Vd: YouTubeHeader)'
        required: true
        default: 'YouTubeHeader'

jobs:
  refine_process:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🚚 Bốc vác & Xẻ thịt
        run: |
          mkdir -p src/refinery/staging
          # Gắn gốc headers/ với tên thư mục ông giáo nhập
          OUT_DIR="headers/${{ github.event.inputs.folder_name }}"
          mkdir -p "$OUT_DIR"
          
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          # Gắp file thực thi (YouTube hoặc bất kỳ app nào)
          unzip -j app.ipa "Payload/*.app/*" -d src/refinery/staging/ 2>/dev/null || true
          
          # Tìm file thực thi chính (file nặng nhất trong staging)
          TARGET_BIN=$(ls -S src/refinery/staging/ | head -1)
          echo "TARGET_NAME=$TARGET_BIN" >> $GITHUB_ENV
          mv "src/refinery/staging/$TARGET_BIN" src/refinery/staging/main_bin

      - name: 💎 Chế tác Cầu nối (Bản vá lưới Siêu cấp)
        run: |
          TARGET_BIN="src/refinery/staging/main_bin"
          OUT_DIR="headers/${{ github.event.inputs.folder_name }}"
          
          echo "// Refinery Bridge Header (Fixed)" > "$OUT_DIR/Bridge.h"
          echo "@import Foundation; @import UIKit;" >> "$OUT_DIR/Bridge.h"
          
          # Dùng lệnh nm với các cờ mạnh hơn để quét cả những Symbol bị ẩn
          # Sau đó lọc lấy những chuỗi bắt đầu bằng YT, ML, hoặc các tiền tố quen thuộc
          nm -gU "$TARGET_BIN" 2>/dev/null | grep -E "OBJC_CLASS_\$_(YT|ML|AS|G|YTI)" | sed 's/.*OBJC_CLASS_\$_\(.*\)/@class \1;/' | sort -u >> "$OUT_DIR/Bridge.h"
          
          # Nếu vẫn ít quá, dùng chiêu cuối: Quét chuỗi (strings)
          if [ $(wc -l < "$OUT_DIR/Bridge.h") -lt 10 ]; then
            echo "⚠️ nm tịt ngòi, chuyển sang quét chuỗi (strings)..."
            strings "$TARGET_BIN" | grep -E "^(YT|ML|AS)[A-Z][A-Za-z0-9_]{5,64}$" | sort -u | sed 's/.*/@class &;/' >> "$OUT_DIR/Bridge.h"
          fi

      - name: 🎁 Nhập kho (Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add headers/
          git commit -m "💎 Refinery: Thêm linh hồn ${{ github.event.inputs.folder_name }} vào kho" || exit 0
          git push

      - name: 🗑️ Dọn rác
        if: always()
        run: rm -rf src/refinery/staging/ app.ipa
