name: 🏭 Refinery - Lò Tinh Luyện (Tùy chỉnh kho)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Dán Link IPA YouTube'
        required: true
      output_path:
        description: 'Thư mục đổ hàng (Vd: headers/YouTubeHeader)'
        required: true
        default: 'headers/YouTubeHeader'

jobs:
  refine_process:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🚚 Bốc vác & Xẻ thịt
        run: |
          # 1. Tạo folder làm việc
          mkdir -p src/refinery/staging
          OUT_DIR="${{ github.event.inputs.output_path }}"
          mkdir -p "$OUT_DIR"
          
          # 2. Tải và gắp Trùm Cuối
          curl -L "${{ github.event.inputs.ipa_url }}" -o app.ipa
          unzip -j app.ipa "Payload/*.app/YouTube" -d src/refinery/staging/

      - name: 💎 Chế tác Linh hồn & Cầu nối
        run: |
          TARGET_BIN="src/refinery/staging/YouTube"
          OUT_DIR="${{ github.event.inputs.output_path }}"
          
          echo "🔨 Luyện .tbd vào $OUT_DIR..."
          xcrun tapi stubify "$TARGET_BIN" -o "$OUT_DIR/YouTube.tbd"
          
          echo "🌉 Luyện Bridge.h vào $OUT_DIR..."
          echo "// Refinery Auto-Generated Bridge Header" > "$OUT_DIR/YouTube-Bridge.h"
          echo "@import Foundation;" >> "$OUT_DIR/YouTube-Bridge.h"
          echo "@import UIKit;" >> "$OUT_DIR/YouTube-Bridge.h"
          
          # Quét Class và tiêm vào Bridge
          nm -gU "$TARGET_BIN" | grep "OBJC_CLASS_$_" | sed 's/.*OBJC_CLASS_$_\(.*\)/@class \1;/' >> "$OUT_DIR/YouTube-Bridge.h"

      - name: 🎁 Nhập kho (Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "💎 Refinery: Nhập kho vào ${{ github.event.inputs.output_path }}" || exit 0
          git push

      - name: 🗑️ Dọn rác
        if: always()
        run: rm -rf src/refinery/staging/ app.ipa
