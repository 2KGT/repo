name: Emergency Clean theos

on:
  workflow_dispatch: # Để bạn có thể bấm chạy thủ công

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove ghost submodule
        run: |
          # Xóa sạch dấu vết của theos trong Git index
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf --cached theos || true
          rm -rf theos || true
          git commit -m "Fix: Remove ghost submodule theos [skip ci]" || echo "No changes"
          git push origin main
