      - name: "Sync List"
        run: |
          TARGET=".github/workflows/build-tweaks.yml"
          
          # 1. Lấy danh sách thư mục thực tế
          PROJECTS=$(ls -d src/Build_Tweak/*/ | xargs -n 1 basename)
          
          # 2. Tạo nội dung options mới (Luôn có dòng hướng dẫn ở đầu)
          # Lưu ý: Thụt lề 10 khoảng trắng để khớp với cấu trúc YAML
          NEW_OPTIONS="          - \"--- Vui lòng chọn dự án ---\"\n"
          NEW_OPTIONS+=$(echo "$PROJECTS" | sed 's/^/          - /')

          # 3. Ghi đè vào file build
          # Tìm đến dòng 'options:', giữ lại nó và chèn danh sách mới ngay dưới
          awk -v list="$NEW_OPTIONS" '
            /options:/ { print; print list; exit }
            { print }
          ' "$TARGET" > temp.yml && mv temp.yml "$TARGET"
