name: "Sync List"

on:
  push:
    paths:
      - 'src/Build_Tweak/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Update"
        run: |
          # 1. Đảm bảo tên file build chính xác
          TARGET=".github/workflows/build-tweaks.yml"
          
          # 2. Quét thư mục (Sửa đúng thành Build_Tweak viết hoa)
          # Thêm || true để tránh script dừng lại nếu chưa có thư mục nào
          PROJECTS=$(ls -d src/Build_Tweak/*/ 2>/dev/null | xargs -n 1 basename || echo "")
          
          # 3. Tạo danh sách (Mặc định có dòng hướng dẫn)
          OPTIONS="          - \"--- Chọn dự án ---\""
          
          if [ -n "$PROJECTS" ]; then
            ADD_PROJECTS=$(echo "$PROJECTS" | sed 's/^/          - /')
            FINAL_LIST="$OPTIONS"$'\n'"$ADD_PROJECTS"
          else
            FINAL_LIST="$OPTIONS"
          fi

          # 4. Ghi đè mục options trong file build
          sed -i '/options:/q' "$TARGET"
          echo -e "$FINAL_LIST" >> "$TARGET"

      - name: "Push"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || (git commit -m "sync list" && git push)
