name: Sync List

on:
  push:
    paths:
      - 'src/build-tweaks/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v4

      - name: Update build-tweaks.yml
        run: |
          TARGET=".github/workflows/build-tweaks.yml"
          
          # Tìm tên dự án từ dòng "Name:" trong file control
          # Quét trong thư mục src/build-tweaks/
          echo "          - none" > list.txt
          find src/build-tweaks -name "control" | while read -r file; do
            NAME=$(grep "^Name:" "$file" | cut -d':' -f2 | xargs)
            if [ -n "$NAME" ]; then
              echo "          - \"$NAME\"" >> list.txt
            fi
          done

          # Cắt file build-tweaks.yml tại dòng 'options:' và dán list mới vào
          sed -i '/options:/q' "$TARGET"
          cat list.txt >> "$TARGET"

      - name: Push update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || (git commit -m "sync: updated project list" && git push)
