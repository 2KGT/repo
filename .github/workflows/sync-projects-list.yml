name: Sync List

on:
  push:
    paths:
      - 'src/build-tweaks/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Options
        run: |
          TARGET=".github/workflows/build-tweaks.yml"
          
          # 1. Quét control và tạo danh sách
          echo "          - none" > new_opts.txt
          find src/build-tweaks -name "control" | while read -r file; do
            NAME=$(grep "^Name:" "$file" | cut -d':' -f2- | xargs)
            if [ -n "$NAME" ]; then
              echo "          - $NAME" >> new_opts.txt
            fi
          done

          # 2. Xóa sạch các dòng cũ nằm giữa 'options:' và 'jobs:'
          sed -i '/^ *options:/,/^jobs:/{ /^ *options:/!{ /^jobs:/!d } }' "$TARGET"

          # 3. Chèn danh sách mới vào ngay bên dưới 'options:'
          sed -i '/^ *options:/r new_opts.txt' "$TARGET"

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || (git commit -m "sync: updated project list" && git push)
