name: Sync List

on:
  push:
    paths:
      - 'src/build-tweaks/**/control'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync Unique Project Names
        run: |
          TARGET=".github/workflows/build-tweaks.yml"
          
          # Lấy Name từ control, tự động lọc trùng bằng 'sort -u'
          echo "          - none" > new_opts.txt
          find src/build-tweaks -name "control" -exec grep "^Name:" {} \; | cut -d':' -f2- | awk '{$1=$1};1' | sort -u | while read -r name; do
            if [ -n "$name" ]; then
              echo "          - \"$name\"" >> new_opts.txt
            fi
          done

          # Cắt và ghép an toàn vào giữa options: và jobs:
          sed -n '1,/^ *options:/p' "$TARGET" > header.yml
          sed -n '/^ *jobs:/,$p' "$TARGET" > footer.yml
          cat header.yml new_opts.txt footer.yml > temp.yml
          mv temp.yml "$TARGET"
          rm header.yml new_opts.txt footer.yml temp.yml 2>/dev/null || true

      - name: Push update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$TARGET"
          git diff --cached --quiet || (git commit -m "sync: updated unique project names" && git push)
