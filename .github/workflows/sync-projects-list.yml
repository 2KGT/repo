      - name: "Sync List"
        run: |
          TARGET=".github/workflows/build-tweaks.yml"
          
          # Quét trực tiếp thư mục, giữ nguyên hoa thường
          # Lệnh này sẽ lấy chính xác tên: AutoAc, MyTweak, v.v.
          PROJECTS=$(cd src/Build_Tweak && ls -d */ | sed 's/\///')
          
          if [ -z "$PROJECTS" ]; then
            echo "⚠️ Không tìm thấy dự án."
            exit 0
          fi

          # Tạo danh sách options cho YAML
          OPTIONS=$(echo "$PROJECTS" | sed 's/^/          - /')

          # Cập nhật vào file build
          awk -v list="$OPTIONS" '
            /options:/ { print; print list; exit }
            { print }
          ' "$TARGET" > temp.yml && mv temp.yml "$TARGET"
