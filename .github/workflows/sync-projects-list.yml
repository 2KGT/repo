name: Sync List

on:
  push:
    paths:
      - 'src/build-tweaks/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Options
        run: |
          TARGET=".github/workflows/build-tweaks.yml"
          
          # 1. Quét file control trong src/build-tweaks và lấy Name
          LIST="          - none"
          while read -r file; do
            NAME=$(grep "^Name:" "$file" | cut -d':' -f2- | xargs)
            if [ -n "$NAME" ]; then
              LIST="$LIST\n          - $NAME"
            fi
          done < <(find src/build-tweaks -name "control" 2>/dev/null)
          
          # 2. Thay thế chính xác phần giữa 'options:' và 'jobs:'
          awk -v new_opts="$LIST" '
            /^ *options:/ { print; printf "%s\n", new_opts; in_opts=1; next }
            /^ *jobs:/ { in_opts=0 }
            in_opts { next }
            { print }
          ' "$TARGET" > temp.yml && mv temp.yml "$TARGET"

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || (git commit -m "sync: updated project list" && git push)
