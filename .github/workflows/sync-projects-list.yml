      - name: "Sync List to Description"
        run: |
          TARGET=".github/workflows/build-tweaks.yml"
          
          # Quét danh sách dự án
          PROJECTS=$(ls -d src/Build_Tweak/*/ | xargs -n 1 basename | tr '\n' ', ')
          
          # Tạo dòng mô tả mới kèm danh sách dự án
          NEW_DESC="description: '⌨️ Nhập tên dự án (Gợi ý: $PROJECTS)'"

          # Dùng sed để cập nhật dòng description trong file build
          sed -i "s|description: '⌨️ Nhập tên dự án.*|$NEW_DESC|" $TARGET
