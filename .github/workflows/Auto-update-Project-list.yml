name: "Auto Update Project List"

on:
  push:
    paths:
      - 'src/Build_Tweak/**'
  workflow_dispatch: # Dòng này phải thẳng hàng với 'push:'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan and Update Build Workflow
        run: |
          # Đảm bảo tên file này khớp với file build chính của bạn
          TARGET_FILE=".github/workflows/build-tweaks.yml"

          if [ ! -f "$TARGET_FILE" ]; then
            echo "❌ Không tìm thấy file $TARGET_FILE"
            exit 1
          fi

          # Lấy danh sách thư mục dự án
          PROJECTS=$(ls -d src/Build_Tweak/*/ | xargs -n 1 basename)
          OPTIONS_LIST=$(echo "$PROJECTS" | sed 's/^/          - /')

          # Cập nhật danh sách vào file build
          awk -v new_list="$OPTIONS_LIST" '
            /options:/ { print; print new_list; exit }
            { print }
          ' "$TARGET_FILE" > temp.yml && mv temp.yml "$TARGET_FILE"

      - name: Commit and Push update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update projects list [skip ci]"
            git push origin main
          fi
