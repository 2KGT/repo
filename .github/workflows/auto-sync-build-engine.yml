name: "Tôí ưu hoá Build System"

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Tên thư mục dự án'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # [Tối ưu 1] Cache Theos để tăng tốc
      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: theos
          key: theos-cache-v1

      - name: Install Theos & SDK (Nếu cache trống)
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git theos
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz | tar -xJ -C theos/sdks

      - name: Setup Environment
        run: |
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          sudo apt-get install -y build-essential lzma liblzma-dev

      - name: Build Tweak
        run: |
          cd src/build-tweaks/${{ github.event.inputs.project_name }}
          make package FINALPACKAGE=1
          
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_name }}-deb
          path: src/build-tweaks/${{ github.event.inputs.project_name }}/packages/*.deb
