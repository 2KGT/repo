name: YML Manager Pro
on:
  workflow_dispatch:
    inputs:
      action:
        type: choice
        description: 'Chon chuc nang'
        options:
          - backup
          - restore
          - delete
      target_file:
        type: choice
        description: 'Chon ban sao luu'
        options:
          # OPTIONS-START
          - '(none)'
          # OPTIONS-END
jobs:
  manage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Logic
        run: |
          act="${{ github.event.inputs.action }}"
          tgt="${{ github.event.inputs.target_file }}"
          if [ "$act" == "backup" ]; then
            mkdir -p src/sync-yml
            for f in .github/workflows/*.yml; do
              name=$(basename "$f" .yml)
              mkdir -p "src/sync-yml/$name"
              count=$(ls "src/sync-yml/$name" | wc -l)
              new_num=$((count + 1))
              cp "$f" "src/sync-yml/$name/$new_num-$name.yml"
            done
          elif [ "$act" == "restore" ] && [ "$tgt" != "(none)" ]; then
            fname=$(basename "$tgt")
            orig=$(echo "$fname" | sed -E 's/^[0-9]+-//')
            cp "$tgt" ".github/workflows/$orig"
          elif [ "$act" == "delete" ] && [ "$tgt" != "(none)" ]; then
            rm -f "$tgt"
          fi
      - name: Update Menu
        run: |
          files=$(find src/sync-yml -name "*.yml" | sort)
          list="(none)"
          for f in $files; do list="$list\n          - '$f'"; done
          sed -i "/# OPTIONS-START/,/# OPTIONS-END/ { /# OPTIONS-START/ n; /# OPTIONS-END/ ! d; }" .github/workflows/yml-manager.yml
          sed -i "/# OPTIONS-START/ a $list" .github/workflows/yml-manager.yml
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "update" && git push)
