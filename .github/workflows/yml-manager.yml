name: YML Manager Pro
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Chon chuc nang'
        required: true
        type: choice
        default: 'backup'
        options: [backup, restore, delete]
      target_file:
        description: 'Chon ban sao luu'
        required: false
        type: choice
        default: '(none)'
        options:
          # OPTIONS-START
          - '(none)'
          # OPTIONS-END
jobs:
  manage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Logic
        run: |
          python3 -c "
          import os, glob, re, shutil
          act = '${{ github.event.inputs.action }}'
          tgt = '${{ github.event.inputs.target_file }}'
          if act == 'backup':
            os.makedirs('src/sync-yml', exist_ok=True)
            for f in glob.glob('.github/workflows/*.yml'):
              nm = os.path.basename(f).replace('.yml', '')
              dr = f'src/sync-yml/{nm}'
              os.makedirs(dr, exist_ok=True)
              ex = glob.glob(f'{dr}/*-{nm}.yml')
              nums = [int(os.path.basename(x).split('-')[0]) for x in ex if os.path.basename(x).split('-')[0].isdigit()]
              nxt = max(nums) + 1 if nums else 1
              shutil.copy2(f, f'{dr}/{nxt}-{nm}.yml')
          elif act == 'restore' and tgt != '(none)':
            if os.path.exists(tgt):
              orig = re.sub(r'^\d+-', '', os.path.basename(tgt))
              shutil.copy2(tgt, f'.github/workflows/{orig}')
          elif act == 'delete' and tgt != '(none)':
            if os.path.exists(tgt): os.remove(tgt)
          "
      - name: Update Menu
        run: |
          python3 -c "
          import os, glob, re
          bk = ['(none)']
          for f in glob.glob('src/sync-yml/**/*.yml', recursive=True): bk.append(f)
          bk.sort()
          path = '.github/workflows/yml-manager.yml'
          if os.path.exists(path):
            with open(path, 'r') as f: c = f.read()
            opts = '\n'.join([f'          - \'{b}\'' for b in bk])
            nc = re.sub(r'(# OPTIONS-START\n).*?(\n[ \t]*# OPTIONS-END)', f'\\1{opts}\\2', c, flags=re.DOTALL)
            with open(path, 'w') as f: f.write(nc)
          "
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ src/sync-yml/
          git diff --cached --quiet || (git commit -m "chore: yml update" && git push)
