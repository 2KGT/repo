<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyic Repository</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a1428, #1e3a8a, #312e81);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 80px 20px 60px;
            position: relative;
            z-index: 2;
        }

        img {
            width: 128px;
            height: 128px;
            border-radius: 28px;
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        h1 { 
            font-size: 2.7em; 
            margin-bottom: 12px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        p { 
            font-size: 1.2em; 
            opacity: 0.92; 
            margin-bottom: 45px;
        }

        /* Glassmorphism mạnh kiểu iOS */
        .glass-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 22px 30px;
            font-size: 1.15em;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
            margin: 14px auto;
            max-width: 340px;
            display: block;
            color: white;
            transition: all 0.4s ease;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-6px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
        }

        .info {
            margin-top: 60px;
            font-size: 0.96em;
            opacity: 0.85;
            line-height: 1.6;
        }

        /* Hiệu ứng nền mịn */
        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <img src="https://2kgt.github.io/repo/CydiaIcon.png" alt="Kyic Repository">

        <h1>Kyic Repository</h1>
        <p>Repo tweak & IPA chất lượng cao cho iOS</p>

        <!-- Nút Esign / Feather - Trên -->
        <a href="#" onclick="copyEsign(); return false;" class="glass-btn">
            📱 Add vào Esign / Feather
        </a>

        <!-- Nút Sileo - Dưới -->
        <a href="#" onclick="copySileo(); return false;" class="glass-btn">
            📦 Add vào Sileo / Cydia / Zebra
        </a>

        <div class="info">
            📍 Hanoi, Vietnam<br><br>
            Nhấn nút để tự động sao chép link<br>
            Dán vào ứng dụng tương ứng
        </div>
    </div>

    <script>
        function copySileo() {
            navigator.clipboard.writeText("https://2kgt.github.io/repo/").then(() => {
                alert("✅ Đã copy link Sileo!\n\nMở Sileo → Sources → + → Dán link");
            });
        }

        function copyEsign() {
            navigator.clipboard.writeText("https://2kgt.github.io/repo/apps.json").then(() => {
                alert("✅ Đã copy link Esign/Feather!\n\nMở Esign → App Source → + → Dán link");
            });
        }
    </script>
</body>
</html>
