<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyic IPA Repository</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        img {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #1e3a8a;
            padding: 14px 32px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }
        .info {
            margin-top: 40px;
            font-size: 0.95em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://2kgt.github.io/repo/icons/Kyic.png" alt="Kyic IPA Repository">
        <h1>Kyic IPA Repository</h1>
        <p>Repo chuyên cung cấp IPA &amp; Tweaks chất lượng cao cho iOS</p>
        
        <a href="https://2kgt.github.io/repo/apps.json" class="btn">📱 Thêm vào Esign / Feather</a>
        <br><br>
        <a href="https://2kgt.github.io/repo/" class="btn" style="background:#1e40af; color:white;">📦 Thêm vào Sileo / Cydia</a>
        
        <div class="info">
            <p>📍 Hanoi, Vietnam<br>
            Cập nhật thường xuyên • Hỗ trợ Esign, Feather, Sileo</p>
        </div>
    </div>
</body>
</html>
