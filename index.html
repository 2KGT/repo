<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyic Repository</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        img { width: 120px; height: 120px; border-radius: 22px; margin: 20px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        h1 { font-size: 2.5em; margin: 10px 0; }
        p { font-size: 1.2em; opacity: 0.9; margin-bottom: 40px; }
        .btn {
            display: block;
            margin: 15px auto;
            max-width: 340px;
            padding: 18px 24px;
            font-size: 1.15em;
            font-weight: 600;
            border-radius: 16px;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .esign-btn { background: white; color: #1e3a8a; }
        .sileo-btn { background: #1e40af; color: white; }
    </style>
</head>
<body>
    <img src="https://2kgt.github.io/repo/CydiaIcon.png" alt="Kyic Repository">
    <h1>Kyic Repository</h1>
    <p>Repo cung cấp tweak & IPA chất lượng cho iOS</p>

    <a href="#" onclick="copyEsign(); return false;" class="btn esign-btn">
        📋 Copy Link thêm vào Esign / Feather
    </a>

    <a href="https://2kgt.github.io/repo/" class="btn sileo-btn">
        📦 Thêm vào Sileo / Cydia / Zebra
    </a>

    <div style="margin-top: 60px; font-size: 0.95em; opacity: 0.85;">
        📍 Hanoi, Vietnam<br><br>
        Nhấn nút trên → Dán link vào Esign (App Source) hoặc Feather
    </div>

    <script>
        function copyEsign() {
            const link = "https://2kgt.github.io/repo/apps.json";
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ Đã copy link!\n\nMở Esign → App Source → + → Dán link\nHoặc Feather → Add AltStore Source");
            }).catch(() => {
                prompt("Copy thủ công:", link);
            });
        }
    </script>
</body>
</html>
