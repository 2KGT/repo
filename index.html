<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyic Repository</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        img {
            width: 120px;
            height: 120px;
            border-radius: 22px;
            margin: 20px 0 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        h1 { font-size: 2.6em; margin: 10px 0 8px; }
        p { font-size: 1.2em; opacity: 0.9; margin-bottom: 40px; }
        .btn {
            display: block;
            margin: 16px auto;
            max-width: 340px;
            padding: 18px 24px;
            font-size: 1.15em;
            font-weight: 600;
            border-radius: 16px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .btn:active { transform: scale(0.96); }
        .sileo-btn { background: #1e40af; color: white; }
        .esign-btn { background: white; color: #1e3a8a; }
    </style>
</head>
<body>
    <img src="https://2kgt.github.io/repo/CydiaIcon.png" alt="Kyic Repository">

    <h1>Kyic Repository</h1>
    <p>Repo cung cấp tweak & IPA chất lượng cao cho iOS</p>

    <!-- Nút Sileo / Cydia -->
    <a href="#" onclick="copySileoLink(); return false;" class="btn sileo-btn">
        📦 Copy Link thêm vào Sileo / Cydia / Zebra
    </a>

    <!-- Nút Esign / Feather -->
    <a href="#" onclick="copyEsignLink(); return false;" class="btn esign-btn">
        📱 Copy Link thêm vào Esign / Feather
    </a>

    <div style="margin-top: 60px; font-size: 0.95em; opacity: 0.85;">
        📍 Hanoi, Vietnam
    </div>

    <script>
        function copySileoLink() {
            const link = "https://2kgt.github.io/repo/";
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ Đã sao chép link Sileo!\n\nMở Sileo → Sources → + → Dán link");
            }).catch(() => {
                prompt("Sao chép thủ công:", link);
            });
        }

        function copyEsignLink() {
            const link = "https://2kgt.github.io/repo/apps.json";
            navigator.clipboard.writeText(link).then(() => {
                alert("✅ Đã sao chép link Esign/Feather!\n\nMở Esign → App Source → + → Dán link\nHoặc Feather → Add AltStore Source");
            }).catch(() => {
                prompt("Sao chép thủ công:", link);
            });
        }
    </script>
</body>
</html>
