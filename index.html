<script>
const API = "https://YOUR_RENDER_URL"; // 🔥 đổi sau khi deploy

// ===== COPY LINK (giữ nguyên) =====
function copySileo() {
    navigator.clipboard.writeText("https://2kgt.github.io/repo/");
    showToast("📦 Đã copy link Sileo");
}

function copyEsign() {
    navigator.clipboard.writeText("https://2kgt.github.io/repo/apps.json");
    showToast("📱 Đã copy link Esign");
}

// ===== TOAST UI XỊN =====
function showToast(msg) {
    const t = document.createElement("div");
    t.innerText = msg;
    t.style = `
        position:fixed;
        bottom:40px;
        left:50%;
        transform:translateX(-50%);
        background:rgba(0,0,0,0.7);
        padding:12px 20px;
        border-radius:12px;
        backdrop-filter:blur(10px);
        z-index:9999;
    `;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

// ===== UPLOAD FILE IPA =====
async function uploadIPA(file) {
    const form = new FormData();
    form.append("ipa", file);

    showProgress("🔐 Đang ký IPA...");

    const res = await fetch(API + "/sign", {
        method: "POST",
        body: form
    });

    const data = await res.json();

    if (data.success) {
        finishInstall(data.manifest);
    } else {
        showToast("❌ Ký thất bại");
    }
}

// ===== SIGN TỪ LINK =====
async function signFromLink() {
    const ipa = prompt("Dán link IPA:");
    if (!ipa) return;

    showProgress("🌐 Đang tải & ký...");

    const res = await fetch(API + "/sign-from-url?ipa=" + encodeURIComponent(ipa));
    const data = await res.json();

    if (data.success) {
        finishInstall(data.manifest);
    } else {
        showToast("❌ Lỗi link");
    }
}

// ===== PROGRESS FAKE (UI XỊN) =====
function showProgress(text) {
    const box = document.createElement("div");
    box.id = "progressBox";
    box.innerHTML = `
        <div style="font-size:18px;margin-bottom:10px">${text}</div>
        <div style="height:6px;background:#333;border-radius:6px;overflow:hidden">
            <div id="bar" style="height:100%;width:10%;background:#22c55e"></div>
        </div>
    `;
    box.style = `
        position:fixed;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        background:rgba(20,20,30,0.8);
        padding:20px;
        border-radius:20px;
        backdrop-filter:blur(20px);
        z-index:9999;
    `;
    document.body.appendChild(box);

    let w = 10;
    const i = setInterval(()=>{
        w += Math.random()*10;
        if (w > 90) clearInterval(i);
        document.getElementById("bar").style.width = w + "%";
    }, 400);
}

// ===== INSTALL =====
function finishInstall(manifest) {
    document.getElementById("progressBox")?.remove();

    const url = API + manifest;
    const install = "itms-services://?action=download-manifest&url=" + url;

    showToast("🚀 Sẵn sàng cài");

    setTimeout(()=>{
        window.location.href = install;
    },1000);
}
</script>
