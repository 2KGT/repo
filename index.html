<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyic IPA Repository</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        img {
            width: 110px;
            height: 110px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { font-size: 2.4em; margin: 10px 0; }
        p { font-size: 1.15em; opacity: 0.9; margin-bottom: 35px; }
        .btn {
            display: block;
            margin: 12px auto;
            max-width: 320px;
            padding: 16px 20px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 14px;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }
        .esign-btn {
            background: white;
            color: #1e3a8a;
        }
        .sileo-btn {
            background: #1e40af;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://2kgt.github.io/repo/icons/Kyic.png" alt="Kyic IPA Repository">
        <h1>Kyic IPA Repository</h1>
        <p>Repo chuyên cung cấp IPA &amp; Tweaks chất lượng cao cho iOS</p>
        
        <!-- Nút Esign / Feather -->
        <a href="https://2kgt.github.io/repo/apps.json" class="btn esign-btn">
            📱 Thêm vào Esign / Feather
        </a>
        
        <!-- Nút Sileo / Cydia -->
        <a href="https://2kgt.github.io/repo/" class="btn sileo-btn">
            📦 Thêm vào Sileo / Cydia
        </a>
        
        <div style="margin-top: 50px; font-size: 0.95em; opacity: 0.85;">
            📍 Hanoi, Vietnam<br>
            Cập nhật thường xuyên • Hỗ trợ Esign, Feather, Sileo
        </div>
    </div>
</body>
</html>
